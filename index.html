// ── Finance tab — API helpers ────────────────────────────────────
// El túnel trycloudflare cambia de URL en cada reinicio de la Mac. La Mac
// publica la URL vigente en data/api-url.json (paso del auto_refresh); aquí la
// auto-descubrimos para que el usuario solo tenga que pegar el TOKEN una vez.
window._publishedApiUrl = null;
(async function(){
  try {
    const r = await fetch('data/api-url.json?_='+Date.now(), {cache:'no-store'});
    if (r.ok) {
      const j = await r.json();
      if (j && j.url) {
        window._publishedApiUrl = String(j.url).replace(/\/+$/, '');
        const stored = (localStorage.getItem('finance_api_url')||'').replace(/\/+$/, '');
        if (stored && stored !== window._publishedApiUrl) {
          localStorage.setItem('finance_api_url', window._publishedApiUrl);  // auto-heal URL vieja
        }
      }
    }
  } catch(e) {}
})();

function financeApiConfig() {
  return {
    url: (localStorage.getItem('finance_api_url')||window._publishedApiUrl||'').replace(/\/+$/, ''),
    token: localStorage.getItem('finance_api_token')||'',
  };
}

function financeApiConfigured() {
  const {url, token} = financeApiConfig();
  return !!(url && token);
}

async function financeApi(path, options={}) {
  const {url, token} = financeApiConfig();
  if (!url || !token) throw new Error('API not configured (open Settings)');
  // For FormData uploads, do NOT set Content-Type — let browser add the multipart boundary.
  const isFormData = options.body instanceof FormData;
  const baseHeaders = { 'Authorization': 'Bearer ' + token };
  if (!isFormData) baseHeaders['Content-Type'] = 'application/json';
  const res = await fetch(url + path, {
    ...options,
    headers: { ...baseHeaders, ...(options.headers||{}) },
  });
  const text = await res.text();
  let body;
  try { body = text ? JSON.parse(text) : null; } catch(e) { body = text; }
  if (!res.ok) throw new Error('API ' + res.status + ': ' + (typeof body === 'string' ? body : JSON.stringify(body)));
  return body;
}

function financeModal(title, bodyHtml, onSubmit) {
  const bg = document.createElement('div');
  bg.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px';
  bg.innerHTML = `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:20px;min-width:320px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:16px;font-weight:700">${title}</div>
      <button type="button" style="background:none;border:none;color:var(--txt2);font-size:20px;cursor:pointer;padding:0 4px" data-close>×</button>
    </div>
    <form style="display:flex;flex-direction:column;gap:10px">${bodyHtml}
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px">
        <button type="button" data-close style="padding:8px 14px;font-size:13px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;cursor:pointer">Cancel</button>
        <button type="submit" style="padding:8px 14px;font-size:13px;font-weight:600;background:var(--blu);color:#fff;border:none;border-radius:6px;cursor:pointer">Save</button>
      </div>
    </form>
    <div data-err style="color:var(--red);font-size:12px;margin-top:8px;display:none"></div>
  </div>`;
  document.body.appendChild(bg);
  const err = bg.querySelector('[data-err]');
  const close = () => bg.remove();
  bg.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', close));
  bg.addEventListener('click', e => { if (e.target === bg) close(); });
  bg.querySelector('form').addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const fd = new FormData(ev.target);
    const data = {};
    for (const [k, v] of fd.entries()) if (v !== '') data[k] = v;
    try {
      const submitBtn = ev.target.querySelector('button[type=submit]');
      submitBtn.disabled = true; submitBtn.textContent = 'Saving...';
      await onSubmit(data);
      close();
    } catch (e) {
      err.textContent = e.message;
      err.style.display = '';
      const submitBtn = ev.target.querySelector('button[type=submit]');
      submitBtn.disabled = false; submitBtn.textContent = 'Save';
    }
  });
  setTimeout(() => bg.querySelector('input')?.focus(), 50);
  return bg;
}

// ── Fixed Costs Pay Queue ─────────────────────────────────────────────
async function financePayQueueLoad() {
  const host = document.getElementById('pay-queue-body');
  const summary = document.getElementById('pay-queue-summary');
  if (!host) return;
  // Local money formatter — module-scoped fmt() isn't in scope here.
  const $ = (n) => '$' + (Math.round((n || 0) * 100) / 100).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  try {
    const r = await financeApi('/fixed-cost/pending');
    const pending = (r && r.pending) || [];
    pending.sort((a, b) => a.scheduled_date.localeCompare(b.scheduled_date) || a.name.localeCompare(b.name));
    const today = new Date().toISOString().slice(0, 10);
    const total = pending.reduce((s, p) => s + (p.amount || 0), 0);
    const overdueCount = pending.filter(p => p.scheduled_date < today).length;
    if (summary) {
      summary.innerHTML = pending.length
        ? `<b>${pending.length}</b> to pay · <b style="color:var(--red)">${$(total)}</b> total${overdueCount ? ` · <span style="color:var(--ylw)">${overdueCount} past due</span>` : ''}`
        : `<span style="color:var(--grn)">✓ all caught up</span>`;
    }
    if (!pending.length) {
      host.innerHTML = '<div style="padding:18px;color:var(--grn);font-size:13px;text-align:center">🎉 No fixed costs due. Caught up.</div>';
      return;
    }
    // ── FLAT LIST: every pending occurrence appears on today's queue
    //    regardless of when it was originally scheduled. The "Original Due"
    //    column shows the scheduled date + days-overdue badge so you know
    //    how stale each obligation is. Tomorrow's load will show them all
    //    again (with badges incremented) until you click PAID.
    const dtToday = new Date(today + 'T12:00:00');
    let h = `<div style="padding:10px 14px;background:linear-gradient(135deg,#7f1d1d,#991b1b);color:#fff;display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.8">Pay these today</div><div style="font-weight:700;font-size:14px">${dtToday.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'})}</div></div>
      <div style="text-align:right"><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.8">Total due</div><div style="font-size:20px;font-weight:800;font-family:var(--mono)">${$(total)}</div></div>
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead style="background:var(--raised)"><tr style="text-align:left;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px">
        <th style="padding:6px 14px">Original Due</th>
        <th style="padding:6px 8px">Name</th>
        <th style="padding:6px 8px">Category</th>
        <th style="padding:6px 8px;text-align:right">Amount</th>
        <th style="padding:6px 14px;width:90px"></th>
      </tr></thead>
      <tbody>`;
    pending.forEach(p => {
      const dt = new Date(p.scheduled_date + 'T12:00:00');
      const days = Math.floor((dtToday - dt) / 86400000);
      const overdueTag = days > 0
        ? `<span style="background:rgba(234,170,8,.15);color:var(--ylw);padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;margin-left:6px">${days}d OVERDUE</span>`
        : (days === 0 ? '<span style="background:rgba(96,165,250,.15);color:var(--blu);padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;margin-left:6px">DUE TODAY</span>' : '');
      h += `<tr style="border-top:1px solid rgba(33,39,47,.3)">
        <td style="padding:7px 14px;font-family:var(--mono);font-size:11px;color:var(--txt2);white-space:nowrap">${dt.toLocaleDateString('en-US', {month:'short',day:'numeric'})}${overdueTag}</td>
        <td style="padding:7px 8px;font-weight:600">${(p.name || '').replace(/</g, '&lt;')}</td>
        <td style="padding:7px 8px;color:var(--txt2);font-size:11px">${(p.category || '—')}</td>
        <td style="padding:7px 8px;text-align:right;font-family:var(--mono);color:var(--red);font-weight:700">${$(p.amount)}</td>
        <td style="padding:7px 14px;text-align:right">
          <button class="pay-btn" data-rule="${p.rule_id}" data-date="${p.scheduled_date}" data-amount="${p.amount}" style="padding:5px 14px;background:var(--grn);color:#fff;border:none;border-radius:5px;font-weight:700;cursor:pointer;font-size:11px">PAID</button>
        </td>
      </tr>`;
    });
    h += '</tbody></table>';
    host.innerHTML = h;
    host.querySelectorAll('button.pay-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        btn.textContent = '…';
        try {
          await financeApi('/fixed-cost/pay', {
            method: 'POST',
            body: JSON.stringify({
              rule_id: parseInt(btn.dataset.rule, 10),
              scheduled_date: btn.dataset.date,
              amount: parseFloat(btn.dataset.amount),
              note: 'paid via dashboard',
            }),
          });
          // Re-fetch the pay queue (row disappears)
          financePayQueueLoad();
        } catch (e) {
          alert(`Mark paid failed: ${e.message}`);
          btn.disabled = false;
          btn.textContent = 'PAID';
        }
      });
    });
  } catch (e) {
    host.innerHTML = `<div style="padding:14px;color:var(--red);font-size:13px">Failed to load pay queue: ${e.message}</div>`;
  }
}

async function financeToggleConfirm(sourceId, currentlyConfirmed) {
  if (!sourceId) return;
  const newConfirmed = !currentlyConfirmed;
  try {
    // Tiny request → tiny response. Avoids massive state payloads through the tunnel.
    await financeApi('/confirmation', {
      method: 'POST',
      body: JSON.stringify({
        source_id: sourceId,
        confirmed: newConfirmed,
      }),
    });
    // Update FINANCE_DATA in place — flip the confirmed flag on this event
    if (FINANCE_DATA) {
      const updateEvent = e => { if (e && (e.confirm_key || e.source_id) === sourceId) e.confirmed = newConfirmed; };
      (FINANCE_DATA.timeline || []).forEach(updateEvent);
      (FINANCE_DATA.overdue || []).forEach(updateEvent);
      // Per-project events arrays are duplicates of the same dicts above — same in-place update
      (FINANCE_DATA.by_project || []).forEach(p => (p.events || []).forEach(updateEvent));
      // Recompute running_balance_confirmed walking the timeline (only confirmed events count)
      const startBal = (FINANCE_DATA.bank && FINANCE_DATA.bank.current_balance) || 0;
      let runConf = startBal;
      (FINANCE_DATA.timeline || []).forEach(e => {
        if (e.confirmed) runConf += (e.amount || 0);
        e.running_balance_confirmed = Math.round(runConf * 100) / 100;
      });
      // Update aggregates' confirmed totals + counts
      ['day','week','month'].forEach(unit => {
        const bs = (FINANCE_DATA.aggregated && FINANCE_DATA.aggregated[unit]) || [];
        bs.forEach(b => {
          const inWin = (FINANCE_DATA.timeline || []).filter(e => e.date >= b.start && e.date <= b.end);
          const conf = inWin.filter(e => e.confirmed);
          b.inflow_confirmed = Math.round(conf.filter(e=>e.amount>0).reduce((s,e)=>s+e.amount,0)*100)/100;
          b.outflow_confirmed = Math.round(conf.filter(e=>e.amount<0).reduce((s,e)=>s+Math.abs(e.amount),0)*100)/100;
          b.net_confirmed = Math.round((b.inflow_confirmed - b.outflow_confirmed)*100)/100;
          b.count_confirmed = conf.length;
          // closing_balance_confirmed = running_balance_confirmed of last event in bucket
          let cb = null;
          for (let i = inWin.length - 1; i >= 0; i--) {
            if (inWin[i].running_balance_confirmed != null) { cb = inWin[i].running_balance_confirmed; break; }
          }
          if (cb !== null) b.closing_balance_confirmed = cb;
        });
      });
    }
    financeSafeRender();
  } catch (e) {
    alert('Toggle failed: ' + e.message);
  }
}

// Local YYYY-MM-DD (avoids toISOString timezone day-shift)
function finYmd(dt) {
  return dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-' + String(dt.getDate()).padStart(2, '0');
}

// Window presets (Jose 2026-07-13): exactly This month / Q3 / Q4.
// Q3 = Jul 1 → Sep 30, Q4 = Oct 1 → Dec 31 (year taken from data.date — never hardcoded).
function financeRangeBounds(data) {
  const range = window._financeRange || 'month';
  const today = new Date(data.date + 'T12:00:00');
  const yr = today.getFullYear();
  if (range === 'q3') return { start: new Date(yr, 6, 1), end: new Date(yr, 8, 30) };
  if (range === 'q4') return { start: new Date(yr, 9, 1), end: new Date(yr, 11, 31) };
  // default 'month' → the current calendar month
  return { start: new Date(yr, today.getMonth(), 1), end: new Date(yr, today.getMonth() + 1, 0) };
}

function financeRangeEndDate(data) {
  return financeRangeBounds(data).end;
}

function financeFilterByRange(data) {
  const bounds = financeRangeBounds(data);
  const rangeEndStr = finYmd(bounds.end);
  const rangeStartStr = finYmd(bounds.start);

  const inRange = e => e.date >= rangeStartStr && e.date <= rangeEndStr;
  const tl = (data.timeline || []).filter(inRange);
  const fcFwd = ((data.fixed_cost_events || {}).forward || []).filter(inRange);

  const agg = {}, aggFixed = {};
  ['day', 'week', 'month'].forEach(u => {
    agg[u] = ((data.aggregated && data.aggregated[u]) || []).filter(b => b.start <= rangeEndStr && b.end >= rangeStartStr);
    aggFixed[u] = ((data.aggregated_fixed && data.aggregated_fixed[u]) || []).filter(b => b.start <= rangeEndStr && b.end >= rangeStartStr);
  });

  // Recompute summary for the range
  const totalIn = tl.filter(e => e.amount > 0).reduce((s, e) => s + e.amount, 0);
  const totalOut = tl.filter(e => e.amount < 0).reduce((s, e) => s + Math.abs(e.amount), 0);
  const startBal = data.summary.current_balance;
  const projected = startBal + totalIn - totalOut;
  const breakdown = tl.find(e => e.running_balance !== null && e.running_balance < 0);

  // Recompute by_project for the range — but preserve milestones, is_planning,
  // and overdue totals from the original so range-filtering doesn't strip them.
  // Every project from the original by_project remains in the result, even if it
  // has zero events in the filtered range, so the user always sees its milestones.
  const origByProj = {};
  (data.by_project || []).forEach(p => { origByProj[p.project] = p; });
  const projMap = {};
  Object.values(origByProj).forEach(orig => {
    projMap[orig.project] = {
      ...orig,                              // preserves milestones, is_planning, planning_event_count
      project: orig.project,
      // Range-scoped totals (will be zero if no events in window)
      net: 0, inflow: 0, outflow: 0,
      overdue_in: orig.overdue_in || 0,
      overdue_out: orig.overdue_out || 0,
      events: [],
      // Full-window snapshots (do NOT shrink with range)
      total_event_count: orig.event_count || 0,
      total_inflow: orig.inflow || 0,
      total_outflow: orig.outflow || 0,
      total_net: orig.net || 0,
    };
  });
  tl.forEach(e => {
    if (e.source_type === 'fixed_cost' || e.source_type === 'debt') return;
    const p = e.project || 'Other';
    if (!projMap[p]) {
      projMap[p] = { project: p, net: 0, inflow: 0, outflow: 0,
                     overdue_in: 0, overdue_out: 0, events: [],
                     milestones: [], is_planning: false,
                     total_event_count: 0, total_inflow: 0, total_outflow: 0, total_net: 0 };
    }
    projMap[p].net += e.amount;
    if (e.amount > 0) projMap[p].inflow += e.amount;
    else projMap[p].outflow += Math.abs(e.amount);
    projMap[p].events.push(e);
  });
  Object.keys(projMap).forEach(pn => {
    projMap[pn].net = Math.round(projMap[pn].net * 100) / 100;
    projMap[pn].inflow = Math.round(projMap[pn].inflow * 100) / 100;
    projMap[pn].outflow = Math.round(projMap[pn].outflow * 100) / 100;
    projMap[pn].event_count = projMap[pn].events.length;
  });
  // Sort by full-window net (NOT range-scoped) so all projects ranked by total scale
  const projectsFiltered = Object.values(projMap).sort((a, b) => {
    return Math.abs(b.total_net) - Math.abs(a.total_net);
  });

  return {
    ...data,
    _rangeStart: rangeStartStr,
    _rangeEnd: rangeEndStr,
    window_end: rangeEndStr,
    timeline: tl,
    fixed_cost_events: { ...data.fixed_cost_events, forward: fcFwd },
    aggregated: agg,
    aggregated_fixed: aggFixed,
    by_project: projectsFiltered,
    summary: {
      ...data.summary,
      incoming_window: Math.round(totalIn * 100) / 100,
      outgoing_window: Math.round(totalOut * 100) / 100,
      net_window: Math.round((totalIn - totalOut) * 100) / 100,
      projected_end_balance: Math.round(projected * 100) / 100,
      runway_breakdown_date: breakdown ? breakdown.date : null,
      event_count: tl.length,
    },
  };
}

function financeRenderCalendar(dayBuckets, fcByKey) {
  // Group day-buckets by YYYY-MM
  const fmtK = n => (n<0?'-':'') + '$' + Math.abs(Math.round(n||0)).toLocaleString();
  const byMonth = {};
  dayBuckets.forEach(b => {
    const mk = b.key.slice(0, 7);
    if (!byMonth[mk]) byMonth[mk] = {};
    byMonth[mk][b.key] = b;
  });
  const todayStr = new Date().toISOString().slice(0,10);
  let html = '<div style="display:flex;flex-direction:column;gap:22px">';
  Object.keys(byMonth).sort().forEach(mk => {
    const [y, mo] = mk.split('-').map(Number);
    const firstDay = new Date(y, mo-1, 1);
    const lastDay = new Date(y, mo, 0).getDate();
    // Monday=0 alignment
    const startWeekday = (firstDay.getDay() + 6) % 7;
    const monthName = firstDay.toLocaleString('default', { month: 'long', year: 'numeric' });
    html += `<div>`;
    html += `<div style="font-size:14px;font-weight:700;color:var(--txt);margin-bottom:8px">${monthName}</div>`;
    html += `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">`;
    ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
      html += `<div style="font-size:10px;color:var(--dim);text-align:center;padding:2px 0;font-weight:600;text-transform:uppercase;letter-spacing:.5px">${d}</div>`;
    });
    for (let i = 0; i < startWeekday; i++) html += '<div></div>';
    for (let day = 1; day <= lastDay; day++) {
      const ds = `${y}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const b = byMonth[mk][ds];
      const isToday = ds === todayStr;
      const net = b ? b.net : 0;
      const count = b ? b.count : 0;
      const cb = b ? b.closing_balance : null;
      const bgColor = net > 0 ? 'rgba(18,183,106,.14)'
                    : net < 0 ? 'rgba(240,68,56,.10)'
                    : 'var(--card)';
      const borderColor = isToday ? 'var(--blu)' : 'var(--bdr)';
      const borderWidth = isToday ? '2px' : '1px';
      const clickable = b ? `cursor:pointer` : 'cursor:default';
      const clickAttr = b ? ` class="fin-openday" data-date="${ds}"` : '';
      html += `<div${clickAttr} style="${clickable};background:${bgColor};border:${borderWidth} solid ${borderColor};border-radius:5px;padding:6px;min-height:74px;display:flex;flex-direction:column;gap:2px" title="${b ? count + ' events' : ''}">`;
      html += `<div style="font-size:11px;font-weight:${isToday?'700':'500'};color:${isToday?'var(--blu)':'var(--txt)'}">${day}${isToday?' ★':''}</div>`;
      if (b) {
        const netCol = net > 0 ? 'var(--grn)' : net < 0 ? 'var(--red)' : 'var(--txt2)';
        html += `<div style="font-size:11px;font-family:var(--mono);color:${netCol};font-weight:700">${net>0?'+':''}${fmtK(net)}</div>`;
        if (cb != null) html += `<div style="font-size:9px;font-family:var(--mono);color:${cb<0?'var(--red)':'var(--dim)'}">${cb<0?'':'='}${fmtK(cb)}</div>`;
        html += `<div style="font-size:9px;color:var(--dim);margin-top:auto">${count} evt${count!==1?'s':''}</div>`;
      }
      html += `</div>`;
    }
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

  // Project events within date range (exclude overhead source_types — they're their own category)

      <div style="font-size:18px;color:var(--red);font-family:var(--mono);font-weight:700">-$${Math.round(last30Total).toLocaleString()}</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:10px">
      <div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px">All time</div>
      <div style="font-size:18px;color:var(--red);font-family:var(--mono);font-weight:700">-$${Math.round(totalAll).toLocaleString()}</div>
      <div style="font-size:11px;color:var(--txt2)">${log.length} entr${log.length===1?'y':'ies'}</div>
    </div>
  </div>`;

  // Calendar: previous, current, next month
  const now = new Date();
  const months = [];
  for (let i = -1; i <= 1; i++) {
    const mo = new Date(now.getFullYear(), now.getMonth() + i, 1);
    months.push({ year: mo.getFullYear(), month: mo.getMonth() + 1 });
  }

  h += '<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:16px">';
  h += '<div style="display:flex;flex-direction:column;gap:18px">';
  months.forEach(({ year, month }) => {
    const firstDay = new Date(year, month - 1, 1);
    const lastDay = new Date(year, month, 0).getDate();
    const startWeekday = (firstDay.getDay() + 6) % 7;
    const monthName = firstDay.toLocaleString('default', { month: 'long', year: 'numeric' });
    h += `<div>`;
    h += `<div style="font-size:14px;font-weight:700;margin-bottom:8px">${monthName}</div>`;
    h += `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">`;
    ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(dn => {
      h += `<div style="font-size:10px;color:var(--dim);text-align:center;padding:2px 0;font-weight:600;text-transform:uppercase;letter-spacing:.5px">${dn}</div>`;
    });
    for (let i = 0; i < startWeekday; i++) h += '<div></div>';
    for (let day = 1; day <= lastDay; day++) {
      const ds = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const entries = byDate[ds] || [];
      const total = entries.reduce((s, r) => s + r.amount, 0);
      const isToday = ds === todayStr;
      const has = entries.length > 0;
      const bgColor = has ? 'rgba(247,144,9,.16)' : 'var(--bg)';
      const borderColor = isToday ? 'var(--blu)' : 'var(--bdr)';
      const borderWidth = isToday ? '2px' : '1px';
      h += `<div ${live?`class="fin-petty-day" data-date="${ds}"`:''} style="cursor:${live?'pointer':'default'};background:${bgColor};border:${borderWidth} solid ${borderColor};border-radius:5px;padding:6px;min-height:64px;display:flex;flex-direction:column;gap:2px">`;
      h += `<div style="font-size:11px;font-weight:${isToday?'700':'500'};color:${isToday?'var(--blu)':'var(--txt)'}">${day}${isToday?' ★':''}</div>`;
      if (has) {
        h += `<div style="font-size:11px;font-family:var(--mono);color:var(--red);font-weight:600">-$${Math.round(total).toLocaleString()}</div>`;
        h += `<div style="font-size:9px;color:var(--dim);margin-top:auto">${entries.length} entr${entries.length===1?'y':'ies'}</div>`;
      } else if (live) {
        h += `<div style="font-size:9px;color:var(--dim);margin-top:auto">+ add</div>`;
      }
      h += `</div>`;
    }
    h += '</div></div>';
  });
  h += '</div>';

  // Recent entries list below calendar
  if (log.length) {
    h += '<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--bdr)">';
    h += '<div style="font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Recent entries</div>';
    const recent = log.slice().sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id).slice(0, 10);
    recent.forEach(r => {
      h += `<div style="display:flex;align-items:center;gap:10px;padding:5px 0;border-top:1px solid rgba(33,39,47,.3);font-size:12px">`;
      h += `<span style="font-family:var(--mono);color:var(--txt2);white-space:nowrap;width:72px">${r.date}</span>`;
      h += `<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.description||'—'}</span>`;
      h += `<span style="color:var(--txt2);font-size:11px;white-space:nowrap">${r.category||''}</span>`;
      h += `<span style="font-family:var(--mono);color:var(--red);font-weight:600;white-space:nowrap">-$${r.amount.toLocaleString()}</span>`;
      if (live) h += `<a href="#" class="fin-void" data-kind="petty_cash" data-id="${r.id}" title="Void" style="color:var(--red);text-decoration:none">×</a>`;
      h += `</div>`;
    });
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function financeRenderBucketContent(start, end, rowId, live) {
  const d = FINANCE_DATA;
  if (!d) return '<div style="padding:14px;color:var(--dim)">No data.</div>';
  const fmt = n => (n<0?'-':'') + '$' + Math.abs(n||0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  const fmtK = n => (n<0?'-':'') + '$' + Math.abs(Math.round(n||0)).toLocaleString();
  const fmtDate = iso => { if (!iso) return '—'; const dt = new Date(iso + 'T12:00:00'); const MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${MS[dt.getMonth()]} ${dt.getDate()}`; };

  // d.timeline already contains ALL events (including fixed-cost and debt).
  // fixed_cost_events.forward is a subset of timeline — do NOT concat or you'll double-count.
  const bucketEvents = (d.timeline || []).filter(e => e.date >= start && e.date <= end);
  if (!bucketEvents.length) return '<div style="padding:14px;color:var(--dim);font-size:12px">No events in this period.</div>';

  const byProj = {};
  bucketEvents.forEach(e => {
    const p = e.source_type === 'fixed_cost' ? 'Fixed Costs' : e.source_type === 'debt' ? 'Debts' : (e.project || 'Other');
    (byProj[p] = byProj[p] || []).push(e);
  });
  const specialGroups = {'Fixed Costs': 1, 'Debts': 2};
  const projKeys = Object.keys(byProj).sort((a, bb) => {
    const sa = specialGroups[a] || 0, sb = specialGroups[bb] || 0;
    if (sa !== sb) return sa - sb;  // real projects first, then Fixed Costs, then Debts
    const na = byProj[a].reduce((s, e) => s + e.amount, 0);
    const nb = byProj[bb].reduce((s, e) => s + e.amount, 0);
    return Math.abs(nb) - Math.abs(na);
  });

  const PAGE = 15;
  // Single event row — shared by the flat (Fixed Costs / Debts) and the
  // category-segmented (per-project) rendering paths.
  const evRow = (e, hidden, hideKey) => {
    let html = '';
    const canVoid = live && ['petty_cash','misc_expense','non_project_income','bank_snapshot'].includes(e.source_type);
    const dbId = (e.source_id||'').replace(/^(pc|misc|npi|bs)-/, '');
    const isConf = !!e.confirmed;
    const jtRow = (e.source_type==='jobtread' && e.meta && e.meta.taskId) ? ` data-jt-row="${financeAttr(e.meta.taskId)}"` : '';
    html += `<div ${hidden?`data-hidden-in="${financeAttr(hideKey)}"`:''}${jtRow} style="display:${hidden?'none':'flex'};align-items:center;padding:3px 0;gap:10px;border-top:1px solid rgba(33,39,47,.3)">`;
    // Confirmation toggle (live mode only — needs API)
    if (live) {
      const tip = isConf ? 'Confirmed — click to mark Potential' : 'Potential — click to mark Confirmed';
      html += `<a href="#" class="fin-confirm" data-src="${financeAttr(e.confirm_key || e.source_id)}" data-confirmed="${isConf?1:0}" title="${tip}" style="color:${isConf?'var(--grn)':'var(--dim)'};text-decoration:none;font-size:14px;width:18px;text-align:center">${isConf?'☑':'☐'}</a>`;
    } else {
      html += `<span title="${isConf?'Confirmed':'Potential'}" style="color:${isConf?'var(--grn)':'var(--dim)'};font-size:14px;width:18px;text-align:center">${isConf?'☑':'☐'}</span>`;
    }
    html += `<span style="font-family:var(--mono);color:${e.moved?'var(--ylw)':'var(--txt2)'};white-space:nowrap;width:62px">${fmtDate(e.date)}</span>`;
    html += `<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.label||''}${finAssigneeTag(e)}</span>`;
    html += `<span style="font-family:var(--mono);color:${e.amount>=0?'var(--grn)':'var(--red)'};font-weight:600;white-space:nowrap">${e.amount>=0?'+':''}${fmt(e.amount)}</span>`;
    html += finPaidBtn(e, live);
    if (live) html += `<a href="#" class="fin-edit-amount" data-src="${financeAttr(e.source_id)}" data-amount="${e.amount}" data-label="${financeAttr(e.label||'')}" data-type="${financeAttr(e.source_type)}" data-task="${financeAttr((e.meta&&e.meta.taskId)||'')}" data-project="${financeAttr((e.meta&&e.meta.projectId)||'')}" title="Edit amount" style="color:var(--dim);text-decoration:none;margin-right:4px">✎</a>`;
    if (live) html += `<a href="#" class="fin-move" data-src="${financeAttr(e.source_id)}" data-date="${financeAttr(e.date)}" data-orig="${financeAttr(e.original_date)}" data-label="${financeAttr(e.label||'')}" data-task="${financeAttr((e.meta&&e.meta.taskId)||'')}" data-project="${financeAttr((e.meta&&e.meta.projectId)||'')}" data-type="${financeAttr(e.source_type)}" title="Move date" style="color:var(--dim);text-decoration:none">📅</a>`;
    if (canVoid) html += `<a href="#" class="fin-void" data-kind="${financeAttr(e.source_type)}" data-id="${dbId}" title="Void" style="color:var(--red);text-decoration:none">×</a>`;
    else html += `<span style="width:12px"></span>`;
    html += `</div>`;
    return html;
  };
  const showMoreLink = (n, hideKey) => `<div style="padding:6px 0;font-size:11px">
        <a href="#" class="fin-showmore" data-target="${financeAttr(hideKey)}" style="color:var(--blu);text-decoration:none">Show all ${n} events →</a>
      </div>`;

  // Second-level sub-segments inside each project (Jose 2026-07-13): items are
  // assigned by JobTread task type — category 'materials' / 'subs'; everything
  // else (income, additional, manual entries…) lands in Additional expenses.
  const CAT_SEGS = [
    { id: 'materials', label: '🧱 Materials', test: e => e.category === 'materials' },
    { id: 'subs',      label: '👷 Sub payments', test: e => e.category === 'subs' },
    { id: 'other',     label: '📋 Additional expenses', test: null },
  ];

  let html = '<div style="padding:10px 20px 14px">';
  projKeys.forEach(p => {
    const events = byProj[p].sort((a, bb) => a.date.localeCompare(bb.date));
    const net = events.reduce((s, e) => s + e.amount, 0);
    const inflow = events.filter(e => e.amount > 0).reduce((s, e) => s + e.amount, 0);
    const outflow = events.filter(e => e.amount < 0).reduce((s, e) => s + Math.abs(e.amount), 0);
    const projColor = p === 'Fixed Costs' ? 'var(--org)' : p === 'Debts' ? '#9B8AFB' : net >= 0 ? 'var(--grn)' : 'var(--red)';
    html += `<div style="margin-top:10px;padding:8px 10px;background:var(--card);border-left:3px solid ${projColor};border-radius:0 6px 6px 0">`;
    html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:13px">`;
    html += `<b>${p}</b> <span style="color:var(--txt2);font-size:11px;margin-left:6px">${events.length} event${events.length>1?'s':''}</span>`;
    html += `<span style="color:var(--txt2);font-size:12px">`;
    if (inflow) html += `<span style="color:var(--grn);margin-right:10px">+${fmtK(inflow)}</span>`;
    if (outflow) html += `<span style="color:var(--red);margin-right:10px">-${fmtK(outflow)}</span>`;
    html += `<span style="font-weight:700;color:${net>=0?'var(--grn)':'var(--red)'}">${net>=0?'+':''}${fmtK(net)}</span>`;
    html += `</span></div>`;
    html += `<div style="font-size:12px">`;
    const pKey = p.replace(/[^a-z0-9]/gi,'_');
    const hideKey = `${rowId}-${pKey}`;
    if (specialGroups[p]) {
      // Fixed Costs / Debts pseudo-groups — flat list (no task types here)
      events.forEach((e, idx) => { html += evRow(e, idx >= PAGE, hideKey); });
      if (events.length > PAGE) html += showMoreLink(events.length, hideKey);
    } else {
      // Real project — Materials / Sub payments / Additional expenses sub-segments
      let remaining = events.slice();
      CAT_SEGS.forEach(seg => {
        const segEvents = seg.test ? remaining.filter(seg.test) : remaining;
        if (seg.test) remaining = remaining.filter(e => !seg.test(e));
        if (!segEvents.length) return;
        const segKey = `${hideKey}-${seg.id}`;
        const segIn = segEvents.filter(e => e.amount > 0).reduce((s, e) => s + e.amount, 0);
        const segOut = segEvents.filter(e => e.amount < 0).reduce((s, e) => s + Math.abs(e.amount), 0);
        const segNet = segIn - segOut;
        html += `<div onclick="financeToggleCatSeg('${segKey}')" style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding:4px 8px;background:var(--raised);border-radius:5px;cursor:pointer;font-size:11px" title="Click to collapse/expand">`;
        html += `<span style="font-weight:700;color:var(--txt2)"><span id="${segKey}-chv" style="color:var(--dim);margin-right:6px;display:inline-block;width:10px">▾</span>${seg.label} <span style="color:var(--dim);font-weight:400">· ${segEvents.length} item${segEvents.length!==1?'s':''}</span></span>`;
        html += `<span style="font-family:var(--mono)">`;
        if (segIn) html += `<span style="color:var(--grn);margin-right:8px">+${fmtK(segIn)}</span>`;
        if (segOut) html += `<span style="color:var(--red);margin-right:8px">-${fmtK(segOut)}</span>`;
        html += `<span style="font-weight:700;color:${segNet>=0?'var(--grn)':'var(--red)'}">${segNet>=0?'+':''}${fmtK(segNet)}</span>`;
        html += `</span></div>`;
        html += `<div id="${segKey}-body" style="padding-left:6px">`;
        segEvents.forEach((e, idx) => { html += evRow(e, idx >= PAGE, segKey); });
        if (segEvents.length > PAGE) html += showMoreLink(segEvents.length, segKey);
        html += `</div>`;
      });
    }
    html += `</div></div>`;
  });
  html += '</div>';
  return html;
}

// Collapse/expand a category sub-segment inside a bucket drill-down.
function financeToggleCatSeg(segKey) {
  const body = document.getElementById(segKey + '-body');
  const chv = document.getElementById(segKey + '-chv');
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : '';
  if (chv) chv.textContent = open ? '▸' : '▾';
}

function financeShowAll(id) {
  const hidden = document.querySelectorAll(`[data-hidden-in="${id}"]`);
  hidden.forEach(el => el.style.display = '');
  const btn = document.getElementById(id + '-showmore');
  if (btn) btn.remove();
}

// ── JobTread payment-task assignee tag + PAID button (live mode only) ──
// Assignee shows next to the task name. PAID marks the task done (progress=1)
// in JobTread via POST /jobtread/set-paid, then optimistically drops the row.
function finAssigneeTag(e) {
  const a = e && e.meta && e.meta.assignedTo;
  return a ? ` <span style="color:var(--dim);font-weight:400;font-size:11px">· ${a}</span>` : '';
}
// Confirmed (☑) / Potential (☐) toggle — same mechanism as the cashflow drill-down.
function finConfirmToggle(e, live) {
  const isConf = !!e.confirmed;
  if (!live) return `<span title="${isConf?'Confirmed':'Potential'}" style="color:${isConf?'var(--grn)':'var(--dim)'};font-size:14px;margin-right:8px;vertical-align:middle">${isConf?'☑':'☐'}</span>`;
  const tip = isConf ? 'Confirmed — click to mark Potential' : 'Potential — click to mark Confirmed';
  return `<a href="#" class="fin-confirm" data-src="${financeAttr(e.confirm_key || e.source_id)}" data-confirmed="${isConf?1:0}" title="${tip}" style="color:${isConf?'var(--grn)':'var(--dim)'};text-decoration:none;font-size:14px;margin-right:8px;vertical-align:middle">${isConf?'☑':'☐'}</a>`;
}
function finPaidBtn(e, live) {
  if (!live || !e || e.source_type !== 'jobtread') return '';
  const tid = e.meta && e.meta.taskId;
  if (!tid) return '';
  const pid = (e.meta && e.meta.projectId) || '';
  return ` <a href="#" class="fin-jt-paid" data-task="${financeAttr(tid)}" data-project="${financeAttr(pid)}" data-label="${financeAttr(e.label||'')}" title="Mark this payment PAID + done in JobTread" style="font-size:10px;font-weight:700;color:#fff;background:var(--grn);padding:2px 7px;border-radius:4px;text-decoration:none;white-space:nowrap;margin-left:6px">✓ PAID</a>`;
}
async function financeJtPaid(taskId, projectId, label) {
  if (!confirm(`Mark "${label}" as PAID and check it DONE in JobTread?\n\nThis updates the live schedule — the task leaves overdue/active everywhere.`)) return;
  try {
    const result = await financeApi('/jobtread/set-paid', { method: 'POST', body: JSON.stringify({ task_id: taskId, project_id: projectId, paid: true }) });
    // Apply the fresh state so the Cashflow Summary TOTALS recompute now (not just the row).
    if (result && result.state) { FINANCE_DATA = result.state; financeSafeRender(); }
    else document.querySelectorAll(`[data-jt-row="${taskId}"]`).forEach(el => el.remove());
    financeFlash(`✓ "${label}" marked paid in JobTread — cashflow updated. (Full Cash Flow tab updates in ~30s.)`);
  } catch (err) {
    alert('Could not mark paid in JobTread:\n' + err.message);
  }
}
function financeFlash(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--grn);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;z-index:2000;box-shadow:0 4px 16px rgba(0,0,0,.3);max-width:90%;text-align:center';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4500);
}
// On-demand: roll every overdue unpaid PAYMENT (not income) forward to today in JobTread.
async function financeRollOverdue() {
  if (!confirm("Roll ALL overdue unpaid PAYMENTS (Subs/Materials, not income) forward to TODAY in JobTread?\n\nUnpaid bills will land on today's payment list — in JobTread and here. Income is never moved.")) return;
  try {
    await financeApi('/jobtread/roll-overdue', { method: 'POST' });
    financeFlash('⏭ Rolling overdue payments to today in JobTread… the dashboard updates in ~1 min (or hit refresh).');

function financeInstallClickHandler() {
  if (window._financeClickInstalled) return;
  window._financeClickInstalled = true;
  document.addEventListener('click', e => {
    const m = e.target.closest('.fin-move');
    if (m) { e.preventDefault(); e.stopPropagation(); financeMoveDate(m.dataset.src, m.dataset.date, m.dataset.orig, m.dataset.label, m.dataset.task, m.dataset.project, m.dataset.type); return; }
    const v = e.target.closest('.fin-void');
    if (v) { e.preventDefault(); e.stopPropagation(); financeVoidRow(v.dataset.kind, parseInt(v.dataset.id, 10)); return; }
    const s = e.target.closest('.fin-showmore');
    if (s) { e.preventDefault(); e.stopPropagation(); const tg = s.dataset.target; document.querySelectorAll(`[data-hidden-in="${tg}"]`).forEach(el => el.style.display = ''); s.remove(); return; }
    const d = e.target.closest('.fin-openday');
    if (d) { e.preventDefault(); e.stopPropagation(); financeOpenDay(d.dataset.date); return; }
    const pd = e.target.closest('.fin-petty-day');
    if (pd) { e.preventDefault(); e.stopPropagation(); financeOpenPettyDay(pd.dataset.date); return; }
    const pb = e.target.closest('.fin-proj-bucket');
    if (pb) {
      e.preventDefault(); e.stopPropagation();
      financeToggleProjBucket(pb.dataset.rowid, pb.dataset.project, pb.dataset.start, pb.dataset.end);
      return;
    }
    const ea = e.target.closest('.fin-edit-amount');
    if (ea) {
      e.preventDefault(); e.stopPropagation();
      financeEditAmount(ea.dataset.src, parseFloat(ea.dataset.amount), ea.dataset.label, ea.dataset.type, ea.dataset.task, ea.dataset.project);
      return;
    }
    const jp = e.target.closest('.fin-jt-paid');
    if (jp) {
      e.preventDefault(); e.stopPropagation();
      financeJtPaid(jp.dataset.task, jp.dataset.project, jp.dataset.label);
      return;
    }
    const ro = e.target.closest('.fin-roll-overdue');
    if (ro) { e.preventDefault(); e.stopPropagation(); financeRollOverdue(); return; }
    const cf = e.target.closest('.fin-confirm');
    if (cf) {
      e.preventDefault(); e.stopPropagation();
      financeToggleConfirm(cf.dataset.src, cf.dataset.confirmed === '1');
      return;
    }
    const fcAdd = e.target.closest('.fc-add');
    if (fcAdd) { e.preventDefault(); e.stopPropagation(); financeFixedCostAdd(); return; }
    const fcEdit = e.target.closest('a.fc-edit');
    if (fcEdit) { e.preventDefault(); e.stopPropagation(); if (fcEdit.__rule) financeFixedCostEdit(fcEdit.__rule); return; }
    const fcDel = e.target.closest('a.fc-delete');
    if (fcDel) { e.preventDefault(); e.stopPropagation(); financeFixedCostDelete(parseInt(fcDel.dataset.id, 10), fcDel.dataset.name); return; }
    const pick = e.target.closest('.fin-pick-end');
    if (pick) {
      e.preventDefault(); e.stopPropagation();
      const cur = window._financeCustomEnd || '';
      const val = prompt('End date for the range (YYYY-MM-DD). Leave blank to clear and use preset.', cur);
      if (val === null) return;
      if (val.trim() === '') { window._financeCustomEnd = null; window._financeRange = 'month'; }
      else if (!/^\d{4}-\d{2}-\d{2}$/.test(val.trim())) { alert('Use YYYY-MM-DD format'); return; }
      else { window._financeCustomEnd = val.trim(); window._financeRange = 'custom'; }
      window._financeExpandedBuckets = new Set();
      financeSafeRender();
    }
  });
}

// HTML-attribute-safe escape for data-* values.
function financeAttr(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function financeSafeRender() {
  financeInstallClickHandler();
  try {
    renderFinance(document.getElementById('content'));
  } catch (e) {
    console.error('renderFinance failed:', e);
    const c = document.getElementById('content');
    c.innerHTML = `<div class="page-title">Finance</div>
      <div class="alert"><div><b>Render error.</b> ${e.message}
        <div style="margin-top:8px"><button onclick="loadAndRenderFinance(document.getElementById('content'))" style="padding:7px 14px;background:var(--blu);color:#fff;border:none;border-radius:6px;cursor:pointer">Reload from API</button>
        <button onclick="localStorage.removeItem('finance_api_url');localStorage.removeItem('finance_api_token');window._financeLive=false;loadAndRenderFinance(document.getElementById('content'))" style="margin-left:6px;padding:7px 14px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;cursor:pointer">Clear API settings</button></div>
      </div></div>`;
  }
}

function financeEditAmount(sourceId, currentAmount, label, sourceType, taskId, projectId) {
  const abs = Math.abs(currentAmount);
  const direction = currentAmount >= 0 ? 'income' : 'outflow';
  const isSQLite = /^(pc-|misc-|npi-|bs-)/.test(sourceId || '');
  const isJT = !!taskId && /^jt-/.test(sourceId || '');
  const kindNote = isJT
    ? "This is a JobTread payment task. The new amount is written <b>directly into JobTread</b> (the task's description) — the real schedule/CRM is the source of truth."
    : isSQLite
    ? "This is a SQLite-logged entry. We'll void the existing row and insert a corrected one — original stays in the audit trail."
    : "This is an external event (fixed cost / debt). We'll apply a scenario amount override — the source data stays unchanged.";
  financeModal('Modify amount', `
    <div style="font-size:13px;color:var(--txt2);margin-bottom:2px"><b style="color:var(--txt)">${label || '(no label)'}</b></div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:10px">Current: <b style="color:${direction==='income'?'var(--grn)':'var(--red)'}">${direction==='income'?'+':'-'}$${abs.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</b> (${direction})</div>
    <label style="font-size:12px;color:var(--txt2)">New amount ($)</label>
    <input name="amount" type="number" step="0.01" min="0.01" value="${abs}" required style="background:var(--bg);border:1px solid var(--bdr);color:var(--txt);padding:10px 12px;font-size:14px;border-radius:6px;font-family:var(--mono)">
    <label style="font-size:12px;color:var(--txt2);margin-top:6px">Reason (optional)</label>
    <input name="reason" placeholder="e.g. typo correction" style="background:var(--bg);border:1px solid var(--bdr);color:var(--txt);padding:8px 10px;font-size:13px;border-radius:6px">
    <div style="font-size:11px;color:var(--dim);margin-top:6px">Enter the amount as a positive number. The direction (${direction}) will be preserved automatically.</div>
    <div style="font-size:11px;color:var(--dim);margin-top:6px;padding:8px;background:rgba(129,140,248,.06);border-left:2px solid var(--acc);border-radius:4px">${kindNote}</div>
  `, async (data) => {
    const newAmt = parseFloat(data.amount);
    if (isNaN(newAmt) || newAmt <= 0) throw new Error('Amount must be a positive number');
    const result = await financeApi('/edit-amount', {
      method: 'POST',
      body: JSON.stringify({
        source_id: sourceId,
        new_amount: newAmt,
        reason: (data.reason || '').trim() || 'amount edited via dashboard',
        task_id: taskId || null,
        project_id: projectId || null,
      }),
    });
    if (result && result.state) FINANCE_DATA = result.state;
    financeSafeRender();
  });
}

function financeMoveDateModal(sourceId, currentDate, originalDate, label) {
  const body = `
    <div style="font-size:13px;color:var(--txt2);margin-bottom:2px"><b style="color:var(--txt)">${label}</b></div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:8px">Original date: ${originalDate || currentDate}${currentDate !== originalDate ? ' · Currently moved to: ' + currentDate : ''}</div>
    <label style="font-size:12px;color:var(--txt2)">New date</label>
    <input name="date" type="date" value="${currentDate}" required style="background:var(--bg);border:1px solid var(--bdr);color:var(--txt);padding:10px 12px;font-size:14px;border-radius:6px;font-family:var(--mono)">
    <div style="font-size:11px;color:var(--dim);margin-top:6px">This creates a scenario override. Click "Reset" below to revert to the original date.</div>
    <div style="margin-top:4px"><button type="button" id="scenario-reset-btn" style="padding:6px 10px;font-size:11px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:5px;cursor:pointer">Reset to original</button></div>
  `;
  const modal = financeModal('Move payment date', body, async (data) => {
    if (!data.date || !/^\d{4}-\d{2}-\d{2}$/.test(data.date)) {
      throw new Error('Please pick a valid date.');
    }
    let result;
    if (data.date === originalDate) {
      result = await financeApi('/scenario-override/' + encodeURIComponent(sourceId), { method: 'DELETE' });
    } else {
      result = await financeApi('/scenario-override', {
        method: 'POST',
        body: JSON.stringify({
          source_id: sourceId,
          scenario_date: data.date,
          original_date: originalDate,
          label: label,
        }),
      });
    }
    if (result && result.state) FINANCE_DATA = result.state;
    financeSafeRender();
  });
  // Wire reset button
  setTimeout(() => {
    const btn = modal.querySelector('#scenario-reset-btn');
    if (btn) btn.addEventListener('click', async () => {
      try {
        const result = await financeApi('/scenario-override/' + encodeURIComponent(sourceId), { method: 'DELETE' });
        if (result && result.state) FINANCE_DATA = result.state;
        modal.remove();
        financeSafeRender();
      } catch (e) { alert('Reset failed: ' + e.message); }
    });
  }, 100);
}

  const url = cfg.url.replace(/\/+$/, '') + '/cashflow-print?token=' + encodeURIComponent(cfg.token);

async function financeResetScenarios() {

// ── Manual Entries Audit ─────────────────────────────────────────
// Lets the user see every manually-entered row in the DB (misc_expenses,
// non_project_income, petty_cash, scenarios, confirmations, bank_snapshots,
// transactions, pending_payments) and either delete individual rows or wipe
// a whole category. The page is the source of truth — what's gone is gone
// (rows are soft-deleted via voided=1 except event_confirmations which are
// hard-deleted because that table has no voided column).

const FINANCE_AUDIT_CATEGORIES = [
  { key:'misc_expenses',       label:'💸 Misc Expenses',       deletePath: id => '/misc/'+id,    cols:['date','amount','category','description'] },
  { key:'non_project_income',  label:'💰 Non-project Income',  deletePath: id => '/income/'+id,  cols:['date','amount','source','description'] },
  { key:'petty_cash',          label:'🧾 Petty Cash',          deletePath: id => '/petty/'+id,   cols:['date','amount','category','description'] },
  { key:'pending_payments',    label:'⏳ Pending Payments',    deletePath: id => '/pending-payment/'+id+'/void', method:'POST', cols:['due_date','amount','label','status'] },
  { key:'transactions',        label:'📒 Transactions',        deletePath: id => '/transaction/'+id+'/void', method:'POST', body:'{"reason":"manual delete"}', cols:['date','amount','kind','category','label'] },
  { key:'scenario_overrides',  label:'🔀 Scenario Overrides',  deletePath: id => '/scenario-override/'+(id), wipeOnly:true, cols:['scenario_name','source_id','scenario_date','scenario_amount','label'] },
  { key:'scenario_additions',  label:'➕ Scenario Additions',  wipeOnly:true, cols:['scenario_name','date','amount','kind','label'] },
  { key:'scenario_deletions',  label:'➖ Scenario Deletions',  wipeOnly:true, cols:['scenario_name','source_id','label_snapshot','date_snapshot'] },
  { key:'event_confirmations', label:'✅ Event Confirmations', wipeOnly:true, cols:['source_id','confirmed','note','set_at'] },
  { key:'bank_snapshots',      label:'🏦 Bank Snapshots',      deletePath: id => '/bank/'+id,    cols:['date','balance','note'], note:'Wipe-all keeps the most recent.' },
];

async function financeOpenAudit() {
  let inv;
  try { inv = await financeApi('/admin/manual-entries'); }
  catch (e) { alert('Could not load audit: ' + e.message); return; }

  const total = Object.values(inv).reduce((s, v) => s + (v.count||0), 0);
  const overlay = document.createElement('div');
  overlay.id = 'finance-audit-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML = `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:20px;max-width:1100px;width:100%;max-height:90vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-size:18px;font-weight:700">🧹 Manual Entries Audit</div>
      <button id="audit-close" style="padding:6px 12px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;cursor:pointer">Close</button>
    </div>
    <div style="font-size:12px;color:var(--mut);margin-bottom:14px">${total} manually-entered rows in the database. Expand a category to see each row and delete individually, or use Wipe to clear a whole category. Bank Snapshots Wipe keeps the most recent balance.</div>
    <div id="audit-body"></div>
    <div style="margin-top:18px;padding:14px;background:rgba(239,68,68,.08);border:1px solid #ef4444;border-radius:8px">
      <div style="font-size:13px;font-weight:700;color:#ef4444;margin-bottom:6px">Nuclear option</div>
      <div style="font-size:12px;color:var(--txt);margin-bottom:8px">Wipe ALL ${total} manually-entered rows across every category. JobTread tasks and Google-Sheet fixed costs are NOT touched. Most recent bank balance is kept.</div>
      <button id="audit-wipe-all" style="padding:8px 14px;background:#ef4444;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:700">💣 Wipe Everything Manual</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('audit-close').onclick = () => overlay.remove();
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };

  const renderBody = () => {
    const body = document.getElementById('audit-body');
    let h = '';
    for (const cat of FINANCE_AUDIT_CATEGORIES) {
      const info = inv[cat.key] || { count:0, rows:[] };
      const open = sessionStorage.getItem('audit_open_' + cat.key) === '1';
      h += `<details ${open?'open':''} style="margin-bottom:8px;background:var(--card-h);border:1px solid var(--bdr);border-radius:6px" data-cat="${cat.key}">
        <summary style="padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;list-style:none">
          <span style="font-weight:700">${cat.label} <span style="color:var(--mut);font-weight:400;font-size:12px">(${info.count})</span></span>
          ${info.count > 0 ? `<button class="audit-wipe-cat" data-cat="${cat.key}" style="padding:4px 10px;background:#f59e0b;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600">Wipe ${cat.label.replace(/^[^a-zA-Z]+/,'').trim()}</button>` : ''}
        </summary>`;
      if (info.count === 0) {
        h += `<div style="padding:8px 14px;color:var(--mut);font-style:italic;font-size:12px">empty</div>`;
      } else {
        h += `<div style="overflow-x:auto;padding:0 8px 8px"><table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="text-align:left;color:var(--dim);text-transform:uppercase;font-size:10px">
          <th style="padding:5px 8px">id</th>`;
        for (const c of cat.cols) h += `<th style="padding:5px 8px">${c}</th>`;
        h += `<th style="padding:5px 8px;width:50px"></th></tr></thead><tbody>`;
        for (const r of info.rows.slice(0, 200)) {
          h += `<tr style="border-top:1px solid rgba(33,39,47,.3)">
            <td style="padding:4px 8px;font-family:var(--mono);color:var(--mut)">${r.id}</td>`;
          for (const c of cat.cols) {
            let v = r[c];
            if (typeof v === 'number' && c === 'amount') v = '$' + v.toLocaleString();
            if (typeof v === 'number' && c === 'balance') v = '$' + v.toLocaleString();
            h += `<td style="padding:4px 8px">${financeAttr(v ?? '—')}</td>`;
          }
          if (cat.deletePath && !cat.wipeOnly) {
            h += `<td style="padding:4px 8px;text-align:right"><button class="audit-row-del" data-cat="${cat.key}" data-id="${r.id}" style="padding:2px 6px;background:transparent;color:#ef4444;border:1px solid #ef4444;border-radius:3px;cursor:pointer;font-size:10px;font-weight:700">×</button></td>`;
          } else {
            h += `<td style="padding:4px 8px"></td>`;
          }
          h += `</tr>`;
        }
        if (info.rows.length > 200) h += `<tr><td colspan="${cat.cols.length+2}" style="padding:6px 8px;color:var(--mut);font-style:italic;font-size:11px">…${info.rows.length - 200} more rows hidden. Use Wipe to clear all.</td></tr>`;
        h += `</tbody></table></div>`;
      }
      h += `</details>`;
    }
    body.innerHTML = h;
    // Persist details open/closed state
    body.querySelectorAll('details').forEach(el => {
      el.addEventListener('toggle', () => sessionStorage.setItem('audit_open_' + el.dataset.cat, el.open ? '1' : '0'));
    });
    // Per-row delete
    body.querySelectorAll('.audit-row-del').forEach(btn => {
      btn.onclick = async ev => {
        ev.preventDefault();
        const cat = FINANCE_AUDIT_CATEGORIES.find(c => c.key === btn.dataset.cat);
        const id = btn.dataset.id;
        if (!confirm('Delete row ' + id + ' from ' + cat.label + '?')) return;
        try {
          await financeApi(cat.deletePath(id), { method: cat.method || 'DELETE', body: cat.body });
          inv = await financeApi('/admin/manual-entries');
          renderBody();
        } catch (e) { alert('Delete failed: ' + e.message); }
      };
    });
    // Per-category wipe
    body.querySelectorAll('.audit-wipe-cat').forEach(btn => {
      btn.onclick = async ev => {
        ev.preventDefault();
        const cat = FINANCE_AUDIT_CATEGORIES.find(c => c.key === btn.dataset.cat);
        const info = inv[cat.key] || { count:0 };
        if (!confirm(`Wipe all ${info.count} rows from ${cat.label}? ${cat.note||''}`)) return;
        try {
          await financeApi('/admin/wipe-manual-entries', {
            method: 'POST',
            body: JSON.stringify({ categories: [cat.key] }),
          });
          inv = await financeApi('/admin/manual-entries');
          renderBody();
        } catch (e) { alert('Wipe failed: ' + e.message); }
      };
    });
  };
  renderBody();

  document.getElementById('audit-wipe-all').onclick = async () => {
    const counts = FINANCE_AUDIT_CATEGORIES.map(c => `${c.label}: ${(inv[c.key]||{count:0}).count}`).join('\n');
    if (!confirm('💣 Wipe EVERYTHING manual:\n\n' + counts + '\n\nThis cannot be undone (rows are soft-deleted but the dashboard treats voided=1 as gone).\n\nProceed?')) return;
    try {
      await financeApi('/admin/wipe-manual-entries', {
        method: 'POST',
        body: JSON.stringify({ categories: FINANCE_AUDIT_CATEGORIES.map(c => c.key) }),
      });
      overlay.remove();
      // Reload finance state so the dashboard reflects the wipe
      try {
        FINANCE_DATA = await financeApi('/state');
        financeSafeRender();
      } catch (e) { location.reload(); }
    } catch (e) { alert('Wipe failed: ' + e.message); }
  };
}

let PRODUCTIVITY_DATA = null;

function productivityGate(c) {
  if (sessionStorage.getItem('mgmt_auth') === '1') { loadAndRenderProductivity(c); return; }
  c.innerHTML = `<div class="pw-gate">
    <div class="pw-icon">📈</div>

  </div>`;
  const inp=document.getElementById('pw-input'),btn=document.getElementById('pw-btn'),deny=document.getElementById('pw-deny');

let PRODUCTIVITY_WEEKS = [];        // list of {week_iso, start, end, has_report}
let PRODUCTIVITY_SELECTED = null;   // currently displayed week_iso

async function loadAndRenderProductivity(c, weekIso) {
  c.innerHTML = '<div class="empty"><div class="empty-i">⏳</div><div class="empty-t">Loading Productivity…</div></div>';
  PRODUCTIVITY_LIVE = false;

  // Priority 1: live API (allows editing % and regenerating)
  if (financeApiConfigured()) {
    try {
      // Pull weeks list (only need once per render, but cheap)
      const weeksRes = await financeApi('/productivity/weeks');
      PRODUCTIVITY_WEEKS = (weeksRes && weeksRes.weeks) || [];
      // Default to the most recent week WITH a report. If none, the newest candidate.
      if (!weekIso) {
        const withReport = PRODUCTIVITY_WEEKS.find(w => w.has_report);
        weekIso = (withReport || PRODUCTIVITY_WEEKS[0] || {}).week_iso;
      }
      PRODUCTIVITY_SELECTED = weekIso;
      const path = weekIso ? `/productivity?week=${encodeURIComponent(weekIso)}` : '/productivity';
      try {
        PRODUCTIVITY_DATA = await financeApi(path);
      } catch (e) {
        // 404 → offer to generate
        const sel = PRODUCTIVITY_WEEKS.find(w => w.week_iso === weekIso);
        if (sel && confirm(`No report yet for ${sel.week_iso} (${sel.start} → ${sel.end}). Generate it now?`)) {
          PRODUCTIVITY_DATA = await financeApi(`/productivity/regenerate?target_date=${sel.end}`, { method: 'POST' });
          // Refresh weeks list so has_report flips true
          const w2 = await financeApi('/productivity/weeks');
          PRODUCTIVITY_WEEKS = (w2 && w2.weeks) || PRODUCTIVITY_WEEKS;
        } else {
          throw e;
        }
      }
      PRODUCTIVITY_LIVE = true;
      renderProductivity(c);
      return;
    } catch (e) {
      console.warn('Productivity API unavailable, falling back to static JSON:', e.message);
    }
  }

  // Priority 2: static JSON (single week only — week picker requires live API)
  try {
    const url = weekIso ? `data/productivity-${weekIso}.json` : 'data/productivity-latest.json';
    const r = await fetch(url);
    if (r.ok) {
      PRODUCTIVITY_DATA = await r.json();
      PRODUCTIVITY_SELECTED = PRODUCTIVITY_DATA.week_iso || null;
      renderProductivity(c);
      return;
    }
  } catch (e) {}
  c.innerHTML = `<div class="alert"><b>No productivity report yet.</b> Once the backend generator runs (auto on Friday cron, or via API <code>POST /productivity/regenerate</code>), data will appear here.</div>`;
}

function productivityChangeWeek(weekIso) {
  loadAndRenderProductivity(document.getElementById('content'), weekIso);
}

function renderProductivity(c) {
  const d = PRODUCTIVITY_DATA;
  const live = PRODUCTIVITY_LIVE;
  const t = d.totals || {};
  const fmt = (n) => '$' + (Math.round((n||0)*100)/100).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});

  h += `<div class="page-title">📈 Productivity Report</div>`;
  // This Week / Previous Week tabs — live mode only
  let tabs = '';
  if (live && PRODUCTIVITY_WEEKS && PRODUCTIVITY_WEEKS.length >= 2) {
    const fmtMD = iso => new Date(iso + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const wThis = PRODUCTIVITY_WEEKS[0];  // most recent (current/in-flight)
    const wPrev = PRODUCTIVITY_WEEKS[1];  // previous complete week
    const tabBtn = (w, label) => {
      const active = w.week_iso === PRODUCTIVITY_SELECTED;

  h += tabs;
  h += `<div class="page-sub">Showing <b>${d.week_iso || '—'}</b> · ${d.week_start} → ${d.week_end} · ${live ? 'live ✓ editable' : 'static (read-only)'} · ${d.used_snapshot_for_finish_detection ? 'snapshot-verified' : 'endDate-fallback'}</div>`;

    <div class="stat-card"><div class="stat-label">Profit potential (priced groups)</div><div class="stat-value">${fmt(t.profit_potential)}</div></div>
    <div class="stat-card"><div class="stat-label">Sold (priced)</div><div class="stat-value">${fmt(t.sold)}</div></div>
    <div class="stat-card"><div class="stat-label">Expenses (priced)</div><div class="stat-value">${fmt(t.expenses)}</div></div>

  if ((t.groups_missing_price || 0) > 0) {
    h += `<div style="background:rgba(234,170,8,.08);border:1px solid rgba(234,170,8,.3);border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--txt)">
      ⚠ <b>${t.groups_missing_price}</b> group${t.groups_missing_price>1?'s':''} have no price set on their Action Task — ${fmt(t.expense_missing_price)} of expenses recognized but no revenue. These are listed below but excluded from the profit roll-up (no price ≠ "sold for $0"). Set a price in JobTread, then ↻ Regenerate.
    </div>`;

  if (live) {
    h += `<div style="margin-bottom:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">

      <td style="padding:7px 12px;text-align:right;font-family:var(--mono);color:var(--red)">${fmt(pExp)}</td>
      <td style="padding:7px 12px;text-align:right;font-family:var(--mono);color:${potColor}">${fmt(pPot)}</td>
      <td style="padding:7px 12px;text-align:right;font-family:var(--mono);color:${attrColor};font-weight:700">${fmt(p.attribution || 0)}</td>

  const totColor = sumAttr >= 0 ? 'var(--grn)' : 'var(--red)';
  h += `<tr style="border-top:2px solid var(--bdr);background:rgba(96,165,250,.06)">

    <td style="padding:10px 12px;text-align:right;font-family:var(--mono);font-weight:700">${d.by_project.reduce((s, p) => s + (p.group_count || 0), 0)}</td>
    <td style="padding:10px 12px;text-align:right;font-family:var(--mono);font-weight:700">${fmt(sumSold)}</td>
    <td style="padding:10px 12px;text-align:right;font-family:var(--mono);font-weight:700;color:var(--red)">${fmt(sumExp)}</td>
    <td style="padding:10px 12px;text-align:right;font-family:var(--mono);font-weight:700">${fmt(sumPot)}</td>
    <td style="padding:10px 12px;text-align:right;font-family:var(--mono);font-weight:800;font-size:14px;color:${totColor}">${fmt(sumAttr)}</td>
  </tr>`;
  h += `</tbody></table></div>`;

  d.by_project.forEach(p => {
    h += `<div class="pc sev-b" style="margin-bottom:8px"><div class="ph" onclick="tog(this)">
      <div><div class="pn">${(p.project_name || '').replace(/</g, '&lt;')}</div>
      <div class="pp">${p.group_count} groups · attribution ${fmt(p.attribution)}</div></div>
      <div class="pt">${chvSvg()}</div></div>
      <div class="pb"><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
      <thead><tr style="text-align:left;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px">
          <th style="padding:5px 8px">Trade (group)</th>
        <th style="padding:5px 8px">Status</th>
        <th style="padding:5px 8px;font-family:var(--mono);font-size:10px">Start</th>
        <th style="padding:5px 8px;font-family:var(--mono);font-size:10px">End</th>
        <th style="padding:5px 8px;text-align:right">Sold</th>
        <th style="padding:5px 8px;text-align:right">Expenses</th>
        <th style="padding:5px 8px;text-align:right">Profit</th>
        <th style="padding:5px 8px;text-align:center">% Done</th>
        <th style="padding:5px 8px;text-align:right">This week</th>
      </tr></thead><tbody>`;

      const attrColor = g.attribution >= 0 ? 'var(--grn)' : 'var(--red)';

        : `<span style="font-family:var(--mono);color:${hasPrice?'var(--txt)':'var(--dim)'}">${hasPrice ? g.this_pct+'%' : '—'}</span>`;

    document.querySelectorAll('tr.prod-row').forEach(tr => {
      tr.addEventListener('click', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'A' || e.target.tagName === 'BUTTON') return;
        const target = document.getElementById(tr.dataset.target);
        if (!target) return;
        const chev = tr.querySelector('.prod-chevron');
        if (target.style.display === 'none') { target.style.display = ''; if (chev) chev.style.transform = 'rotate(90deg)'; }
        else { target.style.display = 'none'; if (chev) chev.style.transform = 'rotate(0deg)'; }
      });
    });
    // Tab click handlers
    document.querySelectorAll('button.prod-tab').forEach(btn => {
      btn.addEventListener('click', () => productivityChangeWeek(btn.dataset.week));
    });
    // Wire % inputs — save to sqlite, then update in-memory data + re-render
    // (no full refetch; numbers move instantly).
    document.querySelectorAll('.prod-pct-input').forEach(inp => {
      const commit = async () => {
        const v = parseFloat(inp.value);
        if (isNaN(v) || v < 0 || v > 100) { alert('Enter a number 0–100.'); return; }
        const origPct = parseFloat(inp.defaultValue);
        if (v === origPct) return;  // no-op
        inp.disabled = true;
        const pid = inp.dataset.pid, gid = inp.dataset.gid;
        try {
          await financeApi('/productivity/set-percent', {
            method: 'POST',
            body: JSON.stringify({week_iso: d.week_iso, project_id: pid, group_id: gid, percent: v}),
          });
          // Recompute attribution in memory: percent × profit (per-group), then roll up
          for (const p of PRODUCTIVITY_DATA.by_project) {
            if (p.project_id !== pid) continue;
            for (const g of p.groups) {
              if (g.group_id !== gid) continue;
              g.this_pct = v;
              g.user_set = true;
              g.attribution = g.has_price === false || (g.has_price !== true && !(g.sold > 0))
                ? 0
                : Math.round((v / 100) * g.profit * 100) / 100;
            }
            p.attribution = Math.round(p.groups.reduce((s, gg) => s + (gg.attribution || 0), 0) * 100) / 100;
          }
          // Re-sort projects by attribution (matches generator behavior)
          PRODUCTIVITY_DATA.by_project.sort((a, b) => b.attribution - a.attribution);
          PRODUCTIVITY_DATA.totals.profit_attributed_this_week =
            Math.round(PRODUCTIVITY_DATA.by_project.reduce((s, p) => s + (p.attribution || 0), 0) * 100) / 100;
          renderProductivity(document.getElementById('content'));
        } catch (e) {
          alert('Save failed: ' + e.message);
          inp.disabled = false;
        }
      };
      inp.addEventListener('blur', commit);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); inp.blur(); } });
    });
  }
}

function prodRenderBreakdown(g) {
  const fmt = (n) => '$' + (Math.round((n||0)*100)/100).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  const esc = (s) => (s || '').replace(/</g, '&lt;');
  const renderLines = (lines, label, color) => {
    if (!lines || !lines.length) return `<div style="padding:6px 10px;color:var(--dim);font-size:11px;font-style:italic">${label}: none</div>`;
    let total = 0;
    const rows = lines.map(l => {
      total += l.amount || 0;
      const doneTag = l.progress === 1 ? '<span style="color:var(--grn);font-size:9px;margin-left:4px">✓</span>' : '';
      return `<tr>
        <td style="padding:3px 8px">${esc(l.name)}${doneTag}</td>
        <td style="padding:3px 8px;color:var(--txt2);font-size:11px">${esc(l.description) || '<span style="color:var(--dim)">—</span>'}</td>
        <td style="padding:3px 8px;text-align:right;font-family:var(--mono);color:${color}">${fmt(l.amount)}</td>
      </tr>`;
    }).join('');
    return `<div style="padding:6px 10px">
      <div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;font-weight:600">${label} · ${fmt(total)}</div>
      <table style="width:100%;border-collapse:collapse;font-size:11px;background:var(--card-h);border-radius:4px">
        <thead><tr style="text-align:left;color:var(--dim);font-size:9px;text-transform:uppercase">
          <th style="padding:3px 8px;width:38%">Line item</th>
          <th style="padding:3px 8px">Description</th>
          <th style="padding:3px 8px;text-align:right;width:90px">Amount</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  };
  return `<div style="background:rgba(33,39,47,.15);padding:8px 0;border-bottom:1px solid var(--bdr)">
    <div style="padding:0 10px 4px 10px;color:var(--blu);font-size:11px;font-weight:600">▼ Breakdown · ${esc(g.group_name)}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
      <div style="background:rgba(74,222,128,.05);border-left:3px solid var(--grn)">${renderLines(g.action_lines, '↗ Sold — Action Tasks', 'var(--grn)')}</div>
      <div style="background:rgba(239,68,68,.04);border-left:3px solid var(--red)">${renderLines(g.subs_lines, '↘ Payment – Subs', 'var(--red)')}${renderLines(g.materials_lines, '↘ Payment – Materials', 'var(--red)')}${renderLines(g.additional_lines, '↘ Additional Expenses', 'var(--red)')}</div>
    </div>
    <div style="padding:6px 10px;font-size:11px;color:var(--txt2);border-top:1px dashed var(--bdr);margin-top:4px">
      <b>Sold</b> ${fmt(g.sold)} − <b>Expenses</b> ${fmt(g.expenses_total)} = <b>Profit</b> <span style="color:${g.profit >= 0 ? 'var(--grn)' : 'var(--red)'};font-weight:600">${fmt(g.profit)}</span>${g.this_pct ? ` × <b>${g.this_pct}%</b> = <b>${fmt(g.attribution)}</b> attributed this week` : ''}
    </div>
  </div>`;
}

function productivityPrintByPM() {
  const cfg = financeApiConfig();
  if (!cfg.url || !cfg.token) {
    alert('Configure the Tunnel URL + Bearer token in ⚙ Settings first.');
    return;
  }
  const week = PRODUCTIVITY_SELECTED || (PRODUCTIVITY_DATA && PRODUCTIVITY_DATA.week_iso);
  const url = cfg.url.replace(/\/+$/, '') + '/productivity-print?token=' + encodeURIComponent(cfg.token) + (week ? '&week=' + encodeURIComponent(week) : '');
  window.open(url, '_blank');
}

async function productivityRegenerate() {
  const btn = document.getElementById('prod-regen');
  if (btn) { btn.disabled = true; btn.textContent = '↻ Regenerating…'; }
  try {
    // Regenerate for the currently-selected week (uses its end date)
    const sel = (PRODUCTIVITY_WEEKS || []).find(w => w.week_iso === PRODUCTIVITY_SELECTED);
    const path = sel ? `/productivity/regenerate?target_date=${sel.end}` : '/productivity/regenerate';
    PRODUCTIVITY_DATA = await financeApi(path, { method: 'POST' });
    // Refresh weeks so has_report flips true if this was new
    try {
      const w2 = await financeApi('/productivity/weeks');
      PRODUCTIVITY_WEEKS = (w2 && w2.weeks) || PRODUCTIVITY_WEEKS;
    } catch (e) {}
    renderProductivity(document.getElementById('content'));
  } catch (e) {
    alert('Regenerate failed: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '↻ Regenerate report'; }
  }
}
