    <button class="pw-btn" id="pw-btn">Unlock</button>
    <div class="pw-deny" id="pw-deny" style="display:none">Access denied</div>
  </div>`;
  const inp=document.getElementById('pw-input'),btn=document.getElementById('pw-btn'),deny=document.getElementById('pw-deny');
  function tryPw(){
    if(inp.value===MGMT_PW){sessionStorage.setItem('mgmt_auth','1');renderOrgMgmt(c);}
    else{inp.classList.add('pw-err');deny.style.display='';setTimeout(()=>inp.classList.remove('pw-err'),400);}
  }
  btn.addEventListener('click',tryPw);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')tryPw();});
  setTimeout(()=>inp.focus(),50);
}

// Management tab — leadership operating system
let MGMT_DATA_FULL = null;
let MGMT_WEEK_OFFSET = 0;          // -N = past, 0 = current, +N = future
let MGMT_DEPT_FILTER = '';         // '' = All; otherwise one of MGMT_DEPTS keys
let MGMT_DEC_QUARTER = '';         // '' = current quarter; 'all' = all-time; or 'YYYY-QN'
const MGMT_MEMBERS = ['Jonas', 'Reynaldo', 'Jose', 'Milagros'];
const KANBAN_COLS = [
  { key: 'todo',        label: 'To do',       color: '#6b7280' },
  { key: 'in_progress', label: 'In Progress', color: '#f59e0b' },
  { key: 'blocked',     label: 'Blocked',     color: '#ef4444' },
  { key: 'done',        label: 'Done',        color: '#10b981' },
];
const MGMT_DEPTS = [
  { key: 'marketing',  label: 'Marketing',  color: '#ec4899' },
  { key: 'sales',      label: 'Sales',      color: '#10b981' },
  { key: 'planning',   label: 'Planning',   color: '#3b82f6' },
  { key: 'operations', label: 'Operations', color: '#f59e0b' },
  { key: 'accounting', label: 'Accounting', color: '#8b5cf6' },
  { key: 'management', label: 'Management', color: '#ef4444' },
];

async function renderOrgMgmt(c) {
  c.innerHTML = '<div class="empty"><div class="empty-i">⏳</div><div class="empty-t">Loading Management...</div></div>';
  if (!financeApiConfigured()) {
    c.innerHTML = '<div class="empty"><div class="empty-i">🎯</div><div class="empty-t">Management requires the Finance API</div><div class="empty-d">Open ⚙ Settings on the Finance tab and configure the tunnel URL + token.</div></div>';
    return;
  }
  try {
    MGMT_DATA_FULL = await financeApi('/management-state?week_offset=' + MGMT_WEEK_OFFSET);
  } catch (e) {
    c.innerHTML = '<div class="alert"><b>Could not load Management data.</b> ' + (e.message||e) + '</div>';
    return;
  }
  paintOrgMgmt(c);
  installOrgMgmtClickHandler();
}

function fmtMoney0(n) { return (n<0?'-':'') + '$' + Math.abs(Math.round(n||0)).toLocaleString(); }
function fmtMoney2(n) { return (n<0?'-':'') + '$' + Math.abs(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDateShort(iso) {
  if (!iso) return '—';
  const dt = new Date(iso + 'T12:00:00');
  const MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return MS[dt.getMonth()] + ' ' + dt.getDate() + ', ' + dt.getFullYear();
}
function htmlEsc(s) { return String(s==null?'':s).replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function attrEsc(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

function paintOrgMgmt(c) {
  const d = MGMT_DATA_FULL || {};
  const sections = [
    `<div class="page-title">🎯 Management</div>
     <div class="page-sub">Operating system for the leadership team — Jonas, Reynaldo, Jose, Milagros</div>`,
    sectionStrategy(d),
    sectionKpis(d),
    sectionOkrs(d),
    sectionKanbans(d),
    sectionDecisions(d),
    sectionAgenda(d),
    sectionRisks(d),
    sectionInitiatives(d),
  ];
  c.innerHTML = sections.join('\n');
}

// ── Strategy banner (mission / vision / quarter focus / north-star) ──
function sectionStrategy(d) {
  const s = d.strategy || {};
  const mission = (s.mission && s.mission.value) || '';
  const vision = (s.vision && s.vision.value) || '';
  const q_focus = (s.q_focus && s.q_focus.value) || '';
  const north_star = (s.north_star && s.north_star.value) || '';
  const cell = (label, val, key) => `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px;flex:1;min-width:220px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div style="font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;font-weight:700">${label}</div>
      <a href="#" class="mg-strat-edit" data-key="${key}" data-label="${attrEsc(label)}" data-val="${attrEsc(val)}" style="font-size:11px;color:var(--blu);text-decoration:none">✎ Edit</a>
    </div>
    <div style="font-size:13px;color:${val?'var(--txt)':'var(--mut)'};font-style:${val?'normal':'italic'}">${val ? htmlEsc(val) : 'Click Edit to set'}</div>
  </div>`;
  return `<div class="sh">📜 Strategy Canvas</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px">
      ${cell('Mission', mission, 'mission')}
      ${cell('Vision', vision, 'vision')}
      ${cell('This Quarter Focus', q_focus, 'q_focus')}
      ${cell('North-Star Metric', north_star, 'north_star')}
    </div>`;
}

// ── KPIs ──
function sectionKpis(d) {
  const k = d.kpis || {};
  const card = (label, val, color, sub) => `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px;min-width:160px">
    <div style="font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;font-weight:700">${label}</div>
    <div style="font-size:22px;font-weight:700;color:${color||'var(--txt)'};margin-top:2px">${val}</div>
    ${sub ? `<div style="font-size:10px;color:var(--mut);margin-top:2px">${sub}</div>` : ''}
  </div>`;
  const balColor = (k.current_balance||0) >= 0 ? 'var(--grn)' : 'var(--red)';
  const projColor = (k.projected_end_balance_quarter||0) >= 0 ? 'var(--grn)' : 'var(--red)';
  const qLabel = k.projected_end_quarter_label || 'quarter';
  const qSub = k.projected_end_quarter_date ? `End of ${qLabel} · ${k.projected_end_quarter_date}` : `End of ${qLabel}`;
  return `<div class="sh">📊 Live KPIs</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px">
      ${card('Current Balance', fmtMoney0(k.current_balance), balColor)}
      ${card('Monthly Burn', fmtMoney0(k.monthly_burn), 'var(--red)', 'Fixed costs / mo')}
      ${card('Projected End ('+qLabel+')', fmtMoney0(k.projected_end_balance_quarter), projColor, qSub)}
      ${card('Active Projects', k.active_project_count, 'var(--grn)', 'Building / signed')}
      ${card('Planning Projects', k.planning_project_count, 'var(--blu)', 'Pre-construction / pipeline')}
    </div>
    <div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px;margin-bottom:18px">
      <div style="font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:6px">Pipeline (incoming - outgoing)</div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:13px">
        ${pipelineCell('30 days', k.pipeline_30d)}
        ${pipelineCell('60 days', k.pipeline_60d)}
        ${pipelineCell('90 days', k.pipeline_90d)}
      </div>
    </div>`;
}
function pipelineCell(label, p) {
  if (!p) return '';
  const netColor = p.net >= 0 ? 'var(--grn)' : 'var(--red)';
  return `<div style="flex:1;min-width:180px">
    <div style="font-size:10px;color:var(--mut);text-transform:uppercase">${label}</div>
    <div style="margin-top:2px"><span style="color:var(--grn)">+${fmtMoney0(p.in)}</span> · <span style="color:var(--red)">-${fmtMoney0(p.out)}</span> · Net <b style="color:${netColor}">${(p.net>=0?'+':'')+fmtMoney0(p.net)}</b></div>
  </div>`;
}

// ── OKRs ──
function sectionOkrs(d) {
  const okrs = d.okrs || [];
  const byQ = {};
  okrs.forEach(o => { (byQ[o.quarter] = byQ[o.quarter] || []).push(o); });
  const quarters = Object.keys(byQ).sort().reverse();
  const today = new Date();
  const curQ = `${today.getFullYear()}-Q${Math.floor(today.getMonth()/3)+1}`;
  let h = `<div class="sh" style="display:flex;justify-content:space-between;align-items:center">
    🎯 OKRs (Objectives + Key Results)
    <button class="mg-okr-add" style="padding:6px 12px;background:var(--blu);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">+ Add OKR</button>
  </div>`;
  if (!okrs.length) {
    h += `<div class="empty" style="padding:14px"><div style="color:var(--mut);font-size:13px">No OKRs yet. Click + Add OKR to set the team's objectives for ${curQ}.</div></div>`;
    return h;
  }
  for (const q of quarters) {
    h += `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px;margin-bottom:10px">
      <div style="font-size:13px;font-weight:700;margin-bottom:6px">${q}</div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="text-align:left;color:var(--dim);font-size:10px;text-transform:uppercase">
          <th style="padding:5px 8px">Owner</th><th style="padding:5px 8px">Objective</th>
          <th style="padding:5px 8px">Key Result</th>
          <th style="padding:5px 8px;text-align:right">Target</th>
          <th style="padding:5px 8px;text-align:right">Current</th>
          <th style="padding:5px 8px">Status</th>
          <th style="padding:5px 8px">Progress</th>
          <th style="padding:5px 8px;width:30px"></th>
        </tr></thead><tbody>`;
    for (const o of byQ[q]) {
      const pct = o.target_value && o.target_value !== 0
        ? Math.round(((o.current_value||0) / o.target_value) * 100) : 0;
      const sColor = {on_track:'var(--grn)', at_risk:'var(--ylw)', off_track:'var(--red)', done:'var(--blu)'}[o.status] || 'var(--mut)';
      h += `<tr style="border-top:1px solid rgba(33,39,47,.3)" data-okr-id="${o.id}">
        <td style="padding:5px 8px"><b>${htmlEsc(o.owner||'—')}</b></td>
        <td style="padding:5px 8px">${htmlEsc(o.objective)}</td>
        <td style="padding:5px 8px;color:var(--mut)">${htmlEsc(o.key_result)}</td>
        <td style="padding:5px 8px;text-align:right;font-family:var(--mono)">${o.target_value!=null ? (o.target_value+(o.unit? ' '+o.unit:'')) : '—'}</td>
        <td style="padding:5px 8px;text-align:right;font-family:var(--mono)">${o.current_value!=null ? (o.current_value+(o.unit? ' '+o.unit:'')) : '—'}</td>
        <td style="padding:5px 8px"><span style="display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;background:rgba(75,134,253,.15);color:${sColor}">${(o.status||'').replace(/_/g,' ')}</span></td>
        <td style="padding:5px 8px"><div style="width:80px;height:6px;background:var(--card-h);border-radius:3px;overflow:hidden"><div style="width:${Math.min(100,Math.max(0,pct))}%;height:100%;background:${sColor}"></div></div><span style="font-size:10px;color:var(--mut)">${pct}%</span></td>
        <td style="padding:5px 8px;text-align:right"><a href="#" class="mg-okr-edit" data-id="${o.id}" style="color:var(--blu);text-decoration:none;margin-right:4px">✎</a><a href="#" class="mg-okr-del" data-id="${o.id}" style="color:var(--red);text-decoration:none">×</a></td>
      </tr>`;
    }
    h += `</tbody></table></div></div>`;
  }
  return h;
}

// ── Weekly Planner Kanban — 3-column layout: Backlog | 7-day grid | Completed ──
function sectionKanbans(d) {
  const k = d.kanban || {};
  const deptKeep = c => !MGMT_DEPT_FILTER || c.department === MGMT_DEPT_FILTER;
  const cells     = (k.cards     || []).filter(deptKeep);
  const backlog   = (k.backlog   || []).filter(deptKeep);
  const completed = (k.completed || []).filter(deptKeep);
  const archCount = k.archived_count || 0;
  const monday = k.monday || new Date().toISOString().slice(0,10);
  const todayStr = new Date().toISOString().slice(0,10);
  const isCurrentWeek = MGMT_WEEK_OFFSET === 0;
  const dayLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const days = [];
  const md = new Date(monday + 'T12:00:00');
  for (let i = 0; i < 7; i++) {
    const dt = new Date(md); dt.setDate(md.getDate() + i);
    days.push({
      date: dt.toISOString().slice(0,10),
      label: dayLabels[i],
      day: dt.getDate(),
      month: dt.getMonth() + 1,
      isToday: dt.toISOString().slice(0,10) === todayStr,
    });
  }
  // Group cells by member+day, backlog and completed by member
  const byMemberDay = {}, backlogByMember = {}, completedByMember = {};
  for (const m of MGMT_MEMBERS) {
    byMemberDay[m] = {}; days.forEach(dy => byMemberDay[m][dy.date] = []);
    backlogByMember[m] = []; completedByMember[m] = [];
  }
  const ensureMember = (obj, m, fillDays) => {
    if (!obj[m]) {
      obj[m] = fillDays ? {} : [];
      if (fillDays) days.forEach(dy => obj[m][dy.date] = []);
    }
  };
  for (const c of cells) {
    if (!c.member || !c.due_date) continue;
    ensureMember(byMemberDay, c.member, true);
    if (byMemberDay[c.member][c.due_date]) byMemberDay[c.member][c.due_date].push(c);
  }
  for (const c of backlog) {
    if (!c.member) continue;
    ensureMember(backlogByMember, c.member, false);
    backlogByMember[c.member].push(c);
  }
  for (const c of completed) {
    if (!c.member) continue;
    ensureMember(completedByMember, c.member, false);
    completedByMember[c.member].push(c);
  }

  const fmtMonDay = (mm, dd) => ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mm-1] + ' ' + dd;
  const weekLabel = `${fmtMonDay(days[0].month, days[0].day)} – ${fmtMonDay(days[6].month, days[6].day)}, ${md.getFullYear()}`;

  // Single card renderer reused everywhere — supports complete/uncomplete + drag-friendly width
  const renderCard = (card, opts) => {
    opts = opts || {};
    const isDone = !!card.completed_at;
    const colorMeta = KANBAN_COLS.find(c => c.key === card.column_name) || KANBAN_COLS[0];
    const deptMeta = card.department ? MGMT_DEPTS.find(dp => dp.key === card.department) : null;
    const isOverdue = !isDone && card.due_date && card.due_date < todayStr;
    const accent = isDone ? '#10b981' : (isOverdue ? '#ef4444' : (deptMeta ? deptMeta.color : colorMeta.color));
    const overdueTag = isOverdue
      ? `<span style="display:inline-block;margin-left:4px;padding:1px 4px;background:#ef4444;color:#fff;border-radius:3px;font-size:8px;font-weight:700;text-transform:uppercase">overdue</span>` : '';
    const completeBtn = isDone
      ? `<button class="mg-kanban-uncomplete" data-id="${card.id}" title="Reopen task" style="padding:2px 5px;background:transparent;color:var(--mut);border:1px solid var(--bdr);border-radius:3px;cursor:pointer;font-size:9px">↺</button>`
      : `<button class="mg-kanban-complete" data-id="${card.id}" title="Mark complete" style="padding:2px 5px;background:#10b981;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:9px;font-weight:700">✓</button>`;
    // Send-to-backlog button: visible only when the card has a due date AND
    // isn't already done (sending a completed card to backlog would be weird).
    const backlogBtn = !isDone && card.due_date
      ? `<button class="mg-kanban-backlog" data-id="${card.id}" title="Move to backlog (clear due date)" style="padding:2px 5px;background:transparent;color:#f59e0b;border:1px solid #f59e0b;border-radius:3px;cursor:pointer;font-size:9px;margin-right:3px">📥</button>` : '';
    const due = card.due_date && !opts.hideDueDate
      ? `<span style="font-size:9px;color:${isOverdue?'#ef4444':'var(--mut)'};margin-left:4px">${card.due_date.slice(5)}</span>` : '';
    const completedAt = isDone && opts.showCompletedDate
      ? `<span style="font-size:9px;color:#10b981;margin-left:4px">✓ ${card.completed_at.slice(5)}</span>` : '';
    return `<div class="mg-kanban-card" data-id="${card.id}" style="background:var(--card);border-left:3px solid ${accent};border-radius:3px;padding:4px 6px;margin-bottom:3px;cursor:pointer;${isDone?'opacity:.7':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:4px">
        <div style="flex:1;font-size:11px;font-weight:600;${isDone?'text-decoration:line-through':''}">${htmlEsc(card.title)}${due}${completedAt}${overdueTag}</div>
        <div style="display:flex;align-items:center;gap:3px">${backlogBtn}${completeBtn}</div>
      </div>
      ${deptMeta ? `<div style="display:inline-block;margin-top:2px;padding:1px 5px;background:${deptMeta.color};color:#fff;border-radius:8px;font-size:8px;font-weight:700;text-transform:uppercase">${deptMeta.label}</div>` : ''}
      ${card.project_name ? `<div style="font-size:9px;color:var(--mut)">📁 ${htmlEsc(card.project_name)}</div>` : ''}
    </div>`;
  };

  let h = `<div class="sh" style="display:flex;justify-content:space-between;align-items:center">
    📋 Weekly Planners (per member)
    <span style="font-size:11px;color:var(--mut)">${archCount} archived</span>
  </div>
  <div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
    <div style="display:flex;gap:6px;align-items:center">
      <button class="mg-week-nav" data-d="-1" style="padding:5px 10px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:5px;cursor:pointer">◀ Prev</button>
      <button class="mg-week-nav" data-d="0" ${isCurrentWeek?'disabled style="padding:5px 10px;background:var(--blu);color:#fff;border:none;border-radius:5px;font-weight:600"':'style="padding:5px 10px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:5px;cursor:pointer"'}>This week</button>
      <button class="mg-week-nav" data-d="1" style="padding:5px 10px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:5px;cursor:pointer">Next ▶</button>
      <span style="margin-left:10px;font-weight:700;font-size:14px">${weekLabel}</span>
      ${MGMT_WEEK_OFFSET !== 0 ? `<span style="font-size:11px;color:var(--mut)">(${MGMT_WEEK_OFFSET > 0 ? '+' : ''}${MGMT_WEEK_OFFSET} from current)</span>` : ''}
    </div>
    <div style="display:flex;gap:6px">
      <input type="date" id="mg-week-jump" value="${monday}" style="padding:4px 6px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:5px;font-size:11px">
      <button class="mg-week-jump-btn" style="padding:5px 10px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:5px;cursor:pointer;font-size:11px">Jump</button>
    </div>
  </div>
  <div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;margin-bottom:10px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
    <span style="font-size:10px;color:var(--mut);font-weight:700;text-transform:uppercase;margin-right:4px">Department</span>
    ${(() => {
      const pill = (key, label, color, active) => `<button class="mg-dept-filter" data-dept="${key}" style="padding:4px 10px;background:${active?color:'var(--card-h)'};color:${active?'#fff':'var(--txt)'};border:1px solid ${active?color:'var(--bdr)'};border-radius:14px;cursor:pointer;font-size:11px;font-weight:${active?'700':'500'}">${label}</button>`;
      let s = pill('', 'All', 'var(--blu)', !MGMT_DEPT_FILTER);
      for (const dp of MGMT_DEPTS) s += pill(dp.key, dp.label, dp.color, MGMT_DEPT_FILTER === dp.key);
      return s;
    })()}
  </div>`;

  for (const m of MGMT_MEMBERS) {
    const cellTotal      = days.reduce((s,dy) => s + (byMemberDay[m][dy.date]||[]).length, 0);
    const backlogTotal   = (backlogByMember[m] || []).length;
    const completedTotal = (completedByMember[m] || []).length;
    h += `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:14px;font-weight:700">${m} <span style="font-size:11px;color:var(--mut);font-weight:400">${cellTotal} this week · ${backlogTotal} in backlog · ${completedTotal} done ${isCurrentWeek?'this week':'(visible week)'}</span></div>
        <button class="mg-kanban-add" data-member="${m}" style="padding:5px 10px;background:var(--blu);color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600">+ Add Task</button>
      </div>
      <div style="display:grid;grid-template-columns:minmax(180px, 1fr) minmax(0, 4fr) minmax(180px, 1fr);gap:8px">
        <!-- BACKLOG (left) -->
        <div style="background:var(--card-h);border:1px dashed var(--bdr);border-radius:6px;padding:6px 8px;display:flex;flex-direction:column">
          <div style="font-size:10px;font-weight:700;color:#f59e0b;text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
            📥 Backlog <span style="background:#f59e0b;color:#fff;padding:1px 6px;border-radius:8px;font-size:9px">${backlogTotal}</span>
          </div>
          <div class="mg-day-cell" data-member="${m}" data-date="" style="flex:1;min-height:80px;cursor:pointer" title="Click to add a backlog task (no date)">`;
    if (backlogByMember[m].length) {
      for (const card of backlogByMember[m]) h += renderCard(card, {});
    } else {
      h += `<div style="font-size:10px;color:var(--mut);font-style:italic;padding:4px 0">No backlog · click to add</div>`;
    }
    h += `</div></div>
        <!-- 7-DAY GRID (middle) -->
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">`;
    for (const day of days) {
      const items = byMemberDay[m][day.date] || [];
      const isPastDay = day.date < todayStr;
      const headerBg = day.isToday ? 'var(--blu)' : 'var(--card-h)';
      const headerColor = day.isToday ? '#fff' : 'var(--mut)';
      h += `<div style="background:var(--card-h);border-radius:5px;min-height:90px;display:flex;flex-direction:column;${isPastDay && isCurrentWeek?'opacity:.7':''}">
        <div style="background:${headerBg};color:${headerColor};padding:4px 6px;border-radius:5px 5px 0 0;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:10px;font-weight:700">${day.label}</span>
          <span style="font-size:11px;font-weight:${day.isToday?'700':'400'}">${day.day}</span>
        </div>
        <div class="mg-day-cell" data-member="${m}" data-date="${day.date}" style="padding:4px;flex:1;cursor:pointer" title="Click to add a task for ${day.label} ${day.day}">`;
      for (const card of items) h += renderCard(card, {hideDueDate: true});
      h += `</div></div>`;
    }
    h += `</div>
        <!-- COMPLETED (right) -->
        <div style="background:var(--card-h);border:1px dashed #10b981;border-radius:6px;padding:6px 8px;display:flex;flex-direction:column">
          <div style="font-size:10px;font-weight:700;color:#10b981;text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
            ✓ Completed <span style="background:#10b981;color:#fff;padding:1px 6px;border-radius:8px;font-size:9px">${completedTotal}</span>
          </div>
          <div style="flex:1;min-height:80px">`;
    if (completedByMember[m].length) {
      for (const card of completedByMember[m]) h += renderCard(card, {showCompletedDate: true});
    } else {
      h += `<div style="font-size:10px;color:var(--mut);font-style:italic;padding:4px 0">Nothing completed ${isCurrentWeek?'yet this week':'this week'}</div>`;
    }
    h += `</div></div>
      </div>
    </div>`;
  }
  return h;
}

// ── Decision Journal — multi-owner + quarter filter ──
function sectionDecisions(d) {
  const decs = d.decisions || [];
  // Build the set of distinct quarters across all decisions for the filter UI.
  const quarterOf = iso => {
    if (!iso) return null;
    const dt = new Date(iso + 'T12:00:00');
    return dt.getFullYear() + '-Q' + (Math.floor(dt.getMonth()/3) + 1);
  };
  const todayQ = (() => { const t = new Date(); return t.getFullYear() + '-Q' + (Math.floor(t.getMonth()/3) + 1); })();
  const allQuarters = Array.from(new Set(decs.map(x => quarterOf(x.decided_at)).filter(Boolean))).sort().reverse();
  // Active quarter ('' means default = current quarter).
  const activeQuarter = MGMT_DEC_QUARTER || todayQ;
  const showAll = MGMT_DEC_QUARTER === 'all';
  const filtered = showAll ? decs : decs.filter(x => quarterOf(x.decided_at) === activeQuarter);

  let h = `<div class="sh" style="display:flex;justify-content:space-between;align-items:center">
    📝 Decision Journal <span style="font-size:11px;color:var(--mut);font-weight:400;margin-left:6px">${decs.length} total · viewing ${showAll?'all-time':activeQuarter}</span>
    <button class="mg-dec-add" style="padding:6px 12px;background:var(--blu);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">+ Add Decision</button>
  </div>
  <div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;margin-bottom:8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
    <span style="font-size:10px;color:var(--mut);font-weight:700;text-transform:uppercase;margin-right:4px">Quarter</span>`;
  const qPill = (key, label, active) => `<button class="mg-dec-quarter" data-q="${key}" style="padding:4px 10px;background:${active?'var(--blu)':'var(--card-h)'};color:${active?'#fff':'var(--txt)'};border:1px solid ${active?'var(--blu)':'var(--bdr)'};border-radius:14px;cursor:pointer;font-size:11px;font-weight:${active?'700':'500'}">${label}</button>`;
  h += qPill('', 'This quarter (' + todayQ + ')', !MGMT_DEC_QUARTER);
  for (const q of allQuarters) {
    if (q === todayQ) continue;
    h += qPill(q, q, MGMT_DEC_QUARTER === q);
  }
  h += qPill('all', 'All-time', showAll);
  h += `</div>`;

  if (!filtered.length) {
    h += `<div class="empty" style="padding:14px"><div style="color:var(--mut);font-size:13px">No decisions in ${showAll?'the journal':activeQuarter} yet.</div></div>`;
    return h;
  }
  h += `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;overflow:hidden;margin-bottom:18px">
    <table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:var(--card-h);text-align:left;color:var(--dim);font-size:10px;text-transform:uppercase">
      <th style="padding:7px 10px">Date</th><th style="padding:7px 10px">Decision</th>
      <th style="padding:7px 10px">By</th><th style="padding:7px 10px">Follow-through</th>
      <th style="padding:7px 10px">Due</th><th style="padding:7px 10px">Status</th>
      <th style="padding:7px 10px;width:50px"></th>
    </tr></thead><tbody>`;
  // Render owner as a list of chips (comma-separated string from DB)
  const ownerChips = s => {
    const list = (s||'').split(',').map(x=>x.trim()).filter(Boolean);
    if (!list.length) return '<span style="color:var(--mut)">—</span>';
    return list.map(n => `<span style="display:inline-block;background:var(--card-h);border:1px solid var(--bdr);padding:1px 7px;border-radius:10px;font-size:10px;margin-right:3px">${htmlEsc(n)}</span>`).join('');
  };
  for (const x of filtered) {
    const sColor = {open:'var(--ylw)', done:'var(--grn)', dropped:'var(--mut)'}[x.status] || 'var(--mut)';
    h += `<tr style="border-top:1px solid rgba(33,39,47,.3)">
      <td style="padding:6px 10px;white-space:nowrap;font-family:var(--mono);font-size:11px">${fmtDateShort(x.decided_at)}</td>
      <td style="padding:6px 10px"><b>${htmlEsc(x.decision)}</b>${x.context?`<div style="font-size:10px;color:var(--mut);margin-top:2px">${htmlEsc(x.context)}</div>`:''}</td>
      <td style="padding:6px 10px;color:var(--mut)">${htmlEsc(x.decided_by||'—')}</td>
      <td style="padding:6px 10px">${ownerChips(x.owner)}</td>
      <td style="padding:6px 10px;font-family:var(--mono);font-size:11px">${x.due_date?fmtDateShort(x.due_date):'—'}</td>
      <td style="padding:6px 10px"><span style="color:${sColor};font-weight:600;text-transform:uppercase;font-size:10px">${x.status}</span></td>
      <td style="padding:6px 10px;text-align:right"><a href="#" class="mg-dec-edit" data-id="${x.id}" style="color:var(--blu);text-decoration:none;margin-right:4px">✎</a><a href="#" class="mg-dec-del" data-id="${x.id}" style="color:var(--red);text-decoration:none">×</a></td>
    </tr>`;
  }
  h += `</tbody></table></div>`;
  return h;
}

      <td style="padding:5px 8px;text-align:center;color:var(--mut)">${i.priority}</td>

// ── Risk Register — grouped by 4 statuses ──
const RISK_STATUSES = [
  { key:'unmanaged',    label:'Unmanaged',    color:'#ef4444', desc:'open, no mitigation in place' },
  { key:'mitigated',    label:'Mitigated',    color:'#f59e0b', desc:'mitigation plan active' },
  { key:'materialized', label:'Materialized', color:'#8b5cf6', desc:'risk happened — incident' },
  { key:'avoided',      label:'Avoided',      color:'#10b981', desc:'risk closed — won’t happen' },
];
function sectionRisks(d) {
  const risks = d.risks || [];
  const byStatus = {};
  for (const s of RISK_STATUSES) byStatus[s.key] = [];
  for (const r of risks) {
    const k = byStatus[r.status] ? r.status : 'unmanaged';
    byStatus[k].push(r);
  }
  let h = `<div class="sh" style="display:flex;justify-content:space-between;align-items:center">
    ⚠️ Risk Register <span style="font-size:11px;color:var(--mut);font-weight:400;margin-left:6px">${risks.length} total</span>
    <button class="mg-risk-add" style="padding:6px 12px;background:var(--blu);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">+ Add Risk</button>
  </div>`;
  if (!risks.length) {
    h += `<div class="empty" style="padding:14px"><div style="color:var(--mut);font-size:13px">No risks logged.</div></div>`;
    return h;
  }
  for (const s of RISK_STATUSES) {
    const list = byStatus[s.key];
    h += `<div style="background:var(--card);border:1px solid var(--bdr);border-left:4px solid ${s.color};border-radius:8px;margin-bottom:10px;overflow:hidden">
      <div style="background:var(--card-h);padding:7px 12px;display:flex;justify-content:space-between;align-items:center">
        <div><b style="color:${s.color};text-transform:uppercase;font-size:11px;letter-spacing:.5px">${s.label}</b> <span style="font-size:11px;color:var(--mut);margin-left:6px">${s.desc}</span></div>
        <span style="background:${s.color};color:#fff;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:700">${list.length}</span>
      </div>`;
    if (!list.length) {
      h += `<div style="padding:10px 14px;color:var(--mut);font-size:12px;font-style:italic">None.</div></div>`;
      continue;
    }
    h += `<table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="text-align:left;color:var(--dim);font-size:10px;text-transform:uppercase;background:var(--card)">
      <th style="padding:6px 12px">Risk</th><th style="padding:6px 12px;text-align:center">I×L</th>
      <th style="padding:6px 12px">Owner</th><th style="padding:6px 12px">Mitigation</th>
      <th style="padding:6px 12px;width:50px"></th>
    </tr></thead><tbody>`;
    for (const r of list) {
      const score = (r.impact||0) * (r.likelihood||0);
      const scColor = score >= 16 ? '#ef4444' : score >= 9 ? '#f59e0b' : '#10b981';
      h += `<tr style="border-top:1px solid rgba(33,39,47,.3)">
        <td style="padding:6px 12px"><b>${htmlEsc(r.title)}</b></td>
        <td style="padding:6px 12px;text-align:center"><span style="background:${scColor};color:#fff;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700">${r.impact}×${r.likelihood}=${score}</span></td>
        <td style="padding:6px 12px"><b>${htmlEsc(r.owner||'—')}</b></td>
        <td style="padding:6px 12px;color:var(--mut);font-size:11px">${htmlEsc(r.mitigation||'—')}</td>
        <td style="padding:6px 12px;text-align:right"><a href="#" class="mg-risk-edit" data-id="${r.id}" style="color:var(--blu);text-decoration:none;margin-right:4px">✎</a><a href="#" class="mg-risk-del" data-id="${r.id}" style="color:var(--red);text-decoration:none">×</a></td>
      </tr>`;
    }
    h += `</tbody></table></div>`;
  }
  h += `<div style="margin-bottom:8px"></div>`;
  return h;
}

// ── Strategic Initiatives — Active vs Past (accomplished/dropped/failed) ──
const INIT_STATUSES = [
  { key:'active',       label:'Active',       color:'#3b82f6' },
  { key:'accomplished', label:'Accomplished', color:'#10b981' },
  { key:'dropped',      label:'Dropped',      color:'#6b7280' },
  { key:'failed',       label:'Failed',       color:'#ef4444' },
];
function sectionInitiatives(d) {
  const items = d.initiatives || [];
  const active = items.filter(i => i.status === 'active');
  const past = items.filter(i => i.status !== 'active');
  let h = `<div class="sh" style="display:flex;justify-content:space-between;align-items:center">
    🚀 Strategic Initiatives <span style="font-size:11px;color:var(--mut);font-weight:400;margin-left:6px">${active.length} active · ${past.length} past</span>
    <button class="mg-init-add" style="padding:6px 12px;background:var(--blu);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">+ Add Initiative</button>
  </div>`;
  if (!items.length) {
    h += `<div class="empty" style="padding:14px"><div style="color:var(--mut);font-size:13px">No initiatives yet.</div></div>`;
    return h;
  }
  const renderCard = (i) => {
    const meta = INIT_STATUSES.find(s => s.key === i.status) || INIT_STATUSES[0];
    return `<div style="background:var(--card);border:1px solid var(--bdr);border-left:4px solid ${meta.color};border-radius:8px;padding:10px 14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;gap:8px">
        <div><b>${htmlEsc(i.title)}</b><div style="font-size:11px;color:var(--mut)">Owner: ${htmlEsc(i.owner||'—')}</div></div>
        <span style="font-size:10px;font-weight:700;color:#fff;background:${meta.color};padding:2px 8px;border-radius:10px;text-transform:uppercase;white-space:nowrap">${meta.label}</span>
      </div>
      ${i.description?`<div style="font-size:11px;color:var(--mut);margin-top:4px">${htmlEsc(i.description)}</div>`:''}
      <div style="margin-top:8px"><div style="width:100%;height:6px;background:var(--card-h);border-radius:3px;overflow:hidden"><div style="width:${i.progress_pct||0}%;height:100%;background:${meta.color}"></div></div><div style="font-size:10px;color:var(--mut);margin-top:2px">${i.progress_pct||0}% · ${fmtDateShort(i.start_date)} → ${fmtDateShort(i.target_date)}</div></div>
      <div style="margin-top:6px;text-align:right"><a href="#" class="mg-init-edit" data-id="${i.id}" style="color:var(--blu);text-decoration:none;margin-right:4px">✎ Edit</a><a href="#" class="mg-init-del" data-id="${i.id}" style="color:var(--red);text-decoration:none">× Delete</a></div>
    </div>`;
  };
  h += `<div style="font-size:12px;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Active</div>`;
  if (!active.length) {
    h += `<div class="empty" style="padding:10px;margin-bottom:12px"><div style="color:var(--mut);font-size:12px;font-style:italic">No active initiatives.</div></div>`;
  } else {
    h += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin-bottom:14px">`;
    for (const i of active) h += renderCard(i);
    h += `</div>`;
  }
  if (past.length) {
    h += `<div style="font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Past</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin-bottom:18px">`;
    for (const i of past) h += renderCard(i);
    h += `</div>`;
  }
  return h;
}

// (Team Roster, Vendor Roster, and Project Health sections were removed
//  per user request — backend storage is preserved but no longer rendered.)

// ── Click delegation: a single handler routes all CRUD button clicks ──
function installOrgMgmtClickHandler() {
  if (window._orgmgmtClickInstalled) return;
  window._orgmgmtClickInstalled = true;
  document.addEventListener('click', e => {
    if (curPage !== 'orgmgmt') return;
    const handlers = [
      ['.mg-strat-edit',   e => mgStrategyEdit(e.dataset.key, e.dataset.label, e.dataset.val)],
      ['.mg-week-nav',     e => { const d=parseInt(e.dataset.d,10); MGMT_WEEK_OFFSET = (d===0?0:MGMT_WEEK_OFFSET+d); renderOrgMgmt(document.getElementById('content')); }],
      ['.mg-week-jump-btn', () => { const v = document.getElementById('mg-week-jump').value; if (v) { const tgt=new Date(v+'T12:00:00'); const today=new Date(); const monday=new Date(today); monday.setDate(today.getDate()-today.getDay()+1); MGMT_WEEK_OFFSET = Math.round((tgt - monday) / (7*86400000)); renderOrgMgmt(document.getElementById('content')); } }],
      ['.mg-dept-filter',  e => { MGMT_DEPT_FILTER = e.dataset.dept || ''; paintOrgMgmt(document.getElementById('content')); }],
      // Kanban card buttons / body MUST come before .mg-day-cell, since cards
      // are nested inside day cells and we use first-match scanning.
      // Optimistic in-place updates on these so the UI flips instantly; the
      // network call still persists in the background.
      ['.mg-kanban-complete',   async e => {
        const id = parseInt(e.dataset.id,10);
        const today = new Date().toISOString().slice(0,10);
        mgKanbanOptimistic(id, c => { c.completed_at = today; c.column_name = 'done'; });
        try { await financeApi('/kanban/'+id+'/complete', { method:'POST', body:'{}' }); }
        catch(err) { alert('Complete failed: '+(err.message||err)); await mgRefresh(); }
      }],
      ['.mg-kanban-uncomplete', async e => {
        const id = parseInt(e.dataset.id,10);
        mgKanbanOptimistic(id, c => { c.completed_at = null; c.column_name = 'todo'; });
        try { await financeApi('/kanban/'+id+'/uncomplete', { method:'POST', body:'{}' }); }
        catch(err) { alert('Reopen failed: '+(err.message||err)); await mgRefresh(); }
      }],
      ['.mg-kanban-backlog',    async e => {
        const id = parseInt(e.dataset.id,10);
        mgKanbanOptimistic(id, c => { c.due_date = null; });
        try { await financeApi('/kanban/'+id+'/move-to-backlog', { method:'POST', body:'{}' }); }
        catch(err) { alert('Move to backlog failed: '+(err.message||err)); await mgRefresh(); }
      }],
      ['.mg-kanban-card',  e => mgKanbanForm(parseInt(e.dataset.id,10))],
      ['.mg-kanban-add',   e => mgKanbanForm(null, e.dataset.member)],
      ['.mg-day-cell',     e => mgKanbanForm(null, e.dataset.member, e.dataset.date)],
      ['.mg-okr-add',      ()=>mgOkrForm(null)],
      ['.mg-okr-edit',     e => mgOkrForm(parseInt(e.dataset.id,10))],
      ['.mg-okr-del',      e => mgDelete('/okr/'+e.dataset.id, 'OKR')],
      ['.mg-dec-add',      ()=>mgDecisionForm(null)],
      ['.mg-dec-edit',     e => mgDecisionForm(parseInt(e.dataset.id,10))],
      ['.mg-dec-del',      e => mgDelete('/decision/'+e.dataset.id, 'decision')],
      ['.mg-dec-quarter',  e => { MGMT_DEC_QUARTER = e.dataset.q || ''; paintOrgMgmt(document.getElementById('content')); }],
      ['.mg-risk-add',     ()=>mgRiskForm(null)],
      ['.mg-risk-edit',    e => mgRiskForm(parseInt(e.dataset.id,10))],
      ['.mg-risk-del',     e => mgDelete('/risk/'+e.dataset.id, 'risk')],
      ['.mg-init-add',     ()=>mgInitForm(null)],
      ['.mg-init-edit',    e => mgInitForm(parseInt(e.dataset.id,10))],
      ['.mg-init-del',     e => mgDelete('/initiative/'+e.dataset.id, 'initiative')],
      ['.mg-agenda-add',   ()=>mgAgendaForm(null)],
      ['.mg-agenda-edit',  e => mgAgendaForm(parseInt(e.dataset.id,10))],
      ['.mg-agenda-del',   e => mgDelete('/agenda/'+e.dataset.id, 'agenda item')],
      ['.mg-agenda-archive', e => mgArchive('/agenda/'+e.dataset.id+'/archive')],
    ];
    for (const [sel, fn] of handlers) {
      const t = e.target.closest(sel);
      if (t) { e.preventDefault(); fn(t); return; }
    }
  });
}

async function mgRefresh() {
  try {

// Optimistic in-place update for kanban actions — repaints instantly.
// Mutator receives the card and modifies its fields; we re-bucket the visible
// week (cards / completed / backlog) and repaint without a network round-trip.
// The caller is responsible for kicking off the persistence call separately.
function mgKanbanOptimistic(cardId, mutator) {
  if (!MGMT_DATA_FULL || !MGMT_DATA_FULL.kanban) return;
  const k = MGMT_DATA_FULL.kanban;
  const all = (k.cards||[]).concat(k.completed||[], k.backlog||[]);
  // De-duplicate (a card can be in cards AND backlog if it's overdue+visible)
  const byId = new Map();
  for (const c of all) byId.set(c.id, c);
  const card = byId.get(cardId);
  if (!card) return;
  mutator(card);
  // Re-bucket
  const today = (new Date()).toISOString().slice(0,10);
  const mon = k.monday, sun = k.sunday;
  const cards = [], completed = [], backlog = [];
  for (const c of byId.values()) {
    if (c.completed_at) {
      if (mon && sun && c.completed_at >= mon && c.completed_at <= sun) completed.push(c);
      // (cards completed in other weeks aren't visible — they live in DB only)
      continue;
    }
    if (c.due_date && mon && sun && c.due_date >= mon && c.due_date <= sun) cards.push(c);
    if (!c.due_date || c.due_date < today) backlog.push(c);
  }
  k.cards = cards; k.completed = completed; k.backlog = backlog;
  paintOrgMgmt(document.getElementById('content'));
}

// ── Generic modal helper ──
function mgModal(title, fields, onSubmit, existingValues) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  const fieldsHtml = fields.map(fd => {
    const v = (existingValues && existingValues[fd.name]) ?? fd.default ?? '';
    if (fd.type === 'select') {
      const opts = fd.options.map(o => `<option value="${o.value}" ${o.value===v?'selected':''}>${o.label}</option>`).join('');
      return `<label style="grid-column:${fd.span||1}/${(fd.span||1)+1}">${fd.label}<select name="${fd.name}" ${fd.required?'required':''} style="width:100%;padding:6px 8px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:5px">${opts}</select></label>`;
    }
    if (fd.type === 'textarea') {
      return `<label style="grid-column:1/3">${fd.label}<textarea name="${fd.name}" rows="${fd.rows||2}" ${fd.required?'required':''} style="width:100%;padding:6px 8px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:5px">${htmlEsc(v)}</textarea></label>`;
    }
    if (fd.type === 'multi-checkbox') {
      // v is a comma-separated string of selected values
      const selected = new Set(String(v||'').split(',').map(s=>s.trim()).filter(Boolean));
      const boxes = fd.options.map(o => {
        const checked = selected.has(o.value) ? 'checked' : '';
        return `<label style="display:inline-flex;align-items:center;gap:4px;font-weight:400;background:var(--card-h);border:1px solid var(--bdr);padding:4px 10px;border-radius:14px;font-size:12px;cursor:pointer;margin:2px"><input type="checkbox" name="${fd.name}__multi" value="${attrEsc(o.value)}" ${checked} style="margin:0">${o.label}</label>`;
      }).join('');
      return `<label style="grid-column:1/3">${fd.label}<div style="display:flex;flex-wrap:wrap;gap:2px;padding:4px 0">${boxes}</div></label>`;
    }
    return `<label style="grid-column:${fd.span?'1/3':''}">${fd.label}<input type="${fd.type||'text'}" name="${fd.name}" value="${attrEsc(v)}" ${fd.required?'required':''} ${fd.step?`step="${fd.step}"`:''} ${fd.min?`min="${fd.min}"`:''} ${fd.placeholder?`placeholder="${attrEsc(fd.placeholder)}"`:''} style="width:100%;padding:6px 8px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:5px"></label>`;
  }).join('');
  overlay.innerHTML = `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:20px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto">
    <div style="font-size:16px;font-weight:700;margin-bottom:14px">${title}</div>
    <form id="mg-form" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px">
      ${fieldsHtml}
      <div style="grid-column:1/3;display:flex;gap:8px;justify-content:flex-end;margin-top:6px">
        <button type="button" id="mg-cancel" style="padding:8px 14px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;cursor:pointer">Cancel</button>
        <button type="submit" style="padding:8px 14px;background:var(--blu);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600">Save</button>
      </div>
    </form>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('mg-cancel').onclick = () => overlay.remove();
  overlay.onclick = ev => { if (ev.target === overlay) overlay.remove(); };
  document.getElementById('mg-form').onsubmit = async ev => {
    ev.preventDefault();
    const submitBtn = ev.target.querySelector('button[type="submit"]');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Saving…'; }
    const body = {};
    const multi = {};
    new FormData(ev.target).forEach((v,k) => {
      if (k.endsWith('__multi')) {
        const base = k.slice(0, -7);
        (multi[base] = multi[base] || []).push(v);
      } else if (v !== '') {
        body[k] = v;
      }
    });
    // Always emit a string for multi fields (even when empty) so the row
    // can be cleared by un-checking everything.
    for (const fd of fields) {
      if (fd.type === 'multi-checkbox') body[fd.name] = (multi[fd.name] || []).join(', ');
    }
    try {
      await onSubmit(body);
      await mgRefresh();    // wait for repaint before closing the modal
      overlay.remove();
    } catch (e) {
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Save'; }
      alert('Save failed: ' + (e.message||e));
    }
  };
}

async function loadAndRenderFinance(c) {
  c.innerHTML = '<div class="empty"><div class="empty-i">⏳</div><div class="empty-t">Loading Finance...</div></div>';
  const isV2 = !!window._financeV2;
  const apiPath = isV2 ? '/state-v2' : '/state';
  const fileSlug = isV2 ? 'finance-v2' : 'finance';
  // Priority 1 — live API (CRUD-capable)
  if (financeApiConfigured()) {
    try {
      FINANCE_DATA = await financeApi(apiPath);
      window._financeLive = true;
      try { financeSafeRender(); } catch (err) { console.error('renderFinance error:', err); c.innerHTML='<div class="alert"><b>Render error.</b> '+err.message+'</div>'; }
      return;
    } catch (e) {
      console.warn('Finance API unavailable, falling back to static JSON:', e.message);
      window._financeLive = false;
      window._financeApiError = e.message;
    }
  }
  // Priority 2 — static JSON published to dashboard-site/data (v1 OR v2 file slug)
  for (let i=0;i<7;i++){
    const d=new Date(Date.now()-i*86400000).toISOString().slice(0,10);
    try{const r=await fetch('data/' + fileSlug + '-'+d+'.json?_=' + Date.now(), {cache:'no-store'});if(!r.ok)continue;FINANCE_DATA=await r.json();financeSafeRender();return;}catch(e){}
  }
  try{const r=await fetch('data/' + fileSlug + '-latest.json?_=' + Date.now(), {cache:'no-store'});if(r.ok){FINANCE_DATA=await r.json();financeSafeRender();return;}}catch(e){}
  c.innerHTML='<div class="empty"><div class="empty-i">💵</div><div class="empty-t">No Finance Data</div><div class="empty-d">Run: python3 generate_finance_json.py</div></div>';
}

function renderPaymentRoute(ov, d, generated) {
  const fmt = n => '$' + Math.abs(n||0).toLocaleString(undefined,{maximumFractionDigits:0});
  const r = d.result, st = d.start;

      <button onclick="document.getElementById('payroute-overlay').remove()" style="margin-left:auto;padding:6px 14px;border-radius:6px;border:1px solid var(--bdr);background:var(--card);color:var(--txt);cursor:pointer">✕ Cerrar</button>

function renderMiles(c, data) {
  const fmt = n => (n<0?'-':'') + '$' + Math.abs(Math.round(n||0)).toLocaleString();
  const fmtDate = iso => {
    if (!iso) return '—';
    const dt = new Date(iso + 'T12:00:00');
    const MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${MS[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}`;
  };
  const projects = (data.by_project || []).filter(p => (p.milestones || []).length > 0);

  if (!projects.length) {
    c.innerHTML = '<div class="empty"><div class="empty-i">🎯</div><div class="empty-t">No milestones yet</div><div class="empty-d">Payment - Income tasks haven\'t been added to any project.</div></div>';
    return;
  }

  // Summary totals
  let totPay = 0, totInvest = 0;
  projects.forEach(p => (p.milestones || []).forEach(m => { totPay += m.payment || 0; totInvest += m.invest_before || 0; }));

  const head = `<div class="page-title">🎯 Milestones — Investment Needed per Client Payment</div>
    <div class="page-sub">For each client payment milestone: how much we need to spend on subs + materials BEFORE that payment comes in.</div>
    <div style="display:flex;gap:16px;margin:12px 0 20px 0;flex-wrap:wrap">
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px">
        <div style="font-size:11px;color:var(--mut);text-transform:uppercase">Total milestones</div>
        <div style="font-size:22px;font-weight:700">${projects.reduce((s,p)=>s+(p.milestones||[]).filter(m=>!m.trailing).length,0)} across ${projects.length} projects</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px">
        <div style="font-size:11px;color:var(--mut);text-transform:uppercase">Total client payments</div>
        <div style="font-size:22px;font-weight:700;color:var(--grn)">${fmt(totPay)}</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px">
        <div style="font-size:11px;color:var(--mut);text-transform:uppercase">Total investment needed</div>
        <div style="font-size:22px;font-weight:700;color:var(--red)">${fmt(totInvest)}</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px">
        <div style="font-size:11px;color:var(--mut);text-transform:uppercase">Net margin</div>
        <div style="font-size:22px;font-weight:700;color:${(totPay-totInvest)>=0?'var(--grn)':'var(--red)'}">${fmt(totPay-totInvest)}</div>
      </div>
    </div>`;

  const projectSections = projects.map(p => {
    const ms = p.milestones || [];
    const pPay = ms.reduce((s,m)=>s+(m.payment||0),0);
    const pInvest = ms.reduce((s,m)=>s+(m.invest_before||0),0);
    const pNet = pPay - pInvest;
    const rows = ms.map((m,i) => {
      const netColor = m.net_after >= 0 ? 'var(--grn)' : 'var(--red)';
      const rowStyle = m.trailing ? 'background:rgba(200,100,100,.08)' : '';
      const label = m.trailing ? `<span style="color:var(--mut);font-style:italic">${m.label}</span>` : m.label;
      return `<tr style="${rowStyle}">
        <td style="padding:7px 10px;color:var(--mut);font-size:12px">${i+1}</td>
        <td style="padding:7px 10px;white-space:nowrap">${fmtDate(m.date)}</td>
        <td style="padding:7px 10px;max-width:360px">${label}</td>
        <td style="padding:7px 10px;text-align:right;color:var(--grn);font-weight:600">${m.payment>0?fmt(m.payment):'—'}</td>
        <td style="padding:7px 10px;text-align:right;color:var(--red)">${m.invest_before>0?fmt(m.invest_before):'—'}</td>
        <td style="padding:7px 10px;text-align:right;color:${netColor};font-weight:600">${fmt(m.net_after)}</td>
        <td style="padding:7px 10px;text-align:right;color:var(--mut);font-size:12px">${fmt(m.cumulative_invest)}</td>
      </tr>`;
    }).join('');

    return `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:14px 16px;margin:0 0 16px 0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:10px">
        <div style="font-size:15px;font-weight:700">${p.project}</div>
        <div style="font-size:12px;color:var(--mut)">
          Pay <span style="color:var(--grn);font-weight:600">${fmt(pPay)}</span> ·
          Invest <span style="color:var(--red);font-weight:600">${fmt(pInvest)}</span> ·
          Net <span style="color:${pNet>=0?'var(--grn)':'var(--red)'};font-weight:600">${fmt(pNet)}</span>
        </div>
      </div>
      <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:720px">
        <thead>
          <tr style="color:var(--mut);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bdr)">
            <th style="padding:8px 10px;text-align:left;width:30px">#</th>
            <th style="padding:8px 10px;text-align:left">Date</th>
            <th style="padding:8px 10px;text-align:left">Milestone</th>
            <th style="padding:8px 10px;text-align:right">Client Pays</th>
            <th style="padding:8px 10px;text-align:right">Invest Before</th>
            <th style="padding:8px 10px;text-align:right">Net After</th>
            <th style="padding:8px 10px;text-align:right">Cum. Invest</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      </div>
    </div>`;
  }).join('');

  c.innerHTML = head + projectSections;
}

function renderLedger(c) {
  const d = LEDGER_DATA || {};
  const txs = d.transactions || [];
  const bal = d.real_balance || {};
  const fmt = n => (n<0?'-':'') + '$' + Math.abs(n||0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  const fmtDate = iso => {
    if (!iso) return '—';
    const dt = new Date(iso + 'T12:00:00');
    const MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${MS[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}`;
  };
  const search = (LEDGER_FILTER.search || '').toLowerCase();
  const filtered = !search ? txs : txs.filter(t => {
    const blob = [t.description, t.vendor, t.notes, t.reference_number, t.project_name, t.category]
      .filter(Boolean).join(' ').toLowerCase();
    return blob.includes(search);
  });

  const totIn = filtered.filter(t=>t.kind==='in').reduce((s,t)=>s+t.amount,0);
  const totOut = filtered.filter(t=>t.kind==='out').reduce((s,t)=>s+t.amount,0);

  // Year-month tree for the sidebar
  const byYM = {};
  txs.forEach(t => {
    const y = t.date.slice(0,4), m = t.date.slice(5,7);
