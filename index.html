<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AG Operations Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0B0E13;--raised:#111519;--card:#161B22;--card-h:#1C222B;
  --bdr:#21272F;--bdr-h:#2D3540;
  --txt:#E6EAF0;--txt2:#8B95A8;--dim:#555F70;
  --red:#F04438;--red-s:rgba(240,68,56,.1);--red-b:rgba(240,68,56,.25);
  --org:#F79009;--org-s:rgba(247,144,9,.1);--org-b:rgba(247,144,9,.25);
  --ylw:#EAAA08;--ylw-s:rgba(234,170,8,.1);--ylw-b:rgba(234,170,8,.25);
  --blu:#528BFF;--blu-s:rgba(82,139,255,.1);--blu-b:rgba(82,139,255,.25);
  --grn:#12B76A;--grn-s:rgba(18,183,106,.1);--grn-b:rgba(18,183,106,.25);
  --pur:#9B8AFB;--acc:#818CF8;
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;
  --r:8px;--rl:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);line-height:1.5;-webkit-font-smoothing:antialiased}

/* Top bar */
.top{position:sticky;top:0;background:var(--raised);border-bottom:1px solid var(--bdr);padding:12px 16px;z-index:100;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;background:linear-gradient(135deg,var(--acc),var(--pur));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:1px;color:#fff}
.brand-name{font-size:15px;font-weight:600}
.brand-sub{font-size:11px;color:var(--dim)}
.date-nav{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:2px}
.date-btn{width:28px;height:28px;border:none;background:none;color:var(--txt2);font-size:16px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center}
.date-btn:hover{background:var(--card-h);color:var(--txt)}
.date-txt{font-size:13px;font-weight:500;padding:0 8px;min-width:80px;text-align:center}

/* Nav tabs */
.nav{display:flex;gap:2px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;background:var(--raised);border-bottom:1px solid var(--bdr);position:sticky;top:58px;z-index:99}
.nav::-webkit-scrollbar{display:none}
.nav a{padding:8px 14px;font-size:13px;font-weight:500;color:var(--txt2);background:none;border:none;border-radius:6px;cursor:pointer;white-space:nowrap;text-decoration:none;transition:all .12s}
.nav a:hover{background:var(--card);color:var(--txt)}
.nav a.on{background:var(--blu);color:#fff}
.nav .cnt{font-family:var(--mono);font-size:11px;margin-left:3px;opacity:.7}

/* Main */
.main{max-width:1600px;margin:0 auto;padding:16px 32px;width:100%;box-sizing:border-box}
/* TV / smaller desktop: 1080p windowed or 720p */
@media(max-width:1400px){
  .main{padding:12px 12px;max-width:100%}
  body{font-size:13px}
  .page-title{font-size:18px!important}
  .page-sub{font-size:11px!important}
  .stats{grid-template-columns:repeat(3,1fr)!important;gap:6px!important}
  .st .n{font-size:18px!important}
  .st .l{font-size:10px!important}
  .cf-bk-grid4{grid-template-columns:repeat(2,1fr)!important}
  .cf-bk-grid5{grid-template-columns:repeat(3,1fr)!important}
  .sod-top-grid{grid-template-columns:1fr!important;gap:12px!important}
  .pn{font-size:14px!important}
  .pp{font-size:11px!important}
  .tg{font-size:9px!important;padding:1px 5px!important}
  .preview{gap:4px!important}
  .pv-head{font-size:9px!important}
  .pv-name{font-size:11px!important}
  .pv-sub{font-size:10px!important}
  .pv-item{font-size:11px!important}
  .tr{font-size:11px!important}
  .tsl{font-size:10px!important}
  .ph{padding:10px 12px!important}
  .pb{padding:0 12px 12px!important}
  .pc{margin-bottom:14px!important}
  .pmc{padding:8px 10px!important}
  .pmn{font-size:12px!important}
  .pmd{font-size:10px!important}
  .pmb{font-size:14px!important}
  .sh{font-size:13px!important}
  .pb-3col{grid-template-columns:1fr 1fr!important;gap:12px!important}
  .pb-3col .pay-side{grid-column:1/-1}
  .wk-pies{grid-template-columns:repeat(3,1fr)!important}
  .wk-zone-title{font-size:16px!important}
  .wk-zone-dates{font-size:11px!important}
  .wk-section-title{font-size:13px!important}
  .wk-pm-name{font-size:13px!important}
  .wk-pm-detail{font-size:11px!important}
  .wk-pm-trend{font-size:14px!important}
  .top{padding:8px 12px!important}
  .brand-name{font-size:13px!important}
  .nav a{padding:6px 10px!important;font-size:12px!important}
}
/* Small screens: 720p TV or small laptop */
@media(max-width:1100px){
  .main{padding:8px 6px}
  body{font-size:12px}
  .stats{grid-template-columns:repeat(2,1fr)!important}
  .st .n{font-size:16px!important}
  .cf-bk-grid4{grid-template-columns:repeat(2,1fr)!important}
  .cf-bk-grid5{grid-template-columns:repeat(2,1fr)!important}
  .preview{grid-template-columns:repeat(2,1fr)!important}
  .pb-grid{grid-template-columns:1fr!important}
  .pb-3col{grid-template-columns:1fr!important}
  .pb-3col .pay-side{grid-column:auto}
  .wk-pies{grid-template-columns:repeat(2,1fr)!important}
  .pn{font-size:13px!important}
  .pc{margin-bottom:10px!important}
}
.page-title{font-size:22px;font-weight:700;margin-bottom:2px}
.page-sub{font-size:13px;color:var(--txt2);margin-bottom:20px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.st{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 6px;text-align:center;position:relative;overflow:hidden}
.st::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.st.r::before{background:var(--red)}.st.o::before{background:var(--org)}.st.b::before{background:var(--blu)}.st.y::before{background:var(--ylw)}.st.g::before{background:var(--dim)}
.st .n{font-family:var(--mono);font-size:20px;font-weight:700;line-height:1}
.st.r .n{color:var(--red)}.st.o .n{color:var(--org)}.st.b .n{color:var(--blu)}.st.y .n{color:var(--ylw)}.st.g .n{color:var(--txt2)}
.st .l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);margin-top:4px}

/* Alert */
.alert{background:var(--red-s);border:1px solid var(--red-b);border-radius:var(--r);padding:12px 14px;margin-bottom:16px;font-size:13px;display:flex;gap:8px;align-items:flex-start}
.alert b{color:var(--red)}

/* Filters */
.filters{display:flex;gap:4px;margin-bottom:14px}
.fb{padding:6px 12px;font-size:13px;font-weight:500;font-family:var(--sans);color:var(--txt2);background:none;border:1px solid var(--bdr);border-radius:6px;cursor:pointer;white-space:nowrap}
.fb:hover{background:var(--card);color:var(--txt)}.fb.on{background:var(--blu);color:#fff;border-color:var(--blu)}

/* Project card */
.pc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);margin-bottom:20px;overflow:hidden;transition:border-color .15s;border-left:4px solid var(--bdr)}
.pc.sev-r{border-left-color:var(--red);background:linear-gradient(135deg,rgba(240,68,56,.1) 0%,rgba(240,68,56,.03) 40%,var(--card) 100%)}
.pc.sev-o{border-left-color:var(--org);background:linear-gradient(135deg,rgba(247,144,9,.08) 0%,rgba(247,144,9,.02) 40%,var(--card) 100%)}
.pc.sev-b{border-left-color:var(--blu);background:linear-gradient(135deg,rgba(82,139,255,.07) 0%,rgba(82,139,255,.02) 40%,var(--card) 100%)}
.pc.sev-g{border-left-color:var(--grn);background:linear-gradient(135deg,rgba(18,183,106,.07) 0%,rgba(18,183,106,.02) 40%,var(--card) 100%)}
.pc:hover{border-color:var(--bdr-h)}.pc.sev-r:hover{border-left-color:var(--red)}.pc.sev-o:hover{border-left-color:var(--org)}.pc.sev-b:hover{border-left-color:var(--blu)}.pc.sev-g:hover{border-left-color:var(--grn)}
.ph{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;background:rgba(255,255,255,.02)}
.ph:hover{background:rgba(255,255,255,.04)}
.pn{font-size:16px;font-weight:600}
.pp{font-size:12px;color:var(--txt2);margin-top:1px}
.pt{display:flex;gap:4px;flex-shrink:0;align-items:center;flex-wrap:wrap}
.tg{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px}
.tg.r{background:var(--red-s);color:var(--red);border:1px solid var(--red-b)}
.tg.o{background:var(--org-s);color:var(--org);border:1px solid var(--org-b)}
.tg.b{background:var(--blu-s);color:var(--blu);border:1px solid var(--blu-b)}
.tg.y{background:var(--ylw-s);color:var(--ylw);border:1px solid var(--ylw-b)}
.tg.gr{background:var(--grn-s);color:var(--grn);border:1px solid var(--grn-b)}
.chv{width:14px;height:14px;color:var(--dim);transition:transform .2s;margin-left:4px;flex-shrink:0}
.pc.op .chv{transform:rotate(180deg)}
.pb{padding:0 14px 14px;display:none}
.pc.op .pb{display:block}

/* Preview - 3 columns visible on collapsed cards */
.preview{padding:10px 14px;border-top:1px solid rgba(33,39,47,.5);display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.pv-col{min-width:0}
.pv-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding-bottom:6px;margin-bottom:6px;border-bottom:1px solid var(--bdr)}
.pv-head.r{color:var(--red)}.pv-head.y{color:var(--ylw)}.pv-head.b{color:var(--blu)}
.pv-item{font-size:12px;padding:3px 0;display:flex;align-items:flex-start;gap:6px;line-height:1.4}
.pv-dot{width:5px;height:5px;border-radius:50%;margin-top:5px;flex-shrink:0}
.pv-dot.r{background:var(--red)}.pv-dot.y{background:var(--ylw)}.pv-dot.b{background:var(--blu)}
.pv-txt{flex:1;min-width:0}
.pv-name{color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pv-sub{font-size:11px;color:var(--txt2)}
.pv-sub.warn{color:var(--red)}
.pv-more{font-size:11px;color:var(--dim);padding:3px 0}
.pv-empty{font-size:11px;color:var(--dim);font-style:italic;padding:3px 0}
.pc.op .preview{display:none}

/* Expanded body - 2 columns */
.pb{padding:0 14px 14px;display:none}
.pc.op .pb{display:block}
.pb-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pb-full{grid-column:1/-1}
.pb-3col{display:grid;grid-template-columns:2fr 2fr 1fr;gap:16px}
.pb-3col .pay-side{background:rgba(129,140,248,.04);border:1px solid rgba(129,140,248,.15);border-radius:8px;padding:10px 12px}
.pb-3col .pay-side .tsl{color:#818cf8;border-bottom-color:rgba(129,140,248,.2)}
.pb-3col .pay-side .tr{border-bottom-color:rgba(129,140,248,.1)}
.pb-3col .pay-side .td{background:#818cf8}

@media(max-width:600px){
  .preview{grid-template-columns:1fr 1fr!important}
  .pb-grid{grid-template-columns:1fr}
  .pn{font-size:15px}
  .pc{margin-bottom:0;border-radius:8px}
  .pc+.pc{margin-top:20px;position:relative}
  .pc+.pc::before{content:'';position:absolute;top:-11px;left:10%;right:10%;height:2px;background:rgba(255,255,255,.08);border-radius:1px}
}

/* Task sections */
.ts{margin-bottom:10px}.ts:last-child{margin-bottom:0}
.tsl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:5px 0;margin-bottom:3px;border-bottom:1px solid var(--bdr)}
.tsl.lr{color:var(--red)}.tsl.ac{color:var(--blu)}.tsl.bl{color:var(--org)}.tsl.dt{color:var(--ylw)}.tsl.gp{color:var(--txt2)}

/* Task row */
.tr{display:flex;align-items:center;padding:4px 0;border-bottom:1px solid rgba(33,39,47,.3);font-size:12px;line-height:1.3}
.tr:last-child{border-bottom:none}
.td{width:5px;height:5px;border-radius:50%;margin-right:7px;flex-shrink:0}
.td.r{background:var(--red)}.td.o{background:var(--org)}.td.b{background:var(--blu)}.td.y{background:var(--ylw)}.td.g{background:var(--grn)}
.ti{flex:1;min-width:0;display:flex;align-items:baseline;gap:4px;overflow:hidden}
.tn{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1;min-width:0}
.tm{font-size:11px;color:var(--txt2);white-space:nowrap;flex-shrink:0}
.tb{font-size:11px;color:var(--org);padding:1px 0 1px 12px;opacity:.85}
.tw{font-family:var(--mono);font-size:11px;color:var(--txt);flex-shrink:0;margin-left:6px;text-align:right;white-space:nowrap}
.tw.ov{color:var(--red);font-weight:600}
.tr-bl{padding:0 0 4px 0;border-bottom:1px solid rgba(33,39,47,.3)}
.tr-bl:last-child{border-bottom:none}
.show-more{font-size:11px;color:var(--blu);cursor:pointer;padding:3px 0;user-select:none}
.show-more:hover{text-decoration:underline}
.nob{color:var(--red);font-weight:500;font-size:12px}

/* Gaps */
.gl{display:flex;gap:6px;flex-wrap:wrap;padding:6px 0}
.gt{font-size:11px;background:rgba(85,95,112,.12);border:1px solid rgba(85,95,112,.2);padding:2px 7px;border-radius:4px;color:var(--txt2)}

/* On track */
.otg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.oti{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 12px;font-size:13px}
.otc{color:var(--grn);font-weight:700;margin-right:6px}
.otn{font-size:10px;color:var(--dim)}

/* PM */
.pmr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.pmc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start}
.pmn{font-size:14px;font-weight:600}
.pmd{font-size:12px;color:var(--txt2);margin-top:3px;line-height:1.5}
.pmb{font-size:18px}

/* Section title */
.sh{font-size:15px;font-weight:600;margin:24px 0 4px;color:var(--txt2)}

/* Footer */
.ft{margin-top:32px;padding:16px 0;border-top:1px solid var(--bdr);text-align:center;font-size:11px;color:var(--dim)}

/* Placeholder */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;text-align:center}
.empty-i{font-size:40px;margin-bottom:12px;opacity:.3}
.empty-t{font-size:18px;font-weight:600;color:var(--txt2);margin-bottom:6px}
.empty-d{font-size:13px;color:var(--dim);max-width:360px}

@media(max-width:600px){
  .stats{grid-template-columns:repeat(3,1fr)!important}
  .otg,.pmr{grid-template-columns:1fr}
  .st .n{font-size:20px}
  .pn{font-size:13px}
}

/* Password gate */
.pw-gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;text-align:center}
.pw-gate .pw-icon{font-size:48px;margin-bottom:16px;opacity:.4}
.pw-gate .pw-title{font-size:20px;font-weight:600;color:var(--txt);margin-bottom:4px}
.pw-gate .pw-sub{font-size:13px;color:var(--dim);margin-bottom:20px}
.pw-gate input{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:10px 14px;font-size:14px;font-family:var(--sans);color:var(--txt);width:260px;text-align:center;outline:none;transition:border-color .15s}
.pw-gate input:focus{border-color:var(--blu)}
.pw-gate input.pw-err{border-color:var(--red);animation:shake .3s}
.pw-gate .pw-btn{margin-top:10px;padding:8px 28px;font-size:14px;font-weight:600;font-family:var(--sans);background:var(--blu);color:#fff;border:none;border-radius:6px;cursor:pointer;transition:opacity .15s}
.pw-gate .pw-btn:hover{opacity:.85}
.pw-gate .pw-deny{color:var(--red);font-size:13px;margin-top:10px;font-weight:500}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* Weekly page */
.wk-section{margin-bottom:24px}
.wk-section-title{font-size:15px;font-weight:600;color:var(--txt2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.wk-pm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:600px){.wk-pm-grid{grid-template-columns:1fr}}
.wk-pm-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;position:relative;overflow:hidden}
.wk-pm-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.wk-pm-card.imp::before{background:var(--grn)}.wk-pm-card.dec::before{background:var(--red)}.wk-pm-card.stb::before{background:var(--ylw)}
.wk-pm-name{font-size:14px;font-weight:600}
.wk-pm-detail{font-size:12px;color:var(--txt2);margin-top:3px;line-height:1.5}
.wk-pm-trend{position:absolute;top:12px;right:14px;font-size:16px}
.wk-drift-bar{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.wk-drift-item{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:8px 12px;font-size:13px;display:flex;justify-content:space-between;gap:12px;flex:1;min-width:200px}
.wk-drift-name{color:var(--txt)}.wk-drift-val{font-family:var(--mono);font-weight:600;color:var(--red)}
.wk-type-chips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.wk-chip{font-size:12px;font-weight:500;padding:4px 10px;border-radius:4px;font-family:var(--mono)}
.wk-chip.lm{background:var(--red-s);color:var(--red);border:1px solid var(--red-b)}
.wk-chip.rc{background:var(--org-s);color:var(--org);border:1px solid var(--org-b)}
.wk-chip.pr{background:var(--grn-s);color:var(--grn);border:1px solid var(--grn-b)}
.wk-chip.ca{background:var(--blu-s);color:var(--blu);border:1px solid var(--blu-b)}

/* Weekly sections */
.wk-zone{border-radius:var(--rl);padding:20px 16px;margin-bottom:4px}
.wk-zone.review{background:rgba(85,95,112,.06);border:1px solid rgba(85,95,112,.15)}
.wk-zone.forecast{background:rgba(82,139,255,.05);border:1px solid rgba(82,139,255,.15)}
.wk-zone-header{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.wk-zone-title{font-size:18px;font-weight:700}
.wk-zone.review .wk-zone-title{color:var(--txt2)}
.wk-zone.forecast .wk-zone-title{color:var(--blu)}
.wk-zone-dates{font-size:13px;font-family:var(--mono);font-weight:500}
.wk-zone.review .wk-zone-dates{color:var(--dim)}
.wk-zone.forecast .wk-zone-dates{color:var(--blu);opacity:.7}
.wk-zone-sub{font-size:12px;color:var(--dim);margin-bottom:16px}
.wk-divider{display:flex;align-items:center;gap:12px;margin:24px 0;padding:0 4px}
.wk-divider::before,.wk-divider::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,transparent,var(--blu),transparent)}
.wk-divider-label{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blu);white-space:nowrap}

/* Forecast table */
.fc-table{width:100%;border-collapse:collapse;font-size:12px}
.fc-table th{text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);padding:6px 8px;border-bottom:1px solid var(--bdr)}
.fc-table td{padding:5px 8px;border-bottom:1px solid rgba(33,39,47,.3);vertical-align:top}
.fc-risk{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;display:inline-block;min-width:48px;text-align:center}
.fc-risk.high{background:var(--red-s);color:var(--red);border:1px solid var(--red-b)}
.fc-risk.medium{background:var(--ylw-s);color:var(--ylw);border:1px solid var(--ylw-b)}
.fc-risk.low{background:var(--grn-s);color:var(--grn);border:1px solid var(--grn-b)}

/* Cash Flow */
.cf-balance-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.cf-balance-label{font-size:13px;font-weight:600;color:var(--txt2)}
.cf-balance-input{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:8px 12px;font-size:18px;font-family:var(--mono);font-weight:700;color:var(--grn);width:200px;outline:none;transition:border-color .15s}
.cf-balance-input:focus{border-color:var(--blu)}
.cf-balance-saved{font-size:11px;color:var(--dim);font-style:italic}
.cf-time-tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:2px;width:fit-content}
.cf-tt{padding:6px 14px;font-size:12px;font-weight:500;font-family:var(--sans);color:var(--txt2);background:none;border:none;border-radius:4px;cursor:pointer;white-space:nowrap;transition:all .12s}
.cf-tt:hover{color:var(--txt)}.cf-tt.on{background:var(--blu);color:#fff}
.cf-chart-wrap{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:16px;margin-bottom:20px;overflow-x:auto}
.cf-chart{display:flex;align-items:flex-end;gap:2px;height:180px;min-width:100%}
.cf-bar-group{display:flex;flex-direction:column;align-items:center;flex:1;min-width:36px;position:relative}
.cf-bar{width:100%;max-width:32px;border-radius:4px 4px 0 0;transition:height .3s;position:relative;min-height:2px}
.cf-bar.pos{background:var(--grn)}.cf-bar.neg{background:var(--red);border-radius:0 0 4px 4px}
.cf-bar-lbl{font-size:9px;font-family:var(--mono);color:var(--txt2);margin-top:4px;white-space:nowrap;transform:rotate(-45deg);transform-origin:top left;position:relative;left:8px}
.cf-bar-amt{font-size:9px;font-family:var(--mono);font-weight:600;position:absolute;top:-16px;left:50%;transform:translateX(-50%);white-space:nowrap}
.cf-bar-amt.pos{color:var(--grn)}.cf-bar-amt.neg{color:var(--red)}
.cf-baseline{position:absolute;left:0;right:0;border-top:1px dashed var(--dim);z-index:1}
.cf-proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
@media(max-width:600px){.cf-proj-grid{grid-template-columns:1fr}}
.cf-proj{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
.cf-proj-name{font-size:13px;font-weight:500}
.cf-proj-amt{font-family:var(--mono);font-size:14px;font-weight:700}
.cf-proj-amt.in{color:var(--grn)}.cf-proj-amt.out{color:var(--red)}.cf-proj-amt.net-pos{color:var(--grn)}.cf-proj-amt.net-neg{color:var(--red)}
.cf-proj-detail{font-size:11px;color:var(--txt2)}
.cf-pay-list{margin-top:4px}
.cf-pay{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid rgba(33,39,47,.3);font-size:12px;gap:8px}
.cf-pay:last-child{border-bottom:none}
.cf-pay-date{font-family:var(--mono);font-size:11px;color:var(--txt2);min-width:52px}
.cf-pay-type{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;min-width:54px;text-align:center}
.cf-pay-type.in{background:var(--grn-s);color:var(--grn);border:1px solid var(--grn-b)}
.cf-pay-type.pin{background:#433a1a;color:#facc15;border:1px solid #6b5c1e}
.cf-pay-type.out{background:var(--red-s);color:var(--red);border:1px solid var(--red-b)}
.cf-pay-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cf-pay-proj{font-size:11px;color:var(--txt2)}
.cf-pay-amt{font-family:var(--mono);font-weight:600;white-space:nowrap}
.cf-pay-amt.in{color:var(--grn)}.cf-pay-amt.out{color:var(--red)}
.cf-pay-status{font-size:10px;padding:2px 6px;border-radius:3px}
.cf-pay-status.paid{background:var(--grn-s);color:var(--grn);border:1px solid var(--grn-b)}
.cf-pay-status.pending{background:var(--ylw-s);color:var(--ylw);border:1px solid var(--ylw-b)}
.cf-pay-status.tbd{background:rgba(85,95,112,.12);color:var(--dim);border:1px solid rgba(85,95,112,.2)}
.cf-pay-bal{font-family:var(--mono);font-size:11px;font-weight:600;white-space:nowrap;min-width:72px;text-align:right}
.cf-pay-bal.pos{color:var(--grn)}.cf-pay-bal.neg{color:var(--red)}
</style>

<body>

<div class="top">
  <div class="brand">
    <div class="logo">AG</div>
    <div>
      <div class="brand-name">Awesome Group</div>
      <div class="brand-sub">Operations Dashboard</div>
    </div>
  </div>
  <div class="date-nav">
    <button class="date-btn" id="prev-btn">‹</button>
    <span class="date-txt" id="date-display">Today</span>
    <button class="date-btn" id="next-btn">›</button>
  </div>
</div>

<div class="nav" id="main-nav">
  <a class="on" data-p="sod">📋 Projects Dashboard</a>
  <a data-p="weekly">▤ Weekly Forecast</a>
  <a data-p="mgmt">▥ Management</a>
  <a data-p="fcash">💰 Full Cash Flow</a>
  <a data-p="finance">💵 Finance</a>
  <a data-p="archive">▦ Archive</a>
</div>

<div class="main" id="content"></div>

<script>
let DATA = {};

let curPage = 'sod';

document.getElementById('main-nav').addEventListener('click', e => {
  const a = e.target.closest('a[data-p]');
  if (!a) return;
  e.preventDefault();
  document.querySelectorAll('#main-nav a').forEach(x => x.classList.remove('on'));
  a.classList.add('on');
  curPage = a.dataset.p;
  render();
});

let EOD_DATA = null;
let WEEKLY_DATA = null;
let FORECAST_DATA = null;
let FINANCE_DATA = null;
const WEEKLY_PW = 'Thisisthepassword123!';
const MGMT_PW = 'Awesome';

function render() {
  const c = document.getElementById('content');
  if (curPage === 'sod') renderSOD(c);
  else if (curPage === 'weekly') loadAndRenderWeekly(c);
  else if (curPage === 'mgmt') mgmtGate(c);
  else if (curPage === 'fcash') fcGate(c);
  else if (curPage === 'finance') financeGate(c);
  else if (curPage === 'archive') renderArchive(c);
  else {
    const titles = {projects:'Project Dashboards'};
    const descs = {projects:'Live project status views. Coming soon.'};
    c.innerHTML = `<div class="empty"><div class="empty-i">📋</div><div class="empty-t">${titles[curPage]||'Coming Soon'}</div><div class="empty-d">${descs[curPage]||''}</div></div>`;
  }
}

function weeklyGate(c) {
  if (sessionStorage.getItem('wk_auth') === '1') {
    loadAndRenderWeekly(c);
    return;
  }
  c.innerHTML = `<div class="pw-gate">
    <div class="pw-icon">🔒</div>
    <div class="pw-title">Weekly Forecast — Management View</div>
    <div class="pw-sub">Enter password to access this report.</div>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="off">
    <button class="pw-btn" id="pw-btn">Unlock</button>
    <div class="pw-deny" id="pw-deny" style="display:none">Access denied</div>
  </div>`;
  const inp = document.getElementById('pw-input');
  const btn = document.getElementById('pw-btn');
  const deny = document.getElementById('pw-deny');
  function tryPw() {
    if (inp.value === WEEKLY_PW) {
      sessionStorage.setItem('wk_auth', '1');
      loadAndRenderWeekly(c);
    } else {
      inp.classList.add('pw-err');
      deny.style.display = '';
      setTimeout(() => inp.classList.remove('pw-err'), 400);
    }
  }
  btn.addEventListener('click', tryPw);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') tryPw(); });
  setTimeout(() => inp.focus(), 50);
}

async function loadAndRenderWeekly(c) {
  c.innerHTML = '<div class="empty"><div class="empty-i">⏳</div><div class="empty-t">Loading Weekly Report...</div></div>';
  // Try this Monday, previous Monday, and one more back (handles timezone edge cases)
  const now = new Date();
  // Use local date to avoid UTC timezone mismatch
  const localY = now.getFullYear(), localM = now.getMonth(), localD = now.getDate();
  const localNow = new Date(localY, localM, localD);
  const dow = localNow.getDay() || 7; // Mon=1..Sun=7
  const thisMon = new Date(localNow); thisMon.setDate(localD - (dow - 1));
  const prevMon = new Date(thisMon); prevMon.setDate(thisMon.getDate() - 7);
  const prevPrevMon = new Date(prevMon); prevPrevMon.setDate(prevMon.getDate() - 7);
  const fmt = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  // Load review — try this Monday, then previous two Mondays
  for (const mon of [fmt(thisMon), fmt(prevMon), fmt(prevPrevMon)]) {
    try {
      const r = await fetch('data/weekly-review-' + mon + '.json');
      if (r.ok) { WEEKLY_DATA = await r.json(); break; }
    } catch(e) {}
  }
  // Load forecast — try this Monday, then previous two Mondays
  for (const mon of [fmt(thisMon), fmt(prevMon), fmt(prevPrevMon)]) {
    try {
      const fr = await fetch('data/weekly-forecast-' + mon + '.json');
      if (fr.ok) { FORECAST_DATA = await fr.json(); break; }
    } catch(e) {}
  }
  // Render whatever we have
  if (WEEKLY_DATA || FORECAST_DATA) {
    renderWeekly(c);
    return;
  }
  c.innerHTML = '<div class="empty"><div class="empty-i">📊</div><div class="empty-t">No Weekly Report</div><div class="empty-d">The weekly report generates Monday at 7 AM.</div></div>';
  c.innerHTML = '<div class="empty"><div class="empty-i">📊</div><div class="empty-t">No Weekly Report</div><div class="empty-d">The weekly report generates Monday at 7 AM.</div></div>';
}

// SVG doughnut chart helper
function svgDonut(data, size, colors) {
  // data: [{label, value, color}], size: diameter
  const total = data.reduce((s, d) => s + d.value, 0);
  if (!total) return `<svg width="${size}" height="${size}"></svg>`;
  const cx = size / 2, cy = size / 2, r = size * 0.38, sw = size * 0.18;
  let angle = -Math.PI / 2;
  let paths = '';
  data.forEach(d => {
    if (!d.value) return;
    const pct = d.value / total;
    const a1 = angle;
    const a2 = angle + pct * 2 * Math.PI;
    const large = pct > 0.5 ? 1 : 0;
    const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
    if (pct >= 0.999) {
      paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="${sw}"/>`;
    } else {
      paths += `<path d="M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2}" fill="none" stroke="${d.color}" stroke-width="${sw}" stroke-linecap="round"/>`;
    }
    angle = a2;
  });
  paths += `<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" fill="var(--txt)" font-family="var(--mono)" font-size="${size*0.18}" font-weight="700">${total}</text>`;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}</svg>`;
}

function buildForecast(fc) {
  const fs = fc.summary;
  const fmd = t => t.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  let h = '';

  h += '<div class="wk-zone forecast" style="margin-top:24px">';
  h += '<div class="wk-zone-header" style="background:linear-gradient(135deg,rgba(56,189,248,.12),rgba(56,189,248,.03))">';
  h += '<div class="wk-zone-title" style="color:#38bdf8">🔮 THIS WEEK\'S FORECAST</div>';
  h += '<div class="wk-zone-dates">' + fc.week + ' · Based on schedule as of ' + fc.snapshot_date + '</div>';
  h += '</div>';

  // Top Stats
  h += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:16px 0">';
  const stats = [
    {val: fs.total_due_this_week, label: 'Tasks Due This Week', color: 'var(--txt)'},
    {val: fs.already_overdue, label: 'Already Overdue (Backlog)', color: 'var(--red)'},
    {val: fs.outdoor_tasks_due, label: 'Outdoor Tasks Due', color: '#f97316'},
    {val: fs.blocked_by_overdue, label: 'Blocked by Overdue Work', color: 'var(--red)'},
    {val: fs.payments_blocked || 0, label: 'Payments Stuck (work not done)', color: '#818cf8'},
  ];
  stats.forEach(st => {
    h += '<div style="background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:14px;text-align:center">';
    h += '<div style="font-size:24px;font-weight:700;color:' + st.color + '">' + st.val + '</div>';
    h += '<div style="font-size:12px;color:var(--dim)">' + st.label + '</div>';
    h += '</div>';
  });
  h += '</div>';

  // Weather Strip — This Week + Next Week
  const weatherCard = w => {
    const bg = w.outdoor_risk==='stop' ? 'rgba(240,68,56,.12)' : w.outdoor_risk==='caution' ? 'rgba(249,115,22,.1)' : 'rgba(52,211,168,.06)';
    const bdr = w.outdoor_risk==='stop' ? '#F04438' : w.outdoor_risk==='caution' ? '#f97316' : '#34d399';
    const icon = w.outdoor_risk==='stop' ? '🛑' : w.outdoor_risk==='caution' ? '⚠️' : '☀️';
    const riskLabel = w.outdoor_risk==='stop' ? 'NO OUTDOOR WORK' : w.outdoor_risk==='caution' ? 'MONITOR CONDITIONS' : 'GOOD TO WORK';
    return '<div style="background:' + bg + ';border:1px solid ' + bdr + ';border-radius:10px;padding:12px;text-align:center">'
      + '<div style="font-size:14px;font-weight:700;color:var(--txt)">' + w.day + '</div>'
      + '<div style="font-size:11px;color:var(--dim)">' + w.date + '</div>'
      + '<div style="font-size:20px;margin:6px 0">' + icon + '</div>'
      + '<div style="font-size:12px;color:var(--txt2)">' + w.high + '° / ' + w.low + '°</div>'
      + '<div style="font-size:11px;color:var(--dim);margin-top:2px">💧 ' + w.rain_pct + '%</div>'
      + '<div style="font-size:11px;color:var(--dim)">💨 ' + w.wind_mph + ' mph</div>'
      + '<div style="font-size:10px;font-weight:600;color:' + bdr + ';margin-top:6px">' + riskLabel + '</div>'
      + '</div>';
  };

  const thisWeekWeather = fc.weather_this_week || fc.weather || [];
  const nextWeekWeather = fc.weather_next_week || [];

  h += '<div class="wk-section" style="margin-bottom:16px">';
  h += '<div class="wk-section-title">🌤️ DFW Weather Forecast — Impact on Outdoor Work</div>';

  // This Week
  if (thisWeekWeather.length) {
    h += '<div style="font-size:12px;font-weight:600;color:var(--txt2);margin:10px 0 6px;text-transform:uppercase;letter-spacing:.5px">This Week</div>';
    h += '<div style="display:grid;grid-template-columns:repeat(' + Math.min(thisWeekWeather.length, 7) + ',1fr);gap:8px">';
    thisWeekWeather.forEach(w => { h += weatherCard(w); });
    h += '</div>';
  }

  // Next Week
  if (nextWeekWeather.length) {
    h += '<div style="font-size:12px;font-weight:600;color:var(--txt2);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.5px">Next Week</div>';
    h += '<div style="display:grid;grid-template-columns:repeat(' + Math.min(nextWeekWeather.length, 7) + ',1fr);gap:8px">';
    nextWeekWeather.forEach(w => { h += weatherCard(w); });
    h += '</div>';
  }

  h += '</div>';

  // Weather Alerts
  if (fc.weather_alerts && fc.weather_alerts.length) {
    h += '<div style="margin-bottom:16px">';
    fc.weather_alerts.forEach(a => {
      const abg = a.severity==='high' ? 'rgba(240,68,56,.08)' : 'rgba(249,115,22,.06)';
      const abdr = a.severity==='high' ? '#F04438' : '#f97316';
      h += '<div style="background:' + abg + ';border-left:3px solid ' + abdr + ';padding:10px 14px;border-radius:6px;margin:8px 0">';
      h += '<div style="font-size:14px;color:var(--txt)">' + fmd(a.message) + '</div>';
      if (a.tasks_affected && a.tasks_affected.length) {
        h += '<div style="font-size:12px;color:var(--dim);margin-top:6px">Outdoor tasks at risk: ' + a.tasks_affected.join(', ') + '</div>';
      }
      h += '</div>';
    });
    h += '</div>';
  }

  // Income Alerts — Warning System
  const ia = fc.income_alerts || {};
  const iaItems = ia.items || [];
  const iaBlocked = iaItems.filter(i => i.risk === 'blocked');
  const iaAtRisk = iaItems.filter(i => i.risk === 'at_risk');
  const iaOnTrack = iaItems.filter(i => i.risk === 'on_track');

  h += '<div class="wk-section" style="margin-bottom:16px">';
  h += '<div class="wk-section-title">🚨 Income Watch — Upcoming Payments & Risks</div>';

  // Summary cards
  h += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px;margin-bottom:14px">';
  h += '<div style="background:rgba(52,211,168,.06);border:1px solid var(--bdr);border-radius:10px;padding:14px;text-align:center">';
  h += '<div style="font-size:20px;font-weight:700;color:var(--grn)">$' + (ia.total_upcoming_income||0).toLocaleString() + '</div>';
  h += '<div style="font-size:11px;color:var(--dim);margin-top:2px">Total Upcoming Income</div></div>';
  h += '<div style="background:rgba(52,211,168,.04);border:1px solid rgba(52,211,168,.15);border-radius:10px;padding:14px;text-align:center">';
  h += '<div style="font-size:20px;font-weight:700;color:#4ade80">$' + (ia.on_track_income||0).toLocaleString() + '</div>';
  h += '<div style="font-size:11px;color:var(--dim);margin-top:2px">✅ On Track</div></div>';
  h += '<div style="background:rgba(250,204,21,.06);border:1px solid rgba(250,204,21,.15);border-radius:10px;padding:14px;text-align:center">';
  h += '<div style="font-size:20px;font-weight:700;color:#facc15">$' + (ia.at_risk_income||0).toLocaleString() + '</div>';
  h += '<div style="font-size:11px;color:var(--dim);margin-top:2px">⚠ At Risk</div></div>';
  h += '<div style="background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.15);border-radius:10px;padding:14px;text-align:center">';
  h += '<div style="font-size:20px;font-weight:700;color:#f87171">$' + (ia.blocked_income||0).toLocaleString() + '</div>';
  h += '<div style="font-size:11px;color:var(--dim);margin-top:2px">🛑 Blocked</div></div>';
  h += '</div>';

  // Individual income items
  if (iaItems.length > 0) {
    iaItems.forEach(item => {
      const riskC = item.risk === 'blocked' ? '#f87171' : item.risk === 'at_risk' ? '#facc15' : '#4ade80';
      const riskBg = item.risk === 'blocked' ? 'rgba(248,113,113,.04)' : item.risk === 'at_risk' ? 'rgba(250,204,21,.04)' : 'rgba(74,222,128,.03)';
      const riskIcon = item.risk === 'blocked' ? '🛑' : item.risk === 'at_risk' ? '⚠️' : '✅';
      const riskLabel = item.risk === 'blocked' ? 'BLOCKED' : item.risk === 'at_risk' ? 'AT RISK' : 'ON TRACK';
      const dt = new Date(item.due + 'T12:00:00');
      const dateLbl = MONTHS[dt.getMonth()] + ' ' + dt.getDate() + ' (' + DAYS[dt.getDay()] + ')';

      h += '<div style="background:' + riskBg + ';border:1px solid ' + riskC + '20;border-left:4px solid ' + riskC + ';border-radius:8px;padding:12px 14px;margin-bottom:8px">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
      h += '<div style="display:flex;align-items:center;gap:8px">';
      h += '<span style="font-size:10px;font-weight:700;color:' + riskC + ';background:' + riskC + '15;padding:2px 8px;border-radius:4px">' + riskIcon + ' ' + riskLabel + '</span>';
      h += '<span style="font-size:13px;font-weight:700;color:var(--txt)">' + item.project + '</span>';
      h += '</div>';
      h += '<span style="font-size:16px;font-weight:700;color:#4ade80;font-family:var(--mono)">$' + (item.amount||0).toLocaleString() + '</span>';
      h += '</div>';
      h += '<div style="font-size:12px;color:var(--txt2);margin-bottom:4px">' + item.payment + ' · Due <b>' + dateLbl + '</b></div>';

      if (item.risk === 'blocked' && item.blocker) {
        h += '<div style="background:rgba(248,113,113,.06);border-radius:6px;padding:8px 10px;margin-top:6px">';
        h += '<div style="font-size:11px;font-weight:600;color:#f87171;margin-bottom:4px">⛔ Blocked by: ' + item.blocker + '</div>';
        h += '<div style="font-size:11px;color:var(--txt2)">This task must be completed before this income can be collected. <b>Do not delay or reassign resources from this task.</b></div>';
        h += '</div>';
      }

      if (item.risk === 'at_risk' && item.group_overdue_tasks && item.group_overdue_tasks.length > 0) {
        h += '<div style="background:rgba(250,204,21,.06);border-radius:6px;padding:8px 10px;margin-top:6px">';
        h += '<div style="font-size:11px;font-weight:600;color:#facc15;margin-bottom:4px">⚠ ' + item.group_overdue_count + ' overdue task' + (item.group_overdue_count > 1 ? 's' : '') + ' in this group:</div>';
        item.group_overdue_tasks.forEach(function(t) {
          h += '<div style="font-size:11px;color:var(--txt2);padding:2px 0 2px 8px">• ' + t.name + (t.due ? ' (due ' + t.due + ')' : '') + '</div>';
        });
        h += '<div style="font-size:11px;color:var(--txt2);margin-top:4px"><b>These overdue tasks risk pushing this income payment.</b> Prioritize them.</div>';
        h += '</div>';
      }

      if (item.risk === 'on_track') {
        h += '<div style="font-size:11px;color:var(--dim);margin-top:4px">✅ All prerequisite work is on schedule. Keep it moving.</div>';
      }
      h += '</div>';
    });
  } else {
    h += '<div style="padding:12px;text-align:center;font-size:12px;color:var(--dim)">No income payments found in the forecast window.</div>';
  }
  h += '</div>';

  // Project Cards
  h += '<div class="wk-section">';
  h += '<div class="wk-section-title">Project by Project — What to Watch This Week</div>';
  Object.entries(fc.projects).forEach(function([pn, ps]) {
    if (!ps.due_this_week && !ps.overdue_count) return;
    const pmLabel = ps.pms && ps.pms.length ? ps.pms.join(', ') : 'No PM';
    const riskLevel = ps.overdue_count >= 10 ? 'sev-r' : ps.overdue_count >= 3 ? 'sev-o' : ps.outdoor_due >= 5 ? 'sev-o' : 'sev-b';

    let body = '<div style="border-top:1px solid var(--bdr);padding:12px 4px 4px">';

    // Quick stats
    body += '<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--dim);margin-bottom:12px">';
    body += '<span style="color:var(--txt)" title="Tasks with deadlines this week">📋 ' + ps.due_this_week + ' due this week</span>';
    body += '<span style="color:var(--red)" title="Tasks past their deadline, not done yet">🔴 ' + ps.overdue_count + ' overdue backlog</span>';
    body += '<span style="color:#f97316" title="Tasks requiring outdoor conditions">🌧️ ' + ps.outdoor_due + ' outdoor</span>';
    body += '<span title="Tasks starting this week">🆕 ' + ps.starting + ' starting</span>';
    body += '</div>';

    // Risks
    if (ps.risks && ps.risks.length) {
      body += '<div style="margin-bottom:12px">';
      body += '<div style="font-size:12px;font-weight:600;color:var(--dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">⚠️ Risks & Dangers</div>';
      ps.risks.forEach(function(r) {
        const rbg = r.startsWith('🔴') ? 'rgba(240,68,56,.06)' : r.startsWith('⛔') ? 'rgba(240,68,56,.08)' : 'rgba(249,115,22,.06)';
        body += '<div style="font-size:13px;line-height:1.6;color:var(--txt2);padding:8px 12px;margin:4px 0;border-radius:6px;background:' + rbg + '">' + r + '</div>';
      });
      body += '</div>';
    }

    // Focus
    if (ps.focus && ps.focus.length) {
      body += '<div style="margin-bottom:12px">';
      body += '<div style="font-size:12px;font-weight:600;color:var(--dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">🎯 What to Focus On</div>';
      ps.focus.forEach(function(f) {
        body += '<div style="font-size:13px;line-height:1.6;color:var(--txt2);padding:8px 12px;margin:4px 0;border-radius:6px;background:rgba(56,189,248,.06)">' + f + '</div>';
      });
      body += '</div>';
    }

    // Suggestions
    if (ps.suggestions && ps.suggestions.length) {
      body += '<div style="margin-bottom:12px">';
      body += '<div style="font-size:12px;font-weight:600;color:var(--dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">💡 Suggestions & Alternatives</div>';
      ps.suggestions.forEach(function(sg) {
        body += '<div style="font-size:13px;line-height:1.6;color:var(--txt2);padding:8px 12px;margin:4px 0;border-radius:6px;background:rgba(52,211,168,.06)">' + sg + '</div>';
      });
      body += '</div>';
    }

    // Payments
    const payOuts = (ps.payments || []).filter(function(p) { return p.direction === 'out' && p.amount > 0; });
    if (payOuts.length) {
      const payTotal = payOuts.reduce(function(s,p) { return s + p.amount; }, 0);
      body += '<div style="margin-bottom:8px;cursor:pointer" onclick="var el=this.querySelector(\'.pay-list\');el.style.display=el.style.display===\'none\'?\'block\':\'none\'">';
      body += '<div style="font-size:12px;font-weight:600;color:var(--dim);display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px">';
      body += '💸 Payments Going Out (' + payOuts.length + ') — $' + payTotal.toLocaleString();
      body += ' <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>';
      body += '</div>';
      body += '<div class="pay-list" style="display:none;margin-top:6px">';
      payOuts.forEach(function(p) {
        body += '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--bdr)">';
        body += '<span style="color:var(--txt2)">' + p.name + '</span>';
        body += '<span style="color:var(--red);font-weight:600">$' + p.amount.toLocaleString() + '</span>';
        body += '</div>';
      });
      body += '</div></div>';
    }

    // Payment chains — stuck payments
    var blockedChains = (ps.payment_chains || []).filter(function(c) { return c.status === 'blocked'; });
    if (blockedChains.length) {
      body += '<div style="margin-bottom:12px">';
      body += '<div style="font-size:12px;font-weight:600;color:#818cf8;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">⛓️ Payments Stuck — Work Not Done Yet (' + blockedChains.length + ')</div>';
      blockedChains.forEach(function(c) {
        var amtStr = c.amount ? '$' + c.amount.toLocaleString() : 'amount TBD';
        var dir = c.direction === 'in' ? '⬇️ income from client' : '⬆️ payment to sub/vendor';
        body += '<div style="font-size:13px;line-height:1.6;color:var(--txt2);padding:8px 12px;margin:4px 0;border-radius:6px;background:rgba(129,140,248,.06);border-left:3px solid #818cf8">';
        body += '<b>' + c.payment + '</b> (' + amtStr + ', ' + dir + ')<br>';
        body += '<span style="color:var(--dim)">Stuck because:</span> "' + c.blocker + '" in the <b>' + c.group + '</b> group is <span style="color:var(--red)">' + c.days_blocked + ' days overdue</span>. ';
        body += 'The payment can\'t happen until that work is finished.';
        if (c.overdue_work_in_group > 1) body += ' (' + c.overdue_work_in_group + ' overdue tasks in this group)';
        body += '</div>';
      });
      body += '</div>';
    }

    // Outdoor tasks
    if (ps.outdoor_tasks && ps.outdoor_tasks.length) {
      body += '<div style="margin-bottom:8px;cursor:pointer" onclick="var el=this.querySelector(\'.out-list\');el.style.display=el.style.display===\'none\'?\'block\':\'none\'">';
      body += '<div style="font-size:12px;font-weight:600;color:var(--dim);display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px">';
      body += '🌧️ Outdoor Tasks (' + ps.outdoor_tasks.length + ') — Weather-Dependent';
      body += ' <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>';
      body += '</div>';
      body += '<div class="out-list" style="display:none;margin-top:6px">';
      ps.outdoor_tasks.forEach(function(t) { body += '<div style="padding:3px 0;font-size:12px;color:var(--txt2)">• ' + t + '</div>'; });
      body += '</div></div>';
    }

    body += '</div>';

    h += '<div class="pc ' + riskLevel + '" style="margin-bottom:12px">';
    h += '<div class="ph" onclick="tog(this)">';
    h += '<div style="display:flex;align-items:center;gap:8px;flex:1"><div>';
    h += '<div class="pn">' + pn + '</div>';
    h += '<div class="pp">' + pmLabel + '</div>';
    h += '</div>';
    h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;margin-right:12px">';
    h += '<span class="tg" style="font-size:13px;font-weight:700;padding:3px 10px;background:var(--card)">📋 ' + ps.due_this_week + ' due</span>';
    if (ps.overdue_count) h += '<span class="tg o" style="font-size:13px;font-weight:700;padding:3px 10px">🔴 ' + ps.overdue_count + ' overdue</span>';
    if (ps.outdoor_due) h += '<span class="tg" style="font-size:13px;font-weight:700;padding:3px 10px;background:rgba(249,115,22,.1);color:#f97316">🌧️ ' + ps.outdoor_due + ' outdoor</span>';
    h += '</div></div>';
    h += '<div class="pt">' + chvSvg() + '</div>';
    h += '</div>';
    h += '<div class="pb">' + body + '</div>';
    h += '</div>';
  });
  h += '</div>';

  // Jade Forecast Analysis
  if (fc.analysis && fc.analysis.length) {
    h += '<div class="pc sev-g" style="border-left-color:#38bdf8;background:linear-gradient(135deg,rgba(56,189,248,.08) 0%,rgba(56,189,248,.02) 40%,var(--card) 100%);margin-top:16px">';
    h += '<div class="ph" onclick="tog(this)">';
    h += '<div style="display:flex;align-items:center;gap:8px">';
    h += '<span style="font-size:18px">🔮</span>';
    h += '<div><div class="pn" style="color:#38bdf8">Jade\'s Forecast Analysis</div>';
    h += '<div class="pp">Risks · cash flow · weather · priorities</div></div>';
    h += '</div>';
    h += '<div class="pt">' + chvSvg() + '</div>';
    h += '</div>';
    h += '<div class="pb" style="padding:12px 20px 16px">';
    h += '<div style="font-size:14px;line-height:1.8;color:var(--txt2)">';
    fc.analysis.forEach(function(p) {
      if (p.indexOf('💰') === 0) {
        h += '<div style="background:rgba(129,140,248,.08);border-left:3px solid #818cf8;padding:10px 14px;border-radius:6px;margin:12px 0">' + fmd(p) + '</div>';
      } else if (p.indexOf('🌧') === 0 || p.indexOf('☀') === 0) {
        h += '<div style="background:rgba(249,115,22,.06);border-left:3px solid #f97316;padding:10px 14px;border-radius:6px;margin:12px 0">' + fmd(p) + '</div>';
      } else if (p.indexOf('⛔') === 0) {
        h += '<div style="background:rgba(240,68,56,.06);border-left:3px solid #F04438;padding:10px 14px;border-radius:6px;margin:12px 0">' + fmd(p) + '</div>';
      } else {
        h += '<p style="margin:0 0 14px 0">' + fmd(p) + '</p>';
      }
    });
    h += '</div></div></div>';
  }

  h += '</div>'; // close forecast zone
  return h;
}

function renderWeekly(c) {
  if (!WEEKLY_DATA && FORECAST_DATA) {
    // Only forecast, no review — render forecast only
    c.innerHTML = '<div class="page-title">Weekly Report — Management View</div>' + buildForecast(FORECAST_DATA) + '<div class="ft">Generated by Jade · Construction Nation Group</div>';
    return;
  }
  if (!WEEKLY_DATA) return;
  const w = WEEKLY_DATA;
  const s = w.summary;
  const projs = w.project_summaries || {};
  const pmChart = w.pm_chart_data || {};
  const milestones = w.milestone_impacts || [];
  const analysisParas = w.analysis || [];
  const md = t => t.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');

  // Consistent PM colors
  const PM_COLORS = {'Jeff':'#60a5fa','Angel Pacheco':'#f97316','Marcio Oliveira':'#a78bfa','Milagros':'#f472b6'};
  const pmNames = Object.keys(pmChart);
  const pmLegend = pmNames.map(n => `<span style="display:inline-flex;align-items:center;gap:5px;margin-right:16px"><span style="width:12px;height:12px;border-radius:50%;background:${PM_COLORS[n]||'#888'}"></span><span style="font-size:13px;color:var(--txt2)">${n}</span></span>`).join('');

  let h = `
    <div class="page-title">Weekly Report — Management View</div>
    <div class="page-sub">${w.week}</div>

    <div class="wk-zone review">
      <div class="wk-zone-header">
        <div class="wk-zone-title">📋 PAST WEEK REVIEW</div>
        <div class="wk-zone-dates">${w.week} · ${w.days_with_data} days of data</div>
      </div>

    <!-- PM Legend -->
    <div style="text-align:center;margin:12px 0 16px">${pmLegend}</div>

    <!-- Pie Charts Row -->
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:20px" class="wk-pies">`;

  // Build 6 pie charts: Completed, Unique Overdue, Resolved, Pushed, Pulled, Early Finish
  // Colors: green = completed/resolved/pulled, red = overdue/pushed, skyblue = early finish
  const PIE_RING = {
    completed:'#34d399', unique_overdue:'#F04438', resolved:'#34d399',
    pushed:'#F04438', pulled:'#34d399', early_finish:'#38bdf8'
  };
  const metrics = [
    {key:'completed', label:'Tasks Completed', tip:'Tasks finished this week'},
    {key:'unique_overdue', label:'Tasks Overdue', tip:'Tasks past their deadline that weren\u2019t done'},
    {key:'resolved', label:'Overdue → Done', tip:'Tasks that were overdue but got completed this week'},
    {key:'pushed', label:'Deadlines Pushed Back', tip:'Tasks whose deadlines were moved to later dates'},
    {key:'pulled', label:'Deadlines Moved Up', tip:'Tasks whose deadlines were moved to earlier dates (good)'},
    {key:'early_finish', label:'Finished Early', tip:'Tasks completed before their deadline'},
  ];

  metrics.forEach(m => {
    const data = pmNames.map(pm => ({label: pm, value: pmChart[pm][m.key] || 0, color: PM_COLORS[pm] || '#888'}));
    const ringColor = PIE_RING[m.key] || 'var(--txt2)';
    const total = data.reduce((s, d) => s + d.value, 0);
    h += `<div style="text-align:center">
      ${svgDonut(data, 120, PM_COLORS)}
      <div style="font-size:13px;font-weight:600;color:${ringColor};margin-top:6px" title="${m.tip || ''}">${m.label}</div>`;
    h += '<div style="font-size:12px;color:var(--txt2);line-height:1.7;margin-top:4px">';
    pmNames.forEach(pm => {
      const v = pmChart[pm][m.key] || 0;
      const at = pmChart[pm].active_total || 1;
      const pct = Math.round(v / at * 100);
      if (v > 0) h += `<div title="${v} out of ${at} total tasks assigned to ${pm} (${pct}%)"><span style="color:${PM_COLORS[pm]||'#888'}">●</span> ${pm.split(' ')[0]}: ${v} — ${pct}% of their tasks</div>`;
    });
    h += '</div></div>';
  });

  h += '</div>';

  // ── Resolution % stat ──
  h += `<div style="text-align:center;margin-bottom:20px;font-size:15px;color:var(--txt2)">
    How many overdue tasks got done this week:
    <span style="font-weight:700;font-size:18px;color:${s.resolution_pct >= 30 ? 'var(--grn)' : s.resolution_pct >= 15 ? 'var(--ylw)' : 'var(--red)'}">${s.overdue_resolved} of ${s.unique_overdue}</span>
    <span style="color:var(--dim)">(${s.resolution_pct}%)</span>
    ${s.resolution_pct < 15 ? '— the backlog is growing' : s.resolution_pct < 30 ? '— improving but not enough' : '— good, backlog is shrinking'}
  </div>`;

  // ── Project Analysis ──
  const projNames = Object.keys(projs).sort((a, b) => Math.abs(projs[b].net_shift_days || 0) - Math.abs(projs[a].net_shift_days || 0));
  const activeProjs = projNames.filter(pn => {
    const p = projs[pn];
    return p.tasks_pushed || p.tasks_pulled || p.unique_overdue || p.completed;
  });
  if (activeProjs.length) {
    h += '<div class="wk-section"><div class="wk-section-title">Project by Project — What Happened This Week</div>';
    activeProjs.forEach(pname => {
      const p = projs[pname];
      const pmLabel = p.pms && p.pms.length ? p.pms.join(', ') : 'No PM';
      const n = p.narrative || {};
      const trend = n.trend || 'flat';
      const tasks = p.tasks || {};

      const trendIcon = trend === 'positive' ? '📈' : trend === 'negative' ? '📉' : trend === 'stable' ? '➡️' : '⏸️';
      const trendColor = trend === 'positive' ? 'var(--grn)' : trend === 'negative' ? 'var(--red)' : 'var(--ylw)';
      const sev = trend === 'negative' ? 'sev-r' : p.net_shift_days >= 5 ? 'sev-o' : trend === 'positive' ? 'sev-g' : 'sev-b';

      let tags = '';
      tags += `<span class="tg" style="background:${trend==='negative'?'var(--red-s)':'var(--org-s)'};color:${trendColor}">${trendIcon}</span>`;
      // Schedule shift badge
      if (p.net_shift_days > 0) tags += `<span class="tg o" style="font-size:14px;font-weight:700;padding:3px 10px" title="Schedule pushed back ${p.net_shift_days} days this week">📅 +${p.net_shift_days}d delayed</span>`;
      else if (p.net_shift_days < 0) tags += `<span class="tg gr" style="font-size:14px;font-weight:700;padding:3px 10px" title="Schedule pulled forward ${Math.abs(p.net_shift_days)} days">📅 ${p.net_shift_days}d ahead</span>`;
      else tags += `<span class="tg" style="font-size:14px;font-weight:700;padding:3px 10px;background:var(--card);color:var(--dim)">📅 0d</span>`;
      // Income delay badge — only if this project has delayed client payments
      if (p.income_delayed_days > 0) {
        const amt = p.income_delayed_amount > 0 ? ' · $' + p.income_delayed_amount.toLocaleString() : '';
        tags += `<span class="tg" style="font-size:14px;font-weight:700;padding:3px 10px;background:rgba(129,140,248,.15);color:#818cf8" title="Client income delayed by ${p.income_delayed_days} days">💰 income delayed ${p.income_delayed_days}d${amt}</span>`;
      }

      let body = '<div style="border-top:1px solid var(--bdr);padding:12px 4px 4px">';

      // Headline + trend
      body += `<div style="font-size:16px;font-weight:600;color:var(--txt);margin-bottom:8px">${n.headline || ''}</div>`;
      body += `<div style="font-size:14px;color:${trendColor};margin-bottom:12px">${trendIcon} ${n.trend_text || ''}</div>`;

      // Observations
      if (n.observations && n.observations.length) {
        body += '<div style="font-size:14px;line-height:1.7;color:var(--txt2);margin-bottom:12px">';
        n.observations.forEach(o => { body += `<p style="margin:0 0 8px">${o}</p>`; });
        body += '</div>';
      }

      // Milestone / Payment impacts
      // Client income impacts
      const pMilestones = p.milestone_impacts || [];
      if (pMilestones.length) {
        body += '<div style="margin-bottom:12px;padding:14px 16px;background:rgba(129,140,248,.06);border-radius:8px;border-left:4px solid #818cf8">';
        body += `<div style="font-size:15px;font-weight:600;color:#818cf8;margin-bottom:10px">💰 Client Payments Delayed (${pMilestones.length})</div>`;
        pMilestones.forEach(mi => {
          const amt = mi.payment_amount ? '$' + mi.payment_amount.toLocaleString() : 'Amount TBD';
          const delayed = mi.payment_old_date !== mi.payment_new_date;
          const daysBadge = delayed
            ? `<span style="display:inline-block;background:var(--red-s);color:var(--red);font-weight:700;font-size:16px;padding:3px 10px;border-radius:6px;margin-right:10px">+${mi.origin_delta}d</span>`
            : `<span style="display:inline-block;background:var(--org-s);color:var(--org);font-weight:700;font-size:14px;padding:3px 10px;border-radius:6px;margin-right:10px">⚠ at risk</span>`;

          body += `<div style="padding:10px 0;border-bottom:1px solid rgba(129,140,248,.1)">
            <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:6px">
              ${daysBadge}
              <span style="font-size:15px;font-weight:600;color:var(--txt)">${mi.payment_task}</span>
              <span style="font-size:14px;font-weight:600;color:#818cf8">${amt}</span>
            </div>
            <div style="font-size:13px;color:var(--txt2);padding-left:4px">${delayed ? mi.payment_old_date + ' → ' + mi.payment_new_date : 'Due: ' + mi.payment_old_date}</div>
            <div style="font-size:13px;color:var(--txt2);line-height:1.6;margin-top:6px;padding-left:4px">${md(mi.reason || '')}</div>
          </div>`;
        });
        body += '</div>';
      }

      // Quick stats bar
      body += `<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--dim);margin-bottom:10px;padding:8px 0;border-top:1px solid var(--bdr)">
        <span style="color:var(--grn)" title="Tasks completed this week">✅ ${p.completed} completed</span>
        <span style="color:var(--red)" title="Tasks that were past their deadline at some point this week">🔴 ${p.unique_overdue} overdue</span>
        <span title="Overdue tasks resolved / total overdue this week">${p.overdue_resolved} of ${p.unique_overdue} overdue→done (${p.unique_overdue > 0 ? Math.round(p.overdue_resolved / p.unique_overdue * 100) : 0}%)</span>
        <span title="Tasks that were overdue every single day of the week and never got touched">${p.chronic_overdue} stuck all week</span>
        <span style="color:var(--org)" title="Tasks whose deadlines were pushed to later dates">📅 ${p.tasks_pushed} deadlines pushed</span>
        <span style="color:var(--blu)" title="Tasks whose deadlines were moved to earlier dates">⬆ ${p.tasks_pulled} moved up</span>
      </div>`;

      // Collapsible task lists
      const taskSections = [];
      if (tasks.completed && tasks.completed.length) {
        taskSections.push({label: `✅ Tasks Completed This Week (${tasks.completed.length})`, color:'var(--grn)',
          items: tasks.completed.map(t => `<div class="tr"><div class="td g"></div><div class="ti"><div class="tn">${t}</div></div></div>`)});
      }
      if (tasks.overdue && tasks.overdue.length) {
        taskSections.push({label: `🔴 Still Overdue — Not Done Yet (${tasks.overdue.length})`, color:'var(--red)',
          items: tasks.overdue.map(t => `<div class="tr"><div class="td r"></div><div class="ti"><div class="tn">${t}</div></div></div>`)});
      }
      if (tasks.pushed && tasks.pushed.length) {
        taskSections.push({label: `📅 Deadlines Pushed Back (${tasks.pushed.length})`, color:'var(--org)',
          items: tasks.pushed.map(t => `<div class="tr"><div class="td o"></div><div class="ti"><div class="tn">${t.task}</div></div><div class="tw ov">${t.old} → ${t.new} (${t.delta>0?'+':''}${t.delta}d)</div></div>`)});
      }
      if (tasks.pulled && tasks.pulled.length) {
        taskSections.push({label: `⬆ Deadlines Moved Up — Ahead of Schedule (${tasks.pulled.length})`, color:'var(--blu)',
          items: tasks.pulled.map(t => `<div class="tr"><div class="td b"></div><div class="ti"><div class="tn">${t}</div></div></div>`)});
      }

      taskSections.forEach(sec => {
        body += `<div style="margin-bottom:8px">
          <div style="font-size:13px;font-weight:600;color:${sec.color};cursor:pointer;padding:6px 0;display:flex;align-items:center;gap:6px" onclick="const el=this.nextElementSibling;const open=el.style.display!=='none';el.style.display=open?'none':'block';this.querySelector('svg').style.transform=open?'':'rotate(180deg)'">
            ${sec.label}
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div style="display:none">${sec.items.join('')}</div>
        </div>`;
      });

      body += '</div>';

      h += `<div class="pc ${sev}" style="margin-bottom:8px"><div class="ph" onclick="tog(this)"><div>
        <div class="pn">${pname}</div>
        <div class="pp">PM: ${pmLabel}</div></div>
        <div class="pt">${tags}${chvSvg()}</div></div>
        <div class="pb">${body}</div></div>`;
    });
    h += '</div>';

function cashflowGate(c) {

  }
  c.innerHTML = `<div class="pw-gate">

async function loadAndRenderCashflow(c) {
  c.innerHTML = '<div class="empty"><div class="empty-i">⏳</div><div class="empty-t">Loading Cash Flow...</div></div>';
  const today = new Date().toISOString().slice(0, 10);
  // Try today, then walk back up to 7 days to find the latest data file
  for (let i = 0; i < 7; i++) {
    const d = new Date(Date.now() - i * 86400000).toISOString().slice(0, 10);
    try {
      const r = await fetch('data/cashflow-' + d + '.json');
      if (!r.ok) continue;
      CF_DATA = await r.json();
      renderCashflow(c);
      return;
    } catch(e) {}
  }
  c.innerHTML = '<div class="empty"><div class="empty-i">💰</div><div class="empty-t">No Cash Flow Data</div><div class="empty-d">Run generate_cashflow_json.py to generate cash flow data.</div></div>';
}

function cfFmt(n) {
  if (n === 0) return '$0';
  const abs = Math.abs(n);
  const s = abs >= 1000 ? '$' + abs.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0}) : '$' + abs.toFixed(0);
  return n < 0 ? '-' + s : s;
}
function cfFmt2(n) {
  const abs = Math.abs(n);
  const s = '$' + abs.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  return n < 0 ? '-' + s : s;
}
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function cfWeekRange(mondayStr) {
  const m = new Date(mondayStr + 'T12:00:00');
  const s = new Date(m); s.setDate(m.getDate() + 6);
  return MONTHS[m.getMonth()] + ' ' + m.getDate() + ' (' + DAYS[m.getDay()] + ') — ' +
         MONTHS[s.getMonth()] + ' ' + s.getDate() + ' (' + DAYS[s.getDay()] + ')';
}
function cfGetMonday(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1) - day;
  const m = new Date(d); m.setDate(d.getDate() + diff);
  return m.toISOString().slice(0,10);
}
