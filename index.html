function renderCfBody() {
  const body = document.getElementById('cf-body');
  const statsEl = document.getElementById('cf-stats');
  if (!body || !statsEl || !CF_DATA) return;
  const d = CF_DATA;
  const balance = parseFloat(localStorage.getItem('cf_balance') || '0');
  const today = new Date(cfFromDate + 'T12:00:00');
  const cutoff = new Date(today.getTime() + cfDays * 86400000);
  const allItems = d.all_tasks || [];

  // Filter items in time window + type/project filters
  const windowItems = allItems.filter(t => {
    if (!t.due) return false;
    const td = new Date(t.due + 'T12:00:00');
    if (td < today || td >= cutoff) return false;
    if (cfTypeFilter === 'in' && t.type !== 'income') return false;
    if (cfTypeFilter === 'pin' && t.type !== 'p_income') return false;
    if (cfTypeFilter === 'out' && (t.type === 'income' || t.type === 'p_income')) return false;
    if (cfProjFilter !== 'all' && t.project !== cfProjFilter) return false;
    return true;
  });

  // Compute window totals — separate paid vs unpaid, and p_income
  let winIncome = 0, winOutgoing = 0, winPIncome = 0;
  let winPaidOut = 0, winPaidIn = 0;
  let winUnpaidOut = 0, winUnpaidIn = 0, winUnpaidPIn = 0;
  // Use ALL items in window (ignoring type filter) for stats
  const allWindowItems = (d.all_tasks || []).filter(t => {
    if (!t.due) return false;
    const td = new Date(t.due + 'T12:00:00');
    if (td < today || td >= cutoff) return false;
    if (cfProjFilter !== 'all' && t.project !== cfProjFilter) return false;
    return true;
  });
  allWindowItems.forEach(t => {
    const amt = t.amount || 0;
    if (t.type === 'p_income') {
      winPIncome += amt;
      if (t.paid) {} else winUnpaidPIn += amt;
    } else if (t.type === 'income') {
      winIncome += amt;
      if (t.paid) winPaidIn += amt; else winUnpaidIn += amt;
    } else {
      winOutgoing += amt;
      if (t.paid) winPaidOut += amt; else winUnpaidOut += amt;
    }
  });
  // Projected = bank balance + unpaid income - unpaid outgoing (excludes potential)
  const projectedBal = balance + winUnpaidIn - winUnpaidOut;
  const projectedWithP = projectedBal + winUnpaidPIn;

  // ── Stats (update every time) ──────────
  statsEl.innerHTML = `<div class="stats" style="grid-template-columns:repeat(4,1fr);margin-bottom:8px">
    <div class="st g"><div class="n">${cfFmt(winUnpaidIn)}</div><div class="l">Confirmed Income</div></div>
    <div class="st" style="background:#433a1a;border-color:#6b5c1e"><div class="n" style="color:#facc15">${cfFmt(winUnpaidPIn)}</div><div class="l" style="color:#c9a80e">Potential Income</div></div>
    <div class="st r"><div class="n">${cfFmt(winUnpaidOut)}</div><div class="l">Outgoing</div></div>
    <div class="st" style="background:#3a3a4a"><div class="n" style="color:#888">${cfFmt(winPaidOut)}</div><div class="l" style="color:#666">Already Paid</div></div>
  </div>
  <div class="stats" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px">
    <div class="st ${projectedBal >= 0 ? 'g' : 'r'}"><div class="n">${cfFmt(projectedBal)}</div><div class="l">Projected (confirmed)</div></div>
    <div class="st" style="background:#433a1a;border-color:#6b5c1e"><div class="n" style="color:#facc15">${cfFmt(projectedWithP)}</div><div class="l" style="color:#c9a80e">Projected (w/ potential)</div></div>
    <div class="st y"><div class="n">${allWindowItems.length}</div><div class="l">Total Payments</div></div>
  </div>`;

  // ── Payment Breakdown Summary ──────────
  const unpaidByType = {materials: 0, subs: 0, income: 0, p_income: 0};
  const unpaidCountByType = {materials: 0, subs: 0, income: 0, p_income: 0};
  // Group unpaid by week
  const unpaidByWeek = {}; // 'YYYY-WNN' → {materials, subs, income, p_income, total, dateLabel}
  allWindowItems.filter(t => !t.paid).forEach(t => {
    const tp = t.type || 'subs';
    if (unpaidByType[tp] !== undefined) { unpaidByType[tp] += (t.amount||0); unpaidCountByType[tp]++; }
    const dd = new Date(t.due + 'T12:00:00');
    const jan1 = new Date(dd.getFullYear(), 0, 1);
    const wn = Math.ceil(((dd - jan1) / 86400000 + jan1.getDay() + 1) / 7);
    const wk = `${dd.getFullYear()}-W${String(wn).padStart(2,'0')}`;
    if (!unpaidByWeek[wk]) {
      // Find Monday of this week
      const day = dd.getDay();
      const mon = new Date(dd);
      mon.setDate(mon.getDate() - ((day + 6) % 7));
      const sun = new Date(mon);
      sun.setDate(sun.getDate() + 6);
      const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
      unpaidByWeek[wk] = {materials: 0, subs: 0, income: 0, p_income: 0, total: 0, label: `${fmt(mon)} - ${fmt(sun)}`};
    }
    unpaidByWeek[wk][tp] += (t.amount||0);
    unpaidByWeek[wk].total += (t.amount||0);
  });

  const totalUnpaidOut = unpaidByType.materials + unpaidByType.subs;
  const bkCols = [
    {label: '🔧 Materials', val: unpaidByType.materials, cnt: unpaidCountByType.materials, color: '#f87171'},
    {label: '👷 Subs', val: unpaidByType.subs, cnt: unpaidCountByType.subs, color: '#fb923c'},
    {label: '💰 Income', val: unpaidByType.income, cnt: unpaidCountByType.income, color: '#4ade80'},
    {label: '⚡ Potential', val: unpaidByType.p_income, cnt: unpaidCountByType.p_income, color: '#facc15'},
  ];

  let bkHtml = `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px 16px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;cursor:pointer" onclick="const c=this.nextElementSibling;c.style.display=c.style.display==='none'?'block':'none';this.querySelector('svg').style.transform=c.style.display==='none'?'':'rotate(180deg)'">
      <div style="font-size:13px;font-weight:600;color:var(--txt)">Payment Breakdown — <span style="color:var(--red)">${cfFmt(totalUnpaidOut)}</span> to pay</div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--dim);transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div style="display:none">
      <div class="cf-bk-grid4" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
        ${bkCols.map(c => `<div style="text-align:center;padding:8px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid var(--bdr)">
          <div style="font-size:18px;font-weight:700;color:${c.color}">${cfFmt(c.val)}</div>
          <div style="font-size:11px;color:var(--txt2);margin-top:2px">${c.label} (${c.cnt})</div>
        </div>`).join('')}
      </div>`;

  // Weekly breakdown table
  const weeks = Object.entries(unpaidByWeek).sort((a,b) => a[0].localeCompare(b[0]));
  if (weeks.length) {
    bkHtml += `<div style="overflow-x:auto"><table style="width:100%;font-size:12px;border-collapse:collapse;min-width:400px">
      <tr style="border-bottom:1px solid var(--bdr);color:var(--txt2)">
        <th style="text-align:left;padding:6px 4px;font-weight:600">Week</th>
        <th style="text-align:right;padding:6px 4px;font-weight:600;color:#f87171">Materials</th>
        <th style="text-align:right;padding:6px 4px;font-weight:600;color:#fb923c">Subs</th>
        <th style="text-align:right;padding:6px 4px;font-weight:600;color:#4ade80">Income</th>
        <th style="text-align:right;padding:6px 4px;font-weight:600">Net</th>
      </tr>`;
    weeks.forEach(([wk, v]) => {
      const net = v.income - v.materials - v.subs;
      bkHtml += `<tr style="border-bottom:1px solid rgba(33,39,47,.3)">
        <td style="padding:5px 4px;color:var(--txt)">${v.label}</td>
        <td style="text-align:right;padding:5px 4px;color:#f87171">${v.materials ? cfFmt(v.materials) : '—'}</td>
        <td style="text-align:right;padding:5px 4px;color:#fb923c">${v.subs ? cfFmt(v.subs) : '—'}</td>
        <td style="text-align:right;padding:5px 4px;color:#4ade80">${v.income ? cfFmt(v.income) : '—'}</td>
        <td style="text-align:right;padding:5px 4px;font-weight:600;color:${net >= 0 ? '#4ade80' : '#f87171'}">${cfFmt(net)}</td>
      </tr>`;
    });
    bkHtml += '</table></div>';
  }
  bkHtml += '</div></div>';

  statsEl.innerHTML += bkHtml;

  // Group by day
  const byDay = {};
  windowItems.forEach(t => {
    if (!byDay[t.due]) byDay[t.due] = [];
    byDay[t.due].push(t);
  });

  // Only include days that have payments + today
  const payDates = Object.keys(byDay).sort();
  const chartDates = new Set(payDates);
  chartDates.add(d.date);
  const sortedChartDates = [...chartDates].sort();

  let runBal = balance;
  let runBalP = balance; // with potential
  const chartPoints = [];
  sortedChartDates.forEach(ds => {
    let dayIn = 0, dayOut = 0, dayPIn = 0;
    (byDay[ds] || []).forEach(t => {
      if (t.paid) return;
      if (t.type === 'p_income') { dayPIn += t.amount; return; }
      if (t.type === 'income') dayIn += t.amount;
      else dayOut += t.amount;
    });
    runBal += dayIn - dayOut;
    runBalP += dayIn + dayPIn - dayOut;
    chartPoints.push({date: ds, balance: runBal, balanceP: runBalP, dayIn, dayOut, dayPIn, net: dayIn - dayOut});
  });

  const hasPotential = chartPoints.some(p => p.balanceP !== p.balance);

  // Find min/max for chart scaling (include potential line)
  const allBals = [balance, ...chartPoints.map(p => p.balance), ...chartPoints.map(p => p.balanceP)];
  const maxBal = Math.max(...allBals, 1);
  const minBal = Math.min(...allBals, 0);

  let html = '';

  // ── Chart ──────────────────────────────
  if (chartPoints.length > 0) {
    const W = Math.max(chartPoints.length * 60, 400);
    const H = 180;
    const padL = 60, padR = 20, padT = 25, padB = 35;
    const plotW = W - padL - padR;
    const plotH = H - padT - padB;

    const yMin = Math.min(minBal, 0);
    const yMax = Math.max(maxBal, balance + 1);
    const yRange = yMax - yMin || 1;
    const toY = v => padT + plotH - ((v - yMin) / yRange * plotH);
    const toX = i => padL + (chartPoints.length > 1 ? i / (chartPoints.length - 1) * plotW : plotW / 2);

    const zeroY = toY(0);
    const startY = toY(balance);

    let path = '';
    chartPoints.forEach((p, i) => {
      const x = toX(i), y = toY(p.balance);
      path += (i === 0 ? 'M' : 'L') + `${x},${y} `;
    });

    const firstX = toX(0), lastX = toX(chartPoints.length - 1);
    const areaPath = path + `L${lastX},${toY(0)} L${firstX},${toY(0)} Z`;

    html += `<div class="cf-chart-wrap"><svg width="${W}" height="${H}" style="display:block;width:100%;max-width:${W}px" viewBox="0 0 ${W} ${H}">
      <defs><linearGradient id="cfg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--grn)" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="var(--grn)" stop-opacity="0"/>
      </linearGradient></defs>`;

    const gridLines = 4;
    for (let i = 0; i <= gridLines; i++) {
      const val = yMin + (yRange / gridLines) * i;
      const y = toY(val);
      html += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--bdr)" stroke-width="1"/>`;
      html += `<text x="${padL-8}" y="${y+4}" text-anchor="end" fill="var(--dim)" font-size="10" font-family="var(--mono)">${cfFmt(val)}</text>`;
    }

    if (yMin < 0) {
      html += `<line x1="${padL}" y1="${zeroY}" x2="${W-padR}" y2="${zeroY}" stroke="var(--dim)" stroke-width="1" stroke-dasharray="4,4"/>`;
    }

    html += `<line x1="${padL}" y1="${startY}" x2="${W-padR}" y2="${startY}" stroke="var(--blu)" stroke-width="1" stroke-dasharray="2,4" opacity="0.5"/>`;
    html += `<path d="${areaPath}" fill="url(#cfg)"/>`;

    // Potential income line (dashed yellow) — only when there's p_income data
    if (hasPotential) {
      let pathP = '';
      chartPoints.forEach((p, i) => {
        const x = toX(i), y = toY(p.balanceP);
        pathP += (i === 0 ? 'M' : 'L') + `${x},${y} `;
      });
      html += `<path d="${pathP}" fill="none" stroke="#facc15" stroke-width="2" stroke-dasharray="6,4" stroke-linejoin="round" opacity="0.7"/>`;
      chartPoints.forEach((p, i) => {
        if (p.balanceP === p.balance) return; // Only show dots where lines diverge
        const x = toX(i), y = toY(p.balanceP);
        html += `<circle cx="${x}" cy="${y}" r="3" fill="#facc15" stroke="var(--bg)" stroke-width="1.5" opacity="0.8"/>`;
        html += `<text x="${x}" y="${y-10}" text-anchor="middle" fill="#facc15" font-size="9" font-weight="600" font-family="var(--mono)" opacity="0.8">${cfFmt(p.balanceP)}</text>`;
      });
    }

    // Confirmed balance line (solid green)
    html += `<path d="${path}" fill="none" stroke="var(--grn)" stroke-width="2.5" stroke-linejoin="round"/>`;

    chartPoints.forEach((p, i) => {
      const x = toX(i), y = toY(p.balance);
      const color = p.balance >= 0 ? 'var(--grn)' : 'var(--red)';
      html += `<circle cx="${x}" cy="${y}" r="4" fill="${color}" stroke="var(--bg)" stroke-width="2"/>`;
      const dt = new Date(p.date + 'T12:00:00');
      const lbl = MONTHS[dt.getMonth()] + ' ' + dt.getDate();
      const dayLbl = DAYS[dt.getDay()];
      html += `<text x="${x}" y="${H-14}" text-anchor="middle" fill="var(--txt2)" font-size="10" font-family="var(--mono)">${lbl}</text>`;
      html += `<text x="${x}" y="${H-4}" text-anchor="middle" fill="var(--dim)" font-size="9" font-family="var(--mono)">${dayLbl}</text>`;
      html += `<text x="${x}" y="${y-10}" text-anchor="middle" fill="${color}" font-size="10" font-weight="600" font-family="var(--mono)">${cfFmt(p.balance)}</text>`;
      if (p.net !== 0) {
        const netColor = p.net > 0 ? 'var(--grn)' : 'var(--red)';
        const netSign = p.net > 0 ? '+' : '';
        html += `<text x="${x}" y="${y-22}" text-anchor="middle" fill="${netColor}" font-size="9" font-family="var(--mono)">${netSign}${cfFmt(p.net)}</text>`;
      }
    });

    html += '</svg>';
    if (hasPotential) {
      html += `<div style="display:flex;gap:16px;justify-content:center;margin-top:8px;font-size:11px">
        <span style="color:var(--grn)">● ━━ Confirmed</span>
        <span style="color:#facc15">● ┅┅ With Potential</span>
      </div>`;
    }
    html += '</div>';
  } else {
    html += '<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:32px;text-align:center;margin-bottom:20px;color:var(--dim)">No payments in this time window</div>';
  }

  // ── Per-project breakdown ──────────────
  const projMap = {};
  windowItems.forEach(t => {
    if (!projMap[t.project]) projMap[t.project] = {income: 0, outgoing: 0, tasks: 0};
    if (t.type === 'income') projMap[t.project].income += t.amount;
    else projMap[t.project].outgoing += t.amount;
    projMap[t.project].tasks++;
  });

  const projList = Object.entries(projMap).map(([name, v]) => ({name, ...v, net: v.income - v.outgoing}))
    .sort((a, b) => Math.abs(b.net) - Math.abs(a.net));

  if (projList.length) {
    html += '<div style="font-size:14px;font-weight:600;color:var(--txt2);margin-bottom:8px">Project Impact</div>';
    html += '<div class="cf-proj-grid">';
    projList.forEach(p => {
      const netCls = p.net >= 0 ? 'net-pos' : 'net-neg';
      const sign = p.net >= 0 ? '+' : '';
      let detail = [];
      if (p.income) detail.push(`↑ ${cfFmt(p.income)}`);
      if (p.outgoing) detail.push(`↓ ${cfFmt(p.outgoing)}`);
      html += `<div class="cf-proj">
        <div><div class="cf-proj-name">${p.name}</div><div class="cf-proj-detail">${detail.join(' · ')} · ${p.tasks} payment${p.tasks > 1 ? 's' : ''}</div></div>
        <div class="cf-proj-amt ${netCls}">${sign}${cfFmt(p.net)}</div></div>`;
    });
    html += '</div>';
  }

  // ── Payment list with running balance ──
  html += '<div style="font-size:14px;font-weight:600;color:var(--txt2);margin-bottom:8px">Upcoming Payments</div>';
  html += '<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:8px 12px">';

  // Header row
  html += `<div class="cf-pay" style="border-bottom:1px solid var(--bdr);padding-bottom:4px;margin-bottom:2px">
    <span class="cf-pay-date" style="font-weight:600;color:var(--txt)">Date</span>
    <span class="cf-pay-type" style="background:none;border:none;color:var(--txt);font-weight:600">Type</span>
    <span class="cf-pay-name" style="font-weight:600;color:var(--txt)">Payment</span>
    <span class="cf-pay-amt" style="color:var(--txt)">Amount</span>
    <span class="cf-pay-bal" style="color:var(--txt)">Balance</span>
    <span class="cf-pay-status" style="background:none;border:none;color:var(--txt);font-weight:600">Status</span>
  </div>`;

  const sorted = [...windowItems].sort((a, b) => (a.due || '').localeCompare(b.due || ''));
  if (sorted.length) {
    let runningBal = balance;
    let currentWeek = '';
    sorted.forEach(t => {
      // Week separator header
      const weekKey = cfGetMonday(t.due || d.date);
      if (weekKey !== currentWeek) {
        currentWeek = weekKey;
        const weekLabel = cfWeekRange(weekKey);
        // Compute week totals
        const weekItems = sorted.filter(w => cfGetMonday(w.due || d.date) === weekKey);
        let wIn = 0, wOut = 0, wPIn = 0;
        weekItems.forEach(w => {
          if (w.type === 'p_income') wPIn += w.amount;
          else if (w.type === 'income') wIn += w.amount;
          else wOut += w.amount;
        });
        const wNet = wIn - wOut;
        const wNetColor = wNet >= 0 ? '#4ade80' : '#f87171';
        const pInPart = wPIn > 0 ? ` · <span style="color:#facc15">⚡${cfFmt(wPIn)}</span>` : '';
        html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 4px 4px;margin-top:8px;border-top:2px solid var(--bdr)">
          <span style="font-size:12px;font-weight:700;color:var(--txt);letter-spacing:.3px">📅 ${weekLabel}</span>
          <span style="font-size:11px;color:var(--dim)">IN ${cfFmt(wIn)}${pInPart} · OUT ${cfFmt(wOut)} · <span style="color:${wNetColor};font-weight:600">NET ${cfFmt(wNet)}</span></span>
        </div>`;
      }

      const isIn = t.type === 'income' || t.type === 'p_income';
      const isPotential = t.type === 'p_income';
      const typeLabel = isPotential ? 'P.IN' : isIn ? 'IN' : 'OUT';
      const typeCls = isPotential ? 'pin' : isIn ? 'in' : 'out';
      const dt = new Date((t.due || d.date) + 'T12:00:00');
      const dayName = DAYS[dt.getDay()];
      const dateLbl = MONTHS[dt.getMonth()] + ' ' + dt.getDate() + '<br><span style="font-size:9px;color:var(--dim);font-weight:400">' + dayName + '</span>';
      const amtStr = t.amount ? cfFmt2(t.amount) : 'TBD';
      const statusCls = t.paid ? 'paid' : (t.amount ? 'pending' : 'tbd');
      const statusLbl = t.paid ? '✓ Paid' : (t.amount ? 'Pending' : 'TBD');

      // Only unpaid items affect running balance (paid already in bank)
      // Potential income does NOT affect confirmed running balance
      if (!t.paid && !isPotential) {
        if (isIn) runningBal += t.amount;
        else runningBal -= t.amount;
      }

      const balCls = runningBal >= 0 ? 'pos' : 'neg';
      const paidStyle = t.paid ? 'opacity:0.5;text-decoration:line-through' : '';
      const paidBalLbl = t.paid ? '—' : cfFmt(runningBal);
      const paidBalCls = t.paid ? '' : balCls;

      html += `<div class="cf-pay" style="${paidStyle}">
        <span class="cf-pay-date">${dateLbl}</span>
        <span class="cf-pay-type ${typeCls}">${typeLabel}</span>
        <span class="cf-pay-name">${t.task} <span class="cf-pay-proj">— ${t.project}</span></span>
        <span class="cf-pay-amt ${typeCls}">${isIn ? '+' : '-'}${amtStr}</span>
        <span class="cf-pay-bal ${paidBalCls}">${paidBalLbl}</span>
        <span class="cf-pay-status ${statusCls}">${statusLbl}</span>
      </div>`; 
    });
  } else {
    html += '<div style="padding:12px;text-align:center;color:var(--dim);font-size:13px">No payments in this time window</div>';
  }

  // ── Totals footer ──────────────────────
  let totIn = 0, totOut = 0, totPIn = 0, totPaidIn = 0, totPaidOut = 0;
  let cntIn = 0, cntOut = 0, cntPIn = 0;
  sorted.forEach(t => {
    const amt = t.amount || 0;
    if (t.type === 'p_income') { totPIn += amt; cntPIn++; }
    else if (t.type === 'income') { totIn += amt; cntIn++; if (t.paid) totPaidIn += amt; }
    else { totOut += amt; cntOut++; if (t.paid) totPaidOut += amt; }
  });
  const totNet = totIn - totOut;
  const totNetWithP = totNet + totPIn;
  const totNetColor = totNet >= 0 ? '#4ade80' : '#f87171';
  const totNetPColor = totNetWithP >= 0 ? '#facc15' : '#f87171';
  const filterLabel = cfTypeFilter === 'in' ? 'Income' : cfTypeFilter === 'pin' ? 'Potential' : cfTypeFilter === 'out' ? 'Expenses' : 'All';
  const projLabel = cfProjFilter === 'all' ? 'All Projects' : cfProjFilter;

  html += `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:12px 16px;margin-top:12px">
    <div style="font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">
      Totals · ${filterLabel} · ${projLabel} · ${sorted.length} payment${sorted.length!==1?'s':''}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">
      <div style="text-align:center">
        <div style="font-size:18px;font-weight:700;color:#4ade80">${cfFmt(totIn)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">Confirmed Income (${cntIn})</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:18px;font-weight:700;color:#facc15">${cfFmt(totPIn)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">Potential Income (${cntPIn})</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:18px;font-weight:700;color:#f87171">${cfFmt(totOut)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">Expenses (${cntOut})</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:10px;border-top:1px solid var(--bdr)">
      <div style="text-align:center">
        <div style="font-size:18px;font-weight:700;color:${totNetColor}">${cfFmt(totNet)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">Net (confirmed only)</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:18px;font-weight:700;color:${totNetPColor}">${cfFmt(totNetWithP)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">Net (w/ potential)</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:18px;font-weight:700;color:#888">${cfFmt(totPaidIn + totPaidOut)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">Already Paid</div>
      </div>
    </div>
  </div>`;

  html += '</div>';

  body.innerHTML = html;
}

// ═══════════════════════════════════════════
// MANAGEMENT TAB (cashflow + fixed costs)
// ═══════════════════════════════════════════
let MGMT_DATA = null;
let mgmtFromDate = new Date().toISOString().slice(0,10);
let mgmtDays = 7;
let mgmtTypeFilter = 'all';
let mgmtProjFilter = 'all';

const MGMT_FC_CATS = {
  salaries:  {label:'Salaries',  color:'#818cf8', icon:'👤', typeLabel:'SAL'},
  utilities: {label:'Utilities', color:'#34d399', icon:'⚡', typeLabel:'UTL'},
  rent:      {label:'Rent',      color:'#fb923c', icon:'🏠', typeLabel:'RNT'},
  marketing: {label:'Marketing', color:'#e879f9', icon:'📣', typeLabel:'MKT'},
  others:    {label:'Others',    color:'#94a3b8', icon:'📦', typeLabel:'OTH'},
};
const MGMT_FC_TYPES = new Set(Object.keys(MGMT_FC_CATS));

function mgmtGate(c) {
  if (sessionStorage.getItem('mgmt_auth') === '1') { loadAndRenderMgmt(c); return; }
  c.innerHTML = `<div class="pw-gate">
    <div class="pw-icon">▥</div>
    <div class="pw-title">Management — Restricted</div>
    <div class="pw-sub">Enter password to access.</div>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="off">
    <button class="pw-btn" id="pw-btn">Unlock</button>
    <div class="pw-deny" id="pw-deny" style="display:none">Access denied</div>
  </div>`;
  const inp = document.getElementById('pw-input'), btn = document.getElementById('pw-btn'), deny = document.getElementById('pw-deny');
  function tryPw() {
    if (inp.value === MGMT_PW) { sessionStorage.setItem('mgmt_auth','1'); loadAndRenderMgmt(c); }
    else { inp.classList.add('pw-err'); deny.style.display=''; setTimeout(()=>inp.classList.remove('pw-err'),400); }
  }
  btn.addEventListener('click', tryPw);
  inp.addEventListener('keydown', e => { if(e.key==='Enter') tryPw(); });
  setTimeout(()=>inp.focus(),50);
}

async function loadAndRenderMgmt(c) {
  c.innerHTML = '<div class="empty"><div class="empty-i">⏳</div><div class="empty-t">Loading Management...</div></div>';
  for (let i = 0; i < 7; i++) {
    const d = new Date(Date.now() - i*86400000).toISOString().slice(0,10);
    try {
      const r = await fetch('data/management-' + d + '.json');
      if (!r.ok) continue;
      MGMT_DATA = await r.json();
      renderMgmt(c);
      return;
    } catch(e) {}
  }
  c.innerHTML = '<div class="empty"><div class="empty-i">▥</div><div class="empty-t">No Management Data</div><div class="empty-d">Run generate_management_json.py to generate data.</div></div>';
}

function mgmtIsFixed(type) { return MGMT_FC_TYPES.has(type); }
function mgmtTypeInfo(type) {
  if (type === 'income')   return {label:'IN',  cls:'in',  color:'#4ade80', sign:'+'};
  if (type === 'p_income') return {label:'P.IN', cls:'pin', color:'#facc15', sign:'+'};
  if (type === 'subs')     return {label:'SUB',  cls:'out', color:'#f87171', sign:'-'};
  if (type === 'materials')return {label:'MAT',  cls:'out', color:'#f87171', sign:'-'};
  const fc = MGMT_FC_CATS[type];
  if (fc) return {label:fc.typeLabel, cls:'out', color:fc.color, sign:'-'};
  return {label:'OUT', cls:'out', color:'#f87171', sign:'-'};
}

function renderMgmt(c) {
  const d = MGMT_DATA;
  const balance = parseFloat(localStorage.getItem('cf_balance') || '0');
  const projSet = new Set();
  (d.all_tasks||[]).forEach(t => { if(t.project) projSet.add(t.project); });
  const projects = [...projSet].sort();
  const projOptions = projects.map(p => `<option value="${p}"${mgmtProjFilter===p?' selected':''}>${p}</option>`).join('');

  c.innerHTML = `
    <div class="page-title">Management</div>
    <div class="page-sub">All project payments + fixed costs · Data from ${d.date}</div>
    <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
      <div class="cf-balance-row" style="margin-bottom:0">
        <span class="cf-balance-label">Cash Position:</span>
        <input type="text" class="cf-balance-input" id="mgmt-bal" value="${balance ? cfFmt2(balance) : ''}" placeholder="$0.00">
        <span class="cf-balance-saved" id="mgmt-saved" style="display:none">✓ Saved</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:12px;color:var(--txt2);font-weight:500">View from:</span>
        <input type="date" id="mgmt-from-date" value="${mgmtFromDate}" style="background:var(--card);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;padding:5px 8px;font-size:12px;font-family:var(--sans);cursor:pointer">
        <button id="mgmt-today-btn" style="background:var(--card);color:var(--txt2);border:1px solid var(--bdr);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:var(--sans)">Today</button>
      </div>
    </div>
    <div id="mgmt-stats"></div>
    <div class="cf-time-tabs" id="mgmt-tabs">
      <button class="cf-tt${mgmtDays===7?' on':''}" data-md="7">1 Week</button>
      <button class="cf-tt${mgmtDays===14?' on':''}" data-md="14">2 Weeks</button>
      <button class="cf-tt${mgmtDays===21?' on':''}" data-md="21">3 Weeks</button>
      <button class="cf-tt${mgmtDays===28?' on':''}" data-md="28">1 Month</button>
      <button class="cf-tt${mgmtDays===90?' on':''}" data-md="90">3 Months</button>
    </div>
    <div id="mgmt-filters" style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        <button class="cf-tt${mgmtTypeFilter==='all'?' on':''}" data-mf="all">All</button>
        <button class="cf-tt${mgmtTypeFilter==='in'?' on':''}" data-mf="in" style="color:#4ade80">↑ Income</button>
        <button class="cf-tt${mgmtTypeFilter==='pin'?' on':''}" data-mf="pin" style="color:#facc15">⚡ Potential</button>
        <button class="cf-tt${mgmtTypeFilter==='proj_out'?' on':''}" data-mf="proj_out" style="color:#f87171">↓ Project Exp</button>
        <button class="cf-tt${mgmtTypeFilter==='fixed'?' on':''}" data-mf="fixed" style="color:#818cf8">⚙ Fixed Costs</button>
      </div>
      <select id="mgmt-proj-filter" style="background:var(--card);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;padding:6px 10px;font-size:12px;font-family:var(--sans);min-width:180px;cursor:pointer">
        <option value="all"${mgmtProjFilter==='all'?' selected':''}>All Projects</option>
        ${projOptions}
      </select>
    </div>
    <div id="mgmt-body"></div>`;

  // Balance
  const balInput = document.getElementById('mgmt-bal'), savedEl = document.getElementById('mgmt-saved');
  balInput.addEventListener('change', () => {
    const val = parseFloat(balInput.value.replace(/[^0-9.\-]/g,'')) || 0;
    localStorage.setItem('cf_balance', val.toString());
    balInput.value = cfFmt2(val); savedEl.style.display='';
    setTimeout(()=>savedEl.style.display='none',2000); renderMgmtBody();
  });
  // Tabs
  document.getElementById('mgmt-tabs').addEventListener('click', e => {
    const btn = e.target.closest('[data-md]'); if(!btn) return;
    mgmtDays = parseInt(btn.dataset.md);
    document.querySelectorAll('[data-md]').forEach(b=>b.classList.remove('on')); btn.classList.add('on');
    renderMgmtBody();
  });
  // Date
  document.getElementById('mgmt-from-date').addEventListener('change', e => { mgmtFromDate=e.target.value; renderMgmtBody(); });
  document.getElementById('mgmt-today-btn').addEventListener('click', () => { mgmtFromDate=new Date().toISOString().slice(0,10); document.getElementById('mgmt-from-date').value=mgmtFromDate; renderMgmtBody(); });
  // Filters
  document.getElementById('mgmt-filters').addEventListener('click', e => {
    const btn = e.target.closest('[data-mf]'); if(!btn) return;
    mgmtTypeFilter = btn.dataset.mf;
    document.querySelectorAll('[data-mf]').forEach(b=>b.classList.remove('on')); btn.classList.add('on');
    renderMgmtBody();
  });
  document.getElementById('mgmt-proj-filter').addEventListener('change', e => { mgmtProjFilter=e.target.value; renderMgmtBody(); });
  renderMgmtBody();
}

function renderMgmtBody() {
  const body = document.getElementById('mgmt-body');
  const statsEl = document.getElementById('mgmt-stats');
  if (!body || !statsEl || !MGMT_DATA) return;
  const d = MGMT_DATA;
  const balance = parseFloat(localStorage.getItem('cf_balance') || '0');
  const today = new Date(mgmtFromDate + 'T12:00:00');
  const cutoff = new Date(today.getTime() + mgmtDays * 86400000);
  const allItems = d.all_tasks || [];

  function passesFilter(t) {
    if (mgmtTypeFilter === 'in') return t.type === 'income';
    if (mgmtTypeFilter === 'pin') return t.type === 'p_income';
    if (mgmtTypeFilter === 'proj_out') return t.type !== 'income' && t.type !== 'p_income' && !mgmtIsFixed(t.type);
    if (mgmtTypeFilter === 'fixed') return mgmtIsFixed(t.type);
    return true;
  }

  const windowItems = allItems.filter(t => {
    if (!t.due) return false;
    const td = new Date(t.due + 'T12:00:00');
    if (td < today || td >= cutoff) return false;
    if (!passesFilter(t)) return false;
    if (mgmtProjFilter !== 'all' && t.project !== mgmtProjFilter) return false;
    return true;
  });

  const allWin = allItems.filter(t => {
    if (!t.due) return false;
    const td = new Date(t.due + 'T12:00:00');
    return td >= today && td < cutoff;
  });

  let winIn=0, winPIn=0, winProjOut=0, winFixed=0;
  let winUnpaidIn=0, winUnpaidPIn=0, winUnpaidProjOut=0, winUnpaidFixed=0;
  let winPaidAmt=0;
  allWin.forEach(t => {
    const a = t.amount||0;
    if (t.type==='p_income') { winPIn+=a; if(!t.paid) winUnpaidPIn+=a; }
    else if (t.type==='income') { winIn+=a; if(t.paid) winPaidAmt+=a; else winUnpaidIn+=a; }
    else if (mgmtIsFixed(t.type)) { winFixed+=a; if(t.paid) winPaidAmt+=a; else winUnpaidFixed+=a; }
    else { winProjOut+=a; if(t.paid) winPaidAmt+=a; else winUnpaidProjOut+=a; }
  });

  const grossProjected = balance + winUnpaidIn - winUnpaidProjOut;
  const netProjected   = grossProjected - winUnpaidFixed;
  const netWithP       = netProjected + winUnpaidPIn;

  // Stats
  statsEl.innerHTML = `
  <div class="stats" style="grid-template-columns:repeat(4,1fr);margin-bottom:8px">
    <div class="st g"><div class="n">${cfFmt(winUnpaidIn)}</div><div class="l">Income</div></div>
    <div class="st" style="background:#433a1a;border-color:#6b5c1e"><div class="n" style="color:#facc15">${cfFmt(winUnpaidPIn)}</div><div class="l" style="color:#c9a80e">Potential</div></div>
    <div class="st r"><div class="n">${cfFmt(winUnpaidProjOut)}</div><div class="l">Project Expenses</div></div>
    <div class="st" style="border-color:#818cf840;background:#818cf80d"><div class="n" style="color:#818cf8">${cfFmt(winUnpaidFixed)}</div><div class="l" style="color:#818cf8">⚙ Fixed Costs</div></div>
  </div>
  <div class="stats" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">
    <div class="st ${grossProjected>=0?'g':'r'}"><div class="n">${cfFmt(grossProjected)}</div><div class="l">Gross (no fixed)</div></div>
    <div class="st ${netProjected>=0?'g':'r'}"><div class="n">${cfFmt(netProjected)}</div><div class="l">Net (all expenses)</div></div>
    <div class="st" style="background:#433a1a;border-color:#6b5c1e"><div class="n" style="color:#facc15">${cfFmt(netWithP)}</div><div class="l" style="color:#c9a80e">Net (w/ potential)</div></div>
    <div class="st" style="background:#3a3a4a"><div class="n" style="color:#888">${cfFmt(winPaidAmt)}</div><div class="l" style="color:#666">Already Paid</div></div>
  </div>`;

  // ── Management Payment Breakdown ──────────
  const mUnpaid = {materials: 0, subs: 0, income: 0, p_income: 0, salaries: 0, utilities: 0, rent: 0, marketing: 0, others: 0};
  const mCnt = {materials: 0, subs: 0, income: 0, p_income: 0, salaries: 0, utilities: 0, rent: 0, marketing: 0, others: 0};
  const FC_MAP = {'salaries':'salaries','utilities':'utilities','rent':'rent','marketing':'marketing','others':'others'};
  const mByWeek = {};
  allWin.filter(t => !t.paid).forEach(t => {
    const tp = FC_MAP[t.type] || t.type || 'subs';
    if (mUnpaid[tp] !== undefined) { mUnpaid[tp] += (t.amount||0); mCnt[tp]++; }
    const dd = new Date(t.due + 'T12:00:00');
    const jan1 = new Date(dd.getFullYear(), 0, 1);
    const wn = Math.ceil(((dd - jan1) / 86400000 + jan1.getDay() + 1) / 7);
    const wk = `${dd.getFullYear()}-W${String(wn).padStart(2,'0')}`;
    if (!mByWeek[wk]) {
      const day = dd.getDay(); const mon = new Date(dd); mon.setDate(mon.getDate() - ((day+6)%7));
      const sun = new Date(mon); sun.setDate(sun.getDate()+6);
      const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
      mByWeek[wk] = {materials:0,subs:0,income:0,salaries:0,utilities:0,rent:0,marketing:0,others:0,total:0,label:`${fmt(mon)} - ${fmt(sun)}`};
    }
    const wtp = FC_MAP[t.type] || t.type || 'subs';
    if (mByWeek[wk][wtp] !== undefined) mByWeek[wk][wtp] += (t.amount||0);
    mByWeek[wk].total += (t.amount||0);
  });

  const mTotalOut = mUnpaid.materials + mUnpaid.subs + mUnpaid.salaries + mUnpaid.utilities + mUnpaid.rent + mUnpaid.marketing + mUnpaid.others;
  const mTotalFixed = mUnpaid.salaries + mUnpaid.utilities + mUnpaid.rent + mUnpaid.marketing + mUnpaid.others;
  const mBkCols = [
    {label: '🔧 Materials', val: mUnpaid.materials, cnt: mCnt.materials, color: '#f87171'},
    {label: '👷 Subs', val: mUnpaid.subs, cnt: mCnt.subs, color: '#fb923c'},
    {label: '⚙ Fixed', val: mTotalFixed, cnt: mCnt.salaries+mCnt.utilities+mCnt.rent+mCnt.marketing+mCnt.others, color: '#818cf8'},
    {label: '💰 Income', val: mUnpaid.income, cnt: mCnt.income, color: '#4ade80'},
  ];

  let mBk = `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px 16px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;cursor:pointer" onclick="const c=this.nextElementSibling;c.style.display=c.style.display==='none'?'block':'none';this.querySelector('svg').style.transform=c.style.display==='none'?'':'rotate(180deg)'">
      <div style="font-size:13px;font-weight:600;color:var(--txt)">Payment Breakdown — <span style="color:var(--red)">${cfFmt(mTotalOut)}</span> total to pay</div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--dim);transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div style="display:none">
      <div class="cf-bk-grid4" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
        ${mBkCols.map(c => `<div style="text-align:center;padding:8px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid var(--bdr)">
          <div style="font-size:18px;font-weight:700;color:${c.color}">${cfFmt(c.val)}</div>
          <div style="font-size:11px;color:var(--txt2);margin-top:2px">${c.label} (${c.cnt})</div>
        </div>`).join('')}
      </div>
      <div class="cf-bk-grid5" style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px">
        <div style="text-align:center;padding:6px;background:rgba(129,140,248,.06);border-radius:6px;border:1px solid rgba(129,140,248,.15)">
          <div style="font-size:14px;font-weight:700;color:#818cf8">${cfFmt(mUnpaid.salaries)}</div><div style="font-size:10px;color:#818cf8">Salaries</div></div>
        <div style="text-align:center;padding:6px;background:rgba(52,211,153,.06);border-radius:6px;border:1px solid rgba(52,211,153,.15)">
          <div style="font-size:14px;font-weight:700;color:#34d399">${cfFmt(mUnpaid.utilities)}</div><div style="font-size:10px;color:#34d399">Utilities</div></div>
        <div style="text-align:center;padding:6px;background:rgba(251,146,60,.06);border-radius:6px;border:1px solid rgba(251,146,60,.15)">
          <div style="font-size:14px;font-weight:700;color:#fb923c">${cfFmt(mUnpaid.rent)}</div><div style="font-size:10px;color:#fb923c">Rent</div></div>
        <div style="text-align:center;padding:6px;background:rgba(232,121,249,.06);border-radius:6px;border:1px solid rgba(232,121,249,.15)">
          <div style="font-size:14px;font-weight:700;color:#e879f9">${cfFmt(mUnpaid.marketing)}</div><div style="font-size:10px;color:#e879f9">Marketing</div></div>
        <div style="text-align:center;padding:6px;background:rgba(148,163,184,.06);border-radius:6px;border:1px solid rgba(148,163,184,.15)">
          <div style="font-size:14px;font-weight:700;color:#94a3b8">${cfFmt(mUnpaid.others)}</div><div style="font-size:10px;color:#94a3b8">Others</div></div>
      </div>`;

  const mWeeks = Object.entries(mByWeek).sort((a,b) => a[0].localeCompare(b[0]));
  if (mWeeks.length) {
    mBk += `<div style="overflow-x:auto"><table style="width:100%;font-size:12px;border-collapse:collapse;min-width:480px">
      <tr style="border-bottom:1px solid var(--bdr);color:var(--txt2)">
        <th style="text-align:left;padding:6px 4px;font-weight:600">Week</th>
        <th style="text-align:right;padding:6px 4px;font-weight:600;color:#f87171">Materials</th>
        <th style="text-align:right;padding:6px 4px;font-weight:600;color:#fb923c">Subs</th>
        <th style="text-align:right;padding:6px 4px;font-weight:600;color:#818cf8">Fixed</th>
        <th style="text-align:right;padding:6px 4px;font-weight:600;color:#4ade80">Income</th>
        <th style="text-align:right;padding:6px 4px;font-weight:600">Net</th>
      </tr>`;
    mWeeks.forEach(([wk, v]) => {
      const fixedWk = v.salaries + v.utilities + v.rent + v.marketing + v.others;
      const net = v.income - v.materials - v.subs - fixedWk;
      mBk += `<tr style="border-bottom:1px solid rgba(33,39,47,.3)">
        <td style="padding:5px 4px;color:var(--txt)">${v.label}</td>
        <td style="text-align:right;padding:5px 4px;color:#f87171">${v.materials ? cfFmt(v.materials) : '—'}</td>
        <td style="text-align:right;padding:5px 4px;color:#fb923c">${v.subs ? cfFmt(v.subs) : '—'}</td>
        <td style="text-align:right;padding:5px 4px;color:#818cf8">${fixedWk ? cfFmt(fixedWk) : '—'}</td>
        <td style="text-align:right;padding:5px 4px;color:#4ade80">${v.income ? cfFmt(v.income) : '—'}</td>
        <td style="text-align:right;padding:5px 4px;font-weight:600;color:${net >= 0 ? '#4ade80' : '#f87171'}">${cfFmt(net)}</td>
      </tr>`;
    });
    mBk += '</table></div>';
  }
  mBk += '</div></div>';
  statsEl.innerHTML += mBk;

  // ── Chart ──────────────────────────────
  // Group ALL window items by day (ignoring type/proj filter for chart)
  const mByDay = {};
  allWin.forEach(t => { if(!mByDay[t.due]) mByDay[t.due]=[]; mByDay[t.due].push(t); });
  const mChartDates = [...new Set([...Object.keys(mByDay), d.date])].sort();
  let mRunBal = balance, mRunBalG = balance, mRunBalP = balance;
  const mChartPts = [];
  mChartDates.forEach(ds => {
    let dIn=0, dOut=0, dFixed=0, dPIn=0;
    (mByDay[ds]||[]).forEach(t => {
      if(t.paid) return;
      if(t.type==='p_income'){dPIn+=t.amount; return;}
      if(t.type==='income') dIn+=t.amount;
      else if(mgmtIsFixed(t.type)) dFixed+=t.amount;
      else dOut+=t.amount;
    });
    mRunBalG += dIn - dOut;               // gross (projects only)
    mRunBal  += dIn - dOut - dFixed;      // net (all expenses)
    mRunBalP  = mRunBal + dPIn;           // net + potential
    mChartPts.push({date:ds, gross:mRunBalG, net:mRunBal, netP:mRunBalP, dayIn:dIn, dayOut:dOut+dFixed, dFixed});
  });
  const mHasFixed = mChartPts.some(p => p.gross !== p.net);
  const mHasP = mChartPts.some(p => p.netP !== p.net);
  const mAllBals = [balance, ...mChartPts.map(p=>p.gross), ...mChartPts.map(p=>p.net), ...mChartPts.map(p=>p.netP)];
  const mMaxBal = Math.max(...mAllBals, 1), mMinBal = Math.min(...mAllBals, 0);

  let html = '';
  if (mChartPts.length > 0) {
    const W = Math.max(mChartPts.length*60,400), H=180;
    const padL=60,padR=20,padT=25,padB=35, plotW=W-padL-padR, plotH=H-padT-padB;
    const yMin=Math.min(mMinBal,0), yMax=Math.max(mMaxBal,balance+1), yRange=yMax-yMin||1;
    const toY=v=>padT+plotH-((v-yMin)/yRange*plotH);
    const toX=i=>padL+(mChartPts.length>1?i/(mChartPts.length-1)*plotW:plotW/2);
    const startY=toY(balance), zeroY=toY(0);

    // Gross line path (projects only)
    let grossPath='';
    mChartPts.forEach((p,i)=>{grossPath+=(i===0?'M':'L')+`${toX(i)},${toY(p.gross)} `;});

    // Net line path (all expenses)
    let netPath='';
    mChartPts.forEach((p,i)=>{netPath+=(i===0?'M':'L')+`${toX(i)},${toY(p.net)} `;});

    const firstX=toX(0), lastX=toX(mChartPts.length-1);
    const netArea=netPath+`L${lastX},${zeroY} L${firstX},${zeroY} Z`;

    html += `<div class="cf-chart-wrap" style="position:relative">
      <div id="mgmt-chart-zoom" style="overflow:auto;touch-action:pan-x pan-y;-webkit-overflow-scrolling:touch;cursor:grab;position:relative">
      <svg id="mgmt-chart-svg" width="${W}" height="${H}" style="display:block;min-width:${W}px" viewBox="0 0 ${W} ${H}">
      <defs><linearGradient id="mcfg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--grn)" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="var(--grn)" stop-opacity="0"/>
      </linearGradient></defs>`;

    // Grid
    const gridLines=4;
    for(let i=0;i<=gridLines;i++){
      const val=yMin+(yRange/gridLines)*i, y=toY(val);
      html+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--bdr)" stroke-width="1"/>`;
      html+=`<text x="${padL-8}" y="${y+4}" text-anchor="end" fill="var(--dim)" font-size="10" font-family="var(--mono)">${cfFmt(val)}</text>`;
    }
    if(yMin<0) html+=`<line x1="${padL}" y1="${zeroY}" x2="${W-padR}" y2="${zeroY}" stroke="var(--dim)" stroke-width="1" stroke-dasharray="4,4"/>`;
    html+=`<line x1="${padL}" y1="${startY}" x2="${W-padR}" y2="${startY}" stroke="var(--blu)" stroke-width="1" stroke-dasharray="2,4" opacity="0.5"/>`;

    // Area fill under net line
    html+=`<path d="${netArea}" fill="url(#mcfg)"/>`;

    // Potential line (dashed yellow)
    if(mHasP){
      let pPath='';
      mChartPts.forEach((p,i)=>{pPath+=(i===0?'M':'L')+`${toX(i)},${toY(p.netP)} `;});
      html+=`<path d="${pPath}" fill="none" stroke="#facc15" stroke-width="2" stroke-dasharray="6,4" stroke-linejoin="round" opacity="0.7"/>`;
      mChartPts.forEach((p,i)=>{
        if(p.netP===p.net) return;
        const x=toX(i),y=toY(p.netP);
        html+=`<circle cx="${x}" cy="${y}" r="3" fill="#facc15" stroke="var(--bg)" stroke-width="1.5" opacity="0.8"/>`;
        html+=`<text x="${x}" y="${y-10}" text-anchor="middle" fill="#facc15" font-size="9" font-weight="600" font-family="var(--mono)" opacity="0.8">${cfFmt(p.netP)}</text>`;
      });
    }

    // Gross line (dashed light green — projects only, before fixed costs)
    if(mHasFixed){
      html+=`<path d="${grossPath}" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,4" stroke-linejoin="round" opacity="0.5"/>`;
    }

    // Net line (solid green — all expenses)
    html+=`<path d="${netPath}" fill="none" stroke="var(--grn)" stroke-width="2.5" stroke-linejoin="round"/>`;

    // Dots + labels on net line
    mChartPts.forEach((p,i)=>{
      const x=toX(i), y=toY(p.net);
      const color = p.net>=0?'var(--grn)':'var(--red)';
      html+=`<circle cx="${x}" cy="${y}" r="4" fill="${color}" stroke="var(--bg)" stroke-width="2"/>`;
      const dt=new Date(p.date+'T12:00:00');
      html+=`<text x="${x}" y="${H-14}" text-anchor="middle" fill="var(--txt2)" font-size="10" font-family="var(--mono)">${MONTHS[dt.getMonth()]} ${dt.getDate()}</text>`;
      html+=`<text x="${x}" y="${H-4}" text-anchor="middle" fill="var(--dim)" font-size="9" font-family="var(--mono)">${DAYS[dt.getDay()]}</text>`;
      html+=`<text x="${x}" y="${y-10}" text-anchor="middle" fill="${color}" font-size="10" font-weight="600" font-family="var(--mono)">${cfFmt(p.net)}</text>`;
    });

    html+='</svg></div>';
    // Zoom controls
    html+=`<div style="display:flex;gap:6px;position:absolute;top:8px;right:8px;z-index:2">
      <button id="mgmt-zoom-out" style="background:var(--card);border:1px solid var(--bdr);border-radius:4px;width:28px;height:28px;font-size:16px;cursor:pointer;color:var(--txt);display:flex;align-items:center;justify-content:center">−</button>
      <button id="mgmt-zoom-reset" style="background:var(--card);border:1px solid var(--bdr);border-radius:4px;padding:0 8px;height:28px;font-size:10px;cursor:pointer;color:var(--dim);font-family:var(--mono)">1×</button>
      <button id="mgmt-zoom-in" style="background:var(--card);border:1px solid var(--bdr);border-radius:4px;width:28px;height:28px;font-size:16px;cursor:pointer;color:var(--txt);display:flex;align-items:center;justify-content:center">+</button>
    </div>`;
    // Legend
    let legend = '<span style="color:var(--grn)">● ━━ Net (all expenses)</span>';
    if(mHasFixed) legend += ' <span style="color:#4ade8080">● ┅┅ Gross (projects only)</span>';
    if(mHasP) legend += ' <span style="color:#facc15">● ┅┅ With Potential</span>';
    html+=`<div style="display:flex;gap:16px;justify-content:center;margin-top:8px;font-size:11px">${legend}</div></div>`;
  } else {
    html += '<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:32px;text-align:center;margin-bottom:20px;color:var(--dim)">No payments in this time window</div>';
  }

  // Payment list
  const sorted = [...windowItems].sort((a,b) => (a.due||'').localeCompare(b.due||''));
  let runBal = balance;
  let currentWeek = '';

  html += '<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:8px 12px">';
  html += `<div class="cf-pay" style="border-bottom:1px solid var(--bdr);padding-bottom:4px;margin-bottom:2px">
    <span class="cf-pay-date" style="font-weight:600;color:var(--txt)">Date</span>
    <span class="cf-pay-type" style="background:none;border:none;color:var(--txt);font-weight:600">Type</span>
    <span class="cf-pay-name" style="font-weight:600;color:var(--txt)">Payment</span>
    <span class="cf-pay-amt" style="color:var(--txt)">Amount</span>
    <span class="cf-pay-bal" style="color:var(--txt)">Balance</span>
    <span class="cf-pay-status" style="background:none;border:none;color:var(--txt);font-weight:600">Status</span>
  </div>`;

  if (sorted.length) {
    sorted.forEach(t => {
      const weekKey = cfGetMonday(t.due);
      if (weekKey !== currentWeek) {
        currentWeek = weekKey;
        const wItems = sorted.filter(w => cfGetMonday(w.due) === weekKey);
        let wIn=0, wOut=0, wPIn=0;
        wItems.forEach(w => {
          if (w.type==='p_income') wPIn+=w.amount;
          else if (w.type==='income') wIn+=w.amount;
          else wOut+=w.amount;
        });
        const wNet=wIn-wOut, wNetColor=wNet>=0?'#4ade80':'#f87171';
        const pPart = wPIn>0 ? ` · <span style="color:#facc15">⚡${cfFmt(wPIn)}</span>` : '';
        html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 4px 4px;margin-top:8px;border-top:2px solid var(--bdr)">
          <span style="font-size:12px;font-weight:700;color:var(--txt)">📅 ${cfWeekRange(weekKey)}</span>
          <span style="font-size:11px;color:var(--dim)">IN ${cfFmt(wIn)}${pPart} · OUT ${cfFmt(wOut)} · <span style="color:${wNetColor};font-weight:600">NET ${cfFmt(wNet)}</span></span>
        </div>`;
      }

      const ti = mgmtTypeInfo(t.type);
      const isIn = t.type==='income'||t.type==='p_income';
      const isPIn = t.type==='p_income';
      const dt = new Date(t.due+'T12:00:00');
      const dateLbl = MONTHS[dt.getMonth()]+' '+dt.getDate()+'<br><span style="font-size:9px;color:var(--dim)">'+DAYS[dt.getDay()]+'</span>';

      if (!t.paid && !isPIn) { if(isIn) runBal+=t.amount; else runBal-=t.amount; }
      const balLbl = t.paid ? '—' : cfFmt(runBal);
      const balCls = t.paid ? '' : (runBal>=0?'pos':'neg');
      const paidStyle = t.paid ? 'opacity:0.5;text-decoration:line-through' : '';
      const statusLbl = t.paid ? '✓ Paid' : (t.amount?'Pending':'TBD');
      const statusCls = t.paid ? 'paid' : (t.amount?'pending':'tbd');

      html += `<div class="cf-pay" style="${paidStyle}">
        <span class="cf-pay-date">${dateLbl}</span>
        <span class="cf-pay-type" style="background:${ti.color}20;color:${ti.color};border:1px solid ${ti.color}40;font-size:10px">${ti.label}</span>
        <span class="cf-pay-name">${t.task} <span class="cf-pay-proj">— ${t.project||''}</span></span>
        <span class="cf-pay-amt ${ti.cls}">${ti.sign}${t.amount?cfFmt2(t.amount):'TBD'}</span>
        <span class="cf-pay-bal ${balCls}">${balLbl}</span>
        <span class="cf-pay-status ${statusCls}">${statusLbl}</span>
      </div>`;
    });
  } else {
    html += '<div style="padding:12px;text-align:center;color:var(--dim);font-size:13px">No payments in this time window</div>';
  }

  // Totals footer
  let totIn=0,totPIn=0,totProjOut=0,totFixed=0,totPaid=0;
  sorted.forEach(t => {
    const a=t.amount||0;
    if(t.type==='p_income') totPIn+=a;
    else if(t.type==='income') totIn+=a;
    else if(mgmtIsFixed(t.type)) totFixed+=a;
    else totProjOut+=a;
    if(t.paid) totPaid+=a;
  });
  const totNet=totIn-totProjOut-totFixed, totNetP=totNet+totPIn;

  html += `</div><div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:12px 16px;margin-top:12px">
    <div style="font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">
      Totals · ${sorted.length} payment${sorted.length!==1?'s':''}
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px">
      <div style="text-align:center"><div style="font-size:16px;font-weight:700;color:#4ade80">${cfFmt(totIn)}</div><div style="font-size:10px;color:var(--dim);margin-top:2px">Income</div></div>
      <div style="text-align:center"><div style="font-size:16px;font-weight:700;color:#facc15">${cfFmt(totPIn)}</div><div style="font-size:10px;color:var(--dim);margin-top:2px">Potential</div></div>
      <div style="text-align:center"><div style="font-size:16px;font-weight:700;color:#f87171">${cfFmt(totProjOut)}</div><div style="font-size:10px;color:var(--dim);margin-top:2px">Project Exp</div></div>
      <div style="text-align:center"><div style="font-size:16px;font-weight:700;color:#818cf8">${cfFmt(totFixed)}</div><div style="font-size:10px;color:var(--dim);margin-top:2px">⚙ Fixed Costs</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:10px;border-top:1px solid var(--bdr)">
      <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:${totNet>=0?'#4ade80':'#f87171'}">${cfFmt(totNet)}</div><div style="font-size:10px;color:var(--dim);margin-top:2px">Net (confirmed)</div></div>
      <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:#facc15">${cfFmt(totNetP)}</div><div style="font-size:10px;color:var(--dim);margin-top:2px">Net (w/ potential)</div></div>
      <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:#888">${cfFmt(totPaid)}</div><div style="font-size:10px;color:var(--dim);margin-top:2px">Already Paid</div></div>
    </div>
  </div>`;

  body.innerHTML = html;

  // ── Chart zoom ──────────────────────
  const zoomWrap = document.getElementById('mgmt-chart-zoom');
  const zoomSvg = document.getElementById('mgmt-chart-svg');
  const zoomInBtn = document.getElementById('mgmt-zoom-in');
  const zoomOutBtn = document.getElementById('mgmt-zoom-out');
  const zoomResetBtn = document.getElementById('mgmt-zoom-reset');
  if (zoomWrap && zoomSvg) {
    let scale = 1;
    const baseW = parseInt(zoomSvg.getAttribute('width'));
    function applyZoom() {
      zoomSvg.style.transform = `scale(${scale})`;
      zoomSvg.style.transformOrigin = 'left top';
      zoomSvg.style.minWidth = (baseW * scale) + 'px';
      zoomSvg.style.height = (180 * scale) + 'px';
      if (zoomResetBtn) zoomResetBtn.textContent = scale === 1 ? '1×' : scale.toFixed(1) + '×';
    }
    if (zoomInBtn) zoomInBtn.addEventListener('click', () => { scale = Math.min(scale + 0.5, 4); applyZoom(); });
    if (zoomOutBtn) zoomOutBtn.addEventListener('click', () => { scale = Math.max(scale - 0.5, 0.5); applyZoom(); });
    if (zoomResetBtn) zoomResetBtn.addEventListener('click', () => { scale = 1; applyZoom(); });
    let startDist = 0, startScale = 1;
    zoomWrap.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        startDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        startScale = scale;
      }
    }, {passive: true});
    zoomWrap.addEventListener('touchmove', e => {
      if (e.touches.length === 2) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        scale = Math.min(4, Math.max(0.5, startScale * (dist / startDist)));
        applyZoom();
      }
    }, {passive: true});
    zoomWrap.addEventListener('wheel', e => {
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        scale = Math.min(4, Math.max(0.5, scale + (e.deltaY < 0 ? 0.25 : -0.25)));
        applyZoom();
      }
    }, {passive: false});
  }
}

async function loadAndRenderEOD(c) {
  c.innerHTML = '<div class="empty"><div class="empty-i">⏳</div><div class="empty-t">Loading EOD...</div></div>';
  const dateToLoad = curDate || new Date().toISOString().slice(0,10);
  try {
    const r = await fetch('data/eod-' + dateToLoad + '.json');
    if (!r.ok) throw new Error('not found');
    EOD_DATA = await r.json();
    renderEOD(c);
  } catch(e) {
    c.innerHTML = '<div class="empty"><div class="empty-i">🌙</div><div class="empty-t">No EOD Report</div><div class="empty-d">EOD report for this date hasn\'t been generated yet. Reports run at 4 PM.</div></div>';
  }
}

function eodSec(title, color, content) {
  return `<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:${color};margin-bottom:6px">${title}</div><div style="font-size:13px;color:var(--txt);line-height:1.5">${content}</div></div>`;
}

function renderEOD(c) {
  const s = EOD_DATA.summary;
  const ps = EOD_DATA.projects;
  const issues = ps.filter(p => p.trend !== 'no_issues');
  const ok = ps.filter(p => p.trend === 'no_issues');
  const d = new Date(EOD_DATA.date + 'T12:00:00');
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dateLabel = days[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();

  const trendIcon = t => t === 'improved' ? '🟢' : t === 'worse' ? '🔴' : t === 'same' ? '🟡' : '✅';
  const trendLabel = t => t === 'improved' ? 'Improved' : t === 'worse' ? 'Worse' : t === 'same' ? 'Same as morning' : 'No issues';

  let h = `
    <div class="page-title">End of Day Wrap-Up</div>
    <div class="page-sub">EOD Report · ${dateLabel} · 4:00 PM</div>
    <div class="stats" style="grid-template-columns:repeat(5,1fr)">
      <div class="st g"><div class="n">${s.completed||0}</div><div class="l">Completed</div></div>
      <div class="st r"><div class="n">${s.worse||0}</div><div class="l">Worse</div></div>
      <div class="st y"><div class="n">${s.same||0}</div><div class="l">Same</div></div>
      <div class="st b"><div class="n">${s.improved||0}</div><div class="l">Improved</div></div>
      <div class="st g"><div class="n">${s.no_issues||0}</div><div class="l">On Track</div></div>
    </div>
    <div id="plist" style="margin-top:16px">`;

  issues.forEach(p => {
    const tIcon = trendIcon(p.trend);
    const tLabel = trendLabel(p.trend);
    const sevClass = p.trend === 'worse' ? 'sev-r' : p.trend === 'improved' ? 'sev-g' : 'sev-o';

    let body = '';
    const fmt = t => t.split('\n').map(l => `<div style="padding:2px 0">${l}</div>`).join('');
    body += eodSec('✅ COMPLETED TODAY', 'var(--grn)', p.completed_text ? fmt(p.completed_text) : '<div style="color:var(--dim)">No tasks completed today.</div>');
    if (p.problems_text) body += eodSec('🔴 STILL A PROBLEM', 'var(--red)', fmt(p.problems_text));
    if (p.risk_text) body += eodSec('⚠️ NEXT 48H RISK', 'var(--ylw)', fmt(p.risk_text));

    h += `<div class="pc ${sevClass}" data-st="issue" data-pm="${p.pm||'No PM'}"><div class="ph" onclick="tog(this)"><div>
      <div class="pn">${p.name}</div>
      <div class="pp">PM: ${p.pm} &nbsp;|&nbsp; ${tIcon} ${tLabel}</div></div>
      <div class="pt">${chvSvg()}</div></div>
      <div class="pb" style="padding:0 14px 14px"><div style="border-top:1px solid var(--bdr);margin-bottom:12px"></div>${body}</div></div>`;
  });

  if (ok.length) {
    h += '<div style="margin-top:20px;margin-bottom:8px;font-size:14px;font-weight:600;color:var(--grn)">✅ On Track</div>';
    ok.forEach(p => {
      h += `<div style="font-size:13px;padding:6px 0;border-bottom:1px solid var(--bdr);color:var(--txt2)">${p.name} <span style="color:var(--dim)">— ${p.pm}</span></div>`;
    });
  }

  h += '</div>';
  h += '<div class="ft">Generated by Jade · Awesome Group · Data from JobTread</div>';
  c.innerHTML = h;
}

function buildOkCard(p) {

  return `<div class="pc sev-g" data-st="ok" data-pm="${pmVal}"><div class="ph" onclick="tog(this)"><div>

}

function buildCard(p, open, isEOD) {
  const c = p.c || {};
  const g = p.g || {};
  const t = p.tasks || {};
  const ov = t.overdue || []; const bl = t.blocked || [];
  const ac = t.active || []; const co = t.coming || [];
  const pmLine = p.pm ? `PM: ${p.pm}` : '<span class="nob">⚠ No PM assigned</span>';

  const pay = t.pay_overdue || [];

  // Tags
  let tags = '';
  if (isEOD && c.completed) tags += `<span class="tg gr">${c.completed} done</span>`;
  if (isEOD && c.resolved) tags += `<span class="tg gr">${c.resolved} cleared</span>`;
  if (c.ov) tags += `<span class="tg r">${c.ov} overdue</span>`;
  if (c.ac) tags += `<span class="tg b">${c.ac} active</span>`;
  if (c.ab) tags += `<span class="tg o">${c.ab} active blocked</span>`;
  if (c.co) tags += `<span class="tg y">${c.co} upcoming</span>`;
  if (c.pay) tags += `<span class="tg" style="background:rgba(129,140,248,.15);color:#818cf8;border-color:rgba(129,140,248,.3)">${c.pay} payment</span>`;

  const sev = c.ov ? 'sev-r' : c.ac ? 'sev-b' : c.co ? 'sev-g' : 'sev-g';

  const ab = t.active_blocked || [];
  // Preview: always 4 standard columns + optional payments
  const colCount = 4 + (pay.length ? 1 : 0);
  let preview = `<div class="preview" style="grid-template-columns:repeat(${colCount},1fr)">`;
  preview += pvCol('Overdue', 'r', ov, tk => `${tk.n}`, tk => `${tk.d}d`);
  preview += pvCol('Active', 'b', ac, tk => `${tk.n}`, tk => tk.dt || 'active');
  preview += pvCol('Active Blocked', 'o', ab, tk => `${tk.n}`, tk => tk.d ? `${tk.d}d late` : 'blocked');
  preview += pvCol('Upcoming', 'y', co, tk => `${tk.n}`, tk => tk.when || '');
  if (pay.length) {
    preview += `<div class="pv-col"><div class="pv-head" style="color:#818cf8">💰 Payments</div>`;
    pay.slice(0, 2).forEach(tk => {
      const ttShort = (tk.tt||'').replace(/^\d+\.\s*/, '').replace('Payment - ','');
      const pvDue = tk.d > 0 ? `past due: ${tk.d}d` : tk.d === 0 ? 'due today' : `due in ${Math.abs(tk.d)}d`;
      preview += `<div class="pv-item"><div class="pv-dot" style="background:#818cf8"></div><div class="pv-txt"><div class="pv-name">${tk.n}</div><div class="pv-sub" style="color:#818cf8">${ttShort} · ${pvDue}</div></div></div>`;
    });
    if (pay.length > 2) preview += `<div class="pv-more">+${pay.length - 2} more</div>`;
    preview += '</div>';
  }
  preview += '</div>';

  // Expanded body — 3 columns when payments exist, 2 otherwise
  const useThreeCol = pay.length > 0;
  let body = `<div class="${useThreeCol ? 'pb-3col' : 'pb-grid'}">`;

  const emptyMsg = '<div style="font-size:11px;color:var(--dim);font-style:italic;padding:4px 0">None</div>';

  // Column 1: Overdue + Active Blocked
  body += '<div>';
  if (isEOD && t.completed?.length) {
    body += '<div class="ts"><div class="tsl" style="color:var(--grn)">✅ Completed</div>';
    body += trowSection('g', t.completed, tk => trow('g', tk.n, tk.w, '✓'), 5);
    body += '</div>';
  }
  if (isEOD && t.resolved?.length) {
    body += '<div class="ts"><div class="tsl" style="color:var(--grn)">✅ Resolved</div>';
    body += trowSection('g', t.resolved, tk => trow('g', tk.n, tk.w, 'clear'), 5);
    body += '</div>';
  }
  body += '<div class="ts"><div class="tsl lr">Overdue</div>';
  if (ov.length) {
    body += trowSection('r', ov, tk => trow('r', tk.n, tk.w, tk.d + 'd', true), 5);
  } else { body += emptyMsg; }
  body += '</div>';
  body += '<div class="ts"><div class="tsl" style="color:var(--org)">Active Blocked</div>';
  if (ab.length) {
    body += trowSection('o', ab, tk => {
      const kindTag = tk.bl_kind === 'payment' ? '<span style="background:rgba(129,140,248,.15);color:#818cf8;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px;font-weight:600">💰 payment</span>'
        : tk.bl_kind === 'overdue' ? '<span style="background:rgba(248,113,113,.15);color:var(--red);font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px;font-weight:600">⚠ overdue</span>'
        : '<span style="background:rgba(250,204,21,.1);color:var(--ylw);font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px">⏳ predecessor</span>';
      const late = tk.d > 0 ? `${tk.d}d late` : 'today';
      const byLine = tk.bl ? `<div style="font-size:10px;color:var(--dim);margin-top:1px">↳ waiting on: ${tk.bl}</div>` : '';
      return `<div class="tr" style="flex-wrap:wrap"><div class="td o"></div><div class="ti"><div class="tn">${tk.n} - ${tk.w||''}${kindTag}</div>${byLine}</div><div class="tw ov">${late}</div></div>`;
    }, 5);
  } else { body += emptyMsg; }
  body += '</div>';
  body += '</div>';

  // Column 2: Active + Upcoming
  body += '<div>';
  body += '<div class="ts"><div class="tsl ac">Active</div>';
  if (ac.length) {
    body += trowSection('b', ac, tk => trow('b', tk.n, tk.w, tk.dt || ''), 5);
  } else { body += emptyMsg; }
  body += '</div>';
  body += '<div class="ts"><div class="tsl dt">Upcoming (72h)</div>';
  if (co.length) {
    body += trowSection('y', co, tk => {
      let warn = '';
      if (tk.blocked_kind === 'overdue') warn = '<span style="background:rgba(248,113,113,.15);color:var(--red);font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px;font-weight:600">⚠ blocked by overdue</span>';
      else if (tk.blocked_kind === 'payment') warn = '<span style="background:rgba(129,140,248,.15);color:#818cf8;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px;font-weight:600">💰 blocked by payment</span>';
      else if (tk.blocked_kind === 'active') warn = '<span style="background:rgba(96,165,250,.15);color:#60a5fa;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px">⏳ waiting on active task</span>';
      else if (tk.blocked_kind === 'upcoming') warn = '<span style="background:rgba(250,204,21,.1);color:var(--ylw);font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px">⏳ waiting on predecessor</span>';
      const byLine = tk.blocked_by ? `<div style="font-size:10px;color:var(--dim);margin-top:1px">↳ ${tk.blocked_by}</div>` : '';
      return `<div class="tr"><div class="td y"></div><div class="ti"><div class="tn">${tk.n} - ${tk.w||''}${warn}</div>${byLine}</div><div class="tw">${tk.when||''}</div></div>`;
    }, 8);
  } else { body += emptyMsg; }
  body += '</div>';
  body += '</div>';

  // Column 3 (sidebar): Payment & Purchase tasks
  if (useThreeCol) {
    body += '<div class="pay-side">';
    body += `<div class="ts"><div class="tsl">💰 Payments & Purchases</div>`;
    body += `<div style="font-size:10px;color:rgba(129,140,248,.7);margin-bottom:8px;font-style:italic">Not counted in PM metrics</div>`;
    pay.forEach(tk => {
      const ttShort = (tk.tt||'').replace(/^\d+\.\s*/, '').replace('Payment - ','');
      const dueLabel = tk.d > 0 ? `<span style="color:var(--red);font-weight:600">past due: ${tk.d}d</span>` : tk.d === 0 ? '<span style="color:var(--ylw);font-weight:600">due today</span>' : `<span style="color:var(--dim)">due in ${Math.abs(tk.d)}d</span>`;
      body += `<div class="tr" style="flex-wrap:wrap;gap:2px"><div class="td"></div><div class="ti"><div class="tn">${tk.n}</div><div style="font-size:10px;color:#818cf8">${ttShort}</div></div><div class="tw" style="font-size:10px">${dueLabel}</div></div>`;
    });
    body += '</div></div>';
  }

  // Full-width: Gaps
  if (g.p || g.v || g.pc) {
    body += `<div style="grid-column:1/-1"><div class="ts"><div class="tsl gp">Role Gaps</div><div class="gl">`;
    if (g.p) body += `<span class="gt">${g.p} no PM</span>`;
    if (g.v) body += `<span class="gt">${g.v} no Vendor</span>`;
    if (g.pc) body += `<span class="gt">${g.pc} no PurchCoord</span>`;
    body += '</div></div></div>';
  }
  body += '</div>';

  return `<div class="pc ${sev}${open ? ' op' : ''}" data-st="issue" data-pm="${p.pm||'No PM'}"><div class="ph" onclick="tog(this)"><div>
    <div class="pn">${p.name}</div><div class="pp">${pmLine}</div></div>
    <div class="pt">${tags}${chvSvg()}</div></div>${preview}<div class="pb">${body}</div></div>`;
}

function pvCol(label, color, items, nameFn, subFn) {
  let h = `<div class="pv-col"><div class="pv-head ${color === 'b' ? 'b' : color}">${label}</div>`;
  if (items.length) {
    items.slice(0, 2).forEach(tk => {
      h += `<div class="pv-item"><div class="pv-dot ${color}"></div><div class="pv-txt"><div class="pv-name">${nameFn(tk)}</div><div class="pv-sub">${subFn(tk)}</div></div></div>`;
    });
    if (items.length > 2) h += `<div class="pv-more">+${items.length - 2} more</div>`;
  } else {
    h += '<div class="pv-empty">None</div>';
  }
  return h + '</div>';
}

let _trowId = 0;
function trow(color, name, who, when, overdue, blocker) {
  const whoShort = who ? (who.length > 20 ? who.split(',')[0].trim() : who) : '<span class="nob">⚠ Nobody</span>';
  const sep = ' - ';
  if (blocker) {
    return `<div class="tr-bl"><div class="tr"><div class="td ${color}"></div><div class="ti"><div class="tn">${name}${sep}${whoShort}</div></div><div class="tw${overdue ? ' ov' : ''}">${when}</div></div><div class="tb">↳ ${blocker}</div></div>`;
  }
  return `<div class="tr"><div class="td ${color}"></div><div class="ti"><div class="tn">${name}${sep}${whoShort}</div></div><div class="tw${overdue ? ' ov' : ''}">${when}</div></div>`;
}

function trowSection(color, items, renderFn, limit) {
  limit = limit || 5;
  if (items.length <= limit) return items.map(renderFn).join('');
  const id = 'trs' + (++_trowId);
  let h = items.slice(0, limit).map(renderFn).join('');
  h += `<div id="${id}-rest" style="display:none">${items.slice(limit).map(renderFn).join('')}</div>`;
  h += `<div class="show-more" onclick="document.getElementById('${id}-rest').style.display='block';this.style.display='none'">+ ${items.length - limit} more</div>`;
  return h;
}

function chvSvg() {
  return `<svg class="chv" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>`;
}

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(d) {
  if (!d) return '';
  const clean = d.replace(/\//g, '-');
  const parts = clean.split('-');
  if (parts.length === 2) {
    const m = parseInt(parts[0]) - 1;
    const day = parseInt(parts[1]);
    return (MONTHS[m]||'') + ' ' + day;
  }
  return d;
}

function tog(el) { el.closest('.pc').classList.toggle('op'); }

let curFilter = 'all';
let curPMFilter = '';

function applyFilters() {
  document.querySelectorAll('.pc[data-st]').forEach(card => {
    let show = true;
    // Status filter
    if (curFilter !== 'all' && card.dataset.st !== curFilter) show = false;
    // PM filter
    if (show && curPMFilter) {
      const cardPM = card.dataset.pm || '';
      if (curPMFilter === '__none') {
        show = cardPM === 'No PM';
      } else {
        show = cardPM.includes(curPMFilter);
      }
    }
    card.style.display = show ? '' : 'none';
  });
}

function filt(f, btn) {
  document.querySelectorAll('.fb:not(#pm-filter)').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  curFilter = f;
  applyFilters();
}

function filtPM(pm) {
  curPMFilter = pm;
  applyFilters();
}

// Archive page
async function renderArchive(c) {
  try {
    const r = await fetch('data/archive-index.json');
    if (!r.ok) throw new Error('not found');
    const idx = await r.json();
    const reports = (idx.reports || []).sort((a, b) => b.date.localeCompare(a.date));
    if (!reports.length) throw new Error('empty');

    // Group by month
    const months = {};
    reports.forEach(rpt => {
      const d = new Date(rpt.date + 'T12:00:00');
      const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      const label = MONTHS[d.getMonth()] + ' ' + d.getFullYear();
      if (!months[key]) months[key] = {label, items:[]};
      months[key].items.push(rpt);
    });

    let h = '<div class="page-title">Report Archive</div><div class="page-sub">Browse past SOD reports by date.</div>';

    Object.keys(months).sort().reverse().forEach(key => {
      const m = months[key];
      h += `<div style="margin-top:20px"><div style="font-size:14px;font-weight:600;color:var(--txt2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)">${m.label}</div>`;
      m.items.forEach(rpt => {
        const d = new Date(rpt.date + 'T12:00:00');
        const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
        const dayLabel = MONTHS[d.getMonth()] + ' ' + d.getDate();
        const isEOD = rpt.type === 'eod';
        const typeLabel = isEOD ? 'EOD Report' : 'SOD Report';
        const typeIcon = isEOD ? '🌙' : '☀';
        h += `<div class="pc" style="margin-bottom:4px"><div class="ph" onclick="loadArchiveDate('${rpt.date}','${rpt.type||'sod'}')" style="cursor:pointer">
          <div><div class="pn">${typeIcon} ${dayName}, ${dayLabel}</div><div class="pp">${typeLabel}</div></div>
          <div class="pt">
            ${isEOD && rpt.completed ? `<span class="tg gr">${rpt.completed} done</span>` : ''}
            ${(rpt.overdue||rpt.still_overdue) ? `<span class="tg r">${rpt.overdue||rpt.still_overdue} late</span>` : ''}
            ${(rpt.blocked||rpt.still_blocked) ? `<span class="tg o">${rpt.blocked||rpt.still_blocked} blocked</span>` : ''}
            ${rpt.active ? `<span class="tg b">${rpt.active} active</span>` : ''}
            <span class="tg gr">${rpt.projects} projects</span>
          </div></div></div>`;
      });
      h += '</div>';
    });

    h += '<div class="ft">Click any report to view it.</div>';
    c.innerHTML = h;
  } catch(e) {
    c.innerHTML = '<div class="empty"><div class="empty-i">📋</div><div class="empty-t">No Archives Yet</div><div class="empty-d">Reports will appear here after the first SOD run.</div></div>';
  }
}

async function loadArchiveDate(dateStr, type) {
  const isEOD = type === 'eod';
  const file = isEOD ? 'eod-' : 'sod-';
  try {
    const r = await fetch('data/' + file + dateStr + '.json');
    if (!r.ok) throw new Error('not found');
    if (isEOD) {
      EOD_DATA = await r.json();
      curDate = dateStr;
      updateDateDisplay();
      document.querySelectorAll('#main-nav a').forEach(x => x.classList.remove('on'));
      document.querySelector('#main-nav a[data-p="eod"]').classList.add('on');
      curPage = 'eod';
    } else {
      DATA = await r.json();
      curDate = dateStr;
      updateDateDisplay();
      document.querySelectorAll('#main-nav a').forEach(x => x.classList.remove('on'));
      document.querySelector('#main-nav a[data-p="sod"]').classList.add('on');
      curPage = 'sod';
    }
    render();
  } catch(e) {
    alert('Report not available for ' + dateStr);
  }
}

// Date navigation
let curDate = new Date().toISOString().slice(0, 10);

function updateDateDisplay() {
  const d = new Date(curDate + 'T12:00:00');
  const today = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  let label = MONTHS[d.getMonth()] + ' ' + d.getDate();
  if (curDate === today) label = 'Today';
  else if (curDate === yesterday) label = 'Yesterday';
  document.getElementById('date-display').textContent = label;
}

document.getElementById('prev-btn').addEventListener('click', async () => {
  const prev = new Date(new Date(curDate + 'T12:00:00').getTime() - 86400000).toISOString().slice(0, 10);
  try {
    const r = await fetch('data/sod-' + prev + '.json');
    if (!r.ok) throw new Error('not found');
    DATA = await r.json();
    curDate = prev;
    updateDateDisplay();
    if (curPage === 'sod') render();
  } catch(e) { /* no data for that day */ }
});

document.getElementById('next-btn').addEventListener('click', async () => {
  const next = new Date(new Date(curDate + 'T12:00:00').getTime() + 86400000).toISOString().slice(0, 10);
  try {
    const r = await fetch('data/sod-' + next + '.json');
    if (!r.ok) throw new Error('not found');
    DATA = await r.json();
    curDate = next;
    updateDateDisplay();
    if (curPage === 'sod') render();
  } catch(e) { /* no data for that day */ }
});

async function loadData() {
  const today = new Date().toISOString().slice(0, 10);
  try {
    const r = await fetch('data/sod-' + today + '.json');
    if (!r.ok) throw new Error('not found');
    DATA = await r.json();
    curDate = today;
  } catch(e) {
    // Try yesterday if today isn't available yet
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    try {
      const r2 = await fetch('data/sod-' + yesterday + '.json');
      DATA = await r2.json();
      curDate = yesterday;
    } catch(e2) {
      document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-i">📋</div><div class="empty-t">No Data Yet</div><div class="empty-d">Waiting for first SOD report from Jade.</div></div>';
      return;
    }
  }
  updateDateDisplay();
  render();
}
loadData();
</script>
