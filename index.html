function renderCfBody() {
  const body = document.getElementById('cf-body');
  const statsEl = document.getElementById('cf-stats');
  if (!body || !statsEl || !CF_DATA) return;
  const d = CF_DATA;
  const balance = parseFloat(localStorage.getItem('cf_balance') || '0');
  const today = new Date(cfFromDate + 'T12:00:00');
  const cutoff = new Date(today.getTime() + cfDays * 86400000);
  const allItems = d.all_tasks || [];

  // Filter items in time window + type/project filters
  const windowItems = allItems.filter(t => {
    if (!t.due) return false;
    const td = new Date(t.due + 'T12:00:00');
    if (td < today || td >= cutoff) return false;
    if (cfTypeFilter === 'in' && t.type !== 'income') return false;
    if (cfTypeFilter === 'pin' && t.type !== 'p_income') return false;
    if (cfTypeFilter === 'out' && (t.type === 'income' || t.type === 'p_income')) return false;
    if (cfProjFilter !== 'all' && t.project !== cfProjFilter) return false;
    return true;
  });

  // Compute window totals — separate paid vs unpaid, and p_income
  let winIncome = 0, winOutgoing = 0, winPIncome = 0;
  let winPaidOut = 0, winPaidIn = 0;
  let winUnpaidOut = 0, winUnpaidIn = 0, winUnpaidPIn = 0;
  // Use ALL items in window (ignoring type filter) for stats
  const allWindowItems = (d.all_tasks || []).filter(t => {
    if (!t.due) return false;
    const td = new Date(t.due + 'T12:00:00');
    if (td < today || td >= cutoff) return false;
    if (cfProjFilter !== 'all' && t.project !== cfProjFilter) return false;
    return true;
  });
  allWindowItems.forEach(t => {
    const amt = t.amount || 0;
    if (t.type === 'p_income') {
      winPIncome += amt;
      if (t.paid) {} else winUnpaidPIn += amt;
    } else if (t.type === 'income') {
      winIncome += amt;
      if (t.paid) winPaidIn += amt; else winUnpaidIn += amt;
    } else {
      winOutgoing += amt;
      if (t.paid) winPaidOut += amt; else winUnpaidOut += amt;
    }
  });
  // Projected = bank balance + unpaid income - unpaid outgoing (excludes potential)
  const projectedBal = balance + winUnpaidIn - winUnpaidOut;
  const projectedWithP = projectedBal + winUnpaidPIn;

  // ── Stats (update every time) ──────────
  statsEl.innerHTML = `<div class="stats" style="grid-template-columns:repeat(4,1fr);margin-bottom:8px">
    <div class="st g"><div class="n">${cfFmt(winUnpaidIn)}</div><div class="l">Confirmed Income</div></div>
    <div class="st" style="background:#433a1a;border-color:#6b5c1e"><div class="n" style="color:#facc15">${cfFmt(winUnpaidPIn)}</div><div class="l" style="color:#c9a80e">Potential Income</div></div>
    <div class="st r"><div class="n">${cfFmt(winUnpaidOut)}</div><div class="l">Outgoing</div></div>
    <div class="st" style="background:#3a3a4a"><div class="n" style="color:#888">${cfFmt(winPaidOut)}</div><div class="l" style="color:#666">Already Paid</div></div>
  </div>
  <div class="stats" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px">
    <div class="st ${projectedBal >= 0 ? 'g' : 'r'}"><div class="n">${cfFmt(projectedBal)}</div><div class="l">Projected (confirmed)</div></div>
    <div class="st" style="background:#433a1a;border-color:#6b5c1e"><div class="n" style="color:#facc15">${cfFmt(projectedWithP)}</div><div class="l" style="color:#c9a80e">Projected (w/ potential)</div></div>
    <div class="st y"><div class="n">${allWindowItems.length}</div><div class="l">Total Payments</div></div>
  </div>`;

  // ── Payment Breakdown Summary ──────────
  const unpaidByType = {materials: 0, subs: 0, income: 0, p_income: 0};
  const unpaidCountByType = {materials: 0, subs: 0, income: 0, p_income: 0};
  // Group unpaid by week
  const unpaidByWeek = {}; // 'YYYY-WNN' → {materials, subs, income, p_income, total, dateLabel}
  allWindowItems.filter(t => !t.paid).forEach(t => {
    const tp = t.type || 'subs';
    if (unpaidByType[tp] !== undefined) { unpaidByType[tp] += (t.amount||0); unpaidCountByType[tp]++; }
    const dd = new Date(t.due + 'T12:00:00');
    const jan1 = new Date(dd.getFullYear(), 0, 1);
    const wn = Math.ceil(((dd - jan1) / 86400000 + jan1.getDay() + 1) / 7);
    const wk = `${dd.getFullYear()}-W${String(wn).padStart(2,'0')}`;
    if (!unpaidByWeek[wk]) {
      // Find Monday of this week
      const day = dd.getDay();
      const mon = new Date(dd);
      mon.setDate(mon.getDate() - ((day + 6) % 7));
      const sun = new Date(mon);
      sun.setDate(sun.getDate() + 6);
      const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
      unpaidByWeek[wk] = {materials: 0, subs: 0, income: 0, p_income: 0, total: 0, label: `${fmt(mon)} - ${fmt(sun)}`};
    }
    unpaidByWeek[wk][tp] += (t.amount||0);
    unpaidByWeek[wk].total += (t.amount||0);
  });

  const totalUnpaidOut = unpaidByType.materials + unpaidByType.subs;
  const bkCols = [
    {label: '🔧 Materials', val: unpaidByType.materials, cnt: unpaidCountByType.materials, color: '#f87171'},
    {label: '👷 Subs', val: unpaidByType.subs, cnt: unpaidCountByType.subs, color: '#fb923c'},
    {label: '💰 Income', val: unpaidByType.income, cnt: unpaidCountByType.income, color: '#4ade80'},
    {label: '⚡ Potential', val: unpaidByType.p_income, cnt: unpaidCountByType.p_income, color: '#facc15'},
  ];

  let bkHtml = `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px 16px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;cursor:pointer" onclick="const c=this.nextElementSibling;c.style.display=c.style.display==='none'?'block':'none';this.querySelector('svg').style.transform=c.style.display==='none'?'':'rotate(180deg)'">
      <div style="font-size:13px;font-weight:600;color:var(--txt)">Payment Breakdown — <span style="color:var(--red)">${cfFmt(totalUnpaidOut)}</span> to pay</div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--dim);transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div style="display:none">
      <div class="cf-bk-grid4" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
        ${bkCols.map(c => `<div style="text-align:center;padding:8px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid var(--bdr)">
          <div style="font-size:18px;font-weight:700;color:${c.color}">${cfFmt(c.val)}</div>
          <div style="font-size:11px;color:var(--txt2);margin-top:2px">${c.label} (${c.cnt})</div>
        </div>`).join('')}
      </div>`;

  // Weekly breakdown table
  const weeks = Object.entries(unpaidByWeek).sort((a,b) => a[0].localeCompare(b[0]));
  if (weeks.length) {
    bkHtml += `<div style="overflow-x:auto"><table style="width:100%;font-size:12px;border-collapse:collapse;min-width:400px">
      <tr style="border-bottom:1px solid var(--bdr);color:var(--txt2)">
        <th style="text-align:left;padding:6px 4px;font-weight:600">Week</th>
        <th style="text-align:right;padding:6px 4px;font-weight:600;color:#f87171">Materials</th>
        <th style="text-align:right;padding:6px 4px;font-weight:600;color:#fb923c">Subs</th>
        <th style="text-align:right;padding:6px 4px;font-weight:600;color:#4ade80">Income</th>
        <th style="text-align:right;padding:6px 4px;font-weight:600">Net</th>
      </tr>`;
    weeks.forEach(([wk, v]) => {
      const net = v.income - v.materials - v.subs;
      bkHtml += `<tr style="border-bottom:1px solid rgba(33,39,47,.3)">
        <td style="padding:5px 4px;color:var(--txt)">${v.label}</td>
        <td style="text-align:right;padding:5px 4px;color:#f87171">${v.materials ? cfFmt(v.materials) : '—'}</td>
        <td style="text-align:right;padding:5px 4px;color:#fb923c">${v.subs ? cfFmt(v.subs) : '—'}</td>
        <td style="text-align:right;padding:5px 4px;color:#4ade80">${v.income ? cfFmt(v.income) : '—'}</td>
        <td style="text-align:right;padding:5px 4px;font-weight:600;color:${net >= 0 ? '#4ade80' : '#f87171'}">${cfFmt(net)}</td>
      </tr>`;
    });
    bkHtml += '</table></div>';
  }
  bkHtml += '</div></div>';

  statsEl.innerHTML += bkHtml;

  // Group by day
  const byDay = {};
  windowItems.forEach(t => {
    if (!byDay[t.due]) byDay[t.due] = [];
    byDay[t.due].push(t);
  });

  // Only include days that have payments + today
  const payDates = Object.keys(byDay).sort();
  const chartDates = new Set(payDates);
  chartDates.add(d.date);
  const sortedChartDates = [...chartDates].sort();

  let runBal = balance;
  let runBalP = balance; // with potential
  const chartPoints = [];
  sortedChartDates.forEach(ds => {
    let dayIn = 0, dayOut = 0, dayPIn = 0;
    (byDay[ds] || []).forEach(t => {
      if (t.paid) return;
      if (t.type === 'p_income') { dayPIn += t.amount; return; }
      if (t.type === 'income') dayIn += t.amount;
      else dayOut += t.amount;
    });
    runBal += dayIn - dayOut;
    runBalP += dayIn + dayPIn - dayOut;
    chartPoints.push({date: ds, balance: runBal, balanceP: runBalP, dayIn, dayOut, dayPIn, net: dayIn - dayOut});
  });

  const hasPotential = chartPoints.some(p => p.balanceP !== p.balance);

  // Find min/max for chart scaling (include potential line)
  const allBals = [balance, ...chartPoints.map(p => p.balance), ...chartPoints.map(p => p.balanceP)];
  const maxBal = Math.max(...allBals, 1);
  const minBal = Math.min(...allBals, 0);

  let html = '';

  // ── Chart ──────────────────────────────
  if (chartPoints.length > 0) {
    const W = Math.max(chartPoints.length * 60, 400);
    const H = 180;
    const padL = 60, padR = 20, padT = 25, padB = 35;
    const plotW = W - padL - padR;
    const plotH = H - padT - padB;

    const yMin = Math.min(minBal, 0);
    const yMax = Math.max(maxBal, balance + 1);
    const yRange = yMax - yMin || 1;
    const toY = v => padT + plotH - ((v - yMin) / yRange * plotH);
    const toX = i => padL + (chartPoints.length > 1 ? i / (chartPoints.length - 1) * plotW : plotW / 2);

    const zeroY = toY(0);
    const startY = toY(balance);

    let path = '';
    chartPoints.forEach((p, i) => {
      const x = toX(i), y = toY(p.balance);
      path += (i === 0 ? 'M' : 'L') + `${x},${y} `;
    });

    const firstX = toX(0), lastX = toX(chartPoints.length - 1);
    const areaPath = path + `L${lastX},${toY(0)} L${firstX},${toY(0)} Z`;

    html += `<div class="cf-chart-wrap"><svg width="${W}" height="${H}" style="display:block;width:100%;max-width:${W}px" viewBox="0 0 ${W} ${H}">
      <defs><linearGradient id="cfg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--grn)" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="var(--grn)" stop-opacity="0"/>
      </linearGradient></defs>`;

    const gridLines = 4;
    for (let i = 0; i <= gridLines; i++) {
      const val = yMin + (yRange / gridLines) * i;
      const y = toY(val);
      html += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--bdr)" stroke-width="1"/>`;
      html += `<text x="${padL-8}" y="${y+4}" text-anchor="end" fill="var(--dim)" font-size="10" font-family="var(--mono)">${cfFmt(val)}</text>`;
    }

    if (yMin < 0) {
      html += `<line x1="${padL}" y1="${zeroY}" x2="${W-padR}" y2="${zeroY}" stroke="var(--dim)" stroke-width="1" stroke-dasharray="4,4"/>`;
    }

    html += `<line x1="${padL}" y1="${startY}" x2="${W-padR}" y2="${startY}" stroke="var(--blu)" stroke-width="1" stroke-dasharray="2,4" opacity="0.5"/>`;
    html += `<path d="${areaPath}" fill="url(#cfg)"/>`;

    // Potential income line (dashed yellow) — only when there's p_income data
    if (hasPotential) {
      let pathP = '';
      chartPoints.forEach((p, i) => {
        const x = toX(i), y = toY(p.balanceP);
        pathP += (i === 0 ? 'M' : 'L') + `${x},${y} `;
      });
      html += `<path d="${pathP}" fill="none" stroke="#facc15" stroke-width="2" stroke-dasharray="6,4" stroke-linejoin="round" opacity="0.7"/>`;
      chartPoints.forEach((p, i) => {
        if (p.balanceP === p.balance) return; // Only show dots where lines diverge
        const x = toX(i), y = toY(p.balanceP);
        html += `<circle cx="${x}" cy="${y}" r="3" fill="#facc15" stroke="var(--bg)" stroke-width="1.5" opacity="0.8"/>`;
        html += `<text x="${x}" y="${y-10}" text-anchor="middle" fill="#facc15" font-size="9" font-weight="600" font-family="var(--mono)" opacity="0.8">${cfFmt(p.balanceP)}</text>`;
      });
    }

    // Confirmed balance line (solid green)
    html += `<path d="${path}" fill="none" stroke="var(--grn)" stroke-width="2.5" stroke-linejoin="round"/>`;

    chartPoints.forEach((p, i) => {
      const x = toX(i), y = toY(p.balance);
      const color = p.balance >= 0 ? 'var(--grn)' : 'var(--red)';
      html += `<circle cx="${x}" cy="${y}" r="4" fill="${color}" stroke="var(--bg)" stroke-width="2"/>`;
      const dt = new Date(p.date + 'T12:00:00');
      const lbl = MONTHS[dt.getMonth()] + ' ' + dt.getDate();
      const dayLbl = DAYS[dt.getDay()];
      html += `<text x="${x}" y="${H-14}" text-anchor="middle" fill="var(--txt2)" font-size="10" font-family="var(--mono)">${lbl}</text>`;
      html += `<text x="${x}" y="${H-4}" text-anchor="middle" fill="var(--dim)" font-size="9" font-family="var(--mono)">${dayLbl}</text>`;
      html += `<text x="${x}" y="${y-10}" text-anchor="middle" fill="${color}" font-size="10" font-weight="600" font-family="var(--mono)">${cfFmt(p.balance)}</text>`;
      if (p.net !== 0) {
        const netColor = p.net > 0 ? 'var(--grn)' : 'var(--red)';
        const netSign = p.net > 0 ? '+' : '';
        html += `<text x="${x}" y="${y-22}" text-anchor="middle" fill="${netColor}" font-size="9" font-family="var(--mono)">${netSign}${cfFmt(p.net)}</text>`;
      }
    });

    html += '</svg>';
    if (hasPotential) {
      html += `<div style="display:flex;gap:16px;justify-content:center;margin-top:8px;font-size:11px">
        <span style="color:var(--grn)">● ━━ Confirmed</span>
        <span style="color:#facc15">● ┅┅ With Potential</span>
      </div>`;
    }
    html += '</div>';
  } else {
    html += '<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:32px;text-align:center;margin-bottom:20px;color:var(--dim)">No payments in this time window</div>';
  }

  // ── Per-project breakdown ──────────────
  const projMap = {};
  windowItems.forEach(t => {
    if (!projMap[t.project]) projMap[t.project] = {income: 0, outgoing: 0, tasks: 0};
    if (t.type === 'income') projMap[t.project].income += t.amount;
    else projMap[t.project].outgoing += t.amount;
    projMap[t.project].tasks++;
  });

  const projList = Object.entries(projMap).map(([name, v]) => ({name, ...v, net: v.income - v.outgoing}))
    .sort((a, b) => Math.abs(b.net) - Math.abs(a.net));

  if (projList.length) {
    html += '<div style="font-size:14px;font-weight:600;color:var(--txt2);margin-bottom:8px">Project Impact</div>';
    html += '<div class="cf-proj-grid">';
    projList.forEach(p => {
      const netCls = p.net >= 0 ? 'net-pos' : 'net-neg';
      const sign = p.net >= 0 ? '+' : '';
      let detail = [];
      if (p.income) detail.push(`↑ ${cfFmt(p.income)}`);
      if (p.outgoing) detail.push(`↓ ${cfFmt(p.outgoing)}`);
      html += `<div class="cf-proj">
        <div><div class="cf-proj-name">${p.name}</div><div class="cf-proj-detail">${detail.join(' · ')} · ${p.tasks} payment${p.tasks > 1 ? 's' : ''}</div></div>
        <div class="cf-proj-amt ${netCls}">${sign}${cfFmt(p.net)}</div></div>`;
    });
    html += '</div>';
  }

  // ── Payment list with running balance ──
  html += '<div style="font-size:14px;font-weight:600;color:var(--txt2);margin-bottom:8px">Upcoming Payments</div>';
  html += '<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:8px 12px">';

  // Header row
  html += `<div class="cf-pay" style="border-bottom:1px solid var(--bdr);padding-bottom:4px;margin-bottom:2px">
    <span class="cf-pay-date" style="font-weight:600;color:var(--txt)">Date</span>
    <span class="cf-pay-type" style="background:none;border:none;color:var(--txt);font-weight:600">Type</span>
    <span class="cf-pay-name" style="font-weight:600;color:var(--txt)">Payment</span>
    <span class="cf-pay-amt" style="color:var(--txt)">Amount</span>
    <span class="cf-pay-bal" style="color:var(--txt)">Balance</span>
    <span class="cf-pay-status" style="background:none;border:none;color:var(--txt);font-weight:600">Status</span>
  </div>`;

  const sorted = [...windowItems].sort((a, b) => (a.due || '').localeCompare(b.due || ''));
  if (sorted.length) {
    let runningBal = balance;
    let currentWeek = '';
    sorted.forEach(t => {
      // Week separator header
      const weekKey = cfGetMonday(t.due || d.date);
      if (weekKey !== currentWeek) {
        currentWeek = weekKey;
        const weekLabel = cfWeekRange(weekKey);
        // Compute week totals
        const weekItems = sorted.filter(w => cfGetMonday(w.due || d.date) === weekKey);
        let wIn = 0, wOut = 0, wPIn = 0;
        weekItems.forEach(w => {
          if (w.type === 'p_income') wPIn += w.amount;
          else if (w.type === 'income') wIn += w.amount;
          else wOut += w.amount;
        });
        const wNet = wIn - wOut;
        const wNetColor = wNet >= 0 ? '#4ade80' : '#f87171';
        const pInPart = wPIn > 0 ? ` · <span style="color:#facc15">⚡${cfFmt(wPIn)}</span>` : '';
        html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 4px 4px;margin-top:8px;border-top:2px solid var(--bdr)">
          <span style="font-size:12px;font-weight:700;color:var(--txt);letter-spacing:.3px">📅 ${weekLabel}</span>
          <span style="font-size:11px;color:var(--dim)">IN ${cfFmt(wIn)}${pInPart} · OUT ${cfFmt(wOut)} · <span style="color:${wNetColor};font-weight:600">NET ${cfFmt(wNet)}</span></span>
        </div>`;
      }

      const isIn = t.type === 'income' || t.type === 'p_income';
      const isPotential = t.type === 'p_income';
      const typeLabel = isPotential ? 'P.IN' : isIn ? 'IN' : 'OUT';
      const typeCls = isPotential ? 'pin' : isIn ? 'in' : 'out';
      const dt = new Date((t.due || d.date) + 'T12:00:00');
      const dayName = DAYS[dt.getDay()];
      const dateLbl = MONTHS[dt.getMonth()] + ' ' + dt.getDate() + '<br><span style="font-size:9px;color:var(--dim);font-weight:400">' + dayName + '</span>';
      const amtStr = t.amount ? cfFmt2(t.amount) : 'TBD';
      const statusCls = t.paid ? 'paid' : (t.amount ? 'pending' : 'tbd');
      const statusLbl = t.paid ? '✓ Paid' : (t.amount ? 'Pending' : 'TBD');

      // Only unpaid items affect running balance (paid already in bank)
      // Potential income does NOT affect confirmed running balance
      if (!t.paid && !isPotential) {
        if (isIn) runningBal += t.amount;
        else runningBal -= t.amount;
      }

      const balCls = runningBal >= 0 ? 'pos' : 'neg';
      const paidStyle = t.paid ? 'opacity:0.5;text-decoration:line-through' : '';
      const paidBalLbl = t.paid ? '—' : cfFmt(runningBal);
      const paidBalCls = t.paid ? '' : balCls;

      html += `<div class="cf-pay" style="${paidStyle}">
        <span class="cf-pay-date">${dateLbl}</span>
        <span class="cf-pay-type ${typeCls}">${typeLabel}</span>
        <span class="cf-pay-name">${t.task} <span class="cf-pay-proj">— ${t.project}</span></span>
        <span class="cf-pay-amt ${typeCls}">${isIn ? '+' : '-'}${amtStr}</span>
        <span class="cf-pay-bal ${paidBalCls}">${paidBalLbl}</span>
        <span class="cf-pay-status ${statusCls}">${statusLbl}</span>
      </div>`; 
    });
  } else {
    html += '<div style="padding:12px;text-align:center;color:var(--dim);font-size:13px">No payments in this time window</div>';
  }

  // ── Totals footer ──────────────────────
  let totIn = 0, totOut = 0, totPIn = 0, totPaidIn = 0, totPaidOut = 0;
  let cntIn = 0, cntOut = 0, cntPIn = 0;
  sorted.forEach(t => {
    const amt = t.amount || 0;
    if (t.type === 'p_income') { totPIn += amt; cntPIn++; }
    else if (t.type === 'income') { totIn += amt; cntIn++; if (t.paid) totPaidIn += amt; }
    else { totOut += amt; cntOut++; if (t.paid) totPaidOut += amt; }
  });
  const totNet = totIn - totOut;
  const totNetWithP = totNet + totPIn;
  const totNetColor = totNet >= 0 ? '#4ade80' : '#f87171';
  const totNetPColor = totNetWithP >= 0 ? '#facc15' : '#f87171';
  const filterLabel = cfTypeFilter === 'in' ? 'Income' : cfTypeFilter === 'pin' ? 'Potential' : cfTypeFilter === 'out' ? 'Expenses' : 'All';
  const projLabel = cfProjFilter === 'all' ? 'All Projects' : cfProjFilter;

  html += `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:12px 16px;margin-top:12px">
    <div style="font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">
      Totals · ${filterLabel} · ${projLabel} · ${sorted.length} payment${sorted.length!==1?'s':''}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">
      <div style="text-align:center">
        <div style="font-size:18px;font-weight:700;color:#4ade80">${cfFmt(totIn)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">Confirmed Income (${cntIn})</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:18px;font-weight:700;color:#facc15">${cfFmt(totPIn)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">Potential Income (${cntPIn})</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:18px;font-weight:700;color:#f87171">${cfFmt(totOut)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">Expenses (${cntOut})</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:10px;border-top:1px solid var(--bdr)">
      <div style="text-align:center">
        <div style="font-size:18px;font-weight:700;color:${totNetColor}">${cfFmt(totNet)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">Net (confirmed only)</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:18px;font-weight:700;color:${totNetPColor}">${cfFmt(totNetWithP)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">Net (w/ potential)</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:18px;font-weight:700;color:#888">${cfFmt(totPaidIn + totPaidOut)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">Already Paid</div>
      </div>
    </div>
  </div>`;

  html += '</div>';

  body.innerHTML = html;
}

  rent:      {label:'Rent',      color:'#fb923c', icon:'🏠'},

function mgmtTypeInfo(type) {

// ── Finance tab — API helpers ────────────────────────────────────
function financeApiConfig() {
  return {
    url: (localStorage.getItem('finance_api_url')||'').replace(/\/+$/, ''),
    token: localStorage.getItem('finance_api_token')||'',
  };
}

function financeApiConfigured() {
  const {url, token} = financeApiConfig();
  return !!(url && token);
}

async function financeApi(path, options={}) {
  const {url, token} = financeApiConfig();
  if (!url || !token) throw new Error('API not configured (open Settings)');
  const res = await fetch(url + path, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token,
      ...(options.headers||{}),
    },
  });
  const text = await res.text();
  let body;
  try { body = text ? JSON.parse(text) : null; } catch(e) { body = text; }
  if (!res.ok) throw new Error('API ' + res.status + ': ' + (typeof body === 'string' ? body : JSON.stringify(body)));
  return body;
}

function financeModal(title, bodyHtml, onSubmit) {
  const bg = document.createElement('div');
  bg.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px';
  bg.innerHTML = `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:20px;min-width:320px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:16px;font-weight:700">${title}</div>
      <button type="button" style="background:none;border:none;color:var(--txt2);font-size:20px;cursor:pointer;padding:0 4px" data-close>×</button>
    </div>
    <form style="display:flex;flex-direction:column;gap:10px">${bodyHtml}
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px">
        <button type="button" data-close style="padding:8px 14px;font-size:13px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;cursor:pointer">Cancel</button>
        <button type="submit" style="padding:8px 14px;font-size:13px;font-weight:600;background:var(--blu);color:#fff;border:none;border-radius:6px;cursor:pointer">Save</button>
      </div>
    </form>
    <div data-err style="color:var(--red);font-size:12px;margin-top:8px;display:none"></div>
  </div>`;
  document.body.appendChild(bg);
  const err = bg.querySelector('[data-err]');
  const close = () => bg.remove();
  bg.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', close));
  bg.addEventListener('click', e => { if (e.target === bg) close(); });
  bg.querySelector('form').addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const fd = new FormData(ev.target);
    const data = {};
    for (const [k, v] of fd.entries()) if (v !== '') data[k] = v;
    try {
      const submitBtn = ev.target.querySelector('button[type=submit]');
      submitBtn.disabled = true; submitBtn.textContent = 'Saving...';
      await onSubmit(data);
      close();
    } catch (e) {
      err.textContent = e.message;
      err.style.display = '';
      const submitBtn = ev.target.querySelector('button[type=submit]');
      submitBtn.disabled = false; submitBtn.textContent = 'Save';
    }
  });
  setTimeout(() => bg.querySelector('input')?.focus(), 50);
  return bg;
}

function financeRenderCalendar(dayBuckets, fcByKey) {
  // Group day-buckets by YYYY-MM
  const fmtK = n => (n<0?'-':'') + '$' + Math.abs(Math.round(n||0)).toLocaleString();
  const byMonth = {};
  dayBuckets.forEach(b => {
    const mk = b.key.slice(0, 7);
    if (!byMonth[mk]) byMonth[mk] = {};
    byMonth[mk][b.key] = b;
  });
  const todayStr = new Date().toISOString().slice(0,10);
  let html = '<div style="display:flex;flex-direction:column;gap:22px">';
  Object.keys(byMonth).sort().forEach(mk => {
    const [y, mo] = mk.split('-').map(Number);
    const firstDay = new Date(y, mo-1, 1);
    const lastDay = new Date(y, mo, 0).getDate();
    // Monday=0 alignment
    const startWeekday = (firstDay.getDay() + 6) % 7;
    const monthName = firstDay.toLocaleString('default', { month: 'long', year: 'numeric' });
    html += `<div>`;
    html += `<div style="font-size:14px;font-weight:700;color:var(--txt);margin-bottom:8px">${monthName}</div>`;
    html += `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">`;
    ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
      html += `<div style="font-size:10px;color:var(--dim);text-align:center;padding:2px 0;font-weight:600;text-transform:uppercase;letter-spacing:.5px">${d}</div>`;
    });
    for (let i = 0; i < startWeekday; i++) html += '<div></div>';
    for (let day = 1; day <= lastDay; day++) {
      const ds = `${y}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const b = byMonth[mk][ds];
      const isToday = ds === todayStr;
      const net = b ? b.net : 0;
      const count = b ? b.count : 0;
      const cb = b ? b.closing_balance : null;
      const bgColor = net > 0 ? 'rgba(18,183,106,.14)'
                    : net < 0 ? 'rgba(240,68,56,.10)'
                    : 'var(--card)';
      const borderColor = isToday ? 'var(--blu)' : 'var(--bdr)';
      const borderWidth = isToday ? '2px' : '1px';
      const clickable = b ? `cursor:pointer` : 'cursor:default';
      const clickAttr = b ? ` onclick="financeOpenDay('${ds}')"` : '';
      html += `<div${clickAttr} style="${clickable};background:${bgColor};border:${borderWidth} solid ${borderColor};border-radius:5px;padding:6px;min-height:74px;display:flex;flex-direction:column;gap:2px" title="${b ? count + ' events' : ''}">`;
      html += `<div style="font-size:11px;font-weight:${isToday?'700':'500'};color:${isToday?'var(--blu)':'var(--txt)'}">${day}${isToday?' ★':''}</div>`;
      if (b) {
        const netCol = net > 0 ? 'var(--grn)' : net < 0 ? 'var(--red)' : 'var(--txt2)';
        html += `<div style="font-size:11px;font-family:var(--mono);color:${netCol};font-weight:700">${net>0?'+':''}${fmtK(net)}</div>`;
        if (cb != null) html += `<div style="font-size:9px;font-family:var(--mono);color:${cb<0?'var(--red)':'var(--dim)'}">${cb<0?'':'='}${fmtK(cb)}</div>`;
        html += `<div style="font-size:9px;color:var(--dim);margin-top:auto">${count} evt${count!==1?'s':''}</div>`;
      }
      html += `</div>`;
    }
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function financeRenderBucketContent(start, end, rowId, live) {
  const d = FINANCE_DATA;
  if (!d) return '<div style="padding:14px;color:var(--dim)">No data.</div>';
  const fmt = n => (n<0?'-':'') + '$' + Math.abs(n||0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  const fmtK = n => (n<0?'-':'') + '$' + Math.abs(Math.round(n||0)).toLocaleString();
  const fmtDate = iso => { if (!iso) return '—'; const dt = new Date(iso + 'T12:00:00'); const MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${MS[dt.getMonth()]} ${dt.getDate()}`; };

  const allEvents = (d.timeline || []).concat(((d.fixed_cost_events||{}).forward)||[]);
  const bucketEvents = allEvents.filter(e => e.date >= start && e.date <= end);
  if (!bucketEvents.length) return '<div style="padding:14px;color:var(--dim);font-size:12px">No events in this period.</div>';

  const byProj = {};
  bucketEvents.forEach(e => {
    const p = e.source_type === 'fixed_cost' ? 'Fixed Costs' : e.source_type === 'debt' ? 'Debts' : (e.project || 'Other');
    (byProj[p] = byProj[p] || []).push(e);
  });
  const specialGroups = {'Fixed Costs': 1, 'Debts': 2};
  const projKeys = Object.keys(byProj).sort((a, bb) => {
    const sa = specialGroups[a] || 0, sb = specialGroups[bb] || 0;
    if (sa !== sb) return sa - sb;  // real projects first, then Fixed Costs, then Debts
    const na = byProj[a].reduce((s, e) => s + e.amount, 0);
    const nb = byProj[bb].reduce((s, e) => s + e.amount, 0);
    return Math.abs(nb) - Math.abs(na);
  });

  const PAGE = 15;
  let html = '<div style="padding:10px 20px 14px">';
  projKeys.forEach(p => {
    const events = byProj[p].sort((a, bb) => a.date.localeCompare(bb.date));
    const net = events.reduce((s, e) => s + e.amount, 0);
    const inflow = events.filter(e => e.amount > 0).reduce((s, e) => s + e.amount, 0);
    const outflow = events.filter(e => e.amount < 0).reduce((s, e) => s + Math.abs(e.amount), 0);
    const projColor = p === 'Fixed Costs' ? 'var(--org)' : p === 'Debts' ? '#9B8AFB' : net >= 0 ? 'var(--grn)' : 'var(--red)';
    html += `<div style="margin-top:10px;padding:8px 10px;background:var(--card);border-left:3px solid ${projColor};border-radius:0 6px 6px 0">`;
    html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:13px">`;
    html += `<b>${p}</b> <span style="color:var(--txt2);font-size:11px;margin-left:6px">${events.length} event${events.length>1?'s':''}</span>`;
    html += `<span style="color:var(--txt2);font-size:12px">`;
    if (inflow) html += `<span style="color:var(--grn);margin-right:10px">+${fmtK(inflow)}</span>`;
    if (outflow) html += `<span style="color:var(--red);margin-right:10px">-${fmtK(outflow)}</span>`;
    html += `<span style="font-weight:700;color:${net>=0?'var(--grn)':'var(--red)'}">${net>=0?'+':''}${fmtK(net)}</span>`;
    html += `</span></div>`;
    html += `<div style="font-size:12px">`;
    events.forEach((e, idx) => {
      const hiddenStyle = idx >= PAGE ? `display:none` : '';
      const hiddenAttr = idx >= PAGE ? `data-hidden-in="${rowId}-${p.replace(/[^a-z0-9]/gi,'_')}"` : '';
      const moveHandler = `financeMoveDate(${JSON.stringify(e.source_id)}, ${JSON.stringify(e.date)}, ${JSON.stringify(e.original_date)}, ${JSON.stringify(e.label||'')})`;
      const canVoid = live && ['petty_cash','misc_expense','non_project_income','bank_snapshot'].includes(e.source_type);
      const dbId = (e.source_id||'').replace(/^(pc|misc|npi|bs)-/, '');
      const voidHandler = `financeVoidRow(${JSON.stringify(e.source_type)}, ${dbId})`;
      html += `<div ${hiddenAttr} style="display:flex;align-items:center;padding:3px 0;gap:10px;border-top:1px solid rgba(33,39,47,.3);${hiddenStyle}">`;
      html += `<span style="font-family:var(--mono);color:${e.moved?'var(--ylw)':'var(--txt2)'};white-space:nowrap;width:62px">${fmtDate(e.date)}</span>`;
      html += `<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.label||''}</span>`;
      html += `<span style="font-family:var(--mono);${e.amount>=0?'color:var(--grn)':'color:var(--red)'};font-weight:600;white-space:nowrap">${e.amount>=0?'+':''}${fmt(e.amount)}</span>`;
      if (live) html += `<a href="#" onclick="event.preventDefault();event.stopPropagation();${moveHandler}" title="Move date" style="color:var(--dim);text-decoration:none">📅</a>`;
      if (canVoid) html += `<a href="#" onclick="event.preventDefault();event.stopPropagation();${voidHandler}" title="Void" style="color:var(--red);text-decoration:none">×</a>`;
      else html += `<span style="width:12px"></span>`;
      html += `</div>`;
    });
    if (events.length > PAGE) {
      const pKey = p.replace(/[^a-z0-9]/gi,'_');
      html += `<div id="${rowId}-${pKey}-more" style="padding:6px 0;font-size:11px">
        <a href="#" onclick="event.preventDefault();event.stopPropagation();document.querySelectorAll('[data-hidden-in=\\'${rowId}-${pKey}\\']').forEach(el=>el.style.display='');this.parentElement.remove();" style="color:var(--blu);text-decoration:none">Show all ${events.length} events →</a>
      </div>`;
    }
    html += `</div></div>`;
  });
  html += '</div>';
  return html;
}

  const body = `
    <div style="font-size:13px;color:var(--txt2);margin-bottom:2px"><b style="color:var(--txt)">${label}</b></div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:8px">Original date: ${originalDate || currentDate}${currentDate !== originalDate ? ' · Currently moved to: ' + currentDate : ''}</div>
    <label style="font-size:12px;color:var(--txt2)">New date</label>

    <div style="font-size:11px;color:var(--dim);margin-top:6px">This creates a scenario override. Click "Reset" below to revert to the original date.</div>
    <div style="margin-top:4px"><button type="button" id="scenario-reset-btn" style="padding:6px 10px;font-size:11px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:5px;cursor:pointer">Reset to original</button></div>
  `;
  const modal = financeModal('Move payment date', body, async (data) => {
    if (!data.date || !/^\d{4}-\d{2}-\d{2}$/.test(data.date)) {
      throw new Error('Please pick a valid date.');
    }
    if (data.date === originalDate) {
      await financeApi('/scenario-override/' + encodeURIComponent(sourceId), { method: 'DELETE' });
    } else {
      await financeApi('/scenario-override', {
        method: 'POST',
        body: JSON.stringify({
          source_id: sourceId,
          scenario_date: data.date,
          original_date: originalDate,
          label: label,
        }),
      });
    }
    const result = await financeApi('/state');
    FINANCE_DATA = result;
    financeSafeRender();
  });
  // Wire reset button
  setTimeout(() => {
    const btn = modal.querySelector('#scenario-reset-btn');
    if (btn) btn.addEventListener('click', async () => {
      try {
        await financeApi('/scenario-override/' + encodeURIComponent(sourceId), { method: 'DELETE' });
        const result = await financeApi('/state');
        FINANCE_DATA = result;
        modal.remove();
        financeSafeRender();
      } catch (e) { alert('Reset failed: ' + e.message); }
    });
  }, 100);
}

async function financeResetScenarios() {
  if (!confirm('Clear ALL scenario date overrides and return to base dates?')) return;
  try {
    const result = await financeApi('/scenario-reset', { method: 'POST' });
    if (result.state) FINANCE_DATA = result.state;
    financeSafeRender();
  } catch (e) {
    alert('Reset failed: ' + e.message);
  }
}

// ── Finance tab — gate/load ───────────────────────────────────────
function financeGate(c) {
  if (sessionStorage.getItem('mgmt_auth')==='1') { loadAndRenderFinance(c); return; }
  c.innerHTML = `<div class="pw-gate">
    <div class="pw-icon">💵</div>
    <div class="pw-title">Finance — Restricted</div>
    <div class="pw-sub">Enter password to access.</div>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="off">
    <button class="pw-btn" id="pw-btn">Unlock</button>
    <div class="pw-deny" id="pw-deny" style="display:none">Access denied</div>
  </div>`;
  const inp=document.getElementById('pw-input'),btn=document.getElementById('pw-btn'),deny=document.getElementById('pw-deny');
  function tryPw(){
    if(inp.value===MGMT_PW){sessionStorage.setItem('mgmt_auth','1');loadAndRenderFinance(c);}
    else{inp.classList.add('pw-err');deny.style.display='';setTimeout(()=>inp.classList.remove('pw-err'),400);}
  }
  btn.addEventListener('click',tryPw);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')tryPw();});
  setTimeout(()=>inp.focus(),50);
}

async function loadAndRenderFinance(c) {
  c.innerHTML = '<div class="empty"><div class="empty-i">⏳</div><div class="empty-t">Loading Finance...</div></div>';
  // Priority 1 — live API (CRUD-capable)
  if (financeApiConfigured()) {
    try {
      FINANCE_DATA = await financeApi('/state');
      window._financeLive = true;
      try { renderFinance(c); } catch (err) { console.error('renderFinance error:', err); c.innerHTML='<div class="alert"><b>Render error.</b> '+err.message+'</div>'; }
      return;
    } catch (e) {
      console.warn('Finance API unavailable, falling back to static JSON:', e.message);
      window._financeLive = false;
      window._financeApiError = e.message;
    }
  }
  // Priority 2 — static JSON published to dashboard-site/data
  for (let i=0;i<7;i++){
    const d=new Date(Date.now()-i*86400000).toISOString().slice(0,10);
    try{const r=await fetch('data/finance-'+d+'.json');if(!r.ok)continue;FINANCE_DATA=await r.json();financeSafeRender();return;}catch(e){}
  }
  try{const r=await fetch('data/finance-latest.json');if(r.ok){FINANCE_DATA=await r.json();financeSafeRender();return;}}catch(e){}
  c.innerHTML='<div class="empty"><div class="empty-i">💵</div><div class="empty-t">No Finance Data</div><div class="empty-d">Run: python3 generate_finance_json.py</div></div>';
}

function renderFinance(c) {
  const d = FINANCE_DATA;
  const s = d.summary;
  const fmt = n => (n<0?'-':'') + '$' + Math.abs(n||0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  const fmtK = n => (n<0?'-':'') + '$' + Math.abs(Math.round(n||0)).toLocaleString();
  const fmtDate = iso => {
    if (!iso) return '—';
    const dt = new Date(iso + 'T12:00:00');
    const MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${MS[dt.getMonth()]} ${dt.getDate()}`;
  };
  const amountCls = n => n > 0 ? 'style="color:var(--grn);font-weight:600"' : 'style="color:var(--red);font-weight:600"';
  const amountSign = n => (n > 0 ? '+' : '') + fmt(n);

  const bal = s.current_balance || 0;
  const projected = s.projected_end_balance || 0;
  const forward_net = s.net_window || 0;
  const overdue_net = s.overdue_net || 0;
  const breakdown = s.runway_breakdown_date;

  // Runway stat — date when balance first goes negative
  let runwayCls = 'g', runwayDisp = '∞';
  if (breakdown) {
    const today = new Date(d.date + 'T12:00:00');
    const brk = new Date(breakdown + 'T12:00:00');
    const daysOut = Math.max(0, Math.ceil((brk - today) / 86400000));
    runwayCls = daysOut <= 14 ? 'r' : daysOut <= 45 ? 'y' : 'b';
    runwayDisp = daysOut === 0 ? 'today' : `${daysOut}d`;
  }

  const live = window._financeLive === true;
  const hasOverrides = (d.sources && d.sources.scenario_overrides_count) || 0;

  let h = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:12px">
      <div>
        <div class="page-title">Finance</div>
        <div class="page-sub">Balance · Projects · Fixed costs · 365-day forecast · As of ${d.date}
          ${live ? '<span style="color:var(--grn);font-weight:600;margin-left:8px">● LIVE</span>' : '<span style="color:var(--ylw);margin-left:8px">● read-only (static JSON)</span>'}
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${hasOverrides ? `<button onclick="financeResetScenarios()" style="padding:7px 12px;font-size:12px;font-weight:600;background:var(--card-h);color:var(--txt);border:1px solid var(--ylw);border-radius:6px;cursor:pointer">↺ Reset ${hasOverrides} scenario${hasOverrides>1?'s':''}</button>` : ''}
        <button onclick="financeShowConfig()" style="padding:7px 12px;font-size:12px;font-weight:500;background:var(--card);color:var(--txt2);border:1px solid var(--bdr);border-radius:6px;cursor:pointer">⚙ Settings</button>
      </div>
    </div>

    <!-- Prominent Quick Add bar (always visible when LIVE) -->
    <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;font-weight:700">${live?'Quick add →':'Read-only — enable API in ⚙ Settings to add entries'}</span>
      <button onclick="financeAddEntry('bank')" ${live?'':'disabled'} style="padding:8px 14px;font-size:13px;font-weight:600;background:${live?'var(--grn)':'var(--card-h)'};color:#fff;border:none;border-radius:6px;cursor:${live?'pointer':'not-allowed'};opacity:${live?'1':'.4'}">💵 Bank Balance</button>
      <button onclick="financeAddEntry('petty')" ${live?'':'disabled'} style="padding:8px 14px;font-size:13px;font-weight:600;background:${live?'var(--org)':'var(--card-h)'};color:#fff;border:none;border-radius:6px;cursor:${live?'pointer':'not-allowed'};opacity:${live?'1':'.4'}">🧾 Petty Cash</button>
      <button onclick="financeAddEntry('misc')" ${live?'':'disabled'} style="padding:8px 14px;font-size:13px;font-weight:600;background:${live?'var(--red)':'var(--card-h)'};color:#fff;border:none;border-radius:6px;cursor:${live?'pointer':'not-allowed'};opacity:${live?'1':'.4'}">💸 Misc Expense</button>
      <button onclick="financeAddEntry('income')" ${live?'':'disabled'} style="padding:8px 14px;font-size:13px;font-weight:600;background:${live?'var(--blu)':'var(--card-h)'};color:#fff;border:none;border-radius:6px;cursor:${live?'pointer':'not-allowed'};opacity:${live?'1':'.4'}">💰 Income</button>
    </div>
    ${!live ? `<div class="alert" style="background:var(--ylw-s);border-color:var(--ylw-b);color:var(--ylw)"><div><b>Read-only mode.</b> You're seeing the static JSON snapshot from the last dashboard refresh. To enable Add/Edit/Scenario buttons, click ⚙ Settings and enter the tunnel URL + bearer token from the Mac. ${window._financeApiError ? '<span style="opacity:.7"> (last error: '+window._financeApiError+')</span>' : ''}</div></div>` : ''}

    <div class="stats">
      <div class="st g"><div class="n">${fmtK(bal)}</div><div class="l">Current Balance</div></div>
      <div class="st ${projected >= 0 ? 'g' : 'r'}"><div class="n">${fmtK(projected)}</div><div class="l">Projected 90d End</div></div>
      <div class="st ${runwayCls}"><div class="n">${runwayDisp}</div><div class="l">Runs Negative</div></div>
      <div class="st b"><div class="n">${fmtK(forward_net)}</div><div class="l">Forward Net (90d)</div></div>
      <div class="st ${overdue_net >= 0 ? 'g' : 'r'}"><div class="n">${fmtK(overdue_net)}</div><div class="l">Overdue Backlog Net</div></div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;font-size:12px">
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 12px">
        <div style="color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px">Incoming (next 90d)</div>
        <div style="color:var(--grn);font-family:var(--mono);font-weight:700;font-size:16px">+${fmtK(s.incoming_window)}</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 12px">
        <div style="color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px">Outgoing (next 90d)</div>
        <div style="color:var(--red);font-family:var(--mono);font-weight:700;font-size:16px">-${fmtK(s.outgoing_window)}</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 12px">
        <div style="color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px">Overdue To Collect</div>
        <div style="color:var(--grn);font-family:var(--mono);font-weight:700;font-size:16px">+${fmtK(s.overdue_incoming)}</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 12px">
        <div style="color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px">Overdue To Pay</div>
        <div style="color:var(--red);font-family:var(--mono);font-weight:700;font-size:16px">-${fmtK(s.overdue_outgoing)}</div>
      </div>
    </div>`;

  if (breakdown) {
    const today = new Date(d.date + 'T12:00:00');
    const brk = new Date(breakdown + 'T12:00:00');
    const daysOut = Math.max(0, Math.ceil((brk - today) / 86400000));
    if (daysOut <= 30) {
      h += `<div class="alert"><div><b>⚠ Cash runs negative in ${daysOut === 0 ? 'today' : daysOut + ' days'}</b> (on ${fmtDate(breakdown)}) at current projected in/out flow. Collect overdue income or delay outflows.</div></div>`;
    }
  }

  // ── Time-unit slider + aggregated summary ──
  const unit = window._financeUnit || 'week';
  const view = window._financeView || 'table';
  const pill = (val, label) => `<button onclick="financeSetUnit('${val}')" style="padding:7px 18px;font-size:13px;font-weight:600;background:${unit===val?'var(--blu)':'transparent'};color:${unit===val?'#fff':'var(--txt2)'};border:none;border-radius:4px;cursor:pointer;transition:all .12s">${label}</button>`;
  const viewPill = (val, label) => `<button onclick="financeSetView('${val}')" style="padding:7px 14px;font-size:12px;font-weight:600;background:${view===val?'var(--pur)':'transparent'};color:${view===val?'#fff':'var(--txt2)'};border:none;border-radius:4px;cursor:pointer;transition:all .12s">${label}</button>`;
  h += `<div class="sh" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <span>Cashflow Summary</span>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${unit === 'day' ? `<div style="display:inline-flex;background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:2px">${viewPill('table','Table')}${viewPill('calendar','Calendar')}</div>` : ''}
      <div style="display:inline-flex;background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:2px">
        ${pill('day','Day')}${pill('week','Week')}${pill('month','Month')}
      </div>
    </div>
  </div>`;

  const buckets = (d.aggregated && d.aggregated[unit]) || [];
  const fcBuckets = (d.aggregated_fixed && d.aggregated_fixed[unit]) || [];
  // Map fixed-cost outflow by bucket key
  const fcByKey = {};
  fcBuckets.forEach(b => fcByKey[b.key] = b);

  // Calendar view — only in Day mode
  if (unit === 'day' && view === 'calendar') {
    h += '<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:18px;margin-bottom:20px">';
    if (!buckets.length) {
      h += '<div style="color:var(--dim)">No forward events.</div>';

      h += '<div style="margin-top:14px;font-size:11px;color:var(--dim);display:flex;gap:16px;flex-wrap:wrap"><span><span style="display:inline-block;width:10px;height:10px;background:rgba(18,183,106,.3);border:1px solid var(--grn);border-radius:2px;vertical-align:middle"></span> net positive day</span><span><span style="display:inline-block;width:10px;height:10px;background:rgba(240,68,56,.2);border:1px solid var(--red);border-radius:2px;vertical-align:middle"></span> net negative day</span><span>Click any day for its breakdown</span></div>';

    h += '<th style="padding:10px 12px;text-align:right">Closing Balance</th>';
    h += '<th style="padding:10px 12px;text-align:right">Events</th>';
    h += '</tr></thead><tbody>';
    // Lazy-render bucket drill-downs — only render content when user expands a bucket.

    buckets.forEach((b, idx) => {

  h += '</div>';

  // ── Overdue backlog ──

    h += `<div><div class="pn">🕑 Overdue Backlog · ${d.overdue.length} items</div>`;
    h += `<div class="pp">To collect: <b style="color:var(--grn)">+${fmtK(s.overdue_incoming)}</b> · To pay: <b style="color:var(--red)">-${fmtK(s.overdue_outgoing)}</b> · Net: <b>${fmtK(s.overdue_net)}</b></div></div>`;
    h += `<div class="pt">${chvSvg()}</div></div>`;
    h += `<div class="pb"><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:6px">`;
    h += '<thead><tr style="text-align:left;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px">';
    h += '<th style="padding:6px 8px">Original Due</th><th style="padding:6px 8px">Days Overdue</th><th style="padding:6px 8px">Event</th><th style="padding:6px 8px">Project</th><th style="padding:6px 8px;text-align:right">Amount</th>';

  const projAggUnit = d.project_aggregated && d.project_aggregated[unit] || {};
  d.by_project.forEach(p => {

    h += `<div class="pb">`;
    // Mini aggregated table for this project
    if (projBuckets.length) {
      h += `<div style="overflow-x:auto;margin-top:8px"><table style="width:100%;border-collapse:collapse;font-size:12px">`;
      h += '<thead><tr style="text-align:left;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px">';
      h += '<th style="padding:6px 8px">Period</th><th style="padding:6px 8px;text-align:right">In</th><th style="padding:6px 8px;text-align:right">Out</th><th style="padding:6px 8px;text-align:right">Net</th><th style="padding:6px 8px;text-align:right">#</th>';
      h += '</tr></thead><tbody>';
      projBuckets.forEach(b => {
        const netStyle = b.net >= 0 ? 'color:var(--grn);font-weight:600' : 'color:var(--red);font-weight:600';
        h += '<tr style="border-top:1px solid rgba(33,39,47,.3)">';
        h += `<td style="padding:5px 8px">${b.label}</td>`;
        h += `<td style="padding:5px 8px;text-align:right;font-family:var(--mono);color:${b.inflow>0?'var(--grn)':'var(--dim)'}">${b.inflow>0?'+'+fmtK(b.inflow):'—'}</td>`;
        h += `<td style="padding:5px 8px;text-align:right;font-family:var(--mono);color:${b.outflow>0?'var(--red)':'var(--dim)'}">${b.outflow>0?'-'+fmtK(b.outflow):'—'}</td>`;
        h += `<td style="padding:5px 8px;text-align:right;font-family:var(--mono);${netStyle}">${b.net>=0?'+':''}${fmtK(b.net)}</td>`;
        h += `<td style="padding:5px 8px;text-align:right;color:var(--txt2);font-size:11px">${b.count}</td>`;
        h += '</tr>';
      });
      h += '</tbody></table></div>';
    }
    // Full event list for this project (nested collapsible)
    h += `<details style="margin-top:10px"><summary style="cursor:pointer;font-size:11px;color:var(--dim);padding:6px 0">Show ${p.events.length} individual events</summary>`;
    h += `<div style="overflow-x:auto;margin-top:6px"><table style="width:100%;border-collapse:collapse;font-size:12px">`;
    h += '<thead><tr style="text-align:left;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px">';
    h += '<th style="padding:6px 8px">Date</th><th style="padding:6px 8px">Event</th><th style="padding:6px 8px">Type</th><th style="padding:6px 8px;text-align:right">Amount</th><th style="padding:6px 8px;width:24px"></th>';
    h += '</tr></thead><tbody>';
    p.events.forEach(e => {
      const moveHandler = `financeMoveDate(${JSON.stringify(e.source_id)}, ${JSON.stringify(e.date)}, ${JSON.stringify(e.original_date)}, ${JSON.stringify(e.label||'')})`;
      h += `<tr style="border-top:1px solid rgba(33,39,47,.3);${e.moved?'background:rgba(234,170,8,.06)':''}">`;
      h += `<td style="padding:5px 8px;font-family:var(--mono);white-space:nowrap">`;
      h += `<span style="color:${e.moved?'var(--ylw)':'var(--txt)'}">${fmtDate(e.date)}</span>`;
      if (live) h += ` <a href="#" onclick="event.preventDefault();${moveHandler}" title="Move date" style="color:var(--dim);text-decoration:none;margin-left:4px">📅</a>`;
      h += `</td>`;
      h += `<td style="padding:5px 8px">${e.label || ''}</td>`;
      h += `<td style="padding:5px 8px;color:var(--txt2);font-size:11px">${e.kind.replace(/_/g, ' ')}</td>`;
      h += `<td style="padding:5px 8px;text-align:right;font-family:var(--mono)" ${amountCls(e.amount)}>${amountSign(e.amount)}</td>`;
      h += `<td></td>`;
      h += '</tr>';
    });
    h += '</tbody></table></div></details>';
    h += `</div></div>`;
  });

  // ── Upcoming fixed-cost payments (with date-edit handles) ──
  const fcForward = (d.fixed_cost_events && d.fixed_cost_events.forward) || [];
  h += `<div class="sh">Upcoming Fixed Cost Payments · ${fcForward.length} events</div>`;
  h += '<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:0;overflow:hidden;margin-bottom:20px">';
  if (!fcForward.length) {
    h += '<div style="padding:12px;color:var(--dim)">No upcoming fixed-cost payments.</div>';
  } else {
    h += '<div style="overflow-x:auto;max-height:360px;overflow-y:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">';
    h += '<thead style="background:var(--raised);position:sticky;top:0;z-index:1"><tr style="text-align:left;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px">';
    h += '<th style="padding:8px">Date</th><th style="padding:8px">Item</th><th style="padding:8px">Category</th><th style="padding:8px">Frequency</th><th style="padding:8px;text-align:right">Amount</th>';
    h += '</tr></thead><tbody>';
    fcForward.forEach(e => {
      const moveHandler = `financeMoveDate(${JSON.stringify(e.source_id)}, ${JSON.stringify(e.date)}, ${JSON.stringify(e.original_date)}, ${JSON.stringify(e.label||'')})`;
      const freq = (e.meta && e.meta.frequency) || e.category || '—';
      h += `<tr style="border-top:1px solid rgba(33,39,47,.3);${e.moved?'background:rgba(234,170,8,.06)':''}">`;
      h += `<td style="padding:6px 8px;font-family:var(--mono);white-space:nowrap">`;
      h += `<span style="color:${e.moved?'var(--ylw)':'var(--txt)'}">${fmtDate(e.date)}</span>`;
      if (live) h += ` <a href="#" onclick="event.preventDefault();${moveHandler}" title="Move payment date" style="color:var(--dim);text-decoration:none;margin-left:4px">📅</a>`;
      if (e.moved) h += ` <span style="font-size:10px;color:var(--ylw)">moved</span>`;
      h += `</td>`;
      h += `<td style="padding:6px 8px">${e.label || ''}</td>`;
      h += `<td style="padding:6px 8px;color:var(--txt2);font-size:11px">${e.category || '—'}</td>`;
      h += `<td style="padding:6px 8px;color:var(--txt2);font-size:11px">${freq}</td>`;
      h += `<td style="padding:6px 8px;text-align:right;font-family:var(--mono);color:var(--red)">-${fmt(Math.abs(e.amount))}</td>`;
      h += '</tr>';

    h += '</tbody></table></div>';
  }
  h += '</div>';

  // ── Bank balance history ──
  h += '<div class="sh">Bank Balance History</div>';
  h += '<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:12px;overflow-x:auto">';
  if (!d.bank.history.length) {
    h += '<div style="color:var(--dim);font-size:13px">No snapshots yet.';
    if (live) h += ' Click <b>+ Balance</b> above to add one.';
    else h += ' Log one via <code>@jade log balance $X</code>.';
    h += '</div>';
  } else {
    h += '<table style="width:100%;border-collapse:collapse;font-size:13px">';
    h += '<thead><tr style="text-align:left;color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.5px">';
    h += '<th style="padding:4px 8px">Date</th><th style="padding:4px 8px">Account</th><th style="padding:4px 8px;text-align:right">Balance</th><th style="padding:4px 8px">Note</th><th style="padding:4px 8px;width:24px"></th>';
    h += '</tr></thead><tbody>';
    d.bank.history.forEach(r => {
      h += '<tr style="border-top:1px solid rgba(33,39,47,.3)">';
      h += `<td style="padding:6px 8px;font-family:var(--mono)">${r.date}</td>`;
      h += `<td style="padding:6px 8px;color:var(--txt2)">${r.account}</td>`;
      h += `<td style="padding:6px 8px;text-align:right;font-family:var(--mono);font-weight:600">${fmt(r.balance)}</td>`;
      h += `<td style="padding:6px 8px;color:var(--txt2)">${r.note || ''}</td>`;
      h += `<td style="padding:6px 8px;text-align:center">${live ? `<a href="#" onclick="event.preventDefault();financeVoidRow('bank_snapshot', ${r.id})" title="Void" style="color:var(--red);text-decoration:none">×</a>` : ''}</td>`;
      h += '</tr>';
    });
    h += '</tbody></table>';
  }
  h += '</div>';

  // ── Fixed costs by category (unchanged section) ──
  h += `<div class="sh">Fixed Costs by Category · ${fmtK(d.fixed_costs.total_monthly_equivalent)}/mo</div>`;
  d.fixed_costs.by_category.forEach(cat => {
    h += `<div class="pc sev-b" style="margin-bottom:8px">`;
    h += `<div class="ph" onclick="tog(this)">`;
    h += `<div><div class="pn">${cat.category}</div>`;
    h += `<div class="pp">${cat.count} items · ${fmtK(cat.total_monthly_equivalent)}/mo</div></div>`;
    h += `<div class="pt">${chvSvg()}</div></div>`;
    h += `<div class="pb"><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:8px">`;
    h += `<thead><tr style="text-align:left;color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.5px">`;
    h += `<th style="padding:4px 8px">Name</th><th style="padding:4px 8px;text-align:right">Amount</th><th style="padding:4px 8px">Frequency</th><th style="padding:4px 8px">Pay days</th><th style="padding:4px 8px;text-align:right">~Monthly</th>`;
    h += `</tr></thead><tbody>`;
    cat.items.forEach(it => {
      const days = [it.payment_day, it.payment_day_2].filter(x=>x!=null).join(', ') || '—';
      h += '<tr style="border-top:1px solid rgba(33,39,47,.3)">';
      h += `<td style="padding:5px 8px">${it.name}</td>`;
      h += `<td style="padding:5px 8px;text-align:right;font-family:var(--mono)">${fmt(it.amount)}</td>`;
      h += `<td style="padding:5px 8px;color:var(--txt2)">${it.frequency}</td>`;
      h += `<td style="padding:5px 8px;color:var(--txt2);font-family:var(--mono)">${days}</td>`;
      h += `<td style="padding:5px 8px;text-align:right;font-family:var(--mono);font-weight:600">${fmt(it.monthly_equivalent)}</td>`;
      h += '</tr>';
    });
    h += '</tbody></table></div></div></div>';
  });

  h += `<div class="ft">Generated ${d.generated_at} · Sources: JobTread (cashflow ${d.sources.cashflow_date || '—'}) + Google Sheet (fixed costs ${d.sources.fixed_costs_date || '—'}) + finance.db (SQLite)</div>`;

  c.innerHTML = h;
}

function mgmtGate(c) {
  if (sessionStorage.getItem('mgmt_auth')==='1') { loadAndRenderMgmt(c); return; }
  c.innerHTML = `<div class="pw-gate">
    <div class="pw-icon">▥</div>
    <div class="pw-title">Management — Restricted</div>
    <div class="pw-sub">Enter password to access.</div>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="off">
    <button class="pw-btn" id="pw-btn">Unlock</button>
    <div class="pw-deny" id="pw-deny" style="display:none">Access denied</div>
  </div>`;
  const inp=document.getElementById('pw-input'),btn=document.getElementById('pw-btn'),deny=document.getElementById('pw-deny');
  function tryPw(){
    if(inp.value===MGMT_PW){sessionStorage.setItem('mgmt_auth','1');loadAndRenderMgmt(c);}
    else{inp.classList.add('pw-err');deny.style.display='';setTimeout(()=>inp.classList.remove('pw-err'),400);}
  }
  btn.addEventListener('click',tryPw);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')tryPw();});
  setTimeout(()=>inp.focus(),50);
}

async function loadAndRenderMgmt(c) {
  c.innerHTML = '<div class="empty"><div class="empty-i">⏳</div><div class="empty-t">Loading Management...</div></div>';
  for (let i=0;i<7;i++){
    const d=new Date(Date.now()-i*86400000).toISOString().slice(0,10);
    try{const r=await fetch('data/management-'+d+'.json');if(!r.ok)continue;MGMT_DATA=await r.json();window._mgmtDataVersion=d+'_'+(MGMT_DATA.generated_at||'');renderMgmt(c);return;}catch(e){}
  }
  c.innerHTML='<div class="empty"><div class="empty-i">▥</div><div class="empty-t">No Management Data</div><div class="empty-d">Run generate_management_json.py</div></div>';
}

function renderMgmt(c) {
  const d = MGMT_DATA;
  const balance = parseFloat(localStorage.getItem('cf_balance')||'0');
  const projSet = new Set();
  (d.all_tasks||[]).forEach(t => { if(t.project) projSet.add(t.project); });
  const projects = [...projSet].sort();
  const projOpts = projects.map(p=>`<option value="${p}"${mgmtProjFilter===p?' selected':''}>${p}</option>`).join('');

  c.innerHTML = `
    <div class="page-title">Management</div>
    <div class="page-sub">All project payments + fixed costs · Data from ${d.date}</div>
    <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
      <div class="cf-balance-row" style="margin-bottom:0">
        <span class="cf-balance-label">Cash Position:</span>
        <input type="text" class="cf-balance-input" id="mgmt-bal" value="${balance?cfFmt2(balance):''}" placeholder="$0.00">
        <span class="cf-balance-saved" id="mgmt-saved" style="display:none">✓ Saved</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:12px;color:var(--txt2);font-weight:500">View from:</span>
        <input type="date" id="mgmt-from" value="${mgmtFromDate}" style="background:var(--card);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;padding:5px 8px;font-size:12px;font-family:var(--sans);cursor:pointer">
        <button id="mgmt-today" style="background:var(--card);color:var(--txt2);border:1px solid var(--bdr);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:var(--sans)">Today</button>
      </div>
      <select id="mgmt-proj" style="background:var(--card);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;padding:6px 10px;font-size:12px;font-family:var(--sans);min-width:160px;cursor:pointer">
        <option value="all"${mgmtProjFilter==='all'?' selected':''}>All Projects</option>${projOpts}
      </select>
      <button id="mgmt-fc-tog" style="background:${mgmtIncludeFixed?'rgba(129,140,248,.15)':'var(--card)'};color:${mgmtIncludeFixed?'#818cf8':'var(--dim)'};border:1px solid ${mgmtIncludeFixed?'rgba(129,140,248,.4)':'var(--bdr)'};border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:var(--sans);font-weight:600">
        ⚙ Fixed Costs: ${mgmtIncludeFixed?'ON':'OFF'}
      </button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px">
      <div id="mgmt-range" style="display:flex;gap:4px;flex-wrap:wrap"></div>
      <span style="color:var(--dim);font-size:11px">or</span>
      <span style="font-size:11px;color:var(--txt2)">to:</span>
      <input type="date" id="mgmt-to" value="" style="background:var(--card);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;padding:5px 8px;font-size:12px;font-family:var(--sans);cursor:pointer">
    </div>
    <div id="mgmt-stats"></div>
    <div id="mgmt-body"></div>`;

  // Range tabs
  const ranges = [{d:7,l:'1 Week'},{d:14,l:'2 Weeks'},{d:21,l:'3 Weeks'},{d:30,l:'1 Month'},{d:60,l:'2 Months'},{d:90,l:'3 Months'}];
  const rangeEl = document.getElementById('mgmt-range');
  ranges.forEach(r => {
    const b = document.createElement('button');
    b.className = 'cf-tt' + (mgmtDays===r.d?' on':'');
    b.textContent = r.l;
    b.addEventListener('click', () => {
      mgmtDays = r.d;
      mgmtCustomEnd = '';
      const toEl = document.getElementById('mgmt-to'); if(toEl) toEl.value='';
      rangeEl.querySelectorAll('.cf-tt').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      renderMgmtBody();
    });
    rangeEl.appendChild(b);
  });

  // Events
  document.getElementById('mgmt-bal').addEventListener('change', e => {
    const val=parseFloat(e.target.value.replace(/[^0-9.\-]/g,''))||0;
    localStorage.setItem('cf_balance',val.toString());
    e.target.value=cfFmt2(val);
    document.getElementById('mgmt-saved').style.display='';
    setTimeout(()=>document.getElementById('mgmt-saved').style.display='none',2000);
    renderMgmtBody();
  });
  document.getElementById('mgmt-from').addEventListener('change',e=>{mgmtFromDate=e.target.value;renderMgmtBody();});
  document.getElementById('mgmt-today').addEventListener('click',()=>{mgmtFromDate=new Date().toISOString().slice(0,10);document.getElementById('mgmt-from').value=mgmtFromDate;renderMgmtBody();});
  document.getElementById('mgmt-proj').addEventListener('change',e=>{mgmtProjFilter=e.target.value;renderMgmtBody();});

      document.querySelectorAll('#mgmt-range .cf-tt').forEach(b=>b.classList.remove('on'));

  renderMgmtBody();
