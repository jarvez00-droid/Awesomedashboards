<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AG Operations Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0B0E13;--raised:#111519;--card:#161B22;--card-h:#1C222B;
  --bdr:#21272F;--bdr-h:#2D3540;
  --txt:#E6EAF0;--txt2:#8B95A8;--dim:#555F70;
  --red:#F04438;--red-s:rgba(240,68,56,.1);--red-b:rgba(240,68,56,.25);
  --org:#F79009;--org-s:rgba(247,144,9,.1);--org-b:rgba(247,144,9,.25);
  --ylw:#EAAA08;--ylw-s:rgba(234,170,8,.1);--ylw-b:rgba(234,170,8,.25);
  --blu:#528BFF;--blu-s:rgba(82,139,255,.1);--blu-b:rgba(82,139,255,.25);
  --grn:#12B76A;--grn-s:rgba(18,183,106,.1);--grn-b:rgba(18,183,106,.25);
  --pur:#9B8AFB;--acc:#818CF8;
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;
  --r:8px;--rl:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);line-height:1.5;-webkit-font-smoothing:antialiased}

/* Top bar */
.top{position:sticky;top:0;background:var(--raised);border-bottom:1px solid var(--bdr);padding:12px 16px;z-index:100;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;background:linear-gradient(135deg,var(--acc),var(--pur));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:1px;color:#fff}
.brand-name{font-size:15px;font-weight:600}
.brand-sub{font-size:11px;color:var(--dim)}
.date-nav{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:2px}
.date-btn{width:28px;height:28px;border:none;background:none;color:var(--txt2);font-size:16px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center}
.date-btn:hover{background:var(--card-h);color:var(--txt)}
.date-txt{font-size:13px;font-weight:500;padding:0 8px;min-width:80px;text-align:center}

/* Nav tabs */
.nav{display:flex;gap:2px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;background:var(--raised);border-bottom:1px solid var(--bdr);position:sticky;top:58px;z-index:99}
.nav::-webkit-scrollbar{display:none}
.nav a{padding:8px 14px;font-size:13px;font-weight:500;color:var(--txt2);background:none;border:none;border-radius:6px;cursor:pointer;white-space:nowrap;text-decoration:none;transition:all .12s}
.nav a:hover{background:var(--card);color:var(--txt)}
.nav a.on{background:var(--blu);color:#fff}
.nav .cnt{font-family:var(--mono);font-size:11px;margin-left:3px;opacity:.7}

/* Main */
.main{max-width:1600px;margin:0 auto;padding:16px 32px;width:100%;box-sizing:border-box}
/* TV / smaller desktop: 1080p windowed or 720p */
@media(max-width:1400px){
  .main{padding:12px 12px;max-width:100%}
  body{font-size:13px}
  .page-title{font-size:18px!important}
  .page-sub{font-size:11px!important}
  .stats{grid-template-columns:repeat(3,1fr)!important;gap:6px!important}
  .st .n{font-size:18px!important}
  .st .l{font-size:10px!important}
  .cf-bk-grid4{grid-template-columns:repeat(2,1fr)!important}
  .cf-bk-grid5{grid-template-columns:repeat(3,1fr)!important}
  .sod-top-grid{grid-template-columns:1fr!important;gap:12px!important}
  .pn{font-size:14px!important}
  .pp{font-size:11px!important}
  .tg{font-size:9px!important;padding:1px 5px!important}
  .preview{gap:4px!important}
  .pv-head{font-size:9px!important}
  .pv-name{font-size:11px!important}
  .pv-sub{font-size:10px!important}
  .pv-item{font-size:11px!important}
  .tr{font-size:11px!important}
  .tsl{font-size:10px!important}
  .ph{padding:10px 12px!important}
  .pb{padding:0 12px 12px!important}
  .pc{margin-bottom:14px!important}
  .pmc{padding:8px 10px!important}
  .pmn{font-size:12px!important}
  .pmd{font-size:10px!important}
  .pmb{font-size:14px!important}
  .sh{font-size:13px!important}
  .top{padding:8px 12px!important}
  .brand-name{font-size:13px!important}
  .nav a{padding:6px 10px!important;font-size:12px!important}
}
/* Small screens: 720p TV or small laptop */
@media(max-width:1100px){
  .main{padding:8px 6px}
  body{font-size:12px}
  .stats{grid-template-columns:repeat(2,1fr)!important}
  .st .n{font-size:16px!important}
  .cf-bk-grid4{grid-template-columns:repeat(2,1fr)!important}
  .cf-bk-grid5{grid-template-columns:repeat(2,1fr)!important}
  .preview{grid-template-columns:repeat(2,1fr)!important}
  .pb-grid{grid-template-columns:1fr!important}
  .pb-3col{grid-template-columns:1fr 1fr!important}
  .pn{font-size:13px!important}
  .pc{margin-bottom:10px!important}
}
.page-title{font-size:22px;font-weight:700;margin-bottom:2px}
.page-sub{font-size:13px;color:var(--txt2);margin-bottom:20px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.st{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 6px;text-align:center;position:relative;overflow:hidden}
.st::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.st.r::before{background:var(--red)}.st.o::before{background:var(--org)}.st.b::before{background:var(--blu)}.st.y::before{background:var(--ylw)}.st.g::before{background:var(--dim)}
.st .n{font-family:var(--mono);font-size:20px;font-weight:700;line-height:1}
.st.r .n{color:var(--red)}.st.o .n{color:var(--org)}.st.b .n{color:var(--blu)}.st.y .n{color:var(--ylw)}.st.g .n{color:var(--txt2)}
.st .l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);margin-top:4px}

/* Alert */
.alert{background:var(--red-s);border:1px solid var(--red-b);border-radius:var(--r);padding:12px 14px;margin-bottom:16px;font-size:13px;display:flex;gap:8px;align-items:flex-start}
.alert b{color:var(--red)}

/* Filters */
.filters{display:flex;gap:4px;margin-bottom:14px}
.fb{padding:6px 12px;font-size:13px;font-weight:500;font-family:var(--sans);color:var(--txt2);background:none;border:1px solid var(--bdr);border-radius:6px;cursor:pointer;white-space:nowrap}
.fb:hover{background:var(--card);color:var(--txt)}.fb.on{background:var(--blu);color:#fff;border-color:var(--blu)}

/* Project card */
.pc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);margin-bottom:20px;overflow:hidden;transition:border-color .15s;border-left:4px solid var(--bdr)}
.pc.sev-r{border-left-color:var(--red);background:linear-gradient(135deg,rgba(240,68,56,.1) 0%,rgba(240,68,56,.03) 40%,var(--card) 100%)}
.pc.sev-o{border-left-color:var(--org);background:linear-gradient(135deg,rgba(247,144,9,.08) 0%,rgba(247,144,9,.02) 40%,var(--card) 100%)}
.pc.sev-b{border-left-color:var(--blu);background:linear-gradient(135deg,rgba(82,139,255,.07) 0%,rgba(82,139,255,.02) 40%,var(--card) 100%)}
.pc.sev-g{border-left-color:var(--grn);background:linear-gradient(135deg,rgba(18,183,106,.07) 0%,rgba(18,183,106,.02) 40%,var(--card) 100%)}
.pc:hover{border-color:var(--bdr-h)}.pc.sev-r:hover{border-left-color:var(--red)}.pc.sev-o:hover{border-left-color:var(--org)}.pc.sev-b:hover{border-left-color:var(--blu)}.pc.sev-g:hover{border-left-color:var(--grn)}
.ph{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;background:rgba(255,255,255,.02)}
.ph:hover{background:rgba(255,255,255,.04)}
.pn{font-size:16px;font-weight:600}
.pp{font-size:12px;color:var(--txt2);margin-top:1px}
.pt{display:flex;gap:4px;flex-shrink:0;align-items:center;flex-wrap:wrap}
.tg{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px}
.tg.r{background:var(--red-s);color:var(--red);border:1px solid var(--red-b)}
.tg.o{background:var(--org-s);color:var(--org);border:1px solid var(--org-b)}
.tg.b{background:var(--blu-s);color:var(--blu);border:1px solid var(--blu-b)}
.tg.y{background:var(--ylw-s);color:var(--ylw);border:1px solid var(--ylw-b)}
.tg.gr{background:var(--grn-s);color:var(--grn);border:1px solid var(--grn-b)}
.chv{width:14px;height:14px;color:var(--dim);transition:transform .2s;margin-left:4px;flex-shrink:0}
.pc.op .chv{transform:rotate(180deg)}
.pb{padding:0 14px 14px;display:none}
.pc.op .pb{display:block}

/* Preview - 3 columns visible on collapsed cards */
.preview{padding:10px 14px;border-top:1px solid rgba(33,39,47,.5);display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.pv-col{min-width:0}
.pv-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding-bottom:6px;margin-bottom:6px;border-bottom:1px solid var(--bdr)}
.pv-head.r{color:var(--red)}.pv-head.y{color:var(--ylw)}.pv-head.b{color:var(--blu)}
.pv-item{font-size:12px;padding:3px 0;display:flex;align-items:flex-start;gap:6px;line-height:1.4}
.pv-dot{width:5px;height:5px;border-radius:50%;margin-top:5px;flex-shrink:0}
.pv-dot.r{background:var(--red)}.pv-dot.y{background:var(--ylw)}.pv-dot.b{background:var(--blu)}
.pv-txt{flex:1;min-width:0}
.pv-name{color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pv-sub{font-size:11px;color:var(--txt2)}
.pv-sub.warn{color:var(--red)}
.pv-more{font-size:11px;color:var(--dim);padding:3px 0}
.pv-empty{font-size:11px;color:var(--dim);font-style:italic;padding:3px 0}
.pc.op .preview{display:none}

/* Expanded body - 2 columns */
.pb{padding:0 14px 14px;display:none}
.pc.op .pb{display:block}
.pb-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pb-full{grid-column:1/-1}
.pb-3col{display:grid;grid-template-columns:2fr 2fr 1fr;gap:16px}
.pb-3col .pay-side{background:rgba(129,140,248,.04);border:1px solid rgba(129,140,248,.15);border-radius:8px;padding:10px 12px}
.pb-3col .pay-side .tsl{color:#818cf8;border-bottom-color:rgba(129,140,248,.2)}
.pb-3col .pay-side .tr{border-bottom-color:rgba(129,140,248,.1)}
.pb-3col .pay-side .td{background:#818cf8}

@media(max-width:600px){
  .preview{grid-template-columns:1fr 1fr!important}
  .pb-grid{grid-template-columns:1fr}
  .pn{font-size:15px}
  .pc{margin-bottom:0;border-radius:8px}
  .pc+.pc{margin-top:20px;position:relative}
  .pc+.pc::before{content:'';position:absolute;top:-11px;left:10%;right:10%;height:2px;background:rgba(255,255,255,.08);border-radius:1px}
}

/* Task sections */
.ts{margin-bottom:10px}.ts:last-child{margin-bottom:0}
.tsl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:5px 0;margin-bottom:3px;border-bottom:1px solid var(--bdr)}
.tsl.lr{color:var(--red)}.tsl.ac{color:var(--blu)}.tsl.bl{color:var(--org)}.tsl.dt{color:var(--ylw)}.tsl.gp{color:var(--txt2)}

/* Task row */
.tr{display:flex;align-items:center;padding:4px 0;border-bottom:1px solid rgba(33,39,47,.3);font-size:12px;line-height:1.3}
.tr:last-child{border-bottom:none}
.td{width:5px;height:5px;border-radius:50%;margin-right:7px;flex-shrink:0}
.td.r{background:var(--red)}.td.o{background:var(--org)}.td.b{background:var(--blu)}.td.y{background:var(--ylw)}.td.g{background:var(--grn)}
.ti{flex:1;min-width:0;display:flex;align-items:baseline;gap:4px;overflow:hidden}
.tn{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1;min-width:0}
.tm{font-size:11px;color:var(--txt2);white-space:nowrap;flex-shrink:0}
.tb{font-size:11px;color:var(--org);padding:1px 0 1px 12px;opacity:.85}
.tw{font-family:var(--mono);font-size:11px;color:var(--txt);flex-shrink:0;margin-left:6px;text-align:right;white-space:nowrap}
.tw.ov{color:var(--red);font-weight:600}
.tr-bl{padding:0 0 4px 0;border-bottom:1px solid rgba(33,39,47,.3)}
.tr-bl:last-child{border-bottom:none}
.show-more{font-size:11px;color:var(--blu);cursor:pointer;padding:3px 0;user-select:none}
.show-more:hover{text-decoration:underline}
.nob{color:var(--red);font-weight:500;font-size:12px}

/* Gaps */
.gl{display:flex;gap:6px;flex-wrap:wrap;padding:6px 0}
.gt{font-size:11px;background:rgba(85,95,112,.12);border:1px solid rgba(85,95,112,.2);padding:2px 7px;border-radius:4px;color:var(--txt2)}

/* On track */
.otg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.oti{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 12px;font-size:13px}
.otc{color:var(--grn);font-weight:700;margin-right:6px}
.otn{font-size:10px;color:var(--dim)}

/* PM */
.pmr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.pmc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start}
.pmn{font-size:14px;font-weight:600}
.pmd{font-size:12px;color:var(--txt2);margin-top:3px;line-height:1.5}
.pmb{font-size:18px}

/* Section title */
.sh{font-size:15px;font-weight:600;margin:24px 0 4px;color:var(--txt2)}

/* Footer */
.ft{margin-top:32px;padding:16px 0;border-top:1px solid var(--bdr);text-align:center;font-size:11px;color:var(--dim)}

/* Placeholder */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;text-align:center}
.empty-i{font-size:40px;margin-bottom:12px;opacity:.3}
.empty-t{font-size:18px;font-weight:600;color:var(--txt2);margin-bottom:6px}
.empty-d{font-size:13px;color:var(--dim);max-width:360px}

@media(max-width:600px){
  .stats{grid-template-columns:repeat(3,1fr)!important}
  .otg,.pmr{grid-template-columns:1fr}
  .st .n{font-size:20px}
  .pn{font-size:13px}
}

/* Password gate */
.pw-gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;text-align:center}
.pw-gate .pw-icon{font-size:48px;margin-bottom:16px;opacity:.4}
.pw-gate .pw-title{font-size:20px;font-weight:600;color:var(--txt);margin-bottom:4px}
.pw-gate .pw-sub{font-size:13px;color:var(--dim);margin-bottom:20px}
.pw-gate input{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:10px 14px;font-size:14px;font-family:var(--sans);color:var(--txt);width:260px;text-align:center;outline:none;transition:border-color .15s}
.pw-gate input:focus{border-color:var(--blu)}
.pw-gate input.pw-err{border-color:var(--red);animation:shake .3s}
.pw-gate .pw-btn{margin-top:10px;padding:8px 28px;font-size:14px;font-weight:600;font-family:var(--sans);background:var(--blu);color:#fff;border:none;border-radius:6px;cursor:pointer;transition:opacity .15s}
.pw-gate .pw-btn:hover{opacity:.85}
.pw-gate .pw-deny{color:var(--red);font-size:13px;margin-top:10px;font-weight:500}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* Weekly page */
.wk-section{margin-bottom:24px}
.wk-section-title{font-size:15px;font-weight:600;color:var(--txt2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.wk-pm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:600px){.wk-pm-grid{grid-template-columns:1fr}}
.wk-pm-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;position:relative;overflow:hidden}
.wk-pm-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.wk-pm-card.imp::before{background:var(--grn)}.wk-pm-card.dec::before{background:var(--red)}.wk-pm-card.stb::before{background:var(--ylw)}
.wk-pm-name{font-size:14px;font-weight:600}
.wk-pm-detail{font-size:12px;color:var(--txt2);margin-top:3px;line-height:1.5}
.wk-pm-trend{position:absolute;top:12px;right:14px;font-size:16px}
.wk-drift-bar{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.wk-drift-item{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:8px 12px;font-size:13px;display:flex;justify-content:space-between;gap:12px;flex:1;min-width:200px}
.wk-drift-name{color:var(--txt)}.wk-drift-val{font-family:var(--mono);font-weight:600;color:var(--red)}
.wk-type-chips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.wk-chip{font-size:12px;font-weight:500;padding:4px 10px;border-radius:4px;font-family:var(--mono)}
.wk-chip.lm{background:var(--red-s);color:var(--red);border:1px solid var(--red-b)}
.wk-chip.rc{background:var(--org-s);color:var(--org);border:1px solid var(--org-b)}
.wk-chip.pr{background:var(--grn-s);color:var(--grn);border:1px solid var(--grn-b)}
.wk-chip.ca{background:var(--blu-s);color:var(--blu);border:1px solid var(--blu-b)}

/* Weekly sections */
.wk-zone{border-radius:var(--rl);padding:20px 16px;margin-bottom:4px}
.wk-zone.review{background:rgba(85,95,112,.06);border:1px solid rgba(85,95,112,.15)}
.wk-zone.forecast{background:rgba(82,139,255,.05);border:1px solid rgba(82,139,255,.15)}
.wk-zone-header{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.wk-zone-title{font-size:18px;font-weight:700}
.wk-zone.review .wk-zone-title{color:var(--txt2)}
.wk-zone.forecast .wk-zone-title{color:var(--blu)}
.wk-zone-dates{font-size:13px;font-family:var(--mono);font-weight:500}
.wk-zone.review .wk-zone-dates{color:var(--dim)}
.wk-zone.forecast .wk-zone-dates{color:var(--blu);opacity:.7}
.wk-zone-sub{font-size:12px;color:var(--dim);margin-bottom:16px}
.wk-divider{display:flex;align-items:center;gap:12px;margin:24px 0;padding:0 4px}
.wk-divider::before,.wk-divider::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,transparent,var(--blu),transparent)}
.wk-divider-label{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blu);white-space:nowrap}

/* Forecast table */
.fc-table{width:100%;border-collapse:collapse;font-size:12px}
.fc-table th{text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);padding:6px 8px;border-bottom:1px solid var(--bdr)}
.fc-table td{padding:5px 8px;border-bottom:1px solid rgba(33,39,47,.3);vertical-align:top}
.fc-risk{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;display:inline-block;min-width:48px;text-align:center}
.fc-risk.high{background:var(--red-s);color:var(--red);border:1px solid var(--red-b)}
.fc-risk.medium{background:var(--ylw-s);color:var(--ylw);border:1px solid var(--ylw-b)}
.fc-risk.low{background:var(--grn-s);color:var(--grn);border:1px solid var(--grn-b)}

/* Cash Flow */
.cf-balance-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.cf-balance-label{font-size:13px;font-weight:600;color:var(--txt2)}
.cf-balance-input{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:8px 12px;font-size:18px;font-family:var(--mono);font-weight:700;color:var(--grn);width:200px;outline:none;transition:border-color .15s}
.cf-balance-input:focus{border-color:var(--blu)}
.cf-balance-saved{font-size:11px;color:var(--dim);font-style:italic}
.cf-time-tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:2px;width:fit-content}

.cf-pay-amt{font-family:var(--mono);font-weight:600;white-space:nowrap}

.cf-pay-status.pending{background:var(--ylw-s);color:var(--ylw);border:1px solid var(--ylw-b)}

</style>
</head>
<body>

<div class="top">
  <div class="brand">
    <div class="logo">AG</div>
    <div>
      <div class="brand-name">Awesome Group</div>
      <div class="brand-sub">Operations Dashboard</div>
    </div>
  </div>
  <div class="date-nav">
    <button class="date-btn" id="prev-btn">‹</button>
    <span class="date-txt" id="date-display">Today</span>
    <button class="date-btn" id="next-btn">›</button>
  </div>
</div>

<div class="nav" id="main-nav">
  <a class="on" data-p="sod">☀ SOD</a>
  <a data-p="eod">🌙 EOD</a>
  <a data-p="projects">◧ Projects</a>
  <a data-p="weekly">▤ Weekly Forecast</a>
  <a data-p="cashflow">💰 Cash Flow</a>
  <a data-p="mgmt">▥ Management</a>
  <a data-p="archive">▦ Archive</a>
</div>

<div class="main" id="content"></div>

<script>
let DATA = {};

let curPage = 'sod';

document.getElementById('main-nav').addEventListener('click', e => {
  const a = e.target.closest('a[data-p]');
  if (!a) return;
  e.preventDefault();
  document.querySelectorAll('#main-nav a').forEach(x => x.classList.remove('on'));
  a.classList.add('on');
  curPage = a.dataset.p;
  render();
});

let EOD_DATA = null;
let WEEKLY_DATA = null;
const WEEKLY_PW = 'Thisisthepassword123!';
const MGMT_PW = 'Awesome';

function render() {
  const c = document.getElementById('content');
  if (curPage === 'sod') renderSOD(c);
  else if (curPage === 'eod') loadAndRenderEOD(c);
  else if (curPage === 'weekly') weeklyGate(c);
  else if (curPage === 'cashflow') cashflowGate(c);
  else if (curPage === 'mgmt') mgmtGate(c);
  else if (curPage === 'archive') renderArchive(c);
  else {
    const titles = {projects:'Project Dashboards'};
    const descs = {projects:'Live project status views. Coming soon.'};
    c.innerHTML = `<div class="empty"><div class="empty-i">📋</div><div class="empty-t">${titles[curPage]||'Coming Soon'}</div><div class="empty-d">${descs[curPage]||''}</div></div>`;
  }
}

function weeklyGate(c) {
  if (sessionStorage.getItem('wk_auth') === '1') {
    loadAndRenderWeekly(c);
    return;
  }
  c.innerHTML = `<div class="pw-gate">
    <div class="pw-icon">🔒</div>
    <div class="pw-title">Weekly Forecast — Management View</div>
    <div class="pw-sub">Enter password to access this report.</div>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="off">
    <button class="pw-btn" id="pw-btn">Unlock</button>
    <div class="pw-deny" id="pw-deny" style="display:none">Access denied</div>
  </div>`;
  const inp = document.getElementById('pw-input');
  const btn = document.getElementById('pw-btn');
  const deny = document.getElementById('pw-deny');
  function tryPw() {
    if (inp.value === WEEKLY_PW) {
      sessionStorage.setItem('wk_auth', '1');
      loadAndRenderWeekly(c);
    } else {
      inp.classList.add('pw-err');
      deny.style.display = '';
      setTimeout(() => inp.classList.remove('pw-err'), 400);
    }
  }
  btn.addEventListener('click', tryPw);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') tryPw(); });
  setTimeout(() => inp.focus(), 50);
}

async function loadAndRenderWeekly(c) {
  c.innerHTML = '<div class="empty"><div class="empty-i">⏳</div><div class="empty-t">Loading Weekly Forecast...</div></div>';
  // Try current ISO week, then previous week
  const now = new Date();
  const isoWeeks = [getISOWeek(now)];
  const prev = new Date(now.getTime() - 7 * 86400000);
  isoWeeks.push(getISOWeek(prev));
  for (const wk of isoWeeks) {
    try {
      const r = await fetch('data/weekly-' + wk + '.json');
      if (!r.ok) continue;
      WEEKLY_DATA = await r.json();
      renderWeekly(c);
      return;
    } catch(e) {}
  }
  c.innerHTML = '<div class="empty"><div class="empty-i">📊</div><div class="empty-t">No Weekly Forecast</div><div class="empty-d">The weekly report generates Monday at 7 AM.</div></div>';
}

function getISOWeek(d) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = dt.getUTCDay() || 7;
  dt.setUTCDate(dt.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((dt - yearStart) / 86400000) + 1) / 7);
  return dt.getUTCFullYear() + '-W' + String(weekNo).padStart(2, '0');
}

function renderWeekly(c) {
  const w = WEEKLY_DATA;
  const s = w.summary;
  const drift = w.schedule_drift;

  // Compute date ranges
  // Review = the week period from the data
  const reviewPeriod = w.period; // e.g. "Mar 23 - Mar 28, 2026"

  // Forecast = next 2 weeks from today
  const now = new Date();
  const fc1 = new Date(now.getTime() + 86400000);
  const fc2 = new Date(now.getTime() + 14 * 86400000);
  const forecastPeriod = MONTHS[fc1.getMonth()] + ' ' + fc1.getDate() + ' - ' + MONTHS[fc2.getMonth()] + ' ' + fc2.getDate() + ', ' + fc2.getFullYear();

  // Overdue trend
  const ovDelta = s.total_overdue_end - s.total_overdue_start;
  const ovTrend = ovDelta > 0 ? `↑ ${ovDelta}` : ovDelta < 0 ? `↓ ${Math.abs(ovDelta)}` : '→ 0';
  const ovColor = ovDelta > 0 ? 'var(--red)' : ovDelta < 0 ? 'var(--grn)' : 'var(--ylw)';

  let h = `
    <div class="page-title">Weekly Forecast — Management View</div>
    <div class="page-sub">${w.week}</div>

    <!-- ═══ WEEK IN REVIEW ═══ -->
    <div class="wk-zone review">
      <div class="wk-zone-header">
        <div class="wk-zone-title">📋 WEEK IN REVIEW</div>
        <div class="wk-zone-dates">${reviewPeriod}</div>
      </div>
      <div class="wk-zone-sub">What happened this week — completions, issues, schedule changes, PM performance</div>

    <div class="stats" style="grid-template-columns:repeat(5,1fr)">
      <div class="st g"><div class="n">${s.tasks_completed}</div><div class="l">Completed</div></div>
      <div class="st ${s.on_time_rate >= 0.7 ? 'g' : s.on_time_rate >= 0.4 ? 'y' : 'r'}"><div class="n">${Math.round(s.on_time_rate * 100)}%</div><div class="l">On Time</div></div>
      <div class="st r"><div class="n">${s.total_overdue_end}</div><div class="l">Overdue Now</div></div>
      <div class="st o"><div class="n" style="font-size:16px;color:${ovColor}">${ovTrend}</div><div class="l">Overdue Δ</div></div>
      <div class="st y"><div class="n">${s.net_drift_days}d</div><div class="l">Net Drift</div></div>
    </div>`;

  // ── PM Performance ────────────────────────────
  h += '<div class="wk-section"><div class="wk-section-title">PM Performance</div><div class="wk-pm-grid">';
  w.pm_performance.forEach(pm => {
    const tIcon = pm.trend === 'improving' ? '📈' : pm.trend === 'declining' ? '📉' : '➡️';
    const cls = pm.trend === 'improving' ? 'imp' : pm.trend === 'declining' ? 'dec' : 'stb';
    const otRate = pm.completed > 0 ? Math.round(pm.on_time / pm.completed * 100) + '%' : '—';
    h += `<div class="wk-pm-card ${cls}">
      <div class="wk-pm-trend">${tIcon}</div>
      <div class="wk-pm-name">${pm.name}</div>
      <div class="wk-pm-detail">
        ${pm.completed} completed (${otRate} on time) · ${pm.late} late${pm.avg_days_late > 0 ? ` (avg ${pm.avg_days_late}d)` : ''}<br>
        Overdue: ${pm.overdue_start_of_week} → ${pm.overdue_end_of_week}<br>
        ${pm.direct_changes} schedule changes · ${pm.last_minute} last-minute<br>
        ${pm.projects.length} project${pm.projects.length !== 1 ? 's' : ''}: ${pm.projects.join(', ')}
      </div></div>`;
  });
  h += '</div></div>';

  // ── Review: Project Summary (completions, overdue, changes) ──
  const reviewProjs = w.projects.filter(p => p.completed_this_week.length || p.still_overdue.length || p.schedule_changes.length);
  const reviewOk = w.projects.filter(p => !p.completed_this_week.length && !p.still_overdue.length && !p.schedule_changes.length);

  if (reviewProjs.length) {
    h += '<div class="wk-section"><div class="wk-section-title">Project Summary</div>';
    reviewProjs.forEach(p => { h += buildReviewCard(p); });
    if (reviewOk.length) {
      h += `<div style="margin-top:12px;font-size:13px;font-weight:600;color:var(--grn);margin-bottom:6px">✅ No changes this week (${reviewOk.length} projects)</div>`;
      reviewOk.forEach(p => {
        h += `<div style="font-size:12px;padding:4px 0;color:var(--dim)">${p.name} — ${p.pm !== 'UNMANAGED' ? p.pm : 'No PM'}</div>`;
      });
    }
    h += '</div>';
  }

  // ── Schedule Drift ────────────────────────────
  h += '<div class="wk-section"><div class="wk-section-title">Schedule Drift</div>';
  h += `<div style="font-size:14px;margin-bottom:8px"><span style="font-family:var(--mono);font-weight:700;color:var(--txt)">${drift.total_changes}</span> <span style="color:var(--txt2)">total changes this week</span></div>`;
  h += '<div class="wk-type-chips">';
  if (drift.by_type.last_minute) h += `<span class="wk-chip lm">${drift.by_type.last_minute} last-minute</span>`;
  if (drift.by_type.reactive) h += `<span class="wk-chip rc">${drift.by_type.reactive} reactive</span>`;
  if (drift.by_type.proactive) h += `<span class="wk-chip pr">${drift.by_type.proactive} proactive</span>`;
  if (drift.by_type.cascade) h += `<span class="wk-chip ca">${drift.by_type.cascade} cascade</span>`;
  h += '</div>';
  if (drift.worst_projects.length) {
    h += '<div style="margin-top:12px;font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:6px">Biggest drifters</div><div class="wk-drift-bar" style="flex-direction:column">';
    drift.worst_projects.forEach(wp => {
      h += `<div class="wk-drift-item"><span class="wk-drift-name">${wp.name}</span><span class="wk-drift-val">${wp.drift}</span></div>`;
    });
    h += '</div>';
  }
  h += '</div>';

  // Close REVIEW zone
  h += '</div>';

  // ═══ DIVIDER ═══
  h += '<div class="wk-divider"><span class="wk-divider-label">🔭 LOOKING AHEAD</span></div>';

  // ═══ FORECAST ZONE ═══
  h += `<div class="wk-zone forecast">
    <div class="wk-zone-header">
      <div class="wk-zone-title">📅 FORECAST</div>
      <div class="wk-zone-dates">${forecastPeriod}</div>
    </div>
    <div class="wk-zone-sub">What's coming — upcoming tasks, risk assessment, projected blockers</div>`;

  // Forecast stats
  const totalForecast = w.projects.reduce((sum, p) => sum + p.forecast_next_2_weeks.length, 0);
  const highRisk = w.projects.reduce((sum, p) => sum + p.forecast_next_2_weeks.filter(f => f.risk === 'high').length, 0);
  const medRisk = w.projects.reduce((sum, p) => sum + p.forecast_next_2_weeks.filter(f => f.risk === 'medium').length, 0);
  const lowRisk = w.projects.reduce((sum, p) => sum + p.forecast_next_2_weeks.filter(f => f.risk === 'low').length, 0);

  h += `<div class="stats" style="grid-template-columns:repeat(4,1fr)">
    <div class="st b"><div class="n">${totalForecast}</div><div class="l">Tasks Due</div></div>
    <div class="st r"><div class="n">${highRisk}</div><div class="l">High Risk</div></div>
    <div class="st y"><div class="n">${medRisk}</div><div class="l">Medium Risk</div></div>
    <div class="st g"><div class="n">${lowRisk}</div><div class="l">Low Risk</div></div>
  </div>`;

  // Forecast per project
  const fcProjs = w.projects.filter(p => p.forecast_next_2_weeks.length > 0);
  const fcNone = w.projects.filter(p => p.forecast_next_2_weeks.length === 0);

  fcProjs.sort((a, b) => {
    const aH = a.forecast_next_2_weeks.filter(f => f.risk === 'high').length;
    const bH = b.forecast_next_2_weeks.filter(f => f.risk === 'high').length;
    return bH - aH || b.forecast_next_2_weeks.length - a.forecast_next_2_weeks.length;
  });

  fcProjs.forEach(p => { h += buildForecastCard(p); });

  if (fcNone.length) {
    h += `<div style="margin-top:12px;font-size:13px;font-weight:600;color:var(--dim);margin-bottom:6px">No tasks due in 14 days (${fcNone.length} projects)</div>`;
    fcNone.forEach(p => {
      h += `<div style="font-size:12px;padding:4px 0;color:var(--dim)">${p.name} — ${p.pm !== 'UNMANAGED' ? p.pm : 'No PM'}</div>`;
    });
  }

  // Close FORECAST zone
  h += '</div>';

  h += '<div class="ft">Generated by Jade · Awesome Group · Weekly Forecast — Management View</div>';
  c.innerHTML = h;
}

// ── Review card (completions + overdue + changes, NO forecast) ──
function buildReviewCard(p) {
  let tags = '';
  if (p.completed_this_week.length) tags += `<span class="tg gr">${p.completed_this_week.length} done</span>`;
  if (p.still_overdue.length) tags += `<span class="tg r">${p.still_overdue.length} overdue</span>`;
  if (p.drift_days) tags += `<span class="tg ${p.drift_days > 0 ? 'o' : 'gr'}">${p.drift_days > 0 ? '+' : ''}${p.drift_days}d drift</span>`;
  if (p.schedule_changes.length) tags += `<span class="tg b">${p.schedule_changes.length} changes</span>`;

  const sev = p.still_overdue.length ? 'sev-r' : p.schedule_changes.length ? 'sev-o' : 'sev-g';

  let body = '<div style="border-top:1px solid var(--bdr);margin-bottom:10px"></div>';
  if (p.week_summary) {
    body += `<div style="font-size:13px;color:var(--txt);margin-bottom:12px;padding:8px 12px;background:var(--bg);border-radius:6px;border-left:3px solid var(--dim);line-height:1.5">${p.week_summary}</div>`;
  }
  body += '<div class="pb-grid"><div>';
  if (p.completed_this_week.length) {
    body += '<div class="ts"><div class="tsl" style="color:var(--grn)">✅ Completed</div>';
    p.completed_this_week.forEach(t => { body += `<div class="tr"><div class="td g"></div><div class="ti"><div class="tn">${t}</div></div></div>`; });
    body += '</div>';
  }
  if (p.still_overdue.length) {
    body += '<div class="ts"><div class="tsl lr">Still Overdue</div>';
    p.still_overdue.forEach(t => { body += `<div class="tr"><div class="td r"></div><div class="ti"><div class="tn">${t}</div></div></div>`; });
    body += '</div>';
  }
  body += '</div><div>';
  if (p.schedule_changes.length) {
    body += '<div class="ts"><div class="tsl" style="color:var(--org)">Schedule Changes</div>';
    p.schedule_changes.slice(0, 8).forEach(ch => {
      const clr = ch.type === 'last-minute' ? 'r' : ch.type === 'reactive' ? 'o' : ch.type === 'proactive' ? 'g' : 'b';
      body += `<div class="tr"><div class="td ${clr}"></div><div class="ti"><div class="tn">${ch.task}</div></div><div class="tw${ch.shift.startsWith('+') ? ' ov' : ''}">${ch.shift}</div></div>`;
    });
    if (p.schedule_changes.length > 8) body += `<div class="show-more">+ ${p.schedule_changes.length - 8} more</div>`;
    body += '</div>';
  }
  body += '</div></div>';

  return `<div class="pc ${sev}" style="margin-bottom:8px"><div class="ph" onclick="tog(this)"><div>
    <div class="pn">${p.name}</div>
    <div class="pp">${p.pm !== 'UNMANAGED' ? 'PM: ' + p.pm : '<span class="nob">⚠ No PM</span>'}</div></div>
    <div class="pt">${tags}${chvSvg()}</div></div>
    <div class="pb">${body}</div></div>`;
}

// ── Forecast card (upcoming tasks + risk, NO history) ──
function buildForecastCard(p) {
  const highCount = p.forecast_next_2_weeks.filter(f => f.risk === 'high').length;
  const medCount = p.forecast_next_2_weeks.filter(f => f.risk === 'medium').length;
  let tags = '';
  if (highCount) tags += `<span class="tg r">${highCount} high risk</span>`;
  if (medCount) tags += `<span class="tg y">${medCount} medium</span>`;
  tags += `<span class="tg b">${p.forecast_next_2_weeks.length} tasks</span>`;

  const sev = highCount ? 'sev-r' : medCount ? 'sev-o' : 'sev-g';

  let body = `<div style="border-top:1px solid var(--bdr);margin-bottom:10px"></div>
    <table class="fc-table"><thead><tr><th>Task</th><th>Due</th><th>Risk</th><th>Note</th></tr></thead><tbody>`;
  p.forecast_next_2_weeks.forEach(f => {
    body += `<tr><td style="font-weight:500">${f.task}</td><td style="white-space:nowrap;font-family:var(--mono)">${f.due}</td><td><span class="fc-risk ${f.risk}">${f.risk.toUpperCase()}</span></td><td style="color:var(--txt2);font-size:11px">${f.note}</td></tr>`;
  });
  body += '</tbody></table>';

  return `<div class="pc ${sev}" style="margin-bottom:8px"><div class="ph" onclick="tog(this)"><div>
    <div class="pn">${p.name}</div>
    <div class="pp">${p.pm !== 'UNMANAGED' ? 'PM: ' + p.pm : '<span class="nob">⚠ No PM</span>'}</div></div>
    <div class="pt">${tags}${chvSvg()}</div></div>
    <div class="pb">${body}</div></div>`;
}

// ═══════════════════════════════════════════
// CASH FLOW
// ═══════════════════════════════════════════
let CF_DATA = null;
let cfFromDate = new Date().toISOString().slice(0, 10); // "view from" date for cashflow
let cfDays = 7;

function cashflowGate(c) {
  if (sessionStorage.getItem('wk_auth') === '1') {
    loadAndRenderCashflow(c);
    return;
  }
  c.innerHTML = `<div class="pw-gate">
    <div class="pw-icon">💰</div>
    <div class="pw-title">Cash Flow — Management View</div>
    <div class="pw-sub">Enter password to access this report.</div>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="off">
    <button class="pw-btn" id="pw-btn">Unlock</button>
    <div class="pw-deny" id="pw-deny" style="display:none">Access denied</div>
  </div>`;
  const inp = document.getElementById('pw-input');
  const btn = document.getElementById('pw-btn');
  const deny = document.getElementById('pw-deny');
  function tryPw() {
    if (inp.value === WEEKLY_PW) {
      sessionStorage.setItem('wk_auth', '1');
      loadAndRenderCashflow(c);
    } else {
      inp.classList.add('pw-err');
      deny.style.display = '';
      setTimeout(() => inp.classList.remove('pw-err'), 400);
    }
  }
  btn.addEventListener('click', tryPw);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') tryPw(); });
  setTimeout(() => inp.focus(), 50);
}

async function loadAndRenderCashflow(c) {
  c.innerHTML = '<div class="empty"><div class="empty-i">⏳</div><div class="empty-t">Loading Cash Flow...</div></div>';
  const today = new Date().toISOString().slice(0, 10);
  // Try today, then walk back up to 7 days to find the latest data file
  for (let i = 0; i < 7; i++) {
    const d = new Date(Date.now() - i * 86400000).toISOString().slice(0, 10);
    try {
      const r = await fetch('data/cashflow-' + d + '.json');
      if (!r.ok) continue;
      CF_DATA = await r.json();
      renderCashflow(c);
      return;
    } catch(e) {}
  }
  c.innerHTML = '<div class="empty"><div class="empty-i">💰</div><div class="empty-t">No Cash Flow Data</div><div class="empty-d">Run generate_cashflow_json.py to generate cash flow data.</div></div>';
}

function cfFmt(n) {
  if (n === 0) return '$0';
  const abs = Math.abs(n);
  const s = abs >= 1000 ? '$' + abs.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0}) : '$' + abs.toFixed(0);
  return n < 0 ? '-' + s : s;
}
function cfFmt2(n) {
  const abs = Math.abs(n);
  const s = '$' + abs.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  return n < 0 ? '-' + s : s;
}
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function cfWeekRange(mondayStr) {
  const m = new Date(mondayStr + 'T12:00:00');
  const s = new Date(m); s.setDate(m.getDate() + 6);
  return MONTHS[m.getMonth()] + ' ' + m.getDate() + ' (' + DAYS[m.getDay()] + ') — ' +
         MONTHS[s.getMonth()] + ' ' + s.getDate() + ' (' + DAYS[s.getDay()] + ')';
}
function cfGetMonday(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1) - day;
  const m = new Date(d); m.setDate(d.getDate() + diff);
  return m.toISOString().slice(0,10);
}
