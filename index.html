<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AG Operations Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0B0E13;--raised:#111519;--card:#161B22;--card-h:#1C222B;
  --bdr:#21272F;--bdr-h:#2D3540;
  --txt:#E6EAF0;--txt2:#8B95A8;--dim:#555F70;
  --red:#F04438;--red-s:rgba(240,68,56,.1);--red-b:rgba(240,68,56,.25);
  --org:#F79009;--org-s:rgba(247,144,9,.1);--org-b:rgba(247,144,9,.25);
  --ylw:#EAAA08;--ylw-s:rgba(234,170,8,.1);--ylw-b:rgba(234,170,8,.25);
  --blu:#528BFF;--blu-s:rgba(82,139,255,.1);--blu-b:rgba(82,139,255,.25);
  --grn:#12B76A;--grn-s:rgba(18,183,106,.1);--grn-b:rgba(18,183,106,.25);
  --pur:#9B8AFB;--acc:#818CF8;
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;
  --r:8px;--rl:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);line-height:1.5;-webkit-font-smoothing:antialiased}

/* Top bar */
.top{position:sticky;top:0;background:var(--raised);border-bottom:1px solid var(--bdr);padding:12px 16px;z-index:100;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;background:linear-gradient(135deg,var(--acc),var(--pur));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:1px;color:#fff}
.brand-name{font-size:15px;font-weight:600}
.brand-sub{font-size:11px;color:var(--dim)}
.date-nav{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:2px}
.date-btn{width:28px;height:28px;border:none;background:none;color:var(--txt2);font-size:16px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center}
.date-btn:hover{background:var(--card-h);color:var(--txt)}
.date-txt{font-size:13px;font-weight:500;padding:0 8px;min-width:80px;text-align:center}

/* Nav tabs */
.nav{display:flex;gap:2px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;background:var(--raised);border-bottom:1px solid var(--bdr);position:sticky;top:58px;z-index:99}
.nav::-webkit-scrollbar{display:none}
.nav a{padding:8px 14px;font-size:13px;font-weight:500;color:var(--txt2);background:none;border:none;border-radius:6px;cursor:pointer;white-space:nowrap;text-decoration:none;transition:all .12s}
.nav a:hover{background:var(--card);color:var(--txt)}
.nav a.on{background:var(--blu);color:#fff}
.nav .cnt{font-family:var(--mono);font-size:11px;margin-left:3px;opacity:.7}

/* Main */
.main{max-width:760px;margin:0 auto;padding:16px}
.page-title{font-size:22px;font-weight:700;margin-bottom:2px}
.page-sub{font-size:13px;color:var(--txt2);margin-bottom:20px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.st{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:12px;text-align:center;position:relative;overflow:hidden}
.st::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.st.r::before{background:var(--red)}.st.o::before{background:var(--org)}.st.b::before{background:var(--blu)}.st.y::before{background:var(--ylw)}.st.g::before{background:var(--dim)}
.st .n{font-family:var(--mono);font-size:24px;font-weight:700;line-height:1}
.st.r .n{color:var(--red)}.st.o .n{color:var(--org)}.st.b .n{color:var(--blu)}.st.y .n{color:var(--ylw)}.st.g .n{color:var(--txt2)}
.st .l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);margin-top:4px}

/* Alert */
.alert{background:var(--red-s);border:1px solid var(--red-b);border-radius:var(--r);padding:12px 14px;margin-bottom:16px;font-size:13px;display:flex;gap:8px;align-items:flex-start}
.alert b{color:var(--red)}

/* Filters */
.filters{display:flex;gap:4px;margin-bottom:14px}
.fb{padding:6px 12px;font-size:13px;font-weight:500;font-family:var(--sans);color:var(--txt2);background:none;border:1px solid var(--bdr);border-radius:6px;cursor:pointer;white-space:nowrap}
.fb:hover{background:var(--card);color:var(--txt)}.fb.on{background:var(--blu);color:#fff;border-color:var(--blu)}

/* Project card */
.pc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.pc:hover{border-color:var(--bdr-h)}
.ph{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.ph:hover{background:var(--card-h)}
.pn{font-size:14px;font-weight:600}
.pp{font-size:12px;color:var(--txt2);margin-top:1px}
.pt{display:flex;gap:4px;flex-shrink:0;align-items:center;flex-wrap:wrap}
.tg{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px}
.tg.r{background:var(--red-s);color:var(--red);border:1px solid var(--red-b)}
.tg.o{background:var(--org-s);color:var(--org);border:1px solid var(--org-b)}
.tg.b{background:var(--blu-s);color:var(--blu);border:1px solid var(--blu-b)}
.tg.y{background:var(--ylw-s);color:var(--ylw);border:1px solid var(--ylw-b)}
.tg.gr{background:var(--grn-s);color:var(--grn);border:1px solid var(--grn-b)}
.chv{width:14px;height:14px;color:var(--dim);transition:transform .2s;margin-left:4px;flex-shrink:0}
.pc.op .chv{transform:rotate(180deg)}
.pb{padding:0 14px 14px;display:none}
.pc.op .pb{display:block}

/* Preview - 3 columns visible on collapsed cards */
.preview{padding:10px 14px;border-top:1px solid rgba(33,39,47,.5);display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.pv-col{min-width:0}
.pv-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding-bottom:6px;margin-bottom:6px;border-bottom:1px solid var(--bdr)}
.pv-head.r{color:var(--red)}.pv-head.y{color:var(--ylw)}.pv-head.b{color:var(--blu)}
.pv-item{font-size:12px;padding:3px 0;display:flex;align-items:flex-start;gap:6px;line-height:1.4}
.pv-dot{width:5px;height:5px;border-radius:50%;margin-top:5px;flex-shrink:0}
.pv-dot.r{background:var(--red)}.pv-dot.y{background:var(--ylw)}.pv-dot.b{background:var(--blu)}
.pv-txt{flex:1;min-width:0}
.pv-name{color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pv-sub{font-size:11px;color:var(--txt2)}
.pv-sub.warn{color:var(--red)}
.pv-more{font-size:11px;color:var(--dim);padding:3px 0}
.pv-empty{font-size:11px;color:var(--dim);font-style:italic;padding:3px 0}
.pc.op .preview{display:none}

/* Expanded body - 2 columns */
.pb{padding:0 14px 14px;display:none}
.pc.op .pb{display:block}
.pb-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pb-full{grid-column:1/-1}

@media(max-width:600px){
  .preview{grid-template-columns:1fr}
  .pb-grid{grid-template-columns:1fr}
}

/* Task sections */
.ts{margin-bottom:10px}.ts:last-child{margin-bottom:0}
.tsl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:5px 0;margin-bottom:3px;border-bottom:1px solid var(--bdr)}
.tsl.lr{color:var(--red)}.tsl.ac{color:var(--blu)}.tsl.bl{color:var(--org)}.tsl.dt{color:var(--ylw)}.tsl.gp{color:var(--txt2)}

/* Task row */
.tr{display:flex;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(33,39,47,.5);font-size:13px}
.tr:last-child{border-bottom:none}
.td{width:7px;height:7px;border-radius:50%;margin-top:6px;margin-right:9px;flex-shrink:0}
.td.r{background:var(--red)}.td.o{background:var(--org)}.td.b{background:var(--blu)}.td.y{background:var(--ylw)}
.ti{flex:1;min-width:0}
.tn{font-weight:500;word-wrap:break-word}
.tm{font-size:12px;color:var(--txt2);margin-top:1px}
.tb{font-size:11px;color:var(--org);margin-top:3px;padding-left:16px;opacity:.85}
.tw{font-family:var(--mono);font-size:12px;color:var(--txt);flex-shrink:0;margin-left:10px;text-align:right}
.tw.ov{color:var(--red);font-weight:600}
.nob{color:var(--red);font-weight:500;font-size:12px}

/* Gaps */
.gl{display:flex;gap:6px;flex-wrap:wrap;padding:6px 0}
.gt{font-size:11px;background:rgba(85,95,112,.12);border:1px solid rgba(85,95,112,.2);padding:2px 7px;border-radius:4px;color:var(--txt2)}

/* On track */
.otg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.oti{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 12px;font-size:13px}
.otc{color:var(--grn);font-weight:700;margin-right:6px}
.otn{font-size:10px;color:var(--dim)}

/* PM */
.pmr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.pmc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start}
.pmn{font-size:14px;font-weight:600}
.pmd{font-size:12px;color:var(--txt2);margin-top:3px;line-height:1.5}
.pmb{font-size:18px}

/* Section title */
.sh{font-size:15px;font-weight:600;margin:24px 0 4px;color:var(--txt2)}

/* Footer */
.ft{margin-top:32px;padding:16px 0;border-top:1px solid var(--bdr);text-align:center;font-size:11px;color:var(--dim)}

/* Placeholder */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;text-align:center}
.empty-i{font-size:40px;margin-bottom:12px;opacity:.3}
.empty-t{font-size:18px;font-weight:600;color:var(--txt2);margin-bottom:6px}
.empty-d{font-size:13px;color:var(--dim);max-width:360px}

@media(max-width:600px){
  .stats{grid-template-columns:repeat(3,1fr)}
  .otg,.pmr{grid-template-columns:1fr}
  .st .n{font-size:20px}
  .pn{font-size:13px}
}
</style>
</head>
<body>

<div class="top">
  <div class="brand">
    <div class="logo">AG</div>
    <div>
      <div class="brand-name">Awesome Group</div>
      <div class="brand-sub">Operations Dashboard</div>
    </div>
  </div>
  <div class="date-nav">
    <button class="date-btn" id="prev-btn">‹</button>
    <span class="date-txt" id="date-display">Today</span>
    <button class="date-btn" id="next-btn">›</button>
  </div>
</div>

<div class="nav" id="main-nav">
  <a class="on" data-p="sod">☀ SOD</a>
  <a data-p="eod">🌙 EOD</a>
  <a data-p="projects">◧ Projects</a>
  <a data-p="weekly">▤ Weekly</a>
  <a data-p="mgmt">▥ Management</a>
  <a data-p="archive">▦ Archive</a>
</div>

<div class="main" id="content"></div>

<script>
let DATA = {};

let curPage = 'sod';

document.getElementById('main-nav').addEventListener('click', e => {
  const a = e.target.closest('a[data-p]');
  if (!a) return;
  e.preventDefault();
  document.querySelectorAll('#main-nav a').forEach(x => x.classList.remove('on'));
  a.classList.add('on');
  curPage = a.dataset.p;
  render();
});

function render() {
  const c = document.getElementById('content');
  if (curPage === 'sod') renderSOD(c);
  else if (curPage === 'archive') renderArchive(c);
  else {
    const titles = {eod:'EOD Report',projects:'Project Dashboards',weekly:'Weekly Report',mgmt:'EOD Management'};
    const descs = {eod:'End of day wrap-up with completions and tomorrow preview.',projects:'Live project status views. Coming soon.',weekly:'Full week deep-dive. First report generates next Monday.',mgmt:'Executive snapshot for the owner.'};
    c.innerHTML = `<div class="empty"><div class="empty-i">📋</div><div class="empty-t">${titles[curPage]||'Coming Soon'}</div><div class="empty-d">${descs[curPage]||''}</div></div>`;
  }
}

function renderSOD(c) {
  const s = DATA.summary;
  const ps = DATA.projects;
  const issues = ps.filter(p => p.st === 'issue');
  const ok = ps.filter(p => p.st === 'ok');

  let h = `
    <div class="page-title">Schedule Check</div>
    <div class="page-sub">SOD Report · ${(() => { const d = new Date(DATA.date + 'T12:00:00'); const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']; return days[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear(); })() } · 7:00 AM</div>
    <div class="stats">
      <div class="st r"><div class="n">${s.overdue}</div><div class="l">Overdue</div></div>
      <div class="st o"><div class="n">${s.blocked}</div><div class="l">Blocked</div></div>
      <div class="st b"><div class="n">${s.active}</div><div class="l">Active</div></div>
      <div class="st y"><div class="n">${s.due_tomorrow}</div><div class="l">Due Tmr</div></div>
      <div class="st g"><div class="n">${s.role_gaps}</div><div class="l">Gaps</div></div>
    </div>
    <div class="alert"><span>⚠</span><div><b>Top concern:</b> ${s.concern}</div></div>
    <div class="filters">
      <button class="fb on" onclick="filt('all',this)">All <span class="cnt">${ps.length}</span></button>
      <button class="fb" onclick="filt('issue',this)">Issues <span class="cnt">${issues.length}</span></button>
      <button class="fb" onclick="filt('ok',this)">On Track <span class="cnt">${ok.length}</span></button>
    </div>
    <div id="plist">`;

  issues.forEach((p, i) => { h += projCard(p, i === 0); });

  if (ok.length) {
    h += `<div class="pc" data-st="ok"><div class="ph" onclick="tog(this)"><div>
      <div class="pn" style="color:var(--grn)">✓ On Track</div>
      <div class="pp">${ok.length} projects with no issues</div></div>
      <div class="pt"><span class="tg gr">${ok.length} clean</span>${chvSvg()}</div></div>
      <div class="pb"><div class="otg">${ok.map(p => `<div class="oti"><span class="otc">✓</span>${p.name}${!p.pm ? '<div class="otn">No PM assigned</div>' : ''}</div>`).join('')}</div></div></div>`;
  }

  h += '</div>';

  h += '<div class="sh">PM Snapshot</div><div class="pmr">';
  DATA.pms.forEach(pm => {
    const badge = pm.ind === 'clean' ? '✅' : pm.ind === 'green' ? '🟢' : pm.ind === 'yellow' ? '🟡' : '🔴';
    h += `<div class="pmc"><div><div class="pmn">${pm.name}</div><div class="pmd">${pm.ov} overdue / ${pm.act} active<br>${pm.proj} project${pm.proj > 1 ? 's' : ''}</div></div><div class="pmb">${badge}</div></div>`;
  });
  h += '</div>';
  h += '<div class="ft">Generated by Jade · Awesome Group · Data from JobTread</div>';
  c.innerHTML = h;
}

function projCard(p, open) {
  const c = p.c || {};
  const g = p.g || {};
  const t = p.tasks || {};
  let tags = '';
  if (c.l) tags += `<span class="tg r">${c.l} late</span>`;
  if (c.b) tags += `<span class="tg o">${c.b} blocked</span>`;
  if (c.a) tags += `<span class="tg b">${c.a} active</span>`;
  if (c.t) tags += `<span class="tg y">${c.t} tmr</span>`;

  const pmLine = p.pm ? `PM: ${p.pm}` : '<span class="nob">⚠ No PM assigned</span>';
  
  // Build 3-column preview: LATE | TOMORROW | NEXT 2 DAYS
  let preview = '<div class="preview">';
  
  // Column 1: LATE
  preview += '<div class="pv-col"><div class="pv-head r">Late</div>';
  if (t.late?.length) {
    const real = t.late.filter(tk => !tk.s);
    const summary = t.late.find(tk => tk.s);
    real.slice(0, 3).forEach(tk => {
      preview += `<div class="pv-item"><div class="pv-dot r"></div><div class="pv-txt"><div class="pv-name">${tk.n}</div><div class="pv-sub${!tk.w?' warn':''}">${tk.w||'⚠ nobody'} · ${tk.d}d</div></div></div>`;
    });
    const extra = Math.max(0, real.length - 3) + (summary ? parseInt(summary.n?.match(/\d+/)?.[0]) || 0 : 0);
    if (extra > 0) preview += `<div class="pv-more">+${extra} more</div>`;
  } else {
    preview += '<div class="pv-empty">None — all clear</div>';
  }
  preview += '</div>';
  
  // Column 2: TOMORROW
  preview += '<div class="pv-col"><div class="pv-head y">Tomorrow</div>';
  if (t.tmr?.length) {
    t.tmr.slice(0, 4).forEach(tk => {
      preview += `<div class="pv-item"><div class="pv-dot y"></div><div class="pv-txt"><div class="pv-name">${tk.n}</div><div class="pv-sub${!tk.w?' warn':''}">${tk.w||'⚠ nobody'}</div></div></div>`;
    });
    if (t.tmr.length > 4) preview += `<div class="pv-more">+${t.tmr.length - 4} more</div>`;
  } else {
    preview += '<div class="pv-empty">Nothing due</div>';
  }
  preview += '</div>';
  
  // Column 3: NEXT 2 DAYS (blocked + active coming up)
  preview += '<div class="pv-col"><div class="pv-head b">Coming Up</div>';
  let upcoming = [];
  if (t.active) t.active.forEach(tk => upcoming.push({n:tk.n, w:tk.w, sub:tk.dt||'active'}));
  if (t.blocked) t.blocked.filter(tk => !tk.s).slice(0, 3).forEach(tk => upcoming.push({n:tk.n, w:tk.w, due:tk.due, sub:'← '+tk.bl?.split('(')[0]?.trim(), isBlocked:true}));
  if (upcoming.length) {
    upcoming.slice(0, 4).forEach(tk => {
      if (tk.isBlocked) {
        const fmtDue = fmtDate(tk.due);
        preview += `<div class="pv-item"><div class="pv-dot b"></div><div class="pv-txt"><div class="pv-name">${tk.n} <span style="color:var(--bdr);margin:0 4px">│</span><span style="color:var(--txt);font-family:var(--mono);font-size:11px">${fmtDue}</span></div><div class="pv-sub warn">🟠 ${tk.sub}</div></div></div>`;
      } else {
        preview += `<div class="pv-item"><div class="pv-dot b"></div><div class="pv-txt"><div class="pv-name">${tk.n}</div><div class="pv-sub">${(tk.w||'⚠ nobody') + ' · ' + tk.sub}</div></div></div>`;
      }
    });
    if (upcoming.length > 4) preview += `<div class="pv-more">+${upcoming.length - 4} more</div>`;
  } else {
    preview += '<div class="pv-empty">Nothing upcoming</div>';
  }
  preview += '</div></div>';
  
  // Build expanded body in 2-column grid
  let body = '<div class="pb-grid">';
  
  // Left column: Late + Active
  body += '<div>';
  if (t.late?.length) {
    body += `<div class="ts"><div class="tsl lr">Overdue</div>`;
    t.late.forEach(tk => { body += trow('r', tk.n, tk.w, tk.s ? tk.d : tk.d + 'd late', !tk.s); });
    body += '</div>';
  }
  if (t.active?.length) {
    body += `<div class="ts"><div class="tsl ac">Active</div>`;
    t.active.forEach(tk => { body += trow('b', tk.n, tk.w, tk.dt || ''); });
    body += '</div>';
  }
  body += '</div>';
  
  // Right column: Blocked + Due Tomorrow
  body += '<div>';
  if (t.blocked?.length) {
    body += `<div class="ts"><div class="tsl bl">Blocked</div>`;
    t.blocked.forEach(tk => { body += trow('o', tk.n, tk.w, tk.due || '', false, tk.bl); });
    body += '</div>';
  }
  if (t.tmr?.length) {
    body += `<div class="ts"><div class="tsl dt">Due Tomorrow</div>`;
    t.tmr.forEach(tk => { body += trow('y', tk.n, tk.w, 'tomorrow'); });
    body += '</div>';
  }
  body += '</div>';
  
  // Full-width: Gaps
  if (g.p || g.v || g.pc) {
    body += '<div class="pb-full"><div class="ts"><div class="tsl gp">Role Gaps</div><div class="gl">';
    if (g.p) body += `<span class="gt">${g.p} no PM</span>`;
    if (g.v) body += `<span class="gt">${g.v} no Vendor</span>`;
    if (g.pc) body += `<span class="gt">${g.pc} no PurchCoord</span>`;
    body += '</div></div></div>';
  }
  body += '</div>';
  
  return `<div class="pc${open ? ' op' : ''}" data-st="issue"><div class="ph" onclick="tog(this)"><div>
    <div class="pn">${p.name}</div><div class="pp">${pmLine}</div></div>
    <div class="pt">${tags}${chvSvg()}</div></div>${preview}<div class="pb">${body}</div></div>`;
}

function trow(color, name, who, when, overdue, blocker) {
  const whoHtml = who ? who : '<span class="nob">⚠ Nobody assigned</span>';
  return `<div class="tr"><div class="td ${color}"></div><div class="ti">
    <div class="tn">${name}</div><div class="tm">${whoHtml}</div>
    ${blocker ? `<div class="tb">↳ waiting on: ${blocker}</div>` : ''}
    </div><div class="tw${overdue ? ' ov' : ''}">${when}</div></div>`;
}

function chvSvg() {
  return `<svg class="chv" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>`;
}

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(d) {
  if (!d) return '';
  const clean = d.replace(/\//g, '-');
  const parts = clean.split('-');
  if (parts.length === 2) {
    const m = parseInt(parts[0]) - 1;
    const day = parseInt(parts[1]);
    return (MONTHS[m]||'') + ' ' + day;
  }
  return d;
}

function tog(el) { el.closest('.pc').classList.toggle('op'); }

function filt(f, btn) {
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.pc[data-st]').forEach(card => {
    if (f === 'all') card.style.display = '';
    else card.style.display = card.dataset.st === f ? '' : 'none';
  });
}

// Archive page
async function renderArchive(c) {
  try {
    const r = await fetch('data/archive-index.json');
    if (!r.ok) throw new Error('not found');
    const idx = await r.json();
    const reports = (idx.reports || []).sort((a, b) => b.date.localeCompare(a.date));
    if (!reports.length) throw new Error('empty');

    // Group by month
    const months = {};
    reports.forEach(rpt => {
      const d = new Date(rpt.date + 'T12:00:00');
      const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      const label = MONTHS[d.getMonth()] + ' ' + d.getFullYear();
      if (!months[key]) months[key] = {label, items:[]};
      months[key].items.push(rpt);
    });

    let h = '<div class="page-title">Report Archive</div><div class="page-sub">Browse past SOD reports by date.</div>';

    Object.keys(months).sort().reverse().forEach(key => {
      const m = months[key];
      h += `<div style="margin-top:20px"><div style="font-size:14px;font-weight:600;color:var(--txt2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)">${m.label}</div>`;
      m.items.forEach(rpt => {
        const d = new Date(rpt.date + 'T12:00:00');
        const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
        const dayLabel = MONTHS[d.getMonth()] + ' ' + d.getDate();
        h += `<div class="pc" style="margin-bottom:4px"><div class="ph" onclick="loadArchiveDate('${rpt.date}')" style="cursor:pointer">
          <div><div class="pn">${dayName}, ${dayLabel}</div><div class="pp">SOD Report</div></div>
          <div class="pt">
            ${rpt.overdue ? `<span class="tg r">${rpt.overdue} late</span>` : ''}
            ${rpt.blocked ? `<span class="tg o">${rpt.blocked} blocked</span>` : ''}
            ${rpt.active ? `<span class="tg b">${rpt.active} active</span>` : ''}
            <span class="tg gr">${rpt.projects} projects</span>
          </div></div></div>`;
      });
      h += '</div>';
    });

    h += '<div class="ft">Click any report to view it.</div>';
    c.innerHTML = h;
  } catch(e) {
    c.innerHTML = '<div class="empty"><div class="empty-i">📋</div><div class="empty-t">No Archives Yet</div><div class="empty-d">Reports will appear here after the first SOD run.</div></div>';
  }
}

async function loadArchiveDate(dateStr) {
  try {
    const r = await fetch('data/sod-' + dateStr + '.json');
    if (!r.ok) throw new Error('not found');
    DATA = await r.json();
    curDate = dateStr;
    updateDateDisplay();
    document.querySelectorAll('#main-nav a').forEach(x => x.classList.remove('on'));
    document.querySelector('#main-nav a[data-p="sod"]').classList.add('on');
    curPage = 'sod';
    render();
  } catch(e) {
    alert('Report not available for ' + dateStr);
  }
}

// Date navigation
let curDate = new Date().toISOString().slice(0, 10);

function updateDateDisplay() {
  const d = new Date(curDate + 'T12:00:00');
  const today = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  let label = MONTHS[d.getMonth()] + ' ' + d.getDate();
  if (curDate === today) label = 'Today';
  else if (curDate === yesterday) label = 'Yesterday';
  document.getElementById('date-display').textContent = label;
}

document.getElementById('prev-btn').addEventListener('click', async () => {
  const prev = new Date(new Date(curDate + 'T12:00:00').getTime() - 86400000).toISOString().slice(0, 10);
  try {
    const r = await fetch('data/sod-' + prev + '.json');
    if (!r.ok) throw new Error('not found');
    DATA = await r.json();
    curDate = prev;
    updateDateDisplay();
    if (curPage === 'sod') render();
  } catch(e) { /* no data for that day */ }
});

document.getElementById('next-btn').addEventListener('click', async () => {
  const next = new Date(new Date(curDate + 'T12:00:00').getTime() + 86400000).toISOString().slice(0, 10);
  try {
    const r = await fetch('data/sod-' + next + '.json');
    if (!r.ok) throw new Error('not found');
    DATA = await r.json();
    curDate = next;
    updateDateDisplay();
    if (curPage === 'sod') render();
  } catch(e) { /* no data for that day */ }
});

async function loadData() {
  const today = new Date().toISOString().slice(0, 10);
  try {
    const r = await fetch('data/sod-' + today + '.json');
    if (!r.ok) throw new Error('not found');
    DATA = await r.json();
    curDate = today;
  } catch(e) {
    // Try yesterday if today isn't available yet
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    try {
      const r2 = await fetch('data/sod-' + yesterday + '.json');
      DATA = await r2.json();
      curDate = yesterday;
    } catch(e2) {
      document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-i">📋</div><div class="empty-t">No Data Yet</div><div class="empty-d">Waiting for first SOD report from Jade.</div></div>';
      return;
    }
  }
  updateDateDisplay();
  render();
}
loadData();
