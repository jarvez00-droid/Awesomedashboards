function buildPMSection(pms, isEOD) {
  let h = '<div class="sh">PM Snapshot</div><div class="pmr">';
  pms.forEach(pm => {
    const badge = pm.ind === 'clean' ? '✅' : pm.ind === 'green' ? '🟢' : pm.ind === 'yellow' ? '🟡' : '🔴';
    const detail = isEOD
      ? `${pm.completed||0} done today · ${pm.ov} overdue · ${pm.act} active<br>${pm.proj} project${pm.proj>1?'s':''}`
      : `${pm.ov} overdue / ${pm.act} active<br>${pm.proj} project${pm.proj>1?'s':''}`;
    h += `<div class="pmc"><div><div class="pmn">${pm.name}</div><div class="pmd">${detail}</div></div><div class="pmb">${badge}</div></div>`;
  });
  return h + '</div>';
}

function buildAnalysis(a, pmFilter) {
  if (!a) return '';
  const md = t => t.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');

  let paras, subtitle;
  if (pmFilter && a.pm_briefs && a.pm_briefs[pmFilter]) {
    paras = a.pm_briefs[pmFilter];
    subtitle = `Analysis for ${pmFilter}`;
  } else {
    paras = a.paragraphs || [];
    subtitle = 'Company overview · trend · advice';
  }
  if (!paras.length) return '';

  return `<div id="jade-brief" class="pc sev-g" style="border-left-color:#34d399;background:linear-gradient(135deg,rgba(18,183,106,.08) 0%,rgba(18,183,106,.02) 40%,var(--card) 100%)">
    <div class="ph" onclick="tog(this)">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:18px">🟢</span>
        <div><div class="pn" style="color:#34d399">Jade's Daily Brief</div>
        <div class="pp">${subtitle}</div></div>
      </div>
      <div class="pt">${chvSvg()}</div>
    </div>
    <div class="pb" style="padding:8px 20px 16px">
      <div style="font-size:13px;line-height:1.8;color:var(--txt2)">
        ${paras.map(p => `<p style="margin:0 0 12px 0">${md(p)}</p>`).join('')}
      </div>
    </div>
  </div>`;
}

function buildOkCard(p) {
  const co = p.tasks?.coming || [];
  const coUn = co.filter(tk => tk.unassigned);
  const coAs = co.filter(tk => !tk.unassigned);
  const pmVal = p.pm || 'No PM';
  const tags = coUn.length ? `<span class="tg y">${coUn.length} unassigned</span>` : co.length ? `<span class="tg" style="background:rgba(250,204,21,.06);color:var(--dim);border-color:rgba(250,204,21,.2)">${co.length} upcoming</span>` : '';
  let inner = '';
  if (coUn.length) {
    inner += `<div style="font-size:11px;font-weight:600;color:var(--red);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">⚠️ Unassigned (${coUn.length})</div>`;
    inner += coUn.map(tk => `<div style="font-size:12px;padding:3px 0;border-bottom:1px solid rgba(33,39,47,.3)"><span style="color:var(--red);margin-right:6px">●</span>${tk.n} — <span style="color:var(--txt2)">${tk.when}</span></div>`).join('');
  }
  if (coAs.length) {
    inner += `<div style="margin-top:6px;cursor:pointer" onclick="var el=this.querySelector('.ok-assigned');el.style.display=el.style.display==='none'?'block':'none'"><div style="font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px">✅ Assigned (${coAs.length}) — Click to expand</div><div class="ok-assigned" style="display:none">${coAs.map(tk => `<div style="font-size:12px;padding:3px 0;border-bottom:1px solid rgba(33,39,47,.3)"><span style="margin-right:6px">●</span>${tk.n} — <span style="color:var(--txt2)">${tk.when} · ${tk.w}</span></div>`).join('')}</div></div>`;
  }
  if (!co.length) inner = '<div style="font-size:12px;color:var(--dim);font-style:italic">Nothing upcoming</div>';
  return `<div class="pc sev-g" data-st="ok" data-pm="${pmVal}"><div class="ph" onclick="tog(this)"><div>
    <div class="pn" style="color:var(--grn)">✓ ${p.name}</div>
    <div class="pp">${pmVal !== 'No PM' ? 'PM: '+pmVal : '<span class="nob">⚠ No PM assigned</span>'}</div></div>
    <div class="pt"><span class="tg gr">on track</span>${tags}${chvSvg()}</div></div>
    <div class="pb"><div style="padding:4px 0"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--ylw);margin-bottom:6px">Upcoming — Next 7 Days</div>${inner}</div></div></div>`;
}

function buildCard(p, open, isEOD) {
  const c = p.c || {};
  const g = p.g || {};
  const t = p.tasks || {};
  const ov = t.overdue || []; const bl = t.blocked || [];
  const ac = t.active || []; const co = t.coming || [];
  const pmLine = p.pm ? `PM: ${p.pm}` : '<span class="nob">⚠ No PM assigned</span>';

  const pay = t.pay_overdue || [];

  // Tags
  let tags = '';
  if (isEOD && c.completed) tags += `<span class="tg gr">${c.completed} done</span>`;
  if (isEOD && c.resolved) tags += `<span class="tg gr">${c.resolved} cleared</span>`;
  if (c.ov) tags += `<span class="tg r">${c.ov} overdue</span>`;
  if (c.ac) tags += `<span class="tg b">${c.ac} active</span>`;
  if (c.ab) tags += `<span class="tg o">${c.ab} active blocked</span>`;
  if (c.co_un) tags += `<span class="tg y">${c.co_un} upcoming unassigned</span>`;
  else if (c.co) tags += `<span class="tg" style="background:rgba(250,204,21,.06);color:var(--dim);border-color:rgba(250,204,21,.2)">${c.co} upcoming</span>`;
  if (c.pay) tags += `<span class="tg" style="background:rgba(129,140,248,.15);color:#818cf8;border-color:rgba(129,140,248,.3)">${c.pay} payment</span>`;

  const sev = c.ov ? 'sev-r' : c.ac ? 'sev-b' : c.co ? 'sev-g' : 'sev-g';

  const ab = t.active_blocked || [];
  // Preview: always 4 standard columns + optional payments
  const colCount = 4 + (pay.length ? 1 : 0);
  let preview = `<div class="preview" style="grid-template-columns:repeat(${colCount},1fr)">`;
  preview += pvCol('Overdue', 'r', ov, tk => `${tk.n}`, tk => `${tk.d}d`);
  preview += pvCol('Active', 'b', ac, tk => `${tk.n}`, tk => tk.dt || 'active');
  preview += pvCol('Active Blocked', 'o', ab, tk => `${tk.n}`, tk => tk.d ? `${tk.d}d late` : 'blocked');
  const previewCo = co.filter(tk => tk.unassigned).length ? co.filter(tk => tk.unassigned) : co;
  preview += pvCol('Upcoming' + (co.filter(tk=>tk.unassigned).length ? ' (unassigned)' : ''), 'y', previewCo, tk => `${tk.n}`, tk => tk.when || '');
  if (pay.length) {
    preview += `<div class="pv-col"><div class="pv-head" style="color:#818cf8">💰 Payments</div>`;
    pay.slice(0, 2).forEach(tk => {
      const ttShort = (tk.tt||'').replace(/^\d+\.\s*/, '').replace('Payment - ','');
      const pvDue = tk.d > 0 ? `past due: ${tk.d}d` : tk.d === 0 ? 'due today' : `due in ${Math.abs(tk.d)}d`;
      preview += `<div class="pv-item"><div class="pv-dot" style="background:#818cf8"></div><div class="pv-txt"><div class="pv-name">${tk.n}</div><div class="pv-sub" style="color:#818cf8">${ttShort} · ${pvDue}</div></div></div>`;
    });
    if (pay.length > 2) preview += `<div class="pv-more">+${pay.length - 2} more</div>`;
    preview += '</div>';
  }
  preview += '</div>';

  // Expanded body — 3 columns when payments exist, 2 otherwise
  const useThreeCol = pay.length > 0;
  let body = `<div class="${useThreeCol ? 'pb-3col' : 'pb-grid'}">`;

  const emptyMsg = '<div style="font-size:11px;color:var(--dim);font-style:italic;padding:4px 0">None</div>';

  // Column 1: Overdue + Active Blocked
  body += '<div>';
  if (isEOD && t.completed?.length) {
    body += '<div class="ts"><div class="tsl" style="color:var(--grn)">✅ Completed</div>';
    body += trowSection('g', t.completed, tk => trow('g', tk.n, tk.w, '✓'), 5);
    body += '</div>';
  }
  if (isEOD && t.resolved?.length) {
    body += '<div class="ts"><div class="tsl" style="color:var(--grn)">✅ Resolved</div>';
    body += trowSection('g', t.resolved, tk => trow('g', tk.n, tk.w, 'clear'), 5);
    body += '</div>';
  }
  body += '<div class="ts"><div class="tsl lr">Overdue</div>';
  if (ov.length) {
    body += trowSection('r', ov, tk => trow('r', tk.n, tk.w, tk.d + 'd', true), 5);
  } else { body += emptyMsg; }
  body += '</div>';
  body += '<div class="ts"><div class="tsl" style="color:var(--org)">Active Blocked</div>';
  if (ab.length) {
    body += trowSection('o', ab, tk => {
      const kindTag = tk.bl_kind === 'payment' ? '<span style="background:rgba(129,140,248,.15);color:#818cf8;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px;font-weight:600">💰 payment</span>'
        : tk.bl_kind === 'overdue' ? '<span style="background:rgba(248,113,113,.15);color:var(--red);font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px;font-weight:600">⚠ overdue</span>'
        : '<span style="background:rgba(250,204,21,.1);color:var(--ylw);font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px">⏳ predecessor</span>';
      const late = tk.d > 0 ? `${tk.d}d late` : 'today';
      const byLine = tk.bl ? `<div style="font-size:10px;color:var(--dim);margin-top:1px">↳ waiting on: ${tk.bl}</div>` : '';
      return `<div class="tr" style="flex-wrap:wrap"><div class="td o"></div><div class="ti"><div class="tn">${tk.n} - ${tk.w||''}${kindTag}</div>${byLine}</div><div class="tw ov">${late}</div></div>`;
    }, 5);
  } else { body += emptyMsg; }
  body += '</div>';
  body += '</div>';

  // Column 2: Active + Upcoming
  body += '<div>';
  body += '<div class="ts"><div class="tsl ac">Active</div>';
  if (ac.length) {
    body += trowSection('b', ac, tk => trow('b', tk.n, tk.w, tk.dt || ''), 5);
  } else { body += emptyMsg; }
  body += '</div>';
  // Split upcoming into unassigned (visible) and assigned (collapsed)
  const coUnassigned = co.filter(tk => tk.unassigned);
  const coAssigned = co.filter(tk => !tk.unassigned);

  const upcomingRow = tk => {
    let warn = '';
    if (tk.blocked_kind === 'overdue') warn = '<span style="background:rgba(248,113,113,.15);color:var(--red);font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px;font-weight:600">⚠ blocked by overdue</span>';
    else if (tk.blocked_kind === 'payment') warn = '<span style="background:rgba(129,140,248,.15);color:#818cf8;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px;font-weight:600">💰 blocked by payment</span>';
    else if (tk.blocked_kind === 'active') warn = '<span style="background:rgba(96,165,250,.15);color:#60a5fa;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px">⏳ waiting on active task</span>';
    else if (tk.blocked_kind === 'upcoming') warn = '<span style="background:rgba(250,204,21,.1);color:var(--ylw);font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px">⏳ waiting on predecessor</span>';
    const byLine = tk.blocked_by ? `<div style="font-size:10px;color:var(--dim);margin-top:1px">↳ ${tk.blocked_by}</div>` : '';
    return `<div class="tr"><div class="td y"></div><div class="ti"><div class="tn">${tk.n} — <span style="color:${tk.unassigned ? 'var(--red)' : 'var(--txt2)'}">${tk.w||''}</span>${warn}</div>${byLine}</div><div class="tw">${tk.when||''}</div></div>`;
  };

  body += `<div class="ts"><div class="tsl dt">Upcoming — Next 7 Days (${co.length} total)</div>`;

  // Unassigned: always visible
  if (coUnassigned.length) {
    body += `<div style="font-size:11px;font-weight:600;color:var(--red);margin:6px 0 4px;text-transform:uppercase;letter-spacing:.5px">⚠️ Unassigned (${coUnassigned.length}) — Need someone assigned</div>`;
    coUnassigned.forEach(tk => { body += upcomingRow(tk); });
  }

  // Assigned: collapsed by default
  if (coAssigned.length) {
    body += `<div style="margin-top:8px;cursor:pointer" onclick="var el=this.querySelector('.co-assigned');el.style.display=el.style.display==='none'?'block':'none';this.querySelector('svg').style.transform=el.style.display==='none'?'':'rotate(180deg)'">
      <div style="font-size:11px;font-weight:600;color:var(--dim);display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px">
        ✅ Assigned (${coAssigned.length}) — Click to expand
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="co-assigned" style="display:none">`;
    coAssigned.forEach(tk => { body += upcomingRow(tk); });
    body += '</div></div>';
  }

  if (!co.length) body += emptyMsg;
  body += '</div>';
  body += '</div>';

  // Column 3 (sidebar): Payment & Purchase tasks
  if (useThreeCol) {
    body += '<div class="pay-side">';

    // Overdue payments
    if (pay.length) {
      body += `<div class="ts"><div class="tsl" style="color:var(--red)">🔴 Overdue Payments (${pay.length})</div>`;
      body += `<div style="font-size:10px;color:rgba(129,140,248,.7);margin-bottom:8px;font-style:italic">Not counted in PM metrics</div>`;
      pay.forEach(tk => {
        const ttShort = (tk.tt||'').replace(/^\d+\.\s*/, '').replace('Payment - ','');
        const dueLabel = tk.d > 0 ? `<span style="color:var(--red);font-weight:600">past due: ${tk.d}d</span>` : tk.d === 0 ? '<span style="color:var(--ylw);font-weight:600">due today</span>' : `<span style="color:var(--dim)">due in ${Math.abs(tk.d)}d</span>`;
        body += `<div class="tr" style="flex-wrap:wrap;gap:2px"><div class="td"></div><div class="ti"><div class="tn">${tk.n}</div><div style="font-size:10px;color:#818cf8">${ttShort}</div></div><div class="tw" style="font-size:10px">${dueLabel}</div></div>`;
      });
      body += '</div>';
    }

    // Upcoming payments from 7-day coming list
    const payUpcoming = co.filter(tk => tk.is_payment);
    if (payUpcoming.length) {
      const payUpTotal = payUpcoming.reduce((s, tk) => s + (tk.amount || 0), 0);
      const payIn = payUpcoming.filter(tk => tk.pay_type === 'income' || tk.pay_type === 'p_income');
      const payOut = payUpcoming.filter(tk => tk.pay_type !== 'income' && tk.pay_type !== 'p_income');

      body += `<div class="ts" style="margin-top:10px"><div class="tsl" style="color:var(--ylw)">📅 Upcoming Payments — Next 7 Days (${payUpcoming.length})</div>`;

      if (payIn.length) {
        const inTotal = payIn.reduce((s, tk) => s + (tk.amount || 0), 0);
        body += `<div style="font-size:11px;font-weight:600;color:var(--grn);margin:6px 0 4px;text-transform:uppercase;letter-spacing:.5px">⬇️ Income Expected${inTotal ? ' — $' + inTotal.toLocaleString() : ''}</div>`;
        payIn.forEach(tk => {
          const amt = tk.amount ? '<span style="color:var(--grn);font-weight:600">$' + tk.amount.toLocaleString() + '</span>' : '<span style="color:var(--dim)">TBD</span>';
          body += `<div class="tr" style="flex-wrap:wrap;gap:2px"><div class="td" style="background:var(--grn)"></div><div class="ti"><div class="tn">${tk.n}</div><div style="font-size:10px;color:var(--dim)">${tk.when} · ${tk.w}</div></div><div class="tw" style="font-size:10px">${amt}</div></div>`;
        });
      }

      if (payOut.length) {
        const outTotal = payOut.reduce((s, tk) => s + (tk.amount || 0), 0);
        body += `<div style="font-size:11px;font-weight:600;color:#f97316;margin:6px 0 4px;text-transform:uppercase;letter-spacing:.5px">⬆️ Payments Going Out${outTotal ? ' — $' + outTotal.toLocaleString() : ''}</div>`;
        payOut.forEach(tk => {
          const amt = tk.amount ? '<span style="color:var(--red);font-weight:600">$' + tk.amount.toLocaleString() + '</span>' : '<span style="color:var(--dim)">TBD</span>';
          const typeLabel = tk.pay_type === 'materials' ? '📦' : tk.pay_type === 'subs' ? '🔧' : '💳';
          body += `<div class="tr" style="flex-wrap:wrap;gap:2px"><div class="td" style="background:#f97316"></div><div class="ti"><div class="tn">${typeLabel} ${tk.n}</div><div style="font-size:10px;color:var(--dim)">${tk.when} · ${tk.w}</div></div><div class="tw" style="font-size:10px">${amt}</div></div>`;
        });
      }

      body += '</div>';
    }

    if (!pay.length && !payUpcoming.length) {
      body += `<div class="ts"><div class="tsl">💰 Payments & Purchases</div>`;
      body += '<div style="font-size:12px;color:var(--dim);font-style:italic;padding:8px 0">No payment tasks</div></div>';
    }

    body += '</div>';
  }

  // Full-width: Gaps
  if (g.p || g.v || g.pc) {
    body += `<div style="grid-column:1/-1"><div class="ts"><div class="tsl gp">Role Gaps</div><div class="gl">`;
    if (g.p) body += `<span class="gt">${g.p} no PM</span>`;
    if (g.v) body += `<span class="gt">${g.v} no Vendor</span>`;
    if (g.pc) body += `<span class="gt">${g.pc} no PurchCoord</span>`;
    body += '</div></div></div>';
  }
  body += '</div>';

  return `<div class="pc ${sev}${open ? ' op' : ''}" data-st="issue" data-pm="${p.pm||'No PM'}"><div class="ph" onclick="tog(this)"><div>
    <div class="pn">${p.name}</div><div class="pp">${pmLine}</div></div>
    <div class="pt">${tags}${chvSvg()}</div></div>${preview}<div class="pb">${body}</div></div>`;
}

function pvCol(label, color, items, nameFn, subFn) {
  let h = `<div class="pv-col"><div class="pv-head ${color === 'b' ? 'b' : color}">${label}</div>`;
  if (items.length) {
    items.slice(0, 2).forEach(tk => {
      h += `<div class="pv-item"><div class="pv-dot ${color}"></div><div class="pv-txt"><div class="pv-name">${nameFn(tk)}</div><div class="pv-sub">${subFn(tk)}</div></div></div>`;
    });
    if (items.length > 2) h += `<div class="pv-more">+${items.length - 2} more</div>`;
  } else {
    h += '<div class="pv-empty">None</div>';
  }
  return h + '</div>';
}

let _trowId = 0;
function trow(color, name, who, when, overdue, blocker) {
  const whoShort = who ? (who.length > 20 ? who.split(',')[0].trim() : who) : '<span class="nob">⚠ Nobody</span>';
  const sep = ' - ';
  if (blocker) {
    return `<div class="tr-bl"><div class="tr"><div class="td ${color}"></div><div class="ti"><div class="tn">${name}${sep}${whoShort}</div></div><div class="tw${overdue ? ' ov' : ''}">${when}</div></div><div class="tb">↳ ${blocker}</div></div>`;
  }
  return `<div class="tr"><div class="td ${color}"></div><div class="ti"><div class="tn">${name}${sep}${whoShort}</div></div><div class="tw${overdue ? ' ov' : ''}">${when}</div></div>`;
}

function trowSection(color, items, renderFn, limit) {
  limit = limit || 5;
  if (items.length <= limit) return items.map(renderFn).join('');
  const id = 'trs' + (++_trowId);
  let h = items.slice(0, limit).map(renderFn).join('');
  h += `<div id="${id}-rest" style="display:none">${items.slice(limit).map(renderFn).join('')}</div>`;
  h += `<div class="show-more" onclick="document.getElementById('${id}-rest').style.display='block';this.style.display='none'">+ ${items.length - limit} more</div>`;
  return h;
}

function chvSvg() {
  return `<svg class="chv" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>`;
}

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(d) {
  if (!d) return '';
  const clean = d.replace(/\//g, '-');
  const parts = clean.split('-');
  if (parts.length === 2) {
    const m = parseInt(parts[0]) - 1;
    const day = parseInt(parts[1]);
    return (MONTHS[m]||'') + ' ' + day;
  }
  return d;
}

function tog(el) { el.closest('.pc').classList.toggle('op'); }

let curFilter = 'all';
let curPMFilter = '';

function applyFilters() {
  document.querySelectorAll('.pc[data-st]').forEach(card => {
    let show = true;
    // Status filter
    if (curFilter !== 'all' && card.dataset.st !== curFilter) show = false;
    // PM filter
    if (show && curPMFilter) {
      const cardPM = card.dataset.pm || '';
      if (curPMFilter === '__none') {
        show = cardPM === 'No PM';
      } else {
        show = cardPM.includes(curPMFilter);
      }
    }
    card.style.display = show ? '' : 'none';
  });
}

function filt(f, btn) {
  document.querySelectorAll('.fb:not(#pm-filter)').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  curFilter = f;
  applyFilters();
}

function filtPM(pm) {
  curPMFilter = pm;
  applyFilters();
  // Update Jade's Brief based on PM selection
  const briefEl = document.getElementById('jade-brief');
  if (briefEl && DATA && DATA.analysis) {
    const wasOpen = briefEl.classList.contains('op');
    briefEl.outerHTML = buildAnalysis(DATA.analysis, pm);
    if (wasOpen) {
      const newBrief = document.getElementById('jade-brief');
      if (newBrief) newBrief.classList.add('op');
    }
  }
}

// Archive page
async function renderArchive(c) {
  try {
    const r = await fetch('data/archive-index.json');
    if (!r.ok) throw new Error('not found');
    const idx = await r.json();
    const reports = (idx.reports || []).sort((a, b) => b.date.localeCompare(a.date));
    if (!reports.length) throw new Error('empty');

    // Group by month
    const months = {};
    reports.forEach(rpt => {
      const d = new Date(rpt.date + 'T12:00:00');
      const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      const label = MONTHS[d.getMonth()] + ' ' + d.getFullYear();
      if (!months[key]) months[key] = {label, items:[]};
      months[key].items.push(rpt);
    });

    let h = '<div class="page-title">Report Archive</div><div class="page-sub">Browse past SOD reports by date.</div>';

    Object.keys(months).sort().reverse().forEach(key => {
      const m = months[key];
      h += `<div style="margin-top:20px"><div style="font-size:14px;font-weight:600;color:var(--txt2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)">${m.label}</div>`;
      m.items.forEach(rpt => {
        const d = new Date(rpt.date + 'T12:00:00');
        const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
        const dayLabel = MONTHS[d.getMonth()] + ' ' + d.getDate();
        const isEOD = rpt.type === 'eod';
        const typeLabel = isEOD ? 'EOD Report' : 'Projects Dashboard';
        const typeIcon = isEOD ? '🌙' : '☀';
        h += `<div class="pc" style="margin-bottom:4px"><div class="ph" onclick="loadArchiveDate('${rpt.date}','${rpt.type||'sod'}')" style="cursor:pointer">
          <div><div class="pn">${typeIcon} ${dayName}, ${dayLabel}</div><div class="pp">${typeLabel}</div></div>
          <div class="pt">
            ${isEOD && rpt.completed ? `<span class="tg gr">${rpt.completed} done</span>` : ''}
            ${(rpt.overdue||rpt.still_overdue) ? `<span class="tg r">${rpt.overdue||rpt.still_overdue} late</span>` : ''}
            ${(rpt.blocked||rpt.still_blocked) ? `<span class="tg o">${rpt.blocked||rpt.still_blocked} blocked</span>` : ''}
            ${rpt.active ? `<span class="tg b">${rpt.active} active</span>` : ''}
            <span class="tg gr">${rpt.projects} projects</span>
          </div></div></div>`;
      });
      h += '</div>';
    });

    h += '<div class="ft">Click any report to view it.</div>';
    c.innerHTML = h;
  } catch(e) {
    c.innerHTML = '<div class="empty"><div class="empty-i">📋</div><div class="empty-t">No Archives Yet</div><div class="empty-d">Reports will appear here after the first SOD run.</div></div>';
  }
}

async function loadArchiveDate(dateStr, type) {
  const isEOD = type === 'eod';
  const file = isEOD ? 'eod-' : 'sod-';
  try {
    const r = await fetch('data/' + file + dateStr + '.json');
    if (!r.ok) throw new Error('not found');
    DATA = await r.json();
    curDate = dateStr;
    updateDateDisplay();
    document.querySelectorAll('#main-nav a').forEach(x => x.classList.remove('on'));
    document.querySelector('#main-nav a[data-p="sod"]').classList.add('on');
    curPage = 'sod';
    render();
  } catch(e) {
    alert('Report not available for ' + dateStr);
  }
}

// Date navigation
let curDate = new Date().toISOString().slice(0, 10);

function updateDateDisplay() {
  const d = new Date(curDate + 'T12:00:00');
  const today = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  let label = MONTHS[d.getMonth()] + ' ' + d.getDate();
  if (curDate === today) label = 'Today';
  else if (curDate === yesterday) label = 'Yesterday';
  document.getElementById('date-display').textContent = label;
}

document.getElementById('prev-btn').addEventListener('click', async () => {
  const prev = new Date(new Date(curDate + 'T12:00:00').getTime() - 86400000).toISOString().slice(0, 10);
  try {
    const r = await fetch('data/sod-' + prev + '.json');
    if (!r.ok) throw new Error('not found');
    DATA = await r.json();
    curDate = prev;
    updateDateDisplay();
    if (curPage === 'sod') render();
  } catch(e) { /* no data for that day */ }
});

document.getElementById('next-btn').addEventListener('click', async () => {
  const next = new Date(new Date(curDate + 'T12:00:00').getTime() + 86400000).toISOString().slice(0, 10);
  try {
    const r = await fetch('data/sod-' + next + '.json');
    if (!r.ok) throw new Error('not found');
    DATA = await r.json();
    curDate = next;
    updateDateDisplay();
    if (curPage === 'sod') render();
  } catch(e) { /* no data for that day */ }
});

async function loadData() {
  const today = new Date().toISOString().slice(0, 10);
  try {
    const r = await fetch('data/sod-' + today + '.json');
    if (!r.ok) throw new Error('not found');
    DATA = await r.json();
    curDate = today;
  } catch(e) {
    // Try yesterday if today isn't available yet
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    try {
      const r2 = await fetch('data/sod-' + yesterday + '.json');
      DATA = await r2.json();
      curDate = yesterday;
    } catch(e2) {
      document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-i">📋</div><div class="empty-t">No Data Yet</div><div class="empty-d">Waiting for first SOD report from Jade.</div></div>';
      return;
    }
  }
  updateDateDisplay();
  render();
}
loadData();

// Password-gated, loads management data (all_tasks), shows per-project slider + global calendar

let FC_DATA = null;
let fcBalance = 0;
let fcCurProj = 0; // index into project list (0 = first project)
let fcManualItems = []; // {id, task, project:'Manual', type:'income'|'subs', amount, due}
let fcNextManualId = 1;
const FC_SAVE_KEY = 'jade_fc_v1';

function fcGate(c) {
  if (sessionStorage.getItem('fc_auth') === '1') {
    loadAndRenderFC(c);
    return;
  }
  c.innerHTML = `<div class="pw"><div class="pw-icon">💰</div>
    <div class="pw-title">Full Cash Flow — Restricted</div>
    <div class="pw-sub">Enter password to access.</div>
    <input type="password" id="fc-pw-input" placeholder="Password" autocomplete="off">
    <button class="pw-btn" id="fc-pw-btn">Unlock</button>
    <div class="pw-deny" id="fc-pw-deny" style="display:none">Access denied</div>
  </div>`;
  const inp = document.getElementById('fc-pw-input');
  const btn = document.getElementById('fc-pw-btn');
  const deny = document.getElementById('fc-pw-deny');
  function tryPw() {
    if (inp.value === MGMT_PW) {
      sessionStorage.setItem('fc_auth', '1');
      loadAndRenderFC(c);
    } else {
      inp.classList.add('pw-err');
      deny.style.display = '';
      setTimeout(() => inp.classList.remove('pw-err'), 400);
    }
  }
  btn.addEventListener('click', tryPw);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') tryPw(); });
  setTimeout(() => inp.focus(), 50);
}

async function loadAndRenderFC(c) {
  c.innerHTML = '<div class="empty"><div class="empty-i">⏳</div><div class="empty-t">Loading Full Cash Flow...</div></div>';
  for (let i = 0; i < 7; i++) {
    const d = new Date(Date.now() - i * 86400000).toISOString().slice(0, 10);
    try {
      const r = await fetch('data/management-' + d + '.json');
      if (!r.ok) continue;
      FC_DATA = await r.json();
      renderFullCashflow(c);
      return;
    } catch (e) {}
  }
  c.innerHTML = '<div class="empty"><div class="empty-i">💰</div><div class="empty-t">No Data</div></div>';
}

function renderFullCashflow(c) {
  const d = FC_DATA;
  if (!d) return;

  // Remove stale form overlay (will be recreated fresh by fcAddItemForm)
  const oldForm = document.getElementById('fc-add-form');
  if (oldForm) oldForm.remove();

  fcLoadState();
  fcBalance = parseFloat(localStorage.getItem('fc_balance') || '0');

  // All items — NO fixed costs anywhere
  const allItems = [...(d.all_tasks || []), ...fcManualItems].filter(t => t.due && t.project && t.project !== '⚙ Fixed Costs' && !mgmtIsFixed(t.type));

  // Group by project
  const projTotals = {};
  allItems.forEach(t => {
    if (!projTotals[t.project]) projTotals[t.project] = 0;
    projTotals[t.project] += (t.amount || 0);
  });
  const projNames = Object.keys(projTotals).sort((a, b) => projTotals[b] - projTotals[a]);

  if (projNames.length === 0) {
    c.innerHTML = '<div class="empty"><div class="empty-i">💰</div><div class="empty-t">No project data</div></div>';
    return;
  }

  if (fcCurProj >= projNames.length) fcCurProj = 0;

  const todayStr = new Date().toISOString().slice(0, 10);

  let html = '';
  html += `<div class="page-title" style="margin-bottom:4px">Full Cash Flow</div>`;
  html += `<div style="font-size:12px;color:var(--dim);margin-bottom:16px">Complete payment timeline per project + global overview · Data from ${d.date || '?'}</div>`;

  // Controls bar
  html += `<div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap">`;
  html += `<div style="display:flex;align-items:center;gap:6px">

  html += fcBuildProjectCal(curProjItems, todayStr);

// ── Per-project calendar with income milestone sections ──
function fcBuildProjectCal(items, todayStr) {
  // Sort all items by date
  const sorted = [...items].sort((a, b) => (a.due || '').localeCompare(b.due || ''));
  if (sorted.length === 0) return '<div style="font-size:12px;color:var(--dim);padding:12px;text-align:center">No payments</div>';

  // Build sections: each section ends at an income event
  // Section = [expenses...] → INCOME → summary banner
  let html = '';
  let sectionExpenses = []; // accumulate expenses between incomes
  let sectionExpTotal = 0;
  let runBal = 0;
  let prevMonth = '';

  sorted.forEach((t, idx) => {
    const isIn = t.type === 'income' || t.type === 'p_income';
    const isPaid = t.paid;
    const dd = new Date((t.due || todayStr) + 'T12:00:00');
    const dayName = DAYS[dd.getDay()];
    const monthName = MONTHS[dd.getMonth()];
    const dayLabel = monthName + ' ' + dd.getDate();
    const isToday = (t.due || '') === todayStr;
    const isPast = (t.due || '') < todayStr;
    const isOverdue = isPast && !isPaid;

    // Month header
    const monthKey = dd.getFullYear() + '-' + dd.getMonth();
    if (monthKey !== prevMonth && idx > 0) {
      html += `<div style="padding:6px 0 2px;margin-top:6px;border-top:2px solid var(--bdr)">
        <span style="font-size:12px;font-weight:700;color:var(--txt)">${monthName} ${dd.getFullYear()}</span>
      </div>`;
    }
    prevMonth = monthKey;

    // Track balance
    if (!isPaid) {
      if (isIn) runBal += (t.amount || 0);
      else runBal -= (t.amount || 0);
    }

    const amt = t.amount || 0;
    const typeText = t.type === 'income' ? 'Income' : t.type === 'p_income' ? 'Potential' : t.type === 'materials' ? 'Materials' : 'Subs';
    const tagColor = isIn ? '#4ade80' : (t.type === 'materials' ? '#fb923c' : '#f87171');
    const rowOpacity = isPaid ? 'opacity:.45;' : '';

    if (!isIn) {
      // Expense item — accumulate
      sectionExpenses.push(t);
      if (!isPaid) sectionExpTotal += amt;
    }

    // Render item row
    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 6px;font-size:11px;border-bottom:1px solid rgba(33,39,47,.08);${rowOpacity}${isIn ? 'background:rgba(74,222,128,.04);border-left:3px solid #4ade80;margin:2px 0;border-radius:4px;' : ''}">
      <div style="display:flex;align-items:center;gap:5px;flex:1;min-width:0;overflow:hidden">
        ${isToday ? '<span style="font-size:8px;font-weight:700;color:#38bdf8;background:rgba(56,189,248,.15);padding:1px 4px;border-radius:2px">TODAY</span>' : ''}
        ${isOverdue ? '<span style="font-size:8px;font-weight:700;color:#f97316;background:rgba(249,115,22,.15);padding:1px 4px;border-radius:2px">LATE</span>' : ''}
        <span style="font-size:10px;color:var(--dim);min-width:70px">${dayName} ${dayLabel}</span>
        <span style="background:${tagColor}20;color:${tagColor};border:1px solid ${tagColor}40;font-size:9px;padding:1px 5px;border-radius:3px;white-space:nowrap">${typeText}</span>
        <span style="color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${isPaid ? 'text-decoration:line-through;' : ''}">${t.task}</span>
        ${isPaid ? '<span style="font-size:8px;font-weight:700;color:#4ade80;background:rgba(74,222,128,.15);padding:1px 4px;border-radius:2px">PAID</span>' : ''}
        ${t._manual ? '<span style="font-size:8px;font-weight:700;color:#a78bfa;background:rgba(167,139,250,.15);padding:1px 4px;border-radius:2px">MANUAL</span>' : ''}
      </div>
      <div style="display:flex;align-items:center;gap:4px;white-space:nowrap">
        <span style="color:${isIn ? '#4ade80' : '#f87171'};font-weight:600;font-family:var(--mono);font-size:12px">${isIn ? '+ ' : '- '}${amt ? cfFmt2(amt) : 'TBD'}</span>
        ${t._manual ? '<button onclick="fcDeleteManual(\'' + t.id + '\')" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:12px;padding:0 2px" title="Delete">✕</button>' : ''}
      </div>
    </div>`;

    // If this is an income item → show summary banner
    if (isIn) {
      const netBeforeIncome = sectionExpTotal;
      const incomeAmt = isPaid ? 0 : amt;
      const netAfterIncome = incomeAmt - netBeforeIncome;
      const netColor = netAfterIncome >= 0 ? '#4ade80' : '#f87171';
      const expCount = sectionExpenses.filter(e => !e.paid).length;

      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;margin:4px 0 8px;background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.12);border-radius:6px;font-size:11px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:14px">📊</span>
          <div>
            <div style="font-weight:700;color:var(--txt)">Expenses to collect this income: <span style="color:#f87171;font-family:var(--mono)">${cfFmt(netBeforeIncome)}</span></div>
            <div style="color:var(--dim)">${expCount} unpaid expense${expCount !== 1 ? 's' : ''} since last income</div>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:700;color:${netColor};font-family:var(--mono);font-size:13px">${netAfterIncome >= 0 ? '+' : ''}${cfFmt(netAfterIncome)}</div>
          <div style="font-size:10px;color:var(--dim)">net after this income</div>
        </div>
      </div>`;

      // Reset section
      sectionExpenses = [];
      sectionExpTotal = 0;
    }
  });

  // If there are trailing expenses after last income, show summary
  if (sectionExpenses.length > 0 && sectionExpTotal > 0) {
    const expCount = sectionExpenses.filter(e => !e.paid).length;
    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;margin:4px 0 8px;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.12);border-radius:6px;font-size:11px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:14px">⚠️</span>
        <div>
          <div style="font-weight:700;color:var(--txt)">Remaining expenses with no income: <span style="color:#f87171;font-family:var(--mono)">${cfFmt(sectionExpTotal)}</span></div>
          <div style="color:var(--dim)">${expCount} unpaid expense${expCount !== 1 ? 's' : ''} after last income milestone</div>
        </div>
      </div>
    </div>`;
  }

  // Project total bar
  const totalIn = sorted.filter(t => !t.paid && (t.type === 'income' || t.type === 'p_income')).reduce((s, t) => s + (t.amount || 0), 0);
  const totalOut = sorted.filter(t => !t.paid && t.type !== 'income' && t.type !== 'p_income').reduce((s, t) => s + (t.amount || 0), 0);
  const totalNet = totalIn - totalOut;
  html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px;margin-top:6px;background:rgba(255,255,255,.03);border-top:2px solid var(--bdr);font-size:12px;font-weight:700">
    <span style="color:var(--txt)">PROJECT TOTAL (unpaid)</span>
    <div style="display:flex;gap:12px;font-family:var(--mono)">
      <span style="color:#4ade80">⬇ ${cfFmt(totalIn)}</span>
      <span style="color:#f87171">⬆ ${cfFmt(totalOut)}</span>
      <span style="color:${totalNet >= 0 ? '#4ade80' : '#f87171'}">${totalNet >= 0 ? '+' : ''}${cfFmt(totalNet)}</span>
    </div>
  </div>`;

  return html;
}


function fcSlide(dir) {
  const d = FC_DATA;
  if (!d) return;
  const allItems = [...(d.all_tasks || []), ...fcManualItems].filter(t => t.due && t.project && t.project !== '⚙ Fixed Costs' && !mgmtIsFixed(t.type));
  const projItems = allItems;
  const projTotals = {};
  projItems.forEach(t => { if (!projTotals[t.project]) projTotals[t.project] = 0; projTotals[t.project] += (t.amount || 0); });
  const projNames = Object.keys(projTotals).sort((a, b) => projTotals[b] - projTotals[a]);

  fcCurProj += dir;
  if (fcCurProj < 0) fcCurProj = projNames.length - 1;
  if (fcCurProj >= projNames.length) fcCurProj = 0;

  renderFullCashflow(document.getElementById('content'));
}

  form.innerHTML = `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:20px;width:420px;max-width:90vw">
    <div style="font-size:15px;font-weight:700;color:var(--txt);margin-bottom:14px">➕ Add Manual Item</div>
    <div style="display:grid;gap:10px">

      </div>

      </div>
      <div style="display:flex;gap:8px;margin-top:4px">

        <button id="fc-add-cancel" style="flex:1;background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.2);border-radius:6px;padding:10px;font-weight:700;font-size:13px;cursor:pointer">✕ Cancel</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(form);
  document.getElementById('fc-add-confirm').addEventListener('click', fcConfirmAdd);
  document.getElementById('fc-add-cancel').addEventListener('click', () => { form.style.display = 'none'; });
  // Close on backdrop click
  form.addEventListener('click', (e) => { if (e.target === form) form.style.display = 'none'; });
  setTimeout(() => document.getElementById('fc-add-name').focus(), 100);
}

function fcConfirmAdd() {
  const type = document.getElementById('fc-add-type').value;
  const name = document.getElementById('fc-add-name').value.trim();
  const amount = parseFloat((document.getElementById('fc-add-amount').value || '').replace(/[$,]/g, '')) || 0;
  const due = document.getElementById('fc-add-date').value;
  if (!name) { document.getElementById('fc-add-name').style.borderColor='#f87171'; return; }
  if (!due) { document.getElementById('fc-add-date').style.borderColor='#f87171'; return; }

  fcManualItems.push({
    id: 'fcm_' + fcNextManualId++,
    task: name,
    project: 'Manual',
    type: type,
    amount: amount,
    due: due,
    paid: false,
    _manual: true
  });

  fcSaveState();
  const form = document.getElementById('fc-add-form');
  if (form) form.style.display = 'none';
  renderFullCashflow(document.getElementById('content'));
}

function fcDeleteManual(id) {
  fcManualItems = fcManualItems.filter(t => t.id !== id);
  fcSaveState();
  renderFullCashflow(document.getElementById('content'));
}

let fcGlobalView = 'list';

function fcSetView(view) {
  fcGlobalView = view;
  const listEl = document.getElementById('fc-global-list');
  const calEl = document.getElementById('fc-global-cal-grid');
  const btnList = document.getElementById('fc-view-list');
  const btnCal = document.getElementById('fc-view-cal');
  if (!listEl || !calEl) return;

  const activeStyle = 'background:rgba(56,189,248,.15);color:#38bdf8;border-color:rgba(56,189,248,.3);';
  const inactiveStyle = 'background:var(--card);color:var(--txt);border-color:var(--bdr);';

  if (view === 'list') {
    listEl.style.display = 'block';
    calEl.style.display = 'none';
    if (btnList) btnList.style.cssText += activeStyle;
    if (btnCal) btnCal.style.cssText += inactiveStyle;
  } else {
    listEl.style.display = 'none';
    calEl.style.display = 'block';
    if (btnList) btnList.style.cssText += inactiveStyle;
    if (btnCal) btnCal.style.cssText += activeStyle;
  }
}

function fcBuildCalendarGrid(items, todayStr, startBalance) {
  const unpaid = items.filter(t => t.due && !t.paid);

  // Group by date
  const byDay = {};
  unpaid.forEach(t => {
    const key = t.due < todayStr ? todayStr : t.due;
    if (!byDay[key]) byDay[key] = { in: 0, out: 0, items: [] };
    const isIn = t.type === 'income' || t.type === 'p_income';
    if (isIn) byDay[key].in += (t.amount || 0);
    else byDay[key].out += (t.amount || 0);
    byDay[key].items.push({ ...t, _overdueFrom: t.due < todayStr ? t.due : null });
  });

  // Find date range — start from earliest unpaid, end at latest
  const allDates = Object.keys(byDay).sort();
  if (allDates.length === 0) return '<div style="padding:20px;text-align:center;color:var(--dim)">No unpaid payments</div>';

  const firstDate = new Date(allDates[0] + 'T12:00:00');
  const lastDate = new Date(allDates[allDates.length - 1] + 'T12:00:00');

  // Start from first day of the month of firstDate
  const startMonth = new Date(firstDate.getFullYear(), firstDate.getMonth(), 1);
  // End at last day of the month of lastDate
  const endMonth = new Date(lastDate.getFullYear(), lastDate.getMonth() + 1, 0);

  let html = '';

  // Navigation hint
  html += `<div style="font-size:10px;color:var(--dim);margin-bottom:8px;text-align:center">Click any day to see payment details</div>`;

  // Build running balance day by day
  const balByDay = {};
  let bal = startBalance;
  const scanStart = new Date(startMonth);
  const scanEnd = new Date(endMonth.getTime() + 86400000);
  for (let d = new Date(scanStart); d <= scanEnd; d.setDate(d.getDate() + 1)) {
    const ds = d.toISOString().slice(0, 10);
    const dd = byDay[ds];
    if (dd) bal += dd.in - dd.out;
    balByDay[ds] = bal;
  }

  // Iterate months
  let curMonth = new Date(startMonth);
  while (curMonth <= endMonth) {
    const year = curMonth.getFullYear();
    const month = curMonth.getMonth();
    const monthName = MONTHS[month];
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstDow = new Date(year, month, 1).getDay(); // 0=Sun

    html += `<div style="margin-bottom:16px">`;
    html += `<div style="font-size:14px;font-weight:700;color:var(--txt);margin-bottom:6px;padding-left:4px">${monthName} ${year}</div>`;

    // Day headers
    html += `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;font-size:9px;font-weight:700;color:var(--dim);text-align:center;margin-bottom:2px">`;
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
      html += `<div style="padding:3px">${d}</div>`;
    });
    html += `</div>`;

    // Calendar grid
    html += `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px">`;

    // Empty cells before first day
    for (let i = 0; i < firstDow; i++) {
      html += `<div style="min-height:70px;background:rgba(255,255,255,.01);border-radius:4px"></div>`;
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const isToday = ds === todayStr;
      const isPast = ds < todayStr;
      const dd = byDay[ds];
      const dayBal = balByDay[ds] !== undefined ? balByDay[ds] : startBalance;
      const hasData = dd && dd.items.length > 0;
      const dayId = 'fc-cal-' + ds.replace(/-/g, '');

      const dIn = dd ? dd.in : 0;
      const dOut = dd ? dd.out : 0;
      const dNet = dIn - dOut;

      let bg = 'rgba(255,255,255,.02)';
      let border = '1px solid transparent';
      if (isToday) { bg = 'rgba(56,189,248,.08)'; border = '2px solid #38bdf8'; }
      else if (hasData && dIn > 0 && dOut === 0) bg = 'rgba(74,222,128,.06)';
      else if (hasData && dOut > 0 && dIn === 0) bg = 'rgba(248,113,113,.06)';
      else if (hasData) bg = 'rgba(250,204,21,.04)';

      html += `<div style="min-height:70px;background:${bg};border:${border};border-radius:4px;padding:3px 4px;font-size:9px;position:relative;cursor:${hasData ? 'pointer' : 'default'};overflow:hidden" ${hasData ? 'onclick="fcToggleCalDay(\'' + dayId + '\')"' : ''}>`;

      // Day number
      html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">`;
      html += `<span style="font-size:${isToday ? '12' : '11'}px;font-weight:${isToday ? '800' : '600'};color:${isToday ? '#38bdf8' : isPast ? 'var(--dim)' : 'var(--txt)'}">${day}</span>`;
      if (isToday) html += `<span style="font-size:7px;font-weight:700;color:#38bdf8;background:rgba(56,189,248,.15);padding:0 3px;border-radius:2px">TODAY</span>`;
      html += `</div>`;

      if (hasData) {
        if (dIn > 0) html += `<div style="color:#4ade80;font-weight:700;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">⬇ ${cfFmt(dIn)}</div>`;
        if (dOut > 0) html += `<div style="color:#f87171;font-weight:700;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">⬆ ${cfFmt(dOut)}</div>`;
        const balColor = dayBal >= 0 ? '#4ade80' : '#f87171';
        html += `<div style="color:${balColor};font-size:8px;font-weight:600;font-family:var(--mono);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Bal: ${cfFmt(dayBal)}</div>`;
        html += `<div style="font-size:8px;color:var(--dim)">${dd.items.length} item${dd.items.length > 1 ? 's' : ''}</div>`;
      }

      html += `</div>`;

      // Hidden detail panel (full width, inserted after this cell)
      if (hasData) {
        const detBalColor = dayBal >= 0 ? '#4ade80' : '#f87171';
        html += `<div id="${dayId}" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:998;align-items:center;justify-content:center" onclick="if(event.target===this)this.style.display='none'">
          <div style="background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;width:500px;max-width:90vw;max-height:80vh;overflow-y:auto" onclick="event.stopPropagation()">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
              <div>
                <div style="font-size:14px;font-weight:700;color:var(--txt)">${DAYS[new Date(ds+'T12:00:00').getDay()]} ${monthName} ${day}, ${year}</div>
                <div style="font-size:11px;color:var(--dim)">${dd.items.length} payments</div>
              </div>
              <div style="display:flex;gap:10px;font-size:12px;font-weight:700;font-family:var(--mono)">
                ${dIn > 0 ? '<span style="color:#4ade80">⬇ ' + cfFmt(dIn) + '</span>' : ''}
                ${dOut > 0 ? '<span style="color:#f87171">⬆ ' + cfFmt(dOut) + '</span>' : ''}
                <span style="color:${detBalColor}">Bal: ${cfFmt(dayBal)}</span>
              </div>
            </div>`;

        // Item list
        dd.items.sort((a, b) => {
          const aI = a.type === 'income' || a.type === 'p_income' ? 0 : 1;
          const bI = b.type === 'income' || b.type === 'p_income' ? 0 : 1;
          if (aI !== bI) return aI - bI;
          return (b.amount || 0) - (a.amount || 0);
        }).forEach(t => {
          const isIn = t.type === 'income' || t.type === 'p_income';
          const typeText = t.type === 'income' ? 'Income' : t.type === 'p_income' ? 'Potential' : t.type === 'materials' ? 'Materials' : 'Subs';
          const tagColor = isIn ? '#4ade80' : (t.type === 'materials' ? '#fb923c' : '#f87171');
          html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(33,39,47,.1);font-size:12px">
            <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;overflow:hidden">
              <span style="background:${tagColor}20;color:${tagColor};border:1px solid ${tagColor}40;font-size:10px;padding:1px 6px;border-radius:3px;white-space:nowrap">${typeText}</span>
              <span style="color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.task}</span>
              <span style="color:var(--dim);font-size:10px;white-space:nowrap">— ${t.project || ''}</span>
              ${t._overdueFrom ? '<span style="font-size:8px;font-weight:700;color:#f97316;background:rgba(249,115,22,.15);padding:1px 4px;border-radius:2px">OVERDUE</span>' : ''}
              ${t._manual ? '<span style="font-size:8px;font-weight:700;color:#a78bfa;background:rgba(167,139,250,.15);padding:1px 4px;border-radius:2px">MANUAL</span>' : ''}
            </div>
            <span style="color:${isIn ? '#4ade80' : '#f87171'};font-weight:700;font-family:var(--mono);white-space:nowrap;margin-left:8px">${isIn ? '+ ' : '- '}${t.amount ? cfFmt2(t.amount) : 'TBD'}</span>
          </div>`;
        });

        html += `<button onclick="this.closest('[id^=fc-cal]').style.display='none'" style="margin-top:10px;width:100%;background:rgba(255,255,255,.05);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;padding:8px;font-size:12px;cursor:pointer">Close</button>`;
        html += `</div></div>`;
      }
    }

    html += `</div></div>`;

    // Next month
    curMonth = new Date(year, month + 1, 1);
  }

  return html;
}

function fcToggleCalDay(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
}

function fcExportPDF() {
  const d = FC_DATA;
  if (!d) return;

  const allItems = [...(d.all_tasks || []), ...fcManualItems].filter(t => t.due && t.project && t.project !== '⚙ Fixed Costs' && !mgmtIsFixed(t.type));
  const todayStr = new Date().toISOString().slice(0, 10);
  const todayLabel = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  // Group by project
  const byProj = {};
  allItems.forEach(t => {
    if (!byProj[t.project]) byProj[t.project] = [];
    byProj[t.project].push(t);
  });
  const projNames = Object.keys(byProj).sort((a, b) => {
    const aT = byProj[a].reduce((s, t) => s + (t.amount || 0), 0);
    const bT = byProj[b].reduce((s, t) => s + (t.amount || 0), 0);
    return bT - aT;
  });

  const fmt = (n) => '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  let html = `<!DOCTYPE html><html><head><meta charset="utf-8">
<title>Cash Flow Report — ${todayStr}</title>
<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; color: #1a1a1a; margin: 20px; line-height: 1.4; }
  h1 { font-size: 18px; margin-bottom: 2px; }
  h2 { font-size: 14px; margin-top: 20px; margin-bottom: 6px; border-bottom: 2px solid #333; padding-bottom: 3px; }
  h3 { font-size: 12px; margin-top: 14px; margin-bottom: 4px; color: #444; }
  .meta { font-size: 10px; color: #666; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 10px; font-size: 10px; }
  th { background: #f0f0f0; font-weight: 700; text-align: left; padding: 4px 6px; border: 1px solid #ccc; }
  td { padding: 3px 6px; border: 1px solid #ddd; }
  .right { text-align: right; }
  .bold { font-weight: 700; }
  .green { color: #16a34a; }
  .red { color: #dc2626; }
  .blue { color: #2563eb; }
  .gray { color: #888; }
  .paid { text-decoration: line-through; color: #999; }
  .summary-row { background: #f8f8f8; font-weight: 700; }
  .section-banner { background: #e8f4fd; padding: 6px 8px; margin: 6px 0; border-radius: 4px; font-size: 10px; }
  .warning-banner { background: #fef2f2; padding: 6px 8px; margin: 6px 0; border-radius: 4px; font-size: 10px; color: #991b1b; }
  .grand-table td { padding: 5px 8px; font-size: 11px; }
  @media print { body { margin: 10px; } h1 { font-size: 16px; } }
  .page-break { page-break-before: always; }
</style></head><body>
<h1>💰 Construction Nation Group — Cash Flow Report</h1>
<div class="meta">Generated: ${todayLabel} · Data from: ${d.date || todayStr} · Bank Balance: ${fmt(fcBalance)}</div>`;

  // ── EXECUTIVE SUMMARY ──
  let grandTotalIn = 0, grandTotalOut = 0, grandUnpaidIn = 0, grandUnpaidOut = 0;
  projNames.forEach(p => {
    const items = byProj[p];
    items.forEach(t => {
      const isIn = t.type === 'income' || t.type === 'p_income';
      if (isIn) { grandTotalIn += (t.amount || 0); if (!t.paid) grandUnpaidIn += (t.amount || 0); }
      else { grandTotalOut += (t.amount || 0); if (!t.paid) grandUnpaidOut += (t.amount || 0); }
    });
  });

  html += `<h2>Executive Summary</h2>
  <table class="grand-table"><tr>
    <th>Metric</th><th class="right">Amount</th>
  </tr>
  <tr><td>Bank Balance</td><td class="right bold">${fmt(fcBalance)}</td></tr>
  <tr><td>Total Income (all projects)</td><td class="right green">${fmt(grandTotalIn)}</td></tr>
  <tr><td>Total Expenses (all projects)</td><td class="right red">${fmt(grandTotalOut)}</td></tr>
  <tr><td>Remaining Income (unpaid)</td><td class="right blue">${fmt(grandUnpaidIn)}</td></tr>
  <tr><td>Remaining Expenses (unpaid)</td><td class="right red">${fmt(grandUnpaidOut)}</td></tr>
  <tr class="summary-row"><td>Net Remaining (In - Out)</td><td class="right ${grandUnpaidIn - grandUnpaidOut >= 0 ? 'green' : 'red'}">${grandUnpaidIn - grandUnpaidOut >= 0 ? '+' : '-'}${fmt(grandUnpaidIn - grandUnpaidOut)}</td></tr>
  <tr class="summary-row"><td>Projected Balance (Bank + Net)</td><td class="right ${fcBalance + grandUnpaidIn - grandUnpaidOut >= 0 ? 'green' : 'red'}">${fmt(fcBalance + grandUnpaidIn - grandUnpaidOut)}</td></tr>
  </table>`;

  // ── PROJECT SUMMARY TABLE ──
  html += `<h2>Project Overview</h2>
  <table><tr>
    <th>Project</th><th class="right">Total In</th><th class="right">Total Out</th>
    <th class="right">Remaining In</th><th class="right">Remaining Out</th><th class="right">Net Remaining</th>
  </tr>`;
  projNames.forEach(p => {
    const items = byProj[p];
    let tIn = 0, tOut = 0, uIn = 0, uOut = 0;
    items.forEach(t => {
      const isIn = t.type === 'income' || t.type === 'p_income';
      if (isIn) { tIn += (t.amount || 0); if (!t.paid) uIn += (t.amount || 0); }
      else { tOut += (t.amount || 0); if (!t.paid) uOut += (t.amount || 0); }
    });
    const net = uIn - uOut;
    html += `<tr>
      <td class="bold">${p}</td>
      <td class="right green">${fmt(tIn)}</td><td class="right red">${fmt(tOut)}</td>
      <td class="right blue">${fmt(uIn)}</td><td class="right red">${fmt(uOut)}</td>
      <td class="right bold ${net >= 0 ? 'green' : 'red'}">${net >= 0 ? '+' : '-'}${fmt(net)}</td>
    </tr>`;
  });
  html += `<tr class="summary-row">
    <td class="bold">ALL PROJECTS</td>
    <td class="right green">${fmt(grandTotalIn)}</td><td class="right red">${fmt(grandTotalOut)}</td>
    <td class="right blue">${fmt(grandUnpaidIn)}</td><td class="right red">${fmt(grandUnpaidOut)}</td>
    <td class="right bold ${grandUnpaidIn - grandUnpaidOut >= 0 ? 'green' : 'red'}">${grandUnpaidIn - grandUnpaidOut >= 0 ? '+' : '-'}${fmt(grandUnpaidIn - grandUnpaidOut)}</td>
  </tr></table>`;

  // ── PER-PROJECT DETAIL ──
  projNames.forEach((p, pi) => {
    const items = byProj[p].sort((a, b) => (a.due || '').localeCompare(b.due || ''));
    let uIn = 0, uOut = 0;
    items.forEach(t => {
      const isIn = t.type === 'income' || t.type === 'p_income';
      if (!t.paid) { if (isIn) uIn += (t.amount || 0); else uOut += (t.amount || 0); }
    });
    const net = uIn - uOut;

    if (pi > 0 && pi % 2 === 0) html += '<div class="page-break"></div>';
    html += `<h2>${p}</h2>`;
    html += `<div class="meta">Remaining In: <span class="blue bold">${fmt(uIn)}</span> · Remaining Out: <span class="red bold">${fmt(uOut)}</span> · Net: <span class="${net >= 0 ? 'green' : 'red'} bold">${net >= 0 ? '+' : '-'}${fmt(net)}</span> · ${items.length} total payments</div>`;

    // Income milestones section
    const incomeItems = items.filter(t => t.type === 'income' || t.type === 'p_income');
    if (incomeItems.length > 0) {
      html += `<h3>Income Milestones</h3><table><tr><th>Date</th><th>Description</th><th class="right">Amount</th><th>Status</th></tr>`;
      incomeItems.forEach(t => {
        html += `<tr><td>${t.due}</td><td${t.paid ? ' class="paid"' : ''}>${t.task}</td><td class="right green">${fmt(t.amount || 0)}</td><td>${t.paid ? '✅ Paid' : '⏳ Pending'}</td></tr>`;
      });
      html += `</table>`;
    }

    // Full payment timeline with expense-to-income sections
    html += `<h3>Full Timeline</h3><table><tr><th>Date</th><th>Type</th><th>Description</th><th class="right">Amount</th><th>Status</th></tr>`;
    let secExpTotal = 0, secExpCount = 0;
    items.forEach(t => {
      const isIn = t.type === 'income' || t.type === 'p_income';
      const typeLabel = t.type === 'income' ? 'Income' : t.type === 'p_income' ? 'Potential' : t.type === 'materials' ? 'Materials' : 'Subs';

      if (!isIn && !t.paid) { secExpTotal += (t.amount || 0); secExpCount++; }

      html += `<tr><td>${t.due}</td><td>${typeLabel}</td><td${t.paid ? ' class="paid"' : ''}>${t.task}${t._manual ? ' (MANUAL)' : ''}</td>
        <td class="right ${isIn ? 'green' : 'red'}">${isIn ? '+' : '-'}${fmt(t.amount || 0)}</td>
        <td>${t.paid ? '✅ Paid' : (t.due < todayStr ? '🔴 Overdue' : '⏳')}</td></tr>`;

      if (isIn) {
        const incAmt = t.paid ? 0 : (t.amount || 0);
        const netAfter = incAmt - secExpTotal;
        html += `<tr class="summary-row"><td colspan="3" style="font-size:10px">📊 Expenses to collect this income: <span class="red bold">${fmt(secExpTotal)}</span> (${secExpCount} unpaid) → Net after income: <span class="${netAfter >= 0 ? 'green' : 'red'} bold">${netAfter >= 0 ? '+' : '-'}${fmt(netAfter)}</span></td><td></td><td></td></tr>`;
        secExpTotal = 0; secExpCount = 0;
      }
    });
    if (secExpTotal > 0) {
      html += `<tr class="summary-row"><td colspan="3" style="font-size:10px">⚠️ Remaining expenses with no income: <span class="red bold">${fmt(secExpTotal)}</span> (${secExpCount} unpaid)</td><td></td><td></td></tr>`;
    }
    html += `</table>`;
  });

  // ── GLOBAL DAILY CASH FLOW ──
  html += '<div class="page-break"></div>';
  html += `<h2>Global Daily Cash Flow</h2>`;
  html += `<div class="meta">All projects combined · Starting balance: ${fmt(fcBalance)}</div>`;

  const globalByDay = {};
  allItems.filter(t => !t.paid).forEach(t => {
    const key = t.due < todayStr ? todayStr : t.due;
    if (!globalByDay[key]) globalByDay[key] = { in: 0, out: 0, items: [] };
    const isIn = t.type === 'income' || t.type === 'p_income';
    if (isIn) globalByDay[key].in += (t.amount || 0);
    else globalByDay[key].out += (t.amount || 0);
    globalByDay[key].items.push(t);
  });
  const globalDays = Object.keys(globalByDay).sort();

  html += `<table><tr><th>Date</th><th>Day</th><th class="right">Income</th><th class="right">Expenses</th><th class="right">Net</th><th class="right">Balance</th><th>Details</th></tr>`;
  let runBal = fcBalance;
  globalDays.forEach(day => {
    const dd = new Date(day + 'T12:00:00');
    const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dd.getDay()];
    const gd = globalByDay[day];
    const net = gd.in - gd.out;
    runBal += net;
    const details = gd.items.map(t => {
      const isIn = t.type === 'income' || t.type === 'p_income';
      return (isIn ? '+' : '-') + fmt(t.amount || 0) + ' ' + t.task + ' (' + (t.project || '') + ')';
    }).join('; ');
    html += `<tr><td>${day}</td><td>${dayName}</td>
      <td class="right green">${gd.in > 0 ? fmt(gd.in) : ''}</td>
      <td class="right red">${gd.out > 0 ? fmt(gd.out) : ''}</td>
      <td class="right bold ${net >= 0 ? 'green' : 'red'}">${net >= 0 ? '+' : '-'}${fmt(net)}</td>
      <td class="right bold ${runBal >= 0 ? 'green' : 'red'}">${fmt(runBal)}</td>
      <td style="font-size:9px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${details}</td></tr>`;
  });
  html += `</table>`;

  html += `<div class="meta" style="margin-top:20px">End of report · Generated by Jade · Construction Nation Group</div>`;
  html += `</body></html>`;

  // Open in new window for print
  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.onload = () => { win.print(); };
}

function fcSaveState() {
  localStorage.setItem(FC_SAVE_KEY, JSON.stringify({ items: fcManualItems, nextId: fcNextManualId }));
}

function fcLoadState() {
  try {
    const raw = localStorage.getItem(FC_SAVE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      fcManualItems = s.items || [];
      fcNextManualId = s.nextId || 1;
    }
  } catch (e) {}
}

function fcBuildDayCal(items, todayStr, startBalance, showRunningBal) {
  // Group by day
  const byDay = {};
  items.forEach(t => {
    if (!t.due) return;
    const key = t.due < todayStr && !t.paid ? todayStr : t.due; // pin overdue to today
    if (!byDay[key]) byDay[key] = { items: [] };
    byDay[key].items.push({ ...t, _overdueFrom: t.due < todayStr && !t.paid ? t.due : null });
  });

  const days = Object.keys(byDay).sort();
  if (days.length === 0) return '<div style="font-size:12px;color:var(--dim);padding:12px;text-align:center">No payments found</div>';

  let html = '';
  let runBal = startBalance;
  let prevMonth = '';

  days.forEach((day, idx) => {
    const dd = new Date(day + 'T12:00:00');
    const dayName = DAYS[dd.getDay()];
    const monthName = MONTHS[dd.getMonth()];
    const dayLabel = monthName + ' ' + dd.getDate();
    const isToday = day === todayStr;
    const isWeekend = dd.getDay() === 0 || dd.getDay() === 6;
    const isMon = dd.getDay() === 1;
    const isPast = day < todayStr;

    // Month separator
    const monthKey = dd.getFullYear() + '-' + dd.getMonth();
    if (monthKey !== prevMonth && idx > 0) {
      html += `<div style="padding:8px 0 4px;margin-top:8px;border-top:2px solid var(--bdr)">
        <span style="font-size:13px;font-weight:700;color:var(--txt)">${monthName} ${dd.getFullYear()}</span>
      </div>`;
    }
    prevMonth = monthKey;

    // Week separator
    if (isMon && idx > 0) html += '<div style="height:1px;background:var(--bdr);margin:4px 0"></div>';

    const dayItems = byDay[day].items;

    // Calculate day totals
    let dIn = 0, dOut = 0;
    dayItems.forEach(t => {
      const isIn = t.type === 'income' || t.type === 'p_income';
      if (t.paid) return; // skip paid from totals
      if (isIn) dIn += (t.amount || 0);
      else dOut += (t.amount || 0);
    });

    if (showRunningBal) {
      runBal += dIn - dOut;
    }

    const dNet = dIn - dOut;
    const borderC = dIn > 0 && dOut === 0 ? '#4ade80' : dOut > 0 && dIn === 0 ? '#f87171' : (dIn > 0 && dOut > 0 ? '#facc15' : 'var(--bdr)');
    const balC = runBal >= 0 ? '#4ade80' : '#f87171';

    // Day has no unpaid items — skip display if all paid
    const hasUnpaid = dayItems.some(t => !t.paid);
    const hasPaid = dayItems.some(t => t.paid);

    // Day header (clickable to expand)
    const dayId = 'fc-day-' + day.replace(/-/g, '');
    html += `<div style="margin-bottom:1px">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 8px;background:${isToday ? 'rgba(56,189,248,.08)' : isPast ? 'rgba(255,255,255,.01)' : 'rgba(255,255,255,.02)'};border-radius:6px;cursor:pointer;border-left:3px solid ${borderC}" onclick="var el=document.getElementById('${dayId}');el.style.display=el.style.display==='none'?'block':'none'">
        <div style="flex:1">
          ${isToday ? '<span style="font-size:9px;font-weight:700;color:#38bdf8;background:rgba(56,189,248,.15);padding:1px 5px;border-radius:3px;margin-right:4px">TODAY</span>' : ''}
          ${isPast ? '<span style="font-size:9px;font-weight:700;color:#f97316;background:rgba(249,115,22,.1);padding:1px 5px;border-radius:3px;margin-right:4px">PAST</span>' : ''}
          <span style="font-size:12px;font-weight:600;color:var(--txt)">${dayName} ${dayLabel}</span>
          <span style="font-size:10px;color:var(--dim);margin-left:4px">${dayItems.length} item${dayItems.length !== 1 ? 's' : ''}</span>
        </div>
        <div style="display:flex;gap:10px;font-size:11px;font-weight:600;align-items:center">
          ${dIn > 0 ? '<span style="color:#4ade80;background:rgba(74,222,128,.1);padding:2px 6px;border-radius:4px">⬇ IN ' + cfFmt(dIn) + '</span>' : ''}
          ${dOut > 0 ? '<span style="color:#f87171;background:rgba(248,113,113,.1);padding:2px 6px;border-radius:4px">⬆ OUT ' + cfFmt(dOut) + '</span>' : ''}
          ${showRunningBal ? '<span style="color:var(--dim)">│</span><span style="color:' + balC + ';font-family:var(--mono);font-weight:700;min-width:80px;text-align:right">Bal: ' + cfFmt(runBal) + '</span>' : ''}
        </div>
      </div>
      <div id="${dayId}" style="display:none;padding:4px 0 6px 16px">`;

    // Sort: income first, then by amount desc
    dayItems.sort((a, b) => {
      const aIn = a.type === 'income' || a.type === 'p_income' ? 0 : 1;
      const bIn = b.type === 'income' || b.type === 'p_income' ? 0 : 1;
      if (aIn !== bIn) return aIn - bIn;
      return (b.amount || 0) - (a.amount || 0);
    });

    dayItems.forEach(t => {
      const isIn = t.type === 'income' || t.type === 'p_income';
      const typeText = t.type === 'income' ? 'Income' : t.type === 'p_income' ? 'Potential' : t.type === 'materials' ? 'Materials' : t.type === 'subs' ? 'Subs' : mgmtTypeInfo(t.type).label || 'Expense';
      const tagColor = isIn ? '#4ade80' : (t.type === 'materials' ? '#fb923c' : '#f87171');
      const isPaid = t.paid;
      const isManual = t._manual;
      const odFrom = t._overdueFrom;
      const rowOpacity = isPaid ? 'opacity:.45;' : '';

      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(33,39,47,.1);${rowOpacity}">
        <div style="display:flex;align-items:center;gap:5px;flex:1;min-width:0;overflow:hidden">
          <span style="background:${tagColor}20;color:${tagColor};border:1px solid ${tagColor}40;font-size:9px;padding:1px 5px;border-radius:3px;white-space:nowrap">${typeText}</span>
          <span style="color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${isPaid ? 'text-decoration:line-through;' : ''}">${t.task}</span>
          <span style="color:var(--dim);font-size:9px;white-space:nowrap">— ${t.project || ''}</span>
          ${isPaid ? '<span style="font-size:8px;font-weight:700;color:#4ade80;background:rgba(74,222,128,.15);padding:1px 4px;border-radius:2px">PAID</span>' : ''}
          ${odFrom ? '<span style="font-size:8px;font-weight:700;color:#f97316;background:rgba(249,115,22,.15);padding:1px 4px;border-radius:2px">OVERDUE ' + odFrom + '</span>' : ''}
          ${isManual ? '<span style="font-size:8px;font-weight:700;color:#a78bfa;background:rgba(167,139,250,.15);padding:1px 4px;border-radius:2px">MANUAL</span>' : ''}
        </div>
        <div style="display:flex;align-items:center;gap:4px;white-space:nowrap">
          <span style="color:${isIn ? '#4ade80' : '#f87171'};font-weight:600;font-family:var(--mono)">${isIn ? '+ ' : '- '}${t.amount ? cfFmt2(t.amount) : 'TBD'}</span>
          ${isManual ? '<button onclick="fcDeleteManual(\'' + t.id + '\')" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:12px;padding:0 2px" title="Delete">✕</button>' : ''}
        </div>
      </div>`;
    });

    html += `</div></div>`; // end detail + day
  });

  return html;
}


</script>
</body>
</html>
