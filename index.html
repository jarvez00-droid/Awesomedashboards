function renderScenario(balance) {
  const tableEl = document.getElementById('sit-table');
  const summaryEl = document.getElementById('sit-summary');
  const chartEl = document.getElementById('sit-chart-wrap');
  if (!tableEl || !summaryEl) return;

  const all = [...scenarioItems, ...scenarioManualItems];
  const selCount = scenarioSelected.size;

  // Show/hide batch bar
  const batchBar = document.getElementById('sit-batch-bar');
  if (batchBar) batchBar.style.display = selCount > 0 ? 'flex' : 'none';
  const selCountEl = document.getElementById('sit-sel-count');
  if (selCountEl) selCountEl.textContent = selCount + ' selected';

  // Build 21 days
  const calToday = new Date(new Date().toISOString().slice(0,10)+'T12:00:00');
  const daySlots = [];
  const _simDays = window._sitDataDays || 28;
  for (let i = 0; i < _simDays; i++) {
    const dd = new Date(calToday.getTime() + i * 86400000);
    daySlots.push({ date: dd.toISOString().slice(0,10), obj: dd, items: [] });
  }
  const dayIndex = {};
  daySlots.forEach((d,i) => dayIndex[d.date] = i);
  all.forEach(item => { let idx = dayIndex[item.due]; if (idx === undefined && item._overdue) idx = 0; if (idx !== undefined) daySlots[idx].items.push(item); });

  // Compute running balance
  let runBal = balance, grossBal = balance, netPotBal = balance;
  let minBal = balance, minDate = '';
  const projPts = [{ date: 'start', net: balance, gross: balance, netPot: balance }];

  daySlots.forEach(day => {
    let dConfIn=0, dPotIn=0, dProjOut=0, dFixedOut=0;
    day.items.forEach(item => {
      if (item._removed) return; // skip removed items from calculations
      if (item.type==='income') dConfIn += item.amount;
      else if (item.type==='p_income') dPotIn += item.amount;
      else if (mgmtIsFixed(item.type)) dFixedOut += item.amount;
      else dProjOut += item.amount;
    });
    grossBal += dConfIn - dProjOut;
    runBal += dConfIn - dProjOut - (mgmtIncludeFixed ? dFixedOut : 0);
    netPotBal = runBal + dPotIn;
    day.bal = runBal;
    day.sumIn = dConfIn + dPotIn;
    day.sumOut = dProjOut + dFixedOut;
    day.net = (dConfIn - dProjOut - (mgmtIncludeFixed ? dFixedOut : 0));
    projPts.push({ date: day.date, net: runBal, gross: grossBal, netPot: netPotBal });
    if (runBal < minBal) { minBal = runBal; minDate = day.date; }
  });

  const endBal = runBal;
  const adjusted = all.filter(x => x.shift !== 0).length;
  const manualCount = scenarioManualItems.length;
  const hasGross = projPts.some(p => Math.abs(p.gross - p.net) > 1);
  const hasPot = projPts.some(p => Math.abs(p.netPot - p.net) > 1);
  const minDt = minDate ? new Date(minDate + 'T12:00:00') : null;
  const minLbl = minDt ? MONTHS[minDt.getMonth()] + ' ' + minDt.getDate() : '';

  // ── Summary bar ──
  summaryEl.innerHTML = `<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr);margin-bottom:10px">
    <div style="padding:8px 14px;background:rgba(56,189,248,.06);border-radius:8px;border:1px solid rgba(56,189,248,.15)">
      <span style="font-size:11px;color:var(--dim)">Start: </span>
      <span style="font-size:16px;font-weight:700;color:var(--txt)">${cfFmt(balance)}</span>
    </div>
    <span style="color:var(--dim);font-size:18px">→</span>
    <div style="padding:8px 14px;background:${endBal>=0?'rgba(74,222,128,.06)':'rgba(248,113,113,.06)'};border-radius:8px;border:1px solid ${endBal>=0?'rgba(74,222,128,.15)':'rgba(248,113,113,.15)'}">
      <span style="font-size:11px;color:var(--dim)">Day ${daySlots.length}: </span>
      <span style="font-size:16px;font-weight:700;color:${endBal>=0?'#4ade80':'#f87171'}">${cfFmt(endBal)}</span>
    </div>
    <div style="padding:8px 14px;background:${minBal>=0?'rgba(250,204,21,.06)':'rgba(248,113,113,.06)'};border-radius:8px;border:1px solid ${minBal>=0?'rgba(250,204,21,.15)':'rgba(248,113,113,.15)'}">
      <span style="font-size:11px;color:var(--dim)">⚠ Lowest: </span>
      <span style="font-size:16px;font-weight:700;color:${minBal>=0?'#facc15':'#f87171'}">${cfFmt(minBal)}</span>
      ${minLbl?'<span style="font-size:11px;color:var(--dim)"> on '+minLbl+'</span>':''}
    </div>
    ${adjusted>0?'<div style="padding:6px 12px;background:rgba(250,204,21,.06);border-radius:8px;border:1px solid rgba(250,204,21,.15);font-size:13px;color:#facc15;font-weight:600">'+adjusted+' shifted</div>':''}
    ${manualCount>0?'<div style="padding:6px 12px;background:rgba(232,121,249,.06);border-radius:8px;border:1px solid rgba(232,121,249,.15);font-size:13px;color:#e879f9;font-weight:600">'+manualCount+' manual</div>':''}
    ${all.filter(x=>x._removed).length>0?'<div style="padding:6px 12px;background:rgba(248,113,113,.06);border-radius:8px;border:1px solid rgba(248,113,113,.15);font-size:13px;color:#f87171;font-weight:600">'+all.filter(x=>x._removed).length+' removed</div>':''}
    ${selCount>0?'<div style="padding:6px 12px;background:rgba(250,204,21,.08);border-radius:8px;border:1px solid rgba(250,204,21,.3);font-size:13px;color:#facc15;font-weight:600">'+selCount+' selected — use batch bar above</div>':''}
  </div>`;

  // ── Table ──


  // ── Day cards grouped by collapsible weeks ──
  // Group days into weeks (7 days each)
  const weeks = [];
  const _numWeeks = Math.ceil(daySlots.length / 7);
  for (let w = 0; w < _numWeeks; w++) {
    const start = w * 7;
    const end = Math.min(start + 7, daySlots.length);
    const wDays = daySlots.slice(start, end);
    let wIn = 0, wOut = 0;
    wDays.forEach(d => { wIn += d.sumIn; wOut += d.sumOut; });
    const lastDay = wDays[wDays.length - 1];
    const firstDay = wDays[0];
    const hasToday = wDays.some(d => d.date === new Date().toISOString().slice(0,10));
    weeks.push({ num: w + 1, days: wDays, wIn, wOut, startBal: w === 0 ? balance : daySlots[start - 1].bal, endBal: lastDay.bal, firstDate: firstDay, lastDate: lastDay, hasToday });
  }

  let t = '';
  weeks.forEach(wk => {
    const wNet = wk.wIn - wk.wOut;
    const wNetC = wNet >= 0 ? '#4ade80' : '#f87171';
    const endC = wk.endBal >= 0 ? '#4ade80' : '#f87171';
    const startLbl = MONTHS[wk.firstDate.obj.getMonth()] + ' ' + wk.firstDate.obj.getDate();
    const endLbl = MONTHS[wk.lastDate.obj.getMonth()] + ' ' + wk.lastDate.obj.getDate();
    // Current week starts open, others closed
    const isOpen = wk.hasToday;
    const wkId = 'sit-wk-' + wk.num;

    t += `<div style="border:1px solid rgba(255,255,255,.08);border-radius:12px;margin-bottom:10px;overflow:hidden">`;

    // Week header — clickable toggle
    t += `<div onclick="var b=document.getElementById('${wkId}');b.style.display=b.style.display==='none'?'block':'none';var arr=this.querySelector('.sit-wk-arr');arr.textContent=b.style.display==='none'?'▸':'▾'" style="display:flex;justify-content:space-between;align-items:center;padding:12px 18px;background:rgba(56,189,248,.06);cursor:pointer;user-select:none;border-bottom:1px solid rgba(56,189,248,.12)">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="sit-wk-arr" style="font-size:16px;color:#38bdf8;font-weight:700;width:16px">${isOpen ? '▾' : '▸'}</span>
        <span style="font-size:16px;font-weight:800;color:#38bdf8">Week ${wk.num}</span>
        <span style="font-size:14px;font-weight:600;color:#b0b8c8">${startLbl} – ${endLbl}</span>
        ${wk.hasToday ? '<span style="font-size:10px;font-weight:700;color:#38bdf8;background:rgba(56,189,248,.2);padding:2px 8px;border-radius:4px">THIS WEEK</span>' : ''}
      </div>
      <div style="display:flex;align-items:center;gap:20px;font-size:13px">
        <div style="text-align:right">
          <span style="color:var(--dim)">In: </span>
          <span style="color:#4ade80;font-weight:700;font-family:var(--mono)">${cfFmt(wk.wIn)}</span>
        </div>
        <div style="text-align:right">
          <span style="color:var(--dim)">Out: </span>
          <span style="color:#f87171;font-weight:700;font-family:var(--mono)">${cfFmt(wk.wOut)}</span>
        </div>
        <div style="text-align:right">
          <span style="color:var(--dim)">Net: </span>
          <span style="color:${wNetC};font-weight:700;font-family:var(--mono)">${wNet>=0?'+':''}${cfFmt(wNet)}</span>
        </div>
        <div style="text-align:right;min-width:80px">
          <span style="color:var(--dim)">End: </span>
          <span style="color:${endC};font-weight:800;font-size:16px;font-family:var(--mono)">${cfFmt(wk.endBal)}</span>
        </div>
      </div>
    </div>`;

    // Week body — collapsible
    t += `<div id="${wkId}" style="display:${isOpen ? 'block' : 'none'}">`;

    wk.days.forEach((day, dayIdx) => {
      const dd = day.obj;
      const dayName = DAYS[dd.getDay()];
      const dayLabel = MONTHS[dd.getMonth()] + ' ' + dd.getDate();
      const isToday = day.date === new Date().toISOString().slice(0,10);
      const balC = day.bal >= 0 ? '#4ade80' : '#f87171';
      const netC = day.net > 0 ? '#4ade80' : (day.net < 0 ? '#f87171' : 'var(--dim)');
      const incItems = day.items.filter(x => x.isIn).sort((a,b) => (b.manual?1:0) - (a.manual?1:0));
      const expItems = day.items.filter(x => !x.isIn).sort((a,b) => (b.manual?1:0) - (a.manual?1:0));
      const hasItems = incItems.length > 0 || expItems.length > 0;

      const cardBorder = isToday ? 'border-left:4px solid #38bdf8;' : day.bal < 0 ? 'border-left:4px solid #f87171;' : 'border-left:4px solid transparent;';
      const cardBg = isToday ? 'rgba(56,189,248,.04)' : day.bal < 0 ? 'rgba(248,113,113,.03)' : (dayIdx % 2 === 0 ? 'rgba(255,255,255,.015)' : 'transparent');

      t += `<div style="${cardBorder}background:${cardBg};border-bottom:1px solid rgba(255,255,255,.05);padding:0">`;

      // Day header
      t += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(255,255,255,.02)">`;
      t += `<div style="display:flex;align-items:center;gap:10px">`;
      if (isToday) t += `<span style="font-size:10px;font-weight:800;color:#38bdf8;background:rgba(56,189,248,.2);padding:2px 8px;border-radius:4px">TODAY</span>`;
      t += `<span style="font-size:17px;font-weight:800;color:#fff">${dayName}</span>`;
      t += `<span style="font-size:14px;font-weight:600;color:#b0b8c8">${dayLabel}</span>`;
      if (!hasItems) t += `<span style="font-size:12px;color:var(--dim)">— no payments</span>`;
      else t += `<span style="font-size:12px;color:var(--dim)">${incItems.length + expItems.length} item${(incItems.length+expItems.length)>1?'s':''}</span>`;
      t += `</div>`;
      t += `<div style="display:flex;align-items:center;gap:14px">`;
      const netLabel = day.net === 0 ? '' : ((day.net > 0 ? '+' : '') + cfFmt(day.net));
      if (netLabel) t += `<span style="font-size:15px;font-weight:700;color:${netC};font-family:var(--mono)">${netLabel}</span>`;
      t += `<span style="font-size:18px;font-weight:800;color:${balC};font-family:var(--mono)">${cfFmt(day.bal)}</span>`;
      if (day.bal < 0) t += `<span style="font-size:10px;color:#f87171;font-weight:700">⚠</span>`;
      t += `</div></div>`;

      // Items
      if (hasItems) {
        t += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:0">`;
        t += `<div style="padding:8px 14px;border-right:1px solid rgba(255,255,255,.04)">`;
        if (incItems.length > 0) { incItems.forEach(item => { t += `<div style="margin-bottom:3px">${sitItemCell(item, balance)}</div>`; }); }
        else { t += `<span style="font-size:11px;color:var(--dim)">—</span>`; }
        t += `</div>`;
        t += `<div style="padding:8px 14px">`;
        if (expItems.length > 0) { expItems.forEach(item => { t += `<div style="margin-bottom:3px">${sitItemCell(item, balance)}</div>`; }); }
        else { t += `<span style="font-size:11px;color:var(--dim)">—</span>`; }
        t += `</div></div>`;
      }

      t += `</div>`; // end day
    });

    t += `</div>`; // end week body
    t += `</div>`; // end week container
  });

  tableEl.innerHTML = t;

  // Wire controls
  tableEl.querySelectorAll('[data-sit-id]').forEach(el => {
    const id = el.dataset.sitId;
    const item = all.find(x => x.id === id);
    if (!item) return;

    // Checkbox select
    const cb = el.querySelector('.sit-cb');
    if (cb) {
      cb.checked = scenarioSelected.has(id);
      cb.addEventListener('change', () => {
        if (cb.checked) scenarioSelected.add(id);
        else scenarioSelected.delete(id);
        renderScenario(balance);
      });
    }

    el.querySelectorAll('.sit-postpone').forEach(btn => {
      btn.addEventListener('click', () => {
        const days = parseInt(btn.dataset.days) || 0;
        item.shift += days;
        item.shift = Math.max(-90, Math.min(180, item.shift));
        updateItemDue(item);
        sitSave();
        renderScenario(balance);
      });
    });

    const shiftInput = el.querySelector('.sit-shift-input');
    if (shiftInput) shiftInput.addEventListener('change', e => {
      item.shift = Math.max(-90, Math.min(180, parseInt(e.target.value) || 0));
      updateItemDue(item);
      sitSave();
      renderScenario(balance);
    });

    const delBtn = el.querySelector('.sit-del');
    if (delBtn) delBtn.addEventListener('click', () => {
      scenarioManualItems = scenarioManualItems.filter(x => x.id !== id);
      sitSave();
      renderScenario(balance);
    });

    const delReal = el.querySelector('.sit-del-real');
    if (delReal) delReal.addEventListener('click', () => {
      item._removed = !item._removed;
      sitSave();
      renderScenario(balance);
    });

    const nameInput = el.querySelector('.sit-name');
    if (nameInput) nameInput.addEventListener('change', e => { item.task = e.target.value; sitSave(); renderScenario(balance); });
    const amtInput = el.querySelector('.sit-amt');
    if (amtInput) amtInput.addEventListener('change', e => { item.amount = parseFloat(e.target.value.replace(/[^0-9.]/g,''))||0; sitSave(); renderScenario(balance); });
    const typeSelect = el.querySelector('.sit-type-sel');
    if (typeSelect) typeSelect.addEventListener('change', e => {
      item.type = e.target.value;
      item.isIn = item.type==='income' || item.type==='p_income';
      sitSave(); renderScenario(balance);
    });
  });

  // Calendar overview + bar chart
  chartEl.innerHTML = buildSitOverview(daySlots, balance, projPts, minBal, minDate);
}

function updateItemDue(item) {
  const orig = new Date(item.originalDue + 'T12:00:00');
  orig.setDate(orig.getDate() + item.shift);
  item.due = orig.toISOString().slice(0, 10);
}

function sitItemCell(item, balance) {
  const color = item.isIn ? '#4ade80' : '#f87171';
  const shifted = item.shift !== 0;
  const shiftColor = item.shift > 0 ? '#facc15' : '#38bdf8';
  const origDt = new Date(item.originalDue + 'T12:00:00');
  const origLbl = MONTHS[origDt.getMonth()] + ' ' + origDt.getDate();
  const isSelected = scenarioSelected.has(item.id);
  const selBg = isSelected ? 'rgba(250,204,21,.08)' : '';
  const selBorder = isSelected ? 'border-left:3px solid #facc15;' : '';

  if (item.manual) {
    const amtStr = item.amount ? cfFmt(item.amount) : '$0';
    const typeLabel = item.type==='income'?'⬇':'⬆';
    let movedTag = '';
    if (shifted) {
      movedTag = `<span style="font-size:11px;font-weight:600;color:${shiftColor};background:${shiftColor}18;padding:2px 6px;border-radius:3px;white-space:nowrap">from ${origLbl} (${item.shift>0?'+':''}${item.shift}d)</span>`;
    }
    return `<div data-sit-id="${item.id}" style="display:flex;align-items:center;gap:6px;padding:5px;border-radius:5px;background:rgba(232,121,249,.04);border-left:3px solid #e879f9;${isSelected?'background:rgba(250,204,21,.08);border-left:3px solid #facc15;':''}">
      <input type="checkbox" class="sit-cb" ${isSelected?'checked':''} style="cursor:pointer;width:16px;height:16px;flex-shrink:0;accent-color:#facc15" title="Select for batch">
      <div style="flex:1;min-width:0">
        <div style="font-size:15px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${item.task}">${typeLabel} ${item.task} <span style="font-size:10px;font-weight:600;color:#e879f9;background:rgba(232,121,249,.15);padding:1px 5px;border-radius:3px;vertical-align:middle">MANUAL</span></div>
        <div style="font-size:13px;font-weight:500;color:#b0b8c8">${item.project || '—'}</div>
        ${movedTag}
      </div>
      <span style="font-size:16px;font-weight:700;color:${color};font-family:var(--mono);white-space:nowrap">${amtStr}</span>
      <div style="display:flex;align-items:center;gap:2px;white-space:nowrap">
        <button class="sit-postpone" data-days="-1" style="background:var(--bg);color:#fff;border:1px solid var(--bdr);border-radius:4px;width:28px;height:28px;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center" title="Pull 1 day earlier">◂</button>
        <input class="sit-shift-input" type="number" value="${item.shift}" style="background:var(--bg);color:${shifted?shiftColor:'#b0b8c8'};border:1px solid ${shifted?shiftColor+'60':'var(--bdr)'};border-radius:4px;width:44px;height:28px;text-align:center;font-size:14px;font-weight:700;font-family:var(--mono)" title="Days shifted">
        <button class="sit-postpone" data-days="1" style="background:var(--bg);color:#fff;border:1px solid var(--bdr);border-radius:4px;width:28px;height:28px;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center" title="Postpone 1 day">▸</button>
      </div>
      <button class="sit-del" style="background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.3);border-radius:5px;width:28px;height:28px;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center" title="Remove">✕</button>
    </div>`;
  }

  const amtStr = item.amount ? cfFmt(item.amount) : 'TBD';
  let movedTag = '';
  if (shifted) {
    movedTag = `<span style="font-size:11px;font-weight:600;color:${shiftColor};background:${shiftColor}18;padding:2px 6px;border-radius:3px;white-space:nowrap">from ${origLbl} (${item.shift>0?'+':''}${item.shift}d)</span>`;
  }

  const isRemoved = item._removed;
  return `<div data-sit-id="${item.id}" style="display:flex;align-items:center;gap:6px;padding:5px;border-radius:5px;${isRemoved?'opacity:.35;text-decoration:line-through;':''}${shifted?'background:rgba(250,204,21,.04);':''}${isSelected?'background:rgba(250,204,21,.08);border-left:3px solid #facc15;padding-left:7px;':''}">
    <input type="checkbox" class="sit-cb" ${isSelected?'checked':''} style="cursor:pointer;width:16px;height:16px;flex-shrink:0;accent-color:#facc15" title="Select for batch">
    <div style="flex:1;min-width:0">
      <div style="font-size:15px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${item.task}">${item.task}${isRemoved?' <span style="font-size:9px;color:#f87171;background:rgba(248,113,113,.15);padding:1px 5px;border-radius:3px;text-decoration:none">REMOVED</span>':''}${item._overdue && !shifted?' <span style="font-size:9px;font-weight:700;color:#f97316;background:rgba(249,115,22,.15);padding:1px 5px;border-radius:3px;text-decoration:none">OVERDUE (due '+item.originalDue+')</span>':''}</div>
      <div style="font-size:13px;font-weight:500;color:#b0b8c8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.project}</div>
      ${movedTag}
    </div>
    <span style="font-size:16px;font-weight:700;color:${color};font-family:var(--mono);white-space:nowrap">${amtStr}</span>
    <div style="display:flex;align-items:center;gap:2px;white-space:nowrap">
      <button class="sit-postpone" data-days="-1" style="background:var(--bg);color:#fff;border:1px solid var(--bdr);border-radius:4px;width:28px;height:28px;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center" title="Pull 1 day earlier">◂</button>
      <input class="sit-shift-input" type="number" value="${item.shift}" style="background:var(--bg);color:${shifted?shiftColor:'#b0b8c8'};border:1px solid ${shifted?shiftColor+'60':'var(--bdr)'};border-radius:4px;width:44px;height:28px;text-align:center;font-size:14px;font-weight:700;font-family:var(--mono)" title="Days shifted (negative = earlier)">
      <button class="sit-postpone" data-days="1" style="background:var(--bg);color:#fff;border:1px solid var(--bdr);border-radius:4px;width:28px;height:28px;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center" title="Postpone 1 day">▸</button>
    </div>
    <button class="sit-del-real" style="background:${isRemoved?'rgba(74,222,128,.1)':'rgba(248,113,113,.06)'};color:${isRemoved?'#4ade80':'#f87171'};border:1px solid ${isRemoved?'rgba(74,222,128,.2)':'rgba(248,113,113,.2)'};border-radius:5px;width:28px;height:28px;cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0" title="${isRemoved?'Restore item':'Remove from scenario'}">${isRemoved?'↩':'✕'}</button>
  </div>`;
}


function buildSitOverview(daySlots, balance, projPts, minBal, minDate) {
  // ── Calendar Overview ──
  // 3 rows (weeks) x 7 columns (Mon-Sun)
  // Each cell shows: day, income total, expense total, balance color-coded

  let cal = '';
  cal += `<div style="margin-bottom:20px">`;
  cal += `<div style="font-size:15px;font-weight:700;color:var(--txt);margin-bottom:10px">📅 ${daySlots.length}-Day Overview</div>`;

  // Day headers
  cal += `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">`;
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
    cal += `<div style="text-align:center;font-size:11px;font-weight:700;color:#b0b8c8;padding:4px">${d}</div>`;
  });
  cal += `</div>`;

  // Find the day-of-week offset for first day
  const firstDow = daySlots[0].obj.getDay(); // 0=Sun
  const monOffset = firstDow === 0 ? 6 : firstDow - 1; // convert to Mon=0

  // Build grid cells
  cal += `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">`;

  // Empty cells before first day
  for (let e = 0; e < monOffset; e++) {
    cal += `<div style="min-height:80px"></div>`;
  }

  const today = new Date().toISOString().slice(0,10);
  const maxIn = Math.max(...daySlots.map(d => d.sumIn), 1);
  const maxOut = Math.max(...daySlots.map(d => d.sumOut), 1);
  const maxFlow = Math.max(maxIn, maxOut);

  daySlots.forEach((day, di) => {
    const dd = day.obj;
    const dayNum = dd.getDate();
    const isToday = day.date === today;
    const isWeekend = dd.getDay() === 0 || dd.getDay() === 6;
    const hasItems = day.items.length > 0;
    const incTotal = day.sumIn;
    const expTotal = day.sumOut;

    // Balance-based cell color
    let cellBg, cellBorder;
    if (day.bal < 0) {
      cellBg = 'rgba(248,113,113,.12)';
      cellBorder = '2px solid #f87171';
    } else if (day.bal < balance * 0.2) {
      cellBg = 'rgba(250,204,21,.08)';
      cellBorder = '1px solid rgba(250,204,21,.3)';
    } else if (incTotal > expTotal && incTotal > 0) {
      cellBg = 'rgba(74,222,128,.06)';
      cellBorder = '1px solid rgba(74,222,128,.2)';
    } else if (expTotal > 10000) {
      cellBg = 'rgba(248,113,113,.06)';
      cellBorder = '1px solid rgba(248,113,113,.2)';
    } else {
      cellBg = isWeekend ? 'rgba(255,255,255,.01)' : 'rgba(255,255,255,.03)';
      cellBorder = '1px solid rgba(255,255,255,.06)';
    }

    if (isToday) cellBorder = '2px solid #38bdf8';

    cal += `<div style="min-height:100px;background:${cellBg};border:${cellBorder};border-radius:8px;padding:6px 8px;display:flex;flex-direction:column;position:relative">`;

    // Day label — month + number
    const monShort = MONTHS[dd.getMonth()].slice(0,3);
    cal += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">`;
    cal += `<div>`;
    cal += `<div style="font-size:9px;font-weight:700;color:${isToday?'#38bdf8':'#b0b8c8'};text-transform:uppercase;letter-spacing:.5px">${monShort}</div>`;
    cal += `<span style="font-size:16px;font-weight:800;color:${isToday?'#38bdf8':'#fff'}">${dayNum}</span>`;
    cal += `</div>`;
    if (isToday) cal += `<span style="font-size:8px;font-weight:700;color:#38bdf8;background:rgba(56,189,248,.2);padding:1px 4px;border-radius:2px">TODAY</span>`;
    cal += `</div>`;

    // Mini bar chart — income bar (green) vs expense bar (red) side by side
    if (hasItems) {
      const barH = 20;
      const inW = maxFlow > 0 ? Math.max(incTotal / maxFlow * 100, incTotal > 0 ? 8 : 0) : 0;
      const outW = maxFlow > 0 ? Math.max(expTotal / maxFlow * 100, expTotal > 0 ? 8 : 0) : 0;
      cal += `<div style="display:flex;gap:2px;align-items:end;height:${barH}px;margin-bottom:4px">`;
      if (inW > 0) cal += `<div style="width:${inW}%;height:100%;background:#4ade80;border-radius:2px;min-width:4px" title="In: $${incTotal.toLocaleString()}"></div>`;
      if (outW > 0) cal += `<div style="width:${outW}%;height:100%;background:#f87171;border-radius:2px;min-width:4px" title="Out: $${expTotal.toLocaleString()}"></div>`;
      cal += `</div>`;

      // Amounts
      if (incTotal > 0) cal += `<div style="font-size:10px;font-weight:700;color:#4ade80;font-family:var(--mono)">+${cfFmt(incTotal)}</div>`;
      if (expTotal > 0) cal += `<div style="font-size:10px;font-weight:700;color:#f87171;font-family:var(--mono)">-${cfFmt(expTotal)}</div>`;
    } else {
      cal += `<div style="flex:1"></div>`;
    }

    // Balance at bottom
    const balC = day.bal >= 0 ? '#4ade80' : '#f87171';
    cal += `<div style="margin-top:auto;font-size:11px;font-weight:800;color:${balC};font-family:var(--mono);text-align:right">${cfFmt(day.bal)}</div>`;
    if (day.bal < 0) cal += `<div style="font-size:8px;color:#f87171;text-align:right;font-weight:700">⚠ NEG</div>`;

    cal += `</div>`;
  });

  cal += `</div></div>`;

  // ── Bar Chart: Daily In vs Out + Balance Line ──
  let chart = '';
  chart += `<div style="background:var(--bg);border:1px solid var(--bdr);border-radius:10px;padding:20px;margin-bottom:16px">`;
  chart += `<div style="font-size:16px;font-weight:700;color:var(--txt);margin-bottom:14px">📊 Daily Cash Flow — Income vs Expenses + Balance Trend</div>`;
  chart += `<div style="overflow-x:auto;padding-bottom:8px">`;

  const cW = Math.max(1600, daySlots.length * 60), cH = 450, cPL = 80, cPR = 50, cPT = 30, cPB = 60;
  const cPW = cW - cPL - cPR;
  const cPH = cH - cPT - cPB;
  const barW = Math.floor(cPW / daySlots.length) - 6;

  // Find scales
  const maxBar = Math.max(...daySlots.map(d => Math.max(d.sumIn, d.sumOut)), 1);
  const balVals = projPts.map(p => p.net);
  const balMin = Math.min(...balVals, 0);
  const balMax = Math.max(...balVals, 1);
  const balRange = balMax - balMin || 1;

  const barToH = v => Math.max(v / maxBar * (cPH * 0.55), v > 0 ? 2 : 0);
  const balToY = v => cPT + (cPH * 0.35) + (cPH * 0.55) - ((v - balMin) / balRange * (cPH * 0.55));
  const zeroY = cPT + cPH * 0.55; // zero line for bars

  let svg = `<svg width="${cW}" height="${cH}" viewBox="0 0 ${cW} ${cH}" style="display:block;min-width:${cW}px">`;

  // Background danger zone (where balance < 0)
  const bZeroY = balToY(0);
  if (balMin < 0) {
    svg += `<rect x="${cPL}" y="${bZeroY}" width="${cPW}" height="${cPT + cPH - bZeroY}" fill="rgba(248,113,113,.06)" rx="4"/>`;
  }

  // Grid lines
  [0.25, 0.5, 0.75, 1].forEach(pct => {
    const y = zeroY - pct * (cPH * 0.55);
    const val = Math.round(maxBar * pct);
    svg += `<line x1="${cPL}" y1="${y}" x2="${cW-cPR}" y2="${y}" stroke="rgba(255,255,255,.04)" stroke-width="1"/>`;
    svg += `<text x="${cPL-6}" y="${y+4}" text-anchor="end" fill="rgba(255,255,255,.3)" font-size="11" font-family="monospace">$${val>=1000?(val/1000).toFixed(0)+'K':val}</text>`;
  });

  // $0 baseline for balance
  svg += `<line x1="${cPL}" y1="${bZeroY}" x2="${cW-cPR}" y2="${bZeroY}" stroke="#00ff88" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>`;
  svg += `<text x="${cW-cPR+6}" y="${bZeroY+5}" fill="#00ff88" font-size="13" font-weight="700" font-family="monospace">$0</text>`;

  // Bars + balance points
  const balPts = [];
  daySlots.forEach((day, i) => {
    const x = cPL + i * (cPW / daySlots.length) + (cPW / daySlots.length - barW) / 2;
    const midX = x + barW / 2;

    // Income bar (green, going up)
    if (day.sumIn > 0) {
      const h = barToH(day.sumIn);
      svg += `<rect x="${x}" y="${zeroY - h}" width="${barW/2 - 1}" height="${h}" fill="#4ade80" rx="2" opacity="0.85"/>`;
    }
    // Expense bar (red, going up from same baseline)
    if (day.sumOut > 0) {
      const h = barToH(day.sumOut);
      svg += `<rect x="${x + barW/2 + 1}" y="${zeroY - h}" width="${barW/2 - 1}" height="${h}" fill="#f87171" rx="2" opacity="0.85"/>`;
    }

    // Balance point (using projPts which has index offset by 1)
    const bp = projPts[i + 1];
    if (bp) {
      const by = balToY(bp.net);
      balPts.push({x: midX, y: by, val: bp.net});
    }

    // Day label
    const dd = day.obj;
    const dlbl = DAYS[dd.getDay()].slice(0,3);
    const dnum = dd.getDate();
    const isToday = day.date === new Date().toISOString().slice(0,10);
    const isMon = dd.getDay() === 1;
    svg += `<text x="${midX}" y="${cH - 24}" text-anchor="middle" fill="${isToday?'#38bdf8':isMon?'rgba(255,255,255,.6)':'rgba(255,255,255,.35)'}" font-size="12" font-weight="${isToday||isMon?'700':'400'}" font-family="monospace">${dlbl}</text>`;
    svg += `<text x="${midX}" y="${cH - 8}" text-anchor="middle" fill="${isToday?'#38bdf8':'rgba(255,255,255,.5)'}" font-size="13" font-weight="700" font-family="monospace">${dnum}</text>`;
    if (isToday) svg += `<line x1="${midX}" y1="${cPT}" x2="${midX}" y2="${cH - cPB}" stroke="rgba(56,189,248,.15)" stroke-width="${barW}" stroke-dasharray="0"/>`;
    if (isMon && !isToday) svg += `<line x1="${midX - barW/2 - 4}" y1="${cPT}" x2="${midX - barW/2 - 4}" y2="${cH - cPB}" stroke="rgba(56,189,248,.08)" stroke-width="1"/>`;
  });

  // Balance line
  if (balPts.length > 1) {
    let path = '';
    balPts.forEach((p, i) => { path += (i === 0 ? 'M' : 'L') + `${p.x},${p.y} `; });
    svg += `<path d="${path}" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linejoin="round" opacity="0.9"/>`;
    // Dots at key points
    // Show balance on every day — alternate above/below to avoid overlap
    balPts.forEach((p, i) => {
      const c = p.val >= 0 ? '#4ade80' : '#f87171';
      const isKey = i === 0 || i === balPts.length - 1 || p.val === minBal;
      svg += `<circle cx="${p.x}" cy="${p.y}" r="${isKey ? 6 : 3.5}" fill="${c}" ${isKey ? 'stroke="var(--bg)" stroke-width="2.5"' : ''}/>`;
      // Label position: alternate above/below to prevent overlap
      const above = i % 2 === 0;
      const ly = above ? p.y - 12 : p.y + 16;
      svg += `<text x="${p.x}" y="${ly}" text-anchor="middle" fill="${c}" font-size="${isKey ? '13' : '10'}" font-weight="${isKey ? '700' : '600'}" font-family="monospace" opacity="${isKey ? '1' : '.7'}">${cfFmt(p.val)}</text>`;
    });
  }

  svg += '</svg>';

  // Legend
  chart += svg;
  chart += `</div>`; // close scroll wrapper
  chart += `<div style="display:flex;gap:20px;justify-content:center;margin-top:12px;font-size:13px">
    <span><span style="display:inline-block;width:12px;height:12px;background:#4ade80;border-radius:2px;vertical-align:middle;margin-right:4px"></span> Income</span>
    <span><span style="display:inline-block;width:12px;height:12px;background:#f87171;border-radius:2px;vertical-align:middle;margin-right:4px"></span> Expenses</span>
    <span style="color:#38bdf8">━━ Balance</span>
    <span style="color:#00ff88">- - $0</span>
    ${balMin < 0 ? '<span style="color:#f87171;background:rgba(248,113,113,.1);padding:2px 6px;border-radius:3px">RED = negative balance zone</span>' : ''}
  </div>`;
  chart += `</div>`;

  return cal + chart;
}

function buildJadeFinanceAnalysis(allWin, balance) {
  // Use allWin as-is — these are the visible items in the current date range
  // Do NOT re-filter. Do NOT rely on starting balance for analysis.
  const unpaid = allWin.filter(t => !t.paid);
  const incItems = unpaid.filter(t => t.type==='income');
  const potItems = unpaid.filter(t => t.type==='p_income');
  const expItems = unpaid.filter(t => t.type!=='income' && t.type!=='p_income');
  const totalIn = incItems.reduce((s,t) => s + t.amount, 0);
  const totalPot = potItems.reduce((s,t) => s + t.amount, 0);
  const totalOut = expItems.reduce((s,t) => s + t.amount, 0);
  const netFlow = totalIn - totalOut;

  // Day-by-day flow (balance-agnostic: start from 0)
  const byDay = {};
  unpaid.forEach(t => {
    if (!t.due) return;
    if (!byDay[t.due]) byDay[t.due] = {in:0, out:0, items:[]};
    if (t.type==='income') byDay[t.due].in += t.amount;
    else if (t.type!=='p_income') byDay[t.due].out += t.amount;
    byDay[t.due].items.push(t);
  });
  const sortedDays = Object.keys(byDay).sort();

  // Cumulative net flow (starting from 0 — pure flow analysis)
  let cumFlow = 0;
  let worstFlow = 0, worstDate = '';
  const flowPts = [];
  sortedDays.forEach(ds => {
    cumFlow += byDay[ds].in - byDay[ds].out;
    flowPts.push({date:ds, flow:cumFlow, in:byDay[ds].in, out:byDay[ds].out});
    if (cumFlow < worstFlow) { worstFlow = cumFlow; worstDate = ds; }
  });

  // Heavy outflow days (days where out > $10K)
  const heavyDays = flowPts.filter(d => d.out > 10000).sort((a,b) => b.out - a.out);

  // Per-project mapping
  const projMap = {};
  unpaid.forEach(t => {
    const p = t.project || 'Unknown';
    if (!projMap[p]) projMap[p] = {income:[], expenses:[], potIncome:[]};
    if (t.type==='income') projMap[p].income.push(t);
    else if (t.type==='p_income') projMap[p].potIncome.push(t);
    else projMap[p].expenses.push(t);
  });

  // Week buckets (relative: week 1/2/3 from first visible date)
  const weeks = [{label:'Week 1',in:0,out:0,n:0},{label:'Week 2',in:0,out:0,n:0},{label:'Week 3+',in:0,out:0,n:0}];
  if (sortedDays.length > 0) {
    const firstDate = new Date(sortedDays[0]+'T12:00:00');
    unpaid.forEach(t => {
      if (!t.due) return;
      const diff = Math.floor((new Date(t.due+'T12:00:00') - firstDate) / 86400000);
      const wk = diff < 7 ? 0 : diff < 14 ? 1 : 2;
      if (t.type==='income') weeks[wk].in += t.amount;
      else if (t.type!=='p_income') weeks[wk].out += t.amount;
      weeks[wk].n++;
    });
  }

  let html = '';

  // Jade header
  html += `<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#4ade80,#059669);display:flex;align-items:center;justify-content:center;font-size:20px">🟢</div>
    <div>
      <div style="font-size:15px;font-weight:700;color:var(--txt)">Jade's Financial Analysis</div>
      <div style="font-size:11px;color:var(--dim)">${unpaid.length} visible payments · ${Object.keys(projMap).length} projects · Analysis based on payment flows only (not current cash)</div>
    </div>
  </div>`;

  // Flow overview
  html += `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">
    <div style="background:rgba(74,222,128,.05);border:1px solid rgba(74,222,128,.15);border-radius:10px;padding:12px;text-align:center">
      <div style="font-size:18px;font-weight:700;color:#4ade80">${cfFmt(totalIn)}</div>
      <div style="font-size:10px;color:var(--dim);margin-top:2px">Confirmed Income</div>
    </div>
    <div style="background:rgba(248,113,113,.05);border:1px solid rgba(248,113,113,.15);border-radius:10px;padding:12px;text-align:center">
      <div style="font-size:18px;font-weight:700;color:#f87171">${cfFmt(totalOut)}</div>
      <div style="font-size:10px;color:var(--dim);margin-top:2px">Total Expenses</div>
    </div>
    <div style="background:${netFlow>=0?'rgba(74,222,128,.05)':'rgba(248,113,113,.05)'};border:1px solid ${netFlow>=0?'rgba(74,222,128,.15)':'rgba(248,113,113,.15)'};border-radius:10px;padding:12px;text-align:center">
      <div style="font-size:18px;font-weight:700;color:${netFlow>=0?'#4ade80':'#f87171'}">${netFlow>=0?'+':''}${cfFmt(netFlow)}</div>
      <div style="font-size:10px;color:var(--dim);margin-top:2px">Net Cash Flow</div>
    </div>
    <div style="background:rgba(250,204,21,.05);border:1px solid rgba(250,204,21,.15);border-radius:10px;padding:12px;text-align:center">
      <div style="font-size:18px;font-weight:700;color:#facc15">${cfFmt(totalPot)}</div>
      <div style="font-size:10px;color:var(--dim);margin-top:2px">Potential (unconfirmed)</div>
    </div>
  </div>`;

  // Week pressure
  html += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">`;
  weeks.forEach(wk => {
    const net = wk.in - wk.out;
    const pressure = wk.out > 0 && wk.in === 0 ? 'DRAIN' : wk.out > wk.in * 2 ? 'HIGH' : wk.out > wk.in ? 'MODERATE' : wk.in > 0 ? 'POSITIVE' : 'QUIET';
    const presC = {DRAIN:'#f87171',HIGH:'#f87171',MODERATE:'#facc15',POSITIVE:'#4ade80',QUIET:'var(--dim)'}[pressure];
    html += `<div style="background:var(--bg);border:1px solid var(--bdr);border-radius:10px;padding:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:13px;font-weight:700;color:var(--txt)">${wk.label}</span>
        <span style="font-size:10px;font-weight:700;color:${presC};background:${presC}15;padding:2px 6px;border-radius:3px">${pressure}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px">
        <span style="color:#4ade80;font-weight:600">⬇ ${cfFmt(wk.in)}</span>
        <span style="color:#f87171;font-weight:600">⬆ ${cfFmt(wk.out)}</span>
      </div>
      <div style="font-size:14px;font-weight:700;color:${net>=0?'#4ade80':'#f87171'}">Net: ${net>=0?'+':''}${cfFmt(net)}</div>
    </div>`;
  });
  html += '</div>';

  // Net flow warning
  if (netFlow < 0) {
    const gapAbs = Math.abs(netFlow);
    html += `<div style="background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.2);border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:#f87171;margin-bottom:4px">⚠ Cash Outflow Exceeds Income by ${cfFmt(gapAbs)}</div>
      <div style="font-size:12px;color:var(--txt2)">In this window, you're spending ${cfFmt(totalOut)} but only receiving ${cfFmt(totalIn)}. This ${cfFmt(gapAbs)} gap must come from existing cash reserves or by deferring expenses.</div>
    </div>`;
  }

  // Heavy outflow days
  if (heavyDays.length > 0) {
    html += `<div style="background:rgba(250,204,21,.04);border:1px solid rgba(250,204,21,.15);border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:#facc15;margin-bottom:8px">🔥 Heavy Outflow Days</div>`;
    heavyDays.slice(0,5).forEach(d => {
      const dt = new Date(d.date+'T12:00:00');
      html += `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(250,204,21,.08);font-size:12px">
        <span style="color:var(--txt);font-weight:600">${DAYS[dt.getDay()]} ${MONTHS[dt.getMonth()]} ${dt.getDate()}</span>
        <span style="color:#f87171;font-weight:700;font-family:var(--mono)">⬆ ${cfFmt(d.out)} going out${d.in>0?' · <span style="color:#4ade80">⬇ '+cfFmt(d.in)+' coming in</span>':''}</span>
      </div>`;
    });
    html += '</div>';
  }

  return html;
}

function buildJadeRecommendations(allWin, balance) {
  const unpaid = allWin.filter(t => !t.paid);
  const totalIn = unpaid.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const totalOut = unpaid.filter(t=>t.type!=='income'&&t.type!=='p_income').reduce((s,t)=>s+t.amount,0);

  // Per-project: link expenses to income milestones
  const projMap = {};
  unpaid.forEach(t => {
    const p = t.project || 'Unknown';
    if (!projMap[p]) projMap[p] = {income:[], expenses:[]};
    if (t.type==='income') projMap[p].income.push(t);
    else if (t.type!=='p_income') projMap[p].expenses.push(t);
  });

  const priorityPay = [];
  const canDelay = [];
  const projRecs = [];

  Object.entries(projMap).forEach(([proj, data]) => {
    if (data.income.length > 0 && data.expenses.length > 0) {
      const sortedIncome = data.income.sort((a,b) => a.due.localeCompare(b.due));
      const nextInc = sortedIncome[0];
      const before = data.expenses.filter(e => e.due <= nextInc.due);
      const after = data.expenses.filter(e => e.due > nextInc.due);

      const spendToUnlock = before.reduce((s,e) => s + e.amount, 0);
      const ratio = spendToUnlock > 0 ? nextInc.amount / spendToUnlock : 999;
      const netGain = nextInc.amount - spendToUnlock;

      before.forEach(e => priorityPay.push({
        task: e.task, project: proj, amount: e.amount, due: e.due, type: e.type,
        unlocks: nextInc.amount, unlockDate: nextInc.due,
        ratio, netGain, spendToUnlock
      }));
      after.forEach(e => canDelay.push({
        task: e.task, project: proj, amount: e.amount, due: e.due, type: e.type,
        reason: 'After ' + cfFmt(nextInc.amount) + ' income on ' + nextInc.due
      }));

      projRecs.push({
        proj, spend: spendToUnlock, unlock: nextInc.amount, incDate: nextInc.due,
        blockCount: before.length, afterCount: after.length,
        afterTotal: after.reduce((s,e)=>s+e.amount,0),
        ratio, netGain,
        totalExpense: data.expenses.reduce((s,e)=>s+e.amount,0),
        totalIncome: data.income.reduce((s,t)=>s+t.amount,0)
      });
    } else if (data.expenses.length > 0) {
      data.expenses.forEach(e => canDelay.push({
        task: e.task, project: proj, amount: e.amount, due: e.due, type: e.type,
        reason: 'No income expected in visible window'
      }));
    }
  });

  // Smart sort: prioritize by NET GAIN (absolute impact), not just ratio
  // A 10x return on $500 (=$5K) is less impactful than 2x on $50K (=$100K)
  priorityPay.sort((a,b) => b.netGain - a.netGain || b.ratio - a.ratio);
  canDelay.sort((a,b) => b.amount - a.amount);

  // Sort project recs by absolute net gain
  projRecs.sort((a,b) => b.netGain - a.netGain);

  let html = '';

  // ── Priority Payments ──
  if (priorityPay.length > 0) {
    html += `<div style="background:rgba(74,222,128,.04);border:1px solid rgba(74,222,128,.2);border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:#4ade80;margin-bottom:4px">🎯 Priority — Pay These to Unlock Income</div>
      <div style="font-size:11px;color:var(--dim);margin-bottom:10px">Ranked by net gain (income unlocked minus cost). Focus on payments that bring the most cash back.</div>`;

    // Group by project for clarity
    const byProj = {};
    priorityPay.forEach(p => {
      if (!byProj[p.project]) byProj[p.project] = {items:[], unlocks:p.unlocks, unlockDate:p.unlockDate, ratio:p.ratio, netGain:p.netGain, totalSpend:0};
      byProj[p.project].items.push(p);
      byProj[p.project].totalSpend += p.amount;
    });

    Object.entries(byProj).sort((a,b) => b[1].netGain - a[1].netGain).forEach(([proj, data]) => {
      const dt = new Date(data.unlockDate+'T12:00:00');
      const worthIt = data.netGain > 10000 ? '💰 HIGH IMPACT' : data.netGain > 0 ? '✓ POSITIVE' : '⚠ LOW RETURN';
      const worthC = data.netGain > 10000 ? '#4ade80' : data.netGain > 0 ? '#facc15' : '#f87171';
      html += `<div style="margin-bottom:10px;padding:8px;background:rgba(255,255,255,.02);border-radius:6px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-size:12px;font-weight:700;color:var(--txt)">${proj}</span>
          <span style="font-size:10px;font-weight:600;color:${worthC};background:${worthC}15;padding:2px 6px;border-radius:3px">${worthIt}</span>
        </div>
        <div style="font-size:11px;color:var(--txt2);margin-bottom:6px">
          Spend <b style="color:#f87171">${cfFmt(data.totalSpend)}</b> (${data.items.length} payments) → Unlocks <b style="color:#4ade80">${cfFmt(data.unlocks)}</b> by ${MONTHS[dt.getMonth()]} ${dt.getDate()} · Net gain: <b style="color:${data.netGain>=0?'#4ade80':'#f87171'}">${data.netGain>=0?'+':''}${cfFmt(data.netGain)}</b> · ${data.ratio.toFixed(1)}x return
        </div>`;
      data.items.forEach(item => {
        const typeIcon = item.type==='materials'?'📦':'🔧';
        html += `<div style="display:flex;justify-content:space-between;padding:2px 0 2px 12px;font-size:11px;border-bottom:1px solid rgba(255,255,255,.03)">
          <span style="color:var(--txt2)">${typeIcon} ${item.task}</span>
          <span style="color:#f87171;font-weight:600;font-family:var(--mono)">${cfFmt(item.amount)}</span>
        </div>`;
      });
      html += '</div>';
    });
    html += '</div>';
  }

  // ── Safe to Delay ──
  if (canDelay.length > 0) {
    const totalDelay = canDelay.reduce((s,e) => s + e.amount, 0);
    html += `<div style="background:rgba(250,204,21,.04);border:1px solid rgba(250,204,21,.15);border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:#facc15;margin-bottom:4px">⏸ Safe to Delay — ${cfFmt(totalDelay)} in Deferrable Expenses</div>
      <div style="font-size:11px;color:var(--dim);margin-bottom:10px">These don't block any income milestone. Postpone the biggest ones first if cash is tight.</div>`;
    canDelay.slice(0, 12).forEach((item, i) => {
      const typeIcon = item.type==='materials'?'📦':'🔧';
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(250,204,21,.06);font-size:12px">
        <div style="flex:1"><span style="color:var(--txt)">${typeIcon} ${item.task}</span> <span style="color:var(--dim);font-size:10px">— ${item.project}</span></div>
        <div style="text-align:right;white-space:nowrap">
          <span style="color:#facc15;font-weight:700;font-family:var(--mono)">${cfFmt(item.amount)}</span>
          <span style="color:var(--dim);font-size:10px;margin-left:6px">${item.reason}</span>
        </div>
      </div>`;
    });
    if (canDelay.length > 12) html += `<div style="font-size:10px;color:var(--dim);padding:4px 0">+ ${canDelay.length-12} more items</div>`;
    html += '</div>';
  }

  // ── Project Investment Map ──
  if (projRecs.length > 0) {
    html += `<div style="background:var(--bg);border:1px solid var(--bdr);border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:var(--txt);margin-bottom:4px">📊 Project Investment Map</div>
      <div style="font-size:11px;color:var(--dim);margin-bottom:10px">Which projects return the most per dollar invested. Sorted by absolute net gain.</div>`;
    projRecs.forEach(pr => {
      const barW = projRecs[0].netGain > 0 ? Math.min(Math.max(pr.netGain / projRecs[0].netGain * 100, 5), 100) : 50;
      const dt = new Date(pr.incDate+'T12:00:00');
      const verdict = pr.netGain > 20000 ? '🟢 Strong' : pr.netGain > 5000 ? '🟡 Decent' : pr.netGain > 0 ? '🟠 Marginal' : '🔴 Negative';
      html += `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:3px">
          <span style="color:var(--txt);font-weight:600">${pr.proj} <span style="font-size:10px;color:var(--dim);font-weight:400">${verdict}</span></span>
          <span style="font-size:11px;color:var(--txt2)">Invest <span style="color:#f87171;font-weight:600">${cfFmt(pr.spend)}</span> → Get <span style="color:#4ade80;font-weight:600">${cfFmt(pr.unlock)}</span> by ${MONTHS[dt.getMonth()]} ${dt.getDate()} · <span style="color:#38bdf8;font-weight:700">${pr.ratio.toFixed(1)}x</span> · Net <span style="color:${pr.netGain>=0?'#4ade80':'#f87171'};font-weight:700">${pr.netGain>=0?'+':''}${cfFmt(pr.netGain)}</span></span>
        </div>
        <div style="height:6px;background:rgba(255,255,255,.05);border-radius:3px"><div style="height:100%;width:${barW}%;background:${pr.netGain>5000?'linear-gradient(90deg,#4ade80,#059669)':'linear-gradient(90deg,#facc15,#f59e0b)'};border-radius:3px"></div></div>
        ${pr.afterCount>0?'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+pr.afterCount+' more expenses ('+cfFmt(pr.afterTotal)+') after this milestone — safe to defer</div>':''}
      </div>`;
    });
    html += '</div>';
  }

  // ── Jade's Bottom Line ──
  let summaryParts = [];

  // Assess overall flow
  if (totalIn === 0 && totalOut > 0) {
    summaryParts.push(`<b style="color:#f87171">All outflow, zero income.</b> Every dollar out comes from reserves. Defer what you can — ${canDelay.length > 0 ? cfFmt(canDelay.reduce((s,e)=>s+e.amount,0))+' is safely deferrable' : 'check which expenses can wait'}.`);
  } else if (totalOut > totalIn * 3) {
    summaryParts.push(`<b style="color:#f87171">Expenses are ${(totalOut/totalIn).toFixed(0)}x income.</b> Heavy cash drain. Prioritize only expenses that unlock the ${cfFmt(totalIn)} in income.`);
  } else if (totalOut > totalIn) {
    summaryParts.push(`<b style="color:#facc15">Net negative flow:</b> spending ${cfFmt(totalOut-totalIn)} more than earning in this window.`);
  } else {
    summaryParts.push(`<b style="color:#4ade80">Positive flow:</b> income exceeds expenses by ${cfFmt(totalIn-totalOut)}.`);
  }

  // Best investment advice
  if (projRecs.length > 0) {
    const best = projRecs[0];
    if (best.netGain > 10000) {
      summaryParts.push(`<b>Best move:</b> ${best.proj} — spend ${cfFmt(best.spend)} to unlock ${cfFmt(best.unlock)} (net +${cfFmt(best.netGain)}). This is the highest-impact investment.`);
    } else if (best.netGain > 0) {
      summaryParts.push(`<b>Best available:</b> ${best.proj} needs ${cfFmt(best.spend)} to unlock ${cfFmt(best.unlock)}, but the net gain is only ${cfFmt(best.netGain)}.`);
    }
    // Warn about low-return projects
    const lowReturn = projRecs.filter(p => p.ratio < 1.5 && p.spend > 3000);
    if (lowReturn.length > 0) {
      summaryParts.push(`<b style="color:#facc15">Watch out:</b> ${lowReturn.map(p=>p.proj).join(', ')} ${lowReturn.length>1?'have':'has'} less than 1.5x return on ${cfFmt(lowReturn.reduce((s,p)=>s+p.spend,0))} in spending. Consider if these can wait for a better cash position.`);
    }
  }

  // Delay recommendation
  if (canDelay.length > 0 && totalOut > totalIn) {
    const top3 = canDelay.slice(0,3);
    const top3Total = top3.reduce((s,e)=>s+e.amount,0);
    summaryParts.push(`<b>Quick relief:</b> Deferring the top ${top3.length} delay-safe items (${top3.map(e=>cfFmt(e.amount)).join(' + ')} = ${cfFmt(top3Total)}) would ease the biggest pressure.`);
  }

  html += `<div style="background:rgba(74,222,128,.03);border:1px solid rgba(74,222,128,.12);border-radius:10px;padding:14px">
    <div style="font-size:13px;font-weight:700;color:var(--txt);margin-bottom:8px">💡 Jade's Bottom Line</div>
    <div style="font-size:12px;color:var(--txt2);line-height:1.7">${summaryParts.join('<br>')}</div>
  </div>`;

  return html;
}

async function loadAndRenderEOD(c) {
  c.innerHTML = '<div class="empty"><div class="empty-i">⏳</div><div class="empty-t">Loading EOD...</div></div>';
  const dateToLoad = curDate || new Date().toISOString().slice(0,10);
  try {
    const r = await fetch('data/eod-' + dateToLoad + '.json');
    if (!r.ok) throw new Error('not found');
    EOD_DATA = await r.json();
    renderEOD(c);
  } catch(e) {
    c.innerHTML = '<div class="empty"><div class="empty-i">🌙</div><div class="empty-t">No EOD Report</div><div class="empty-d">EOD report for this date hasn\'t been generated yet. Reports run at 4 PM.</div></div>';
  }
}

function eodSec(title, color, content) {
  return `<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:${color};margin-bottom:6px">${title}</div><div style="font-size:13px;color:var(--txt);line-height:1.5">${content}</div></div>`;
}

function renderEOD(c) {
  const s = EOD_DATA.summary;
  const ps = EOD_DATA.projects;
  const issues = ps.filter(p => p.trend !== 'no_issues');
  const ok = ps.filter(p => p.trend === 'no_issues');
  const d = new Date(EOD_DATA.date + 'T12:00:00');
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dateLabel = days[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();

  const trendIcon = t => t === 'improved' ? '🟢' : t === 'worse' ? '🔴' : t === 'same' ? '🟡' : '✅';
  const trendLabel = t => t === 'improved' ? 'Improved' : t === 'worse' ? 'Worse' : t === 'same' ? 'Same as morning' : 'No issues';

  let h = `
    <div class="page-title">End of Day Wrap-Up</div>
    <div class="page-sub">EOD Report · ${dateLabel} · 4:00 PM</div>
    <div class="stats" style="grid-template-columns:repeat(5,1fr)">
      <div class="st g"><div class="n">${s.completed||0}</div><div class="l">Completed</div></div>
      <div class="st r"><div class="n">${s.worse||0}</div><div class="l">Worse</div></div>
      <div class="st y"><div class="n">${s.same||0}</div><div class="l">Same</div></div>
      <div class="st b"><div class="n">${s.improved||0}</div><div class="l">Improved</div></div>
      <div class="st g"><div class="n">${s.no_issues||0}</div><div class="l">On Track</div></div>
    </div>
    <div id="plist" style="margin-top:16px">`;

  issues.forEach(p => {
    const tIcon = trendIcon(p.trend);
    const tLabel = trendLabel(p.trend);
    const sevClass = p.trend === 'worse' ? 'sev-r' : p.trend === 'improved' ? 'sev-g' : 'sev-o';

    let body = '';
    const fmt = t => t.split('\n').map(l => `<div style="padding:2px 0">${l}</div>`).join('');
    body += eodSec('✅ COMPLETED TODAY', 'var(--grn)', p.completed_text ? fmt(p.completed_text) : '<div style="color:var(--dim)">No tasks completed today.</div>');
    if (p.problems_text) body += eodSec('🔴 STILL A PROBLEM', 'var(--red)', fmt(p.problems_text));
    if (p.risk_text) body += eodSec('⚠️ NEXT 48H RISK', 'var(--ylw)', fmt(p.risk_text));

    h += `<div class="pc ${sevClass}" data-st="issue" data-pm="${p.pm||'No PM'}"><div class="ph" onclick="tog(this)"><div>
      <div class="pn">${p.name}</div>
      <div class="pp">PM: ${p.pm} &nbsp;|&nbsp; ${tIcon} ${tLabel}</div></div>
      <div class="pt">${chvSvg()}</div></div>
      <div class="pb" style="padding:0 14px 14px"><div style="border-top:1px solid var(--bdr);margin-bottom:12px"></div>${body}</div></div>`;
  });

  if (ok.length) {
    h += '<div style="margin-top:20px;margin-bottom:8px;font-size:14px;font-weight:600;color:var(--grn)">✅ On Track</div>';
    ok.forEach(p => {
      h += `<div style="font-size:13px;padding:6px 0;border-bottom:1px solid var(--bdr);color:var(--txt2)">${p.name} <span style="color:var(--dim)">— ${p.pm}</span></div>`;
    });
  }

  h += '</div>';
  h += '<div class="ft">Generated by Jade · Awesome Group · Data from JobTread</div>';
  c.innerHTML = h;
}

// Shared helpers
const pmSelectStyle = "cursor:pointer;appearance:none;padding-right:24px;background-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2210%22 height=%226%22%3E%3Cpath d=%22M0 0l5 6 5-6z%22 fill=%22%238B95A8%22/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 8px center";

function buildFilters(ps, issues, ok, pms) {
  return `<div class="filters">
    <button class="fb on" onclick="filt('all',this)">All <span class="cnt">${ps.length}</span></button>
    <button class="fb" onclick="filt('issue',this)">Issues <span class="cnt">${issues.length}</span></button>
    <button class="fb" onclick="filt('ok',this)">On Track <span class="cnt">${ok.length}</span></button>

      <option value="">All PMs</option>
      ${pms.map(pm => `<option value="${pm.name}">${pm.name}</option>`).join('')}
      <option value="__none">No PM</option>
