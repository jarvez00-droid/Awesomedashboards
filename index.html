function renderMgmtBody() {
  const body = document.getElementById('mgmt-body');
  const statsEl = document.getElementById('mgmt-stats');
  if (!body || !statsEl || !MGMT_DATA) return;
  const d = MGMT_DATA;
  const balance = parseFloat(localStorage.getItem('cf_balance')||'0');
  const winStart = new Date(mgmtFromDate+'T12:00:00');
  const cutoff = new Date(winStart.getTime()+mgmtDays*86400000);
  const realToday = new Date(new Date().toISOString().slice(0,10)+'T12:00:00');
  const realTodayStr = realToday.toISOString().slice(0,10);
  const allItems = d.all_tasks||[];

  // ALL unpaid items with due dates — for analysis + simulator (full scope)
  const allUnpaid = allItems.filter(t => {
    if (!t.due || t.paid) return false;
    if (!mgmtIncludeFixed && mgmtIsFixed(t.type)) return false;
    if (mgmtProjFilter!=='all' && t.project!==mgmtProjFilter) return false;
    return true;
  });
  // Mark overdue items (based on REAL today, not picker date)
  allUnpaid.forEach(t => { t._overdue = t.due < realTodayStr; });
  const overdueItems = allUnpaid.filter(t => t._overdue);
  const futureItems = allUnpaid.filter(t => !t._overdue);
  // Data scope for banners
  const unpaidDates = allUnpaid.map(t=>t.due).sort();
  const dataFirstDate = unpaidDates.length > 0 ? unpaidDates[0] : null;
  const dataLastDate = unpaidDates.length > 0 ? unpaidDates[unpaidDates.length-1] : null;
  const dataDays = dataLastDate ? Math.ceil((new Date(dataLastDate+'T12:00:00') - realToday) / 86400000) : 0;

  // Filter window items — includes BOTH paid and unpaid in the date range
  const allWin = allItems.filter(t => {
    if (!t.due) return false;
    const td = new Date(t.due+'T12:00:00');
    if (td<winStart||td>=cutoff) return false;
    if (!mgmtIncludeFixed && mgmtIsFixed(t.type)) return false;
    if (mgmtProjFilter!=='all' && t.project!==mgmtProjFilter) return false;
    return true;
  });

  // Also include overdue items in the window (unpaid items before winStart)
  const overdueInWin = allUnpaid.filter(t => {
    const td = new Date(t.due+'T12:00:00');
    return td < winStart;
  });
  // Combined: window items + overdue (for display)
  const allWinPlusOverdue = [...allWin, ...overdueInWin];

  // Tallies — unpaid items in window + overdue
  let wIn=0,wPIn=0,wProjOut=0,wFixed=0,wMat=0,wSub=0;
  let wOverdueIn=0, wOverdueOut=0;
  const matByProj={},subByProj={},incByProj={},pincByProj={};
  const fixedByCat={salaries:0,utilities:0,rent:0,marketing:0,systems:0,others:0};
  const matItems=[],subItems=[],incItems=[],pincItems=[],fixedItems=[],overdueDisplayItems=[];

  // Count window items (unpaid only for totals)
  allWin.filter(t=>!t.paid).forEach(t => {
    const a=t.amount||0;
    if (t.type==='income') { wIn+=a; incByProj[t.project]=(incByProj[t.project]||0)+a; incItems.push(t); }
    else if (t.type==='p_income') { wPIn+=a; pincByProj[t.project]=(pincByProj[t.project]||0)+a; pincItems.push(t); }
    else if (t.type==='materials') { wProjOut+=a; wMat+=a; matByProj[t.project]=(matByProj[t.project]||0)+a; matItems.push(t); }
    else if (mgmtIsFixed(t.type)) { wFixed+=a; fixedByCat[t.type]=(fixedByCat[t.type]||0)+a; fixedItems.push(t); }
    else { wProjOut+=a; wSub+=a; subByProj[t.project]=(subByProj[t.project]||0)+a; subItems.push(t); }
  });

  // Count overdue items separately
  overdueItems.forEach(t => {
    const a=t.amount||0;
    overdueDisplayItems.push(t);
    if (t.type==='income'||t.type==='p_income') wOverdueIn+=a;
    else wOverdueOut+=a;
  });

  const totalIncome = wIn + wPIn;
  const gross = balance + wIn - wMat - wSub;
  const net = gross - wFixed;
  const netP = net + wPIn;

  // ── Stat Cards — 3 groups ──
  const sc = (val,label,color,bg,sub) => `<div style="text-align:center;padding:14px 8px;background:${bg||'var(--card)'};border:1px solid var(--bdr);border-radius:10px">
    <div style="font-size:22px;font-weight:700;color:${color}">${cfFmt(val)}</div>
    <div style="font-size:11px;color:var(--txt2);margin-top:4px;font-weight:600">${label}</div>
    ${sub?'<div style="font-size:9px;color:var(--dim);margin-top:2px">'+sub+'</div>':''}</div>`;

  // Overdue alert banner
  let overdueHtml = '';
  if (overdueItems.length > 0) {
    const odByType = {};
    overdueItems.forEach(t => {
      const tp = t.type==='income'?'Income':t.type==='p_income'?'Potential':t.type==='materials'?'Materials':t.type==='subs'?'Subs':mgmtIsFixed(t.type)?'Fixed':'Other';
      odByType[tp] = (odByType[tp]||0) + (t.amount||0);
    });
    const odTotal = wOverdueIn + wOverdueOut;
    let odList = overdueItems.sort((a,b)=>a.due.localeCompare(b.due)).map(t => {
      const c = (t.type==='income'||t.type==='p_income') ? '#4ade80' : '#f87171';
      const dir = (t.type==='income'||t.type==='p_income') ? '⬇ IN' : '⬆ OUT';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(248,113,113,.1)">
        <div style="flex:1;min-width:0"><span style="font-size:12px;color:#f97316;font-weight:700;margin-right:6px">${t.due}</span><span style="font-size:12px;color:#fff">${t.task}</span><span style="font-size:11px;color:var(--dim);margin-left:6px">${t.project}</span></div>
        <span style="font-size:12px;font-weight:700;color:${c};font-family:var(--mono);white-space:nowrap">${dir} ${cfFmt(t.amount||0)}</span>
      </div>`;
    }).join('');
    overdueHtml = `<div style="background:rgba(248,113,113,.06);border:2px solid rgba(248,113,113,.3);border-radius:12px;padding:14px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:14px;font-weight:700;color:#f87171">🔴 ${overdueItems.length} OVERDUE PAYMENT${overdueItems.length>1?'S':''} — ${cfFmt(odTotal)} unpaid</div>
        <div style="font-size:11px;color:var(--dim)">${wOverdueIn>0?'IN: '+cfFmt(wOverdueIn)+' · ':''}OUT: ${cfFmt(wOverdueOut)}</div>
      </div>
      <div style="max-height:200px;overflow-y:auto">${odList}</div>
    </div>`;
  }

  const projCfHtml = buildProjectCashflowView(allItems, realTodayStr);

  statsEl.innerHTML = overdueHtml + projCfHtml + `
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px">
    <div style="background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#4ade80;margin-bottom:10px">💰 INCOME</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        ${sc(wIn,'Confirmed','#4ade80','rgba(74,222,128,.06)',incItems.length+' payments')}
        ${sc(wPIn,'Potential','#facc15','rgba(250,204,21,.06)',pincItems.length+' payments')}
        ${sc(totalIncome,'Total','#4ade80','rgba(74,222,128,.03)','')}
      </div>
    </div>
    <div style="background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#f87171;margin-bottom:10px">📤 EXPENSES</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        ${sc(wMat,'Materials','#fb923c','rgba(251,146,60,.06)',matItems.length+' payments')}
        ${sc(wSub,'Subs','#f87171','rgba(248,113,113,.06)',subItems.length+' payments')}
        ${sc(wFixed,'Fixed','#818cf8','rgba(129,140,248,.06)',fixedItems.length+' payments')}
      </div>
    </div>
    <div style="background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);margin-bottom:10px">📊 BOTTOM LINE</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        ${sc(gross,'Gross','var(--grn)','rgba(74,222,128,.04)','no fixed costs')}
        ${sc(net,'Net',net>=0?'var(--grn)':'var(--red)',net>=0?'rgba(74,222,128,.04)':'rgba(248,113,113,.04)','all expenses')}
        ${sc(netP,'w/ Potential',netP>=0?'#facc15':'var(--red)','rgba(250,204,21,.04)','includes potential')}
      </div>
    </div>
  </div>`;

  // ── Category Breakdown (expandable with detail) ──
  function catCard(title, icon, total, color, items, groupBy) {
    const groups = {};
    items.forEach(t => {
      const key = groupBy==='cat' ? (t.type||'others') : (t.project||'Unknown');
      if (!groups[key]) groups[key] = {total:0, items:[]};
      groups[key].total += (t.amount||0);
      groups[key].items.push(t);
    });
    const sorted = Object.entries(groups).sort((a,b)=>b[1].total-a[1].total);
    let detail = '';
    sorted.forEach(([k,v]) => {
      const lbl = groupBy==='cat' ? (MGMT_FC_CATS[k]?MGMT_FC_CATS[k].icon+' '+MGMT_FC_CATS[k].label:k) : k;
      const pct = total>0 ? Math.round(v.total/total*100) : 0;
      // Bar width
      const barW = total>0 ? Math.max(v.total/total*100, 2) : 0;
      // Sub-items sorted by date
      const subItems = v.items.sort((a,b)=>(a.due||'').localeCompare(b.due||''));
      let subHtml = '';
      subItems.forEach(si => {
        const dt = si.due ? new Date(si.due+'T12:00:00') : null;
        const dtLbl = dt ? MONTHS[dt.getMonth()]+' '+dt.getDate()+' ('+DAYS[dt.getDay()]+')' : '—';
        subHtml += `<div style="display:flex;justify-content:space-between;padding:2px 0 2px 12px;font-size:10px;border-bottom:1px solid rgba(255,255,255,.02)">
          <span style="color:var(--dim);min-width:90px">${dtLbl}</span>
          <span style="color:var(--txt2);flex:1;margin:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${si.task}</span>
          <span style="color:${color};font-weight:600;white-space:nowrap;font-family:var(--mono)">${si.amount?cfFmt(si.amount):'TBD'}</span>
        </div>`;
      });

      detail += `<div style="margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;cursor:pointer" onclick="var el=this.nextElementSibling;el.style.display=el.style.display==='none'?'block':'none'">
          <div style="display:flex;align-items:center;gap:6px;flex:1">
            <span style="color:var(--txt);font-size:12px;font-weight:500">${lbl}</span>
            <span style="color:var(--dim);font-size:10px">${v.items.length} items · ${pct}%</span>
          </div>
          <span style="color:${color};font-weight:700;font-size:13px;font-family:var(--mono)">${cfFmt(v.total)}</span>
        </div>
        <div style="height:4px;background:rgba(255,255,255,.05);border-radius:2px;margin-bottom:2px"><div style="height:100%;width:${barW}%;background:${color};border-radius:2px;opacity:.7"></div></div>
        <div style="display:none">${subHtml}</div>
      </div>`;
    });
    if (!sorted.length) detail = '<div style="font-size:11px;color:var(--dim);padding:6px 0">None</div>';

    return `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="var el=this.nextElementSibling;el.style.display=el.style.display==='none'?'block':'none';this.querySelector('svg').style.transform=el.style.display==='none'?'':'rotate(180deg)'">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:16px">${icon}</span>
          <span style="font-size:13px;font-weight:600;color:var(--txt)">${title}</span>
          <span style="font-size:11px;color:var(--dim)">${items.length} items</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:16px;font-weight:700;color:${color}">${cfFmt(total)}</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--dim);transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)">${detail}</div>
    </div>`;
  }

  // ── Weekly Overview Table ──
  const wByWeek = {};
  allWin.filter(t=>!t.paid).forEach(t => {
    if (!t.due) return;
    const dd = new Date(t.due+'T12:00:00');
    const day = dd.getDay(); const mon = new Date(dd); mon.setDate(mon.getDate()-((day+6)%7));
    const sun = new Date(mon); sun.setDate(sun.getDate()+6);
    const wk = mon.toISOString().slice(0,10);
    if (!wByWeek[wk]) wByWeek[wk] = {mat:0,subs:0,fixed:0,income:0,pincome:0,label:(mon.getMonth()+1)+'/'+mon.getDate()+' - '+(sun.getMonth()+1)+'/'+sun.getDate()};
    if (t.type==='income') wByWeek[wk].income+=(t.amount||0);
    else if (t.type==='p_income') wByWeek[wk].pincome+=(t.amount||0);
    else if (t.type==='materials') wByWeek[wk].mat+=(t.amount||0);
    else if (mgmtIsFixed(t.type)) wByWeek[wk].fixed+=(t.amount||0);
    else wByWeek[wk].subs+=(t.amount||0);
  });
  const weeks = Object.entries(wByWeek).sort((a,b)=>a[0].localeCompare(b[0]));

  let weeklyTable = '';
  if (weeks.length) {
    weeklyTable = `<div style="overflow-x:auto;margin-top:12px"><table style="width:100%;font-size:11px;border-collapse:collapse">
      <tr style="border-bottom:1px solid var(--bdr);color:var(--txt2)">
        <th style="text-align:left;padding:5px 4px;font-weight:600">Week</th>
        <th style="text-align:right;padding:5px 4px;font-weight:600;color:#fb923c">Materials</th>
        <th style="text-align:right;padding:5px 4px;font-weight:600;color:#f87171">Subs</th>
        ${mgmtIncludeFixed?'<th style="text-align:right;padding:5px 4px;font-weight:600;color:#818cf8">Fixed</th>':''}
        <th style="text-align:right;padding:5px 4px;font-weight:600;color:#4ade80">Income</th>
        <th style="text-align:right;padding:5px 4px;font-weight:600">Net</th>
      </tr>`;
    weeks.forEach(([wk,v])=>{
      const fxd=mgmtIncludeFixed?v.fixed:0;
      const wnet=v.income-v.mat-v.subs-fxd;
      weeklyTable+=`<tr style="border-bottom:1px solid rgba(33,39,47,.3)">
        <td style="padding:4px;color:var(--txt);font-size:10px">${v.label}</td>
        <td style="text-align:right;padding:4px;color:#fb923c">${v.mat?cfFmt(v.mat):'—'}</td>
        <td style="text-align:right;padding:4px;color:#f87171">${v.subs?cfFmt(v.subs):'—'}</td>
        ${mgmtIncludeFixed?`<td style="text-align:right;padding:4px;color:#818cf8">${v.fixed?cfFmt(v.fixed):'—'}</td>`:''}
        <td style="text-align:right;padding:4px;color:#4ade80">${v.income?cfFmt(v.income):'—'}</td>
        <td style="text-align:right;padding:4px;font-weight:600;color:${wnet>=0?'#4ade80':'#f87171'}">${cfFmt(wnet)}</td>
      </tr>`;
    });
    weeklyTable += '</table></div>';
  }

  // ── Daily Calendar (from picker start date, 21 days) ──
  const calStart = new Date(mgmtFromDate+'T12:00:00');
  const cal21 = new Date(calStart.getTime()+21*86400000);
  // Include unpaid items in range + overdue items pinned to start date
  const calItems = [];
  allItems.filter(t => {
    if (!t.due) return false;
    const td = new Date(t.due+'T12:00:00');
    if (td>=calStart && td<cal21) {
      if (!mgmtIncludeFixed && mgmtIsFixed(t.type)) return false;
      if (mgmtProjFilter!=='all' && t.project!==mgmtProjFilter) return false;
      calItems.push(t);
    }
    return false;
  });
  // Add overdue items to first day
  overdueItems.forEach(t => {
    calItems.push({...t, due: mgmtFromDate, _overdueOriginal: t.due});
  });
  const calByDay = {};
  calItems.forEach(t => {
    if (!calByDay[t.due]) calByDay[t.due]={in:0,out:0,items:[]};
    const isIn = t.type==='income'||t.type==='p_income';
    if (isIn) calByDay[t.due].in+=(t.amount||0);
    else calByDay[t.due].out+=(t.amount||0);
    calByDay[t.due].items.push(t);
  });

  // Build all 21 days with running balance
  let calHtml = '';
  let calRunBal = balance;
  for (let i=0;i<21;i++) {
    const dd = new Date(calStart.getTime()+i*86400000);
    const ds = dd.toISOString().slice(0,10);
    const dayData = calByDay[ds];
    const dayName = DAYS[dd.getDay()];
    const dayLabel = MONTHS[dd.getMonth()]+' '+dd.getDate();
    const isWeekend = dd.getDay()===0||dd.getDay()===6;
    const isToday = ds===new Date().toISOString().slice(0,10);
    const isMon = dd.getDay()===1;

    // Week separator
    if (isMon && i>0) calHtml += '<div style="height:2px;background:var(--bdr);margin:6px 0"></div>';

    if (!dayData) {
      calHtml += `<div style="padding:6px 8px;border-bottom:1px solid rgba(33,39,47,.15);font-size:11px;display:flex;justify-content:space-between;align-items:center;${isWeekend?'background:rgba(255,255,255,.01)':''}">
        <span style="color:var(--txt2)">${isToday?'<span style="font-size:9px;font-weight:700;color:#38bdf8;background:rgba(56,189,248,.15);padding:1px 5px;border-radius:3px;margin-right:4px">TODAY</span>':''}${dayName} ${dayLabel} — <span style="color:var(--dim)">no payments</span></span>
        <span style="font-family:var(--mono);font-size:10px;color:${calRunBal>=0?'var(--txt2)':'#f87171'}">Bal: ${cfFmt(calRunBal)}</span>
      </div>`;
      continue;
    }

    const dIn = dayData.in;
    const dOut = dayData.out;
    // Update running balance (unpaid only — income adds, expenses subtract — skip p_income from balance)
    const dInConfirmed = dayData.items.filter(t=>!t.paid&&t.type==='income').reduce((s,t)=>s+(t.amount||0),0);
    const dOutAll = dayData.items.filter(t=>!t.paid&&t.type!=='income'&&t.type!=='p_income').reduce((s,t)=>s+(t.amount||0),0);
    calRunBal += dInConfirmed - dOutAll;

    const dnet = dIn - dOut;
    const netC = dnet>=0?'#4ade80':'#f87171';
    const borderC = dIn>0&&dOut===0?'#4ade80':dOut>0&&dIn===0?'#f87171':'#facc15';
    const balC = calRunBal>=0?'#4ade80':'#f87171';

    calHtml += `<div style="margin-bottom:1px">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 8px;background:${isToday?'rgba(56,189,248,.08)':'rgba(255,255,255,.02)'};border-radius:6px;cursor:pointer;border-left:3px solid ${borderC}" onclick="var el=this.nextElementSibling;el.style.display=el.style.display==='none'?'block':'none'">
        <div style="flex:1">
          ${isToday?'<span style="font-size:9px;font-weight:700;color:#38bdf8;background:rgba(56,189,248,.15);padding:1px 5px;border-radius:3px;margin-right:4px">TODAY</span>':''}
          <span style="font-size:12px;font-weight:600;color:var(--txt)">${dayName} ${dayLabel}</span>
          <span style="font-size:10px;color:var(--dim);margin-left:4px">${dayData.items.length} item${dayData.items.length>1?'s':''}</span>
        </div>
        <div style="display:flex;gap:10px;font-size:11px;font-weight:600;align-items:center">
          ${dIn>0?'<span style="color:#4ade80;background:rgba(74,222,128,.1);padding:2px 6px;border-radius:4px">⬇ IN '+cfFmt(dIn)+'</span>':''}
          ${dOut>0?'<span style="color:#f87171;background:rgba(248,113,113,.1);padding:2px 6px;border-radius:4px">⬆ OUT '+cfFmt(dOut)+'</span>':''}
          <span style="color:var(--dim)">│</span>
          <span style="color:${balC};font-family:var(--mono);font-weight:700;min-width:80px;text-align:right">Balance: ${cfFmt(calRunBal)}</span>
        </div>
      </div>
      <div style="display:none;padding:4px 0 6px 16px">`;

    dayData.items.sort((a,b)=>(b.amount||0)-(a.amount||0)).forEach(t => {
      const ti = mgmtTypeInfo(t.type);
      const isIn = t.type==='income'||t.type==='p_income';
      const typeText = t.type==='income'?'Income':t.type==='p_income'?'Potential':t.type==='materials'?'Materials':t.type==='subs'?'Sub Payment':MGMT_FC_CATS[t.type]?MGMT_FC_CATS[t.type].label:'Expense';
      const isPaid = t.paid;
      const isOD = t._overdueOriginal;
      const rowOpacity = isPaid ? 'opacity:.45;' : '';
      const paidTag = isPaid ? '<span style="font-size:8px;font-weight:700;color:#4ade80;background:rgba(74,222,128,.15);padding:1px 4px;border-radius:2px;margin-left:4px">PAID</span>' : '';
      const odTag = isOD ? '<span style="font-size:8px;font-weight:700;color:#f97316;background:rgba(249,115,22,.15);padding:1px 4px;border-radius:2px;margin-left:4px">OVERDUE from '+t._overdueOriginal+'</span>' : '';
      calHtml += `<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(33,39,47,.1);${rowOpacity}">
        <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;overflow:hidden">
          <span style="background:${ti.color}20;color:${ti.color};border:1px solid ${ti.color}40;font-size:9px;padding:1px 5px;border-radius:3px;white-space:nowrap">${typeText}</span>
          <span style="color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${isPaid?'text-decoration:line-through;':''}">${t.task}</span>
          <span style="color:var(--dim);font-size:9px;white-space:nowrap">— ${t.project||''}</span>
          ${paidTag}${odTag}
        </div>
        <span style="color:${isIn?'#4ade80':'#f87171'};font-weight:600;white-space:nowrap;margin-left:8px;font-family:var(--mono)">${isIn?'+ ':'- '}${t.amount?cfFmt2(t.amount):'TBD'}</span>
      </div>`;
    });
    calHtml += '</div></div>';
  }

  // ── Section title helper ──
  const secTitle = (icon, title, sub) => `<div style="display:flex;align-items:center;gap:10px;margin:24px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--bdr)">
    <span style="font-size:18px">${icon}</span>
    <div><div style="font-size:15px;font-weight:700;color:var(--txt)">${title}</div>${sub?'<div style="font-size:11px;color:var(--dim)">'+sub+'</div>':''}</div>
  </div>`;

  // ── Assemble layout ──
  let html = '';

  // Section 1: Breakdown
  html += secTitle('📊', 'Category Breakdown', 'Where the money goes · Click to expand details');

  let leftCol = '';
  leftCol += catCard('📦 Materials', '📦', wMat, '#fb923c', matItems, 'project');
  leftCol += catCard('🔧 Subcontractors', '🔧', wSub, '#f87171', subItems, 'project');
  if (mgmtIncludeFixed) leftCol += catCard('⚙ Fixed Costs', '⚙', wFixed, '#818cf8', fixedItems, 'cat');
  leftCol += catCard('💰 Confirmed Income', '💰', wIn, '#4ade80', incItems, 'project');
  if (wPIn > 0) leftCol += catCard('⚡ Potential Income', '⚡', wPIn, '#facc15', pincItems, 'project');

  // Build payment list for later (Section 6)
  const sorted = [...allWin].sort((a,b)=>(a.due||'').localeCompare(b.due||''));
  let curWeek = '';
  let payListHtml = '';
  payListHtml += `<div class="cf-pay" style="border-bottom:1px solid var(--bdr);padding-bottom:4px;margin-bottom:2px">
    <span class="cf-pay-date" style="font-weight:600;color:var(--txt)">Date</span>
    <span class="cf-pay-type" style="background:none;border:none;color:var(--txt);font-weight:600">Direction</span>
    <span class="cf-pay-name" style="font-weight:600;color:var(--txt)">Payment</span>
    <span class="cf-pay-amt" style="color:var(--txt)">Amount</span>
    <span class="cf-pay-status" style="background:none;border:none;color:var(--txt);font-weight:600">Status</span>
  </div>`;
  if (sorted.length) {
    sorted.forEach(t => {
      const weekKey = cfGetMonday(t.due);
      if (weekKey !== curWeek) {
        curWeek = weekKey;
        const wItems = sorted.filter(w=>cfGetMonday(w.due)===weekKey);
        let wI=0,wO=0,wP=0;
        wItems.forEach(w=>{if(w.type==='p_income')wP+=w.amount;else if(w.type==='income')wI+=w.amount;else wO+=w.amount;});
        const wN=wI-wO;
        payListHtml+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 4px 4px;margin-top:8px;border-top:2px solid var(--bdr)">
          <span style="font-size:12px;font-weight:700;color:var(--txt)">📅 ${cfWeekRange(weekKey)}</span>
          <span style="font-size:11px"><span style="color:#4ade80;font-weight:600">⬇ IN ${cfFmt(wI)}</span>${wP>0?' · <span style="color:#facc15">⚡'+cfFmt(wP)+'</span>':''} · <span style="color:#f87171;font-weight:600">⬆ OUT ${cfFmt(wO)}</span> · <span style="color:${wN>=0?'#4ade80':'#f87171'};font-weight:700">NET ${cfFmt(wN)}</span></span>
        </div>`;
      }
      const ti=mgmtTypeInfo(t.type);
      const isIn=t.type==='income'||t.type==='p_income';
      const dt=new Date(t.due+'T12:00:00');
      const dateLbl=MONTHS[dt.getMonth()]+' '+dt.getDate()+'<br><span style="font-size:9px;color:var(--dim)">'+DAYS[dt.getDay()]+'</span>';
      const paidSt=t.paid?'opacity:0.5;text-decoration:line-through':'';
      const statusLbl=t.paid?'✓ Paid':(t.amount?'Pending':'TBD');
      const statusCls=t.paid?'paid':(t.amount?'pending':'tbd');
      const dirLabel = isIn ? '⬇ INCOME' : '⬆ EXPENSE';
      const dirColor = isIn ? '#4ade80' : '#f87171';
      const dirBg = isIn ? 'rgba(74,222,128,.1)' : 'rgba(248,113,113,.1)';
      payListHtml+=`<div class="cf-pay" style="${paidSt}">
        <span class="cf-pay-date">${dateLbl}</span>
        <span class="cf-pay-type" style="background:${dirBg};color:${dirColor};border:1px solid ${dirColor}40;font-size:10px;font-weight:700">${dirLabel}</span>
        <span class="cf-pay-name">${t.task} <span class="cf-pay-proj">— ${t.project||''}</span></span>
        <span class="cf-pay-amt" style="color:${dirColor};font-weight:700">${isIn?'+':'-'}${t.amount?cfFmt2(t.amount):'TBD'}</span>
        <span class="cf-pay-status ${statusCls}">${statusLbl}</span>
      </div>`;
    });
  } else {
    payListHtml += '<div style="padding:12px;text-align:center;color:var(--dim)">No payments in this window</div>';
  }

  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px">${leftCol}</div>`;
  if (weeklyTable) html += weeklyTable;

  // ── Large Chart ──
  const mByDay = {};
  allWin.forEach(t => { if(!mByDay[t.due]) mByDay[t.due]=[]; mByDay[t.due].push(t); });
  const mDates = [...new Set([...Object.keys(mByDay), d.date])].sort();
  let runBal=balance, runBalG=balance, runBalP=balance;
  const pts = [];
  mDates.forEach(ds => {
    let dIn=0,dOut=0,dFixed=0,dPIn=0;
    (mByDay[ds]||[]).forEach(t => {
      if(t.paid)return;
      if(t.type==='p_income'){dPIn+=t.amount;return;}
      if(t.type==='income')dIn+=t.amount;
      else if(mgmtIsFixed(t.type))dFixed+=t.amount;
      else dOut+=t.amount;
    });
    runBalG+=dIn-dOut;
    runBal+=dIn-dOut-(mgmtIncludeFixed?dFixed:0);
    runBalP=runBal+dPIn;
    pts.push({date:ds,gross:runBalG,net:runBal,netP:runBalP,dayIn:dIn,dayOut:dOut+dFixed});
  });

  // Section 2: Chart
  html += secTitle('📈', 'Cash Flow Chart', 'Balance over time · Scroll to see all days');

  if (pts.length>0) {
    const hasFixed = pts.some(p=>p.gross!==p.net);
    const hasP = pts.some(p=>p.netP!==p.net);
    const allBals = [balance,...pts.map(p=>p.gross),...pts.map(p=>p.net),...pts.map(p=>p.netP)];
    const maxB=Math.max(...allBals,1), minB=Math.min(...allBals,0);
    const W=Math.max(pts.length*80,1200), H=400;
    const padL=70,padR=30,padT=30,padB=45,plotW=W-padL-padR,plotH=H-padT-padB;
    const yMin=Math.min(minB,0), yMax=Math.max(maxB,balance+1), yR=yMax-yMin||1;
    const toY=v=>padT+plotH-((v-yMin)/yR*plotH);
    const toX=i=>padL+(pts.length>1?i/(pts.length-1)*plotW:plotW/2);
    const zeroY=toY(0), startY=toY(balance);

    let svg = `<svg id="mgmt-chart-svg" width="100%" height="${H}" style="display:block;min-width:${W}px" viewBox="0 0 ${W} ${H}">
      <defs><linearGradient id="mcfg2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--grn)" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="var(--grn)" stop-opacity="0"/>
      </linearGradient></defs>`;

    const gridN=5;
    for(let i=0;i<=gridN;i++){
      const val=yMin+(yR/gridN)*i, y=toY(val);
      svg+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--bdr)" stroke-width="1"/>`;
      svg+=`<text x="${padL-10}" y="${y+4}" text-anchor="end" fill="var(--dim)" font-size="11" font-family="var(--mono)">${cfFmt(val)}</text>`;
    }
    svg+=`<line x1="${padL}" y1="${zeroY}" x2="${W-padR}" y2="${zeroY}" stroke="#00ff88" stroke-width="2.5" opacity="0.9"/>`;
    svg+=`<rect x="${W-padR+2}" y="${zeroY-8}" width="30" height="16" rx="3" fill="#00ff88" opacity="0.15"/>`;
    svg+=`<text x="${W-padR+6}" y="${zeroY+4}" fill="#00ff88" font-size="11" font-weight="700" font-family="var(--mono)">$0</text>`;
    svg+=`<line x1="${padL}" y1="${startY}" x2="${W-padR}" y2="${startY}" stroke="var(--blu)" stroke-width="1" stroke-dasharray="3,6" opacity="0.4"/>`;

    let netPath='';
    pts.forEach((p,i)=>{netPath+=(i===0?'M':'L')+`${toX(i)},${toY(p.net)} `;});
    const firstX=toX(0),lastX=toX(pts.length-1);
    svg+=`<path d="${netPath}L${lastX},${zeroY} L${firstX},${zeroY} Z" fill="url(#mcfg2)"/>`;

    if(hasP){
      let pp='';pts.forEach((p,i)=>{pp+=(i===0?'M':'L')+`${toX(i)},${toY(p.netP)} `;});
      svg+=`<path d="${pp}" fill="none" stroke="#facc15" stroke-width="2" stroke-dasharray="6,4" stroke-linejoin="round" opacity="0.7"/>`;
    }
    if(hasFixed){
      let gp='';pts.forEach((p,i)=>{gp+=(i===0?'M':'L')+`${toX(i)},${toY(p.gross)} `;});
      svg+=`<path d="${gp}" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,4" stroke-linejoin="round" opacity="0.5"/>`;
    }
    svg+=`<path d="${netPath}" fill="none" stroke="var(--grn)" stroke-width="3" stroke-linejoin="round"/>`;

    pts.forEach((p,i)=>{
      const x=toX(i),y=toY(p.net);
      const c=p.net>=0?'var(--grn)':'var(--red)';
      svg+=`<circle cx="${x}" cy="${y}" r="5" fill="${c}" stroke="var(--bg)" stroke-width="2"/>`;
      const dt=new Date(p.date+'T12:00:00');
      svg+=`<text x="${x}" y="${H-18}" text-anchor="middle" fill="var(--txt2)" font-size="10" font-family="var(--mono)">${MONTHS[dt.getMonth()]} ${dt.getDate()}</text>`;
      svg+=`<text x="${x}" y="${H-6}" text-anchor="middle" fill="var(--dim)" font-size="9" font-family="var(--mono)">${DAYS[dt.getDay()]}</text>`;
      svg+=`<text x="${x}" y="${y-12}" text-anchor="middle" fill="${c}" font-size="11" font-weight="700" font-family="var(--mono)">${cfFmt(p.net)}</text>`;
    });
    svg+='</svg>';

    let legend = '<span style="color:var(--grn)">━━ Net (all expenses)</span>';
    if(hasFixed) legend+=' <span style="color:#4ade8080">┅┅ Gross (projects only)</span>';
    if(hasP) legend+=' <span style="color:#facc15">┅┅ With Potential</span>';

    html += `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:16px;margin-bottom:8px">
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;max-height:430px">${svg}</div>
      <div style="display:flex;gap:16px;justify-content:center;margin-top:10px;font-size:11px">${legend}
        <span style="color:#00ff88">━━ $0 baseline</span>
      </div>
    </div>`;
  }

  // Section 3: Daily Payment Calendar — full width
  const calOverdueNote = overdueItems.length > 0 ? ' · <span style="color:#f87171">🔴 ' + overdueItems.length + ' overdue included in first day</span>' : '';
  html += secTitle('📅', 'Daily Payment Calendar', 'Day-by-day cash position · 21 days from ' + mgmtFromDate + calOverdueNote);
  html += `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:16px">`;
  html += calHtml || '<div style="font-size:12px;color:var(--dim);padding:12px 0;text-align:center">No payments in this range</div>';
  html += '</div>';

  // Section 4: Situation Evaluation — What-If Scenario Planner
  html += secTitle('🎯', 'Situation Evaluation', 'Adjust payment timing to plan cash flow · Changes are local only — nothing is saved');
  html += buildSituationEval(allUnpaid, balance, dataDays, dataLastDate);

  // Section 5: Jade's Financial Deep Analysis
  const scopeEnd = dataLastDate ? new Date(dataLastDate+'T12:00:00') : new Date();
  const scopeLbl = dataLastDate ? MONTHS[scopeEnd.getMonth()] + ' ' + scopeEnd.getDate() + ', ' + scopeEnd.getFullYear() : '—';
  html += secTitle('🧠', "Jade's Financial Analysis", 'Analyzing ALL ' + allUnpaid.length + ' unpaid payments through ' + scopeLbl + ' (' + dataDays + ' days of data)');
  html += `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:20px;margin-bottom:8px">`;
  html += `<div style="background:rgba(56,189,248,.04);border:1px solid rgba(56,189,248,.15);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#b0b8c8">
    📊 <b style="color:#38bdf8">Data Scope:</b> ${allUnpaid.length} unpaid payments (${overdueItems.length > 0 ? '<b style="color:#f87171">' + overdueItems.length + ' overdue</b> + ' : ''}${futureItems.length} upcoming) through <b>${scopeLbl}</b> (${dataDays} days).
    Source: JobTread payment tasks across ${new Set(allUnpaid.map(t=>t.project)).size} active projects.
    Types: Income, Potential Income, Sub Payments, Materials${mgmtIncludeFixed ? ', Fixed Costs (salaries, rent, utilities, marketing)' : ''}.
    ${dataDays < 30 ? '<span style="color:#facc15">⚠ Limited data — only ' + dataDays + ' days ahead. Longer-term analysis not possible.</span>' : dataDays >= 90 ? '<span style="color:#4ade80">✅ Strong data depth — ' + dataDays + ' days gives reliable multi-month projections.</span>' : '<span style="color:#b0b8c8">' + dataDays + ' days of forward visibility.</span>'}
  </div>`;
  html += buildJadeFinanceAnalysis(allUnpaid, balance);
  html += buildJadeRecommendations(allUnpaid, balance);
  html += '</div>';

  // Section 6: Full Payment List
  html += secTitle('📋', 'All Payments', sorted.length + ' items · Complete list sorted by date');
  html += '<div style="background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:10px 14px">';
  html += payListHtml;
  html += '</div>';

  body.innerHTML = html;

  // Wire up situation eval events after DOM is ready
  initSituationEval(allUnpaid, balance, dataDays);
}

// ── Situation Eval v4 ──
// State
let scenarioItems = [];
let scenarioManualItems = [];
let scenarioNextId = 1;
let scenarioSelected = new Set(); // ids of selected items
const SIT_SAVE_KEY = 'jade_sit_v4';

// Save scenario state to localStorage
function sitSave() {
  const state = {
    items: scenarioItems.map(x => ({ id: x.id, shift: x.shift, due: x.due, _removed: x._removed || false })),
    manual: scenarioManualItems,
    savedAt: new Date().toISOString(),
    dataVersion: window._mgmtDataVersion || ''
  };
  localStorage.setItem(SIT_SAVE_KEY, JSON.stringify(state));
}

// Load saved state — only if dataVersion matches
function sitLoad() {
  try {
    const raw = localStorage.getItem(SIT_SAVE_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (state.dataVersion !== (window._mgmtDataVersion || '')) return false;
    // Apply shifts to items
    const shiftMap = {};
    (state.items || []).forEach(s => { shiftMap[s.id] = s; });
    scenarioItems.forEach(item => {
      if (shiftMap[item.id]) {
        item.shift = shiftMap[item.id].shift;
        item.due = shiftMap[item.id].due;
        item._removed = shiftMap[item.id]._removed || false;
      }
    });
    // Restore manual items
    scenarioManualItems = state.manual || [];
    scenarioNextId = Math.max(1, ...scenarioManualItems.map(m => parseInt(m.id.replace('manual_',''))+1).filter(n=>!isNaN(n)), 1);
    return true;
  } catch(e) { return false; }
}

function sitClearSave() {
  localStorage.removeItem(SIT_SAVE_KEY);
}

function buildProjectCashflowView(allItems, realTodayStr) {
  const projItems = allItems.filter(t => t.due && t.project && t.project !== '⚙ Fixed Costs' && !t.paid);

  // Group by project
  const byProj = {};
  projItems.forEach(t => {
    if (!byProj[t.project]) byProj[t.project] = [];
    byProj[t.project].push(t);
  });

  const projNames = Object.keys(byProj).sort((a, b) => {
    const aOut = byProj[a].filter(t => t.type !== 'income' && t.type !== 'p_income').reduce((s, t) => s + (t.amount || 0), 0);
    const bOut = byProj[b].filter(t => t.type !== 'income' && t.type !== 'p_income').reduce((s, t) => s + (t.amount || 0), 0);
    return bOut - aOut;
  });

  if (projNames.length === 0) return '';

  let html = `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;margin-bottom:16px">`;
  html += `<div style="margin-bottom:14px">`;
  html += `<span style="font-size:16px;font-weight:800;color:var(--txt)">📊 Project Cash Flow — Day by Day</span>`;
  html += `<div style="font-size:11px;color:var(--dim);margin-top:2px">Per-project daily breakdown with running balance. Unpaid items only. Click to expand.</div>`;
  html += `</div>`;

  // Grand totals
  let grandIn = 0, grandOut = 0;

  projNames.forEach(projName => {
    const items = byProj[projName];
    const totalIn = items.filter(t => t.type === 'income' || t.type === 'p_income').reduce((s, t) => s + (t.amount || 0), 0);
    const totalOut = items.filter(t => t.type !== 'income' && t.type !== 'p_income').reduce((s, t) => s + (t.amount || 0), 0);
    const net = totalIn - totalOut;

    if (items.length === 0) return;
    grandIn += totalIn;
    grandOut += totalOut;

    // Group items by day
    const byDay = {};
    items.forEach(t => {
      if (!byDay[t.due]) byDay[t.due] = [];
      byDay[t.due].push(t);
    });
    const days = Object.keys(byDay).sort();

    // Overdue items
    const overdueDays = days.filter(d => d < realTodayStr);
    const futureDays = days.filter(d => d >= realTodayStr);

    const netColor = net >= 0 ? '#4ade80' : '#f87171';
    const netSign = net >= 0 ? '+' : '';

    // Header
    html += `<div style="border:1px solid var(--bdr);border-radius:10px;margin-bottom:8px;overflow:hidden">`;
    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;background:rgba(255,255,255,.02)" onmouseover="this.style.background='rgba(255,255,255,.04)'" onmouseout="this.style.background='rgba(255,255,255,.02)'" onclick="var b=this.nextElementSibling;var a=this.querySelector('.pcf-arrow');if(b.style.display==='none'){b.style.display='block';a.textContent='▾'}else{b.style.display='none';a.textContent='▸'}">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="pcf-arrow" style="font-size:12px;color:var(--dim)">▸</span>
        <div>
          <div style="font-size:14px;font-weight:700;color:var(--txt)">${projName}</div>
          <div style="font-size:11px;color:var(--dim)">${items.length} payments · ${days.length} days${overdueDays.length > 0 ? ' · <span style="color:#f97316">' + overdueDays.length + ' overdue days</span>' : ''}</div>
        </div>
      </div>
      <div style="display:flex;gap:14px;align-items:center;font-size:13px;font-weight:700;font-family:var(--mono)">
        ${totalIn > 0 ? '<span style="color:#4ade80">⬇ ' + cfFmt(totalIn) + '</span>' : '<span style="color:var(--dim)">⬇ $0</span>'}
        <span style="color:#f87171">⬆ ${cfFmt(totalOut)}</span>
        <span style="color:${netColor};border-left:1px solid var(--bdr);padding-left:12px">${netSign}${cfFmt(net)}</span>
      </div>
    </div>`;

    // Expandable body — day by day table
    html += `<div style="display:none;padding:0 4px 10px">`;

    // Table
    html += `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">`;
    html += `<thead><tr style="border-bottom:2px solid var(--bdr);position:sticky;top:0;background:var(--card)">
      <th style="text-align:left;padding:8px 6px;font-weight:700;color:var(--txt2);font-size:11px">DATE</th>
      <th style="text-align:left;padding:8px 6px;font-weight:700;color:var(--txt2);font-size:11px">ITEMS</th>
      <th style="text-align:right;padding:8px 6px;font-weight:700;color:#4ade80;font-size:11px">DAY IN ⬇</th>
      <th style="text-align:right;padding:8px 6px;font-weight:700;color:#f87171;font-size:11px">DAY OUT ⬆</th>
      <th style="text-align:right;padding:8px 6px;font-weight:700;color:var(--txt2);font-size:11px">DAY NET</th>
      <th style="text-align:right;padding:8px 6px;font-weight:700;color:#38bdf8;font-size:11px">BALANCE</th>
    </tr></thead><tbody>`;

    let runBal = 0;

    days.forEach(day => {
      const dayItems = byDay[day];
      const isOverdue = day < realTodayStr;
      const isToday = day === realTodayStr;
      const dd = new Date(day + 'T12:00:00');
      const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dd.getDay()];
      const monthName = MONTHS[dd.getMonth()];
      const dateLbl = monthName + ' ' + dd.getDate();

      let dayIn = 0, dayOut = 0;
      dayItems.forEach(t => {
        const isIn = t.type === 'income' || t.type === 'p_income';
        if (isIn) dayIn += (t.amount || 0);
        else dayOut += (t.amount || 0);
      });
      const dayNet = dayIn - dayOut;
      runBal += dayNet;

      const rowBg = isToday ? 'background:rgba(56,189,248,.06);' : isOverdue ? 'background:rgba(248,113,113,.04);' : (runBal < 0 ? 'background:rgba(248,113,113,.02);' : '');
      const rowBorder = isToday ? 'border-left:3px solid #38bdf8;' : isOverdue ? 'border-left:3px solid #f97316;' : '';
      const balColor = runBal >= 0 ? '#4ade80' : '#f87171';
      const netColor2 = dayNet > 0 ? '#4ade80' : (dayNet < 0 ? '#f87171' : 'var(--dim)');

      // Date cell
      html += `<tr style="border-bottom:1px solid rgba(33,39,47,.15);${rowBg}${rowBorder}">`;
      html += `<td style="padding:6px;white-space:nowrap;vertical-align:top">`;
      if (isToday) html += `<span style="font-size:8px;font-weight:700;color:#38bdf8;background:rgba(56,189,248,.15);padding:1px 4px;border-radius:2px;margin-right:3px">TODAY</span>`;
      if (isOverdue) html += `<span style="font-size:8px;font-weight:700;color:#f97316;background:rgba(249,115,22,.15);padding:1px 4px;border-radius:2px;margin-right:3px">LATE</span>`;
      html += `<span style="font-weight:600;color:var(--txt)">${dayName}</span> <span style="color:var(--dim)">${dateLbl}</span>`;
      html += `</td>`;

      // Items cell
      html += `<td style="padding:6px;vertical-align:top">`;
      dayItems.sort((a, b) => {
        const aIn = a.type === 'income' || a.type === 'p_income';
        const bIn = b.type === 'income' || b.type === 'p_income';
        if (aIn !== bIn) return aIn ? -1 : 1; // income first
        return (b.amount || 0) - (a.amount || 0);
      }).forEach(t => {
        const isIn = t.type === 'income' || t.type === 'p_income';
        const typeTag = t.type === 'income' ? 'Income' : t.type === 'p_income' ? 'Potential' : t.type === 'materials' ? 'Materials' : 'Subs';
        const tagColor = isIn ? '#4ade80' : (t.type === 'materials' ? '#fb923c' : '#f87171');
        html += `<div style="display:flex;align-items:center;gap:5px;padding:1px 0;font-size:11px">
          <span style="font-size:9px;color:${tagColor};background:${tagColor}12;border:1px solid ${tagColor}25;padding:0 4px;border-radius:3px;white-space:nowrap">${typeTag}</span>
          <span style="color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:250px" title="${t.task}">${t.task}</span>
          <span style="font-weight:600;color:${tagColor};font-family:var(--mono);white-space:nowrap;margin-left:auto">${isIn ? '+' : '-'}${cfFmt(t.amount || 0)}</span>
        </div>`;
      });
      html += `</td>`;

      // Amounts
      html += `<td style="text-align:right;padding:6px;font-family:var(--mono);font-weight:600;color:${dayIn > 0 ? '#4ade80' : 'var(--dim)'};vertical-align:top;white-space:nowrap">${dayIn > 0 ? '+' + cfFmt(dayIn) : '—'}</td>`;
      html += `<td style="text-align:right;padding:6px;font-family:var(--mono);font-weight:600;color:${dayOut > 0 ? '#f87171' : 'var(--dim)'};vertical-align:top;white-space:nowrap">${dayOut > 0 ? '-' + cfFmt(dayOut) : '—'}</td>`;
      html += `<td style="text-align:right;padding:6px;font-family:var(--mono);font-weight:700;color:${netColor2};vertical-align:top;white-space:nowrap">${dayNet !== 0 ? (dayNet > 0 ? '+' : '') + cfFmt(dayNet) : '—'}</td>`;
      html += `<td style="text-align:right;padding:6px;font-family:var(--mono);font-weight:800;font-size:13px;color:${balColor};vertical-align:top;white-space:nowrap">${cfFmt(runBal)}</td>`;
      html += `</tr>`;
    });

    // Final row
    html += `<tr style="border-top:2px solid var(--bdr);background:rgba(255,255,255,.02)">
      <td colspan="2" style="padding:8px 6px;font-weight:700;color:var(--txt);font-size:12px">TOTAL — ${projName.split('(')[0].trim()}</td>
      <td style="text-align:right;padding:8px 6px;font-family:var(--mono);font-weight:700;color:#4ade80;font-size:13px">${totalIn > 0 ? '+' + cfFmt(totalIn) : '—'}</td>
      <td style="text-align:right;padding:8px 6px;font-family:var(--mono);font-weight:700;color:#f87171;font-size:13px">-${cfFmt(totalOut)}</td>
      <td style="text-align:right;padding:8px 6px;font-family:var(--mono);font-weight:800;color:${netColor};font-size:13px">${netSign}${cfFmt(net)}</td>
      <td style="text-align:right;padding:8px 6px;font-family:var(--mono);font-weight:800;color:${netColor};font-size:14px">${netSign}${cfFmt(net)}</td>
    </tr>`;

    html += `</tbody></table></div>`;
    html += `</div>`; // end expandable
    html += `</div>`; // end project card
  });

  // Grand summary
  const grandNet = grandIn - grandOut;
  html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:rgba(56,189,248,.04);border:1px solid rgba(56,189,248,.15);border-radius:8px;margin-top:4px">
    <span style="font-size:13px;font-weight:700;color:var(--txt)">ALL PROJECTS — 3 Month Total</span>
    <div style="display:flex;gap:16px;font-size:14px;font-weight:700;font-family:var(--mono)">
      <span style="color:#4ade80">⬇ ${cfFmt(grandIn)}</span>
      <span style="color:#f87171">⬆ ${cfFmt(grandOut)}</span>
      <span style="color:${grandNet >= 0 ? '#4ade80' : '#f87171'};border-left:1px solid var(--bdr);padding-left:12px">${grandNet >= 0 ? '+' : ''}${cfFmt(grandNet)}</span>
    </div>
  </div>`;

  html += `</div>`;
  return html;
}

function initSituationEval(allWin, balance, dataDays) {
  scenarioItems = allWin.filter(t=>!t.paid).map((t,i) => ({
    id: 'orig_'+i, task: t.task, project: t.project||'', type: t.type,
    amount: t.amount||0, originalDue: t.due, due: t.due, shift: 0,
    isIn: t.type==='income'||t.type==='p_income', manual: false,
    _overdue: t._overdue || false
  }));
  scenarioManualItems = [];
  scenarioNextId = 1;
  scenarioSelected = new Set();

  // Try to load saved state
  const loaded = sitLoad();
  if (loaded) {
    const banner = document.getElementById('sit-save-banner');
    if (banner) { banner.style.display = 'block'; setTimeout(() => { banner.style.display = 'none'; }, 5000); }
  }

  document.getElementById('sit-reset').addEventListener('click', () => {
    scenarioItems.forEach(s => { s.due = s.originalDue; s.shift = 0; s._removed = false; });
    scenarioManualItems = [];
    scenarioSelected = new Set();
    sitClearSave();
    renderScenario(balance);
  });

  // Bulk add form
  function sitAddRowHtml() {
    const today = new Date().toISOString().slice(0,10);
    return `<div class="sit-bulk-row" style="display:grid;grid-template-columns:140px 1fr 110px 150px 30px;gap:8px;align-items:center;margin-bottom:6px">
      <select class="sit-br-type" style="background:var(--bg);color:#fff;border:1px solid var(--bdr);border-radius:5px;padding:7px 8px;font-size:13px;font-weight:600;font-family:var(--sans)">
        <option value="income">⬇ Income</option>
        <option value="p_income">⬇ Potential</option>
        <option value="subs" selected>⬆ Subs</option>
        <option value="materials">⬆ Materials</option>
      </select>
      <input class="sit-br-name" type="text" placeholder="Payment name" style="background:var(--bg);color:#fff;border:1px solid var(--bdr);border-radius:5px;padding:7px 10px;font-size:14px;font-weight:600;font-family:var(--sans)">
      <input class="sit-br-amt" type="text" placeholder="$0" style="background:var(--bg);color:#fff;border:1px solid var(--bdr);border-radius:5px;padding:7px 10px;font-size:14px;font-weight:700;font-family:var(--mono);text-align:right">
      <input class="sit-br-date" type="date" value="${today}" style="background:var(--bg);color:#fff;border:1px solid var(--bdr);border-radius:5px;padding:7px 10px;font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer">
      <button class="sit-br-del" style="background:none;color:#f87171;border:none;font-size:16px;cursor:pointer;padding:0" title="Remove row">✕</button>
    </div>`;
  }

  function sitInitFormRows() {
    const container = document.getElementById('sit-add-rows');
    container.innerHTML = sitAddRowHtml();
    container.querySelectorAll('.sit-br-del').forEach(btn => {
      btn.addEventListener('click', () => {
        if (container.querySelectorAll('.sit-bulk-row').length > 1) btn.closest('.sit-bulk-row').remove();
      });
    });
  }

  document.getElementById('sit-show-add').addEventListener('click', () => {
    const form = document.getElementById('sit-add-form');
    if (form.style.display === 'none') {
      form.style.display = 'block';
      sitInitFormRows();
    } else {
      form.style.display = 'none';
    }
  });

  document.getElementById('sit-add-row').addEventListener('click', () => {
    const container = document.getElementById('sit-add-rows');
    container.insertAdjacentHTML('beforeend', sitAddRowHtml());
    // Wire delete for new row
    const rows = container.querySelectorAll('.sit-bulk-row');
    const lastRow = rows[rows.length - 1];
    lastRow.querySelector('.sit-br-del').addEventListener('click', () => {
      if (container.querySelectorAll('.sit-bulk-row').length > 1) lastRow.remove();
    });
  });

  document.getElementById('sit-cancel-add').addEventListener('click', () => {
    document.getElementById('sit-add-form').style.display = 'none';
  });

  document.getElementById('sit-confirm-add').addEventListener('click', () => {
    const rows = document.querySelectorAll('#sit-add-rows .sit-bulk-row');
    let added = 0;
    rows.forEach(row => {
      const type = row.querySelector('.sit-br-type').value;
      const name = row.querySelector('.sit-br-name').value.trim();
      const amt = parseFloat((row.querySelector('.sit-br-amt').value||'0').replace(/[^0-9.]/g,'')) || 0;
      const date = row.querySelector('.sit-br-date').value || new Date().toISOString().slice(0,10);
      if (!name && !amt) return; // skip empty rows
      const isIn = type==='income' || type==='p_income';
      const id = 'manual_' + (scenarioNextId++);
      scenarioManualItems.unshift({ id, task: name || (isIn ? 'New Income' : 'New Expense'), project:'(manual)', type, amount:amt, originalDue:date, due:date, shift:0, isIn, manual:true });
      added++;
    });
    if (added > 0) {
      sitSave();
      document.getElementById('sit-add-form').style.display = 'none';
      renderScenario(balance);
    }
  });

  document.getElementById('sit-export').addEventListener('click', () => sitExportCSV());
  document.getElementById('sit-export-pdf').addEventListener('click', () => sitExportPDF());

  document.getElementById('sit-batch-apply').addEventListener('click', () => {
    const days = parseInt(document.getElementById('sit-batch-days').value) || 0;
    if (!days) return;
    const all = [...scenarioItems, ...scenarioManualItems];
    all.forEach(item => {
      if (scenarioSelected.has(item.id)) {
        item.shift += days;
        item.shift = Math.max(-90, Math.min(180, item.shift));
        updateItemDue(item);
      }
    });
    scenarioSelected = new Set();
    sitSave();
    renderScenario(balance);
  });

  document.getElementById('sit-batch-cancel').addEventListener('click', () => {
    scenarioSelected = new Set();
    renderScenario(balance);
  });

  renderScenario(balance);
}

function sitToggleSelect(id, balance) {
  if (scenarioSelected.has(id)) scenarioSelected.delete(id);
  else scenarioSelected.add(id);
  renderScenario(balance);
}

function sitExportCSV() {
  const all = [...scenarioItems, ...scenarioManualItems];
  const calToday = new Date(new Date().toISOString().slice(0,10)+'T12:00:00');
  const daySlots = [];
  const _simDays = window._sitDataDays || 28;
  for (let i = 0; i < _simDays; i++) {
    const dd = new Date(calToday.getTime() + i * 86400000);
    daySlots.push({ date: dd.toISOString().slice(0,10), obj: dd, items: [] });
  }
  const dayIndex = {};
  daySlots.forEach((d,i) => dayIndex[d.date] = i);
  all.forEach(item => { let idx = dayIndex[item.due]; if (idx === undefined && item._overdue) idx = 0; if (idx !== undefined) daySlots[idx].items.push(item); });

  const balance = parseFloat(localStorage.getItem('cf_balance') || '0');
  let bal = balance;
  const rows = [];

  // Header
  rows.push(['CASH FLOW SCENARIO — ' + new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'})]);
  rows.push(['Starting Balance:,' + '$' + balance.toLocaleString()]);
  rows.push([]);
  rows.push(['Date','Day','Item','Project','Type','Direction','Amount','Day Income','Day Expenses','Day Net','Running Balance','Shifted','Original Date']);

  let weekIn = 0, weekOut = 0, weekNum = 1;

  daySlots.forEach((day, di) => {
    const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][day.obj.getDay()];
    const isMon = day.obj.getDay() === 1;

    // Week separator at Monday (except first day)
    if (isMon && di > 0) {
      const weekNet = weekIn - weekOut;
      const netSign = weekNet >= 0 ? '+' : '';
      rows.push([]);
      rows.push([
        '','','─── WEEK ' + weekNum + ' SUMMARY ───','','','',
        '','$' + weekIn.toLocaleString(),'$' + weekOut.toLocaleString(),
        netSign + '$' + weekNet.toLocaleString(),
        '$' + Math.round(bal).toLocaleString(),'',''
      ]);
      rows.push([]);
      weekNum++;
      weekIn = 0;
      weekOut = 0;
    }

    let dayIncome = 0, dayExpense = 0;

    if (day.items.length === 0) {
      rows.push([day.date, dayName, '(no payments)', '', '', '', '', '$0', '$0', '$0', '$' + Math.round(bal).toLocaleString(), '', '']);
    } else {
      day.items.forEach((item, ii) => {
        const amt = item.isIn ? item.amount : -item.amount;
        bal += amt;
        if (item.isIn) { dayIncome += item.amount; weekIn += item.amount; }
        else { dayExpense += item.amount; weekOut += item.amount; }

        rows.push([
          ii === 0 ? day.date : '',
          ii === 0 ? dayName : '',
          '"' + (item.task||'').replace(/"/g,'""') + '"',
          '"' + (item.project||'').replace(/"/g,'""') + '"',
          item.type === 'income' ? 'Income' : item.type === 'p_income' ? 'Potential' : item.type === 'materials' ? 'Materials' : item.type === 'subs' ? 'Subs' : item.type,
          item.isIn ? 'IN ⬇' : 'OUT ⬆',
          '$' + item.amount.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}),
          '', '', '',
          '$' + Math.round(bal).toLocaleString(),
          item.shift !== 0 ? (item.shift > 0 ? '+'+item.shift+'d' : item.shift+'d') : '',
          item.shift !== 0 ? item.originalDue : ''
        ]);
      });

      // Day totals row
      const dayNet = dayIncome - dayExpense;
      const dayNetSign = dayNet >= 0 ? '+' : '';
      rows.push([
        '', '', '  ── Day Total ──', '', '', '',
        '', '$' + dayIncome.toLocaleString(), '$' + dayExpense.toLocaleString(),
        dayNetSign + '$' + dayNet.toLocaleString(),
        '$' + Math.round(bal).toLocaleString(), '', ''
      ]);
    }
  });

  // Final week summary
  const weekNet = weekIn - weekOut;
  const netSign = weekNet >= 0 ? '+' : '';
  rows.push([]);
  rows.push([
    '','','─── WEEK ' + weekNum + ' SUMMARY ───','','','',
    '','$' + weekIn.toLocaleString(),'$' + weekOut.toLocaleString(),
    netSign + '$' + weekNet.toLocaleString(),
    '$' + Math.round(bal).toLocaleString(),'',''
  ]);

  // Grand totals
  const totalIn = all.filter(x => x.isIn && dayIndex[x.due] !== undefined).reduce((s,x) => s + x.amount, 0);
  const totalOut = all.filter(x => !x.isIn && dayIndex[x.due] !== undefined).reduce((s,x) => s + x.amount, 0);
  const totalNet = totalIn - totalOut;
  const totalNetSign = totalNet >= 0 ? '+' : '';
  rows.push([]);
  rows.push(['════════════════════════════════════════']);
  rows.push([
    '','','GRAND TOTAL (' + _simDays + ' DAYS)','','','',
    '','$' + totalIn.toLocaleString(),'$' + totalOut.toLocaleString(),
    totalNetSign + '$' + totalNet.toLocaleString(),
    '$' + Math.round(bal).toLocaleString(),'',''
  ]);
  rows.push(['Starting Balance:,' + '$' + balance.toLocaleString()]);
  rows.push(['Ending Balance:,' + '$' + Math.round(bal).toLocaleString()]);
  rows.push(['Items Shifted:,' + all.filter(x => x.shift !== 0).length]);
  rows.push(['Manual Items:,' + scenarioManualItems.length]);

  const csv = rows.map(r => Array.isArray(r) ? r.join(',') : r).join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cashflow-scenario-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}
