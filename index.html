// ─── Scenario simulations — selector + create + PDF download ─────────
// Renders a tab strip above the cashflow that lets the user switch between
// Baseline (read-only mirror) and named simulations. Each tab is an isolated
// scenario; edits/moves on the page write into the selected scenario.
function getCurrentScenario() {
  return localStorage.getItem('finance_scenario') || 'baseline';
}
function setCurrentScenario(name) {
  localStorage.setItem('finance_scenario', name || 'baseline');
}

async function injectScenarioSelector(container) {
  const existing = document.getElementById('fin-scenario-bar');
  if (existing) existing.remove();
  if (!financeApiConfigured()) return;  // no API → nothing to do

  const bar = document.createElement('div');
  bar.id = 'fin-scenario-bar';
  bar.style.cssText = 'background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:8px 12px;margin-bottom:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap';
  bar.innerHTML = `<span style="font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-right:4px">🔬 Scenario:</span><span style="color:var(--dim);font-size:12px">loading…</span>`;
  container.insertBefore(bar, container.firstChild);

  let data;
  try {
    data = await financeApi('/scenarios');
  } catch (e) {
    bar.innerHTML = `<span style="color:var(--red);font-size:12px">Could not load scenarios: ${e.message||e}</span>`;
    return;  // do NOT touch localStorage on error
  }

  const current = getCurrentScenario();
  const list = (data && Array.isArray(data.scenarios)) ? data.scenarios : null;
  // Only auto-switch to baseline if we got a SUCCESSFUL non-empty response
  // AND the current scenario is explicitly not in the list. Empty/malformed
  // responses leave the selection untouched (avoids spurious resets on transient
  // backend hiccups).
  let cur = current;
  if (list && list.length > 0) {
    const knownNames = new Set(list.map(s => s.name));
    if (!knownNames.has(current)) {
      console.warn('Scenario "' + current + '" not in API list, falling back to baseline');
      cur = 'baseline';
      setCurrentScenario(cur);
    }
  }
  if (!list) {
    bar.innerHTML = `<span style="color:var(--ylw);font-size:12px">⚠ Scenario list malformed; staying on "${current}"</span>`;
    return;
  }

  let html = `<span style="font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-right:4px">🔬 Scenario:</span>`;
  (data.scenarios || []).forEach(s => {
    const isActive = s.name === cur;
    const badge = s.is_baseline ? '📊' : '🧪';
    const bg = isActive ? (s.color || 'var(--blu)') : 'var(--card-h)';
    const fg = isActive ? '#fff' : 'var(--txt)';
    const bd = isActive ? bg : 'var(--bdr)';
    const safeName = (s.name||'').replace(/"/g, '&quot;');
    html += `<button class="fin-scen-pick" data-name="${safeName}" style="padding:6px 12px;background:${bg};color:${fg};border:1px solid ${bd};border-radius:6px;cursor:pointer;font-size:12px;font-weight:${isActive?'700':'500'}">${badge} ${(s.name||'').replace(/</g,'&lt;')}</button>`;
  });
  // Action buttons for the current scenario
  html += `<div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">`;
  html += `<button class="fin-scen-new" style="padding:6px 12px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;cursor:pointer;font-size:12px">+ New Simulation</button>`;
  if (cur !== 'baseline') {
    html += `<button class="fin-scen-bank" data-name="${cur.replace(/"/g,'&quot;')}" style="padding:6px 12px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;cursor:pointer;font-size:12px">💵 Set Bank Balance</button>`;
    html += `<button class="fin-scen-pdf" data-name="${cur.replace(/"/g,'&quot;')}" style="padding:6px 12px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;cursor:pointer;font-size:12px">📄 Download PDF</button>`;
    html += `<button class="fin-scen-rename" data-name="${cur.replace(/"/g,'&quot;')}" style="padding:6px 12px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;cursor:pointer;font-size:12px">✎ Rename</button>`;
    html += `<button class="fin-scen-delete" data-name="${cur.replace(/"/g,'&quot;')}" style="padding:6px 12px;background:var(--card-h);color:var(--red);border:1px solid var(--red);border-radius:6px;cursor:pointer;font-size:12px">× Delete</button>`;
  }
  html += `</div>`;
  // Status / scenario summary line
  if (FINANCE_DATA && FINANCE_DATA.scenario && FINANCE_DATA.scenario.name !== 'baseline') {
    const s = FINANCE_DATA.scenario;
    const bk = (FINANCE_DATA.bank || {});
    const fmt = n => '$' + Math.abs(Math.round(n||0)).toLocaleString();
    const bankStatus = bk.overridden_for_scenario
      ? ` · 💵 <b style="color:var(--ylw)">Bank override: ${fmt(bk.current_balance)}</b> (real: ${fmt(bk.actual_balance)})`
      : '';
    html += `<div style="width:100%;font-size:11px;color:var(--mut);margin-top:6px;padding-top:6px;border-top:1px solid rgba(33,39,47,.3)">
      Scenario data: <b>${s.overrides_count}</b> modified · <b>${s.additions_count}</b> added · <b>${s.deletions_count}</b> deleted${bankStatus}
      &nbsp;·&nbsp; <i>Edits scoped to <b>${cur.replace(/</g,'&lt;')}</b>.</i>
    </div>`;
  } else {
    html += `<div style="width:100%;font-size:11px;color:var(--mut);margin-top:6px;padding-top:6px;border-top:1px solid rgba(33,39,47,.3)">
      <i>Baseline view — read-only summary of unmodified data. Switch to or create a simulation to make changes.</i>
    </div>`;
  }
  bar.innerHTML = html;
  wireScenarioBar(bar);
}

function wireScenarioBar(bar) {
  bar.querySelectorAll('.fin-scen-pick').forEach(b => b.onclick = e => {
    e.preventDefault();
    setCurrentScenario(b.dataset.name);
    loadAndRenderFinance(document.getElementById('content'));
  });
  const nb = bar.querySelector('.fin-scen-new');
  if (nb) nb.onclick = async e => {
    e.preventDefault();
    const name = prompt('Name this simulation (e.g. "Worst-case Q3", "Drop Brandy", "Push Charles +30d"):');
    if (!name || !name.trim()) return;
    const cloneFromBase = confirm(
      'Clone the current scenario\'s edits into the new one?\n\n' +
      '• OK = start from current view (copy edits)\n' +
      '• Cancel = start clean (no edits)'
    );
    try {
      await financeApi('/scenarios', {
        method: 'POST',
        body: JSON.stringify({
          name: name.trim(),
          clone_from: cloneFromBase ? getCurrentScenario() : null,
        }),
      });
      setCurrentScenario(name.trim());
      loadAndRenderFinance(document.getElementById('content'));
    } catch (err) {
      alert('Failed to create scenario: ' + (err.message||err));
    }
  };
  const bb = bar.querySelector('.fin-scen-bank');
  if (bb) bb.onclick = async e => {
    e.preventDefault();
    const cur = bb.dataset.name;
    const fd = (FINANCE_DATA && FINANCE_DATA.bank) || {};
    const currentValue = fd.overridden_for_scenario ? fd.current_balance : '';
    const promptText = fd.overridden_for_scenario
      ? `Current scenario bank override: $${currentValue.toLocaleString()}\nReal balance: $${(fd.actual_balance||0).toLocaleString()}\n\nNew override (or leave blank to clear and use real balance):`
      : `Real bank balance: $${(fd.actual_balance||0).toLocaleString()}\n\nWhat-if balance for "${cur}" (in $, e.g. 75000):`;
    const v = prompt(promptText, currentValue || '');
    if (v === null) return;
    const trimmed = v.trim();
    let body;
    if (!trimmed) {
      body = { scenario_name: cur, balance: null };
    } else {
      const num = parseFloat(trimmed.replace(/[^\d.\-]/g, ''));
      if (isNaN(num)) { alert('Invalid number'); return; }
      body = { scenario_name: cur, balance: num };
    }
    try {
      await financeApi('/scenario-bank-override', { method: 'POST', body: JSON.stringify(body) });
      loadAndRenderFinance(document.getElementById('content'));
    } catch (err) { alert('Failed: ' + (err.message||err)); }
  };
  const pdfb = bar.querySelector('.fin-scen-pdf');
  if (pdfb) pdfb.onclick = e => {
    e.preventDefault();
    const url = (localStorage.getItem('finance_api_url') || '').replace(/\/$/, '')
      + '/scenario-diff/' + encodeURIComponent(pdfb.dataset.name) + '/print'
      + '?token=' + encodeURIComponent(localStorage.getItem('finance_api_token') || '');
    window.open(url, '_blank');
  };
  const rb = bar.querySelector('.fin-scen-rename');
  if (rb) rb.onclick = async e => {
    e.preventDefault();
    const newName = prompt('New name for "' + rb.dataset.name + '":', rb.dataset.name);
    if (!newName || !newName.trim() || newName === rb.dataset.name) return;
    // Rename = create new + copy + delete old
    try {
      await financeApi('/scenarios', { method: 'POST',
        body: JSON.stringify({ name: newName.trim(), clone_from: rb.dataset.name }) });
      await financeApi('/scenarios/' + encodeURIComponent(rb.dataset.name), { method: 'DELETE' });
      setCurrentScenario(newName.trim());
      loadAndRenderFinance(document.getElementById('content'));
    } catch (err) { alert('Rename failed: ' + (err.message||err)); }
  };
  const db = bar.querySelector('.fin-scen-delete');
  if (db) db.onclick = async e => {
    e.preventDefault();
    if (!confirm('Delete simulation "' + db.dataset.name + '"? All its overrides/additions/deletions will be voided. (Audit trail kept in DB.)')) return;
    try {
      await financeApi('/scenarios/' + encodeURIComponent(db.dataset.name), { method: 'DELETE' });
      setCurrentScenario('baseline');
      loadAndRenderFinance(document.getElementById('content'));
    } catch (err) { alert('Delete failed: ' + (err.message||err)); }
  };
}

// ─── Finance V2 — Pending Payments / Debts manager ─────────────────
// Appends a CRUD panel ABOVE the regular Finance content when V2 is active.
// Data comes from the SQLite pending_payments table via the live API.
async function v2InjectPendingPaymentsManager(container) {
  // Idempotent: remove any existing panel first
  const existing = document.getElementById('v2-pp-panel');
  if (existing) existing.remove();

  // Insert anchor at top of container
  const anchor = document.createElement('div');
  anchor.id = 'v2-pp-panel';
  anchor.style.cssText = 'margin-bottom:18px';
  anchor.innerHTML = `<div class="empty" style="padding:14px"><div class="empty-i">⏳</div><div class="empty-t">Loading pending payments…</div></div>`;
  container.insertBefore(anchor, container.firstChild);

  if (!financeApiConfigured()) {
    anchor.innerHTML = `<div class="alert" style="background:var(--ylw-s);border-color:var(--ylw-b);color:var(--ylw)">
      <div><b>V2 needs the live API.</b> Open ⚙ Settings (below) and enter the tunnel URL + bearer token to use V2 features.</div></div>`;
    return;
  }

  let data;
  try {
    data = await financeApi('/pending-payments?include_paid=true');
  } catch (e) {
    anchor.innerHTML = `<div class="alert"><div><b>Could not load pending payments.</b> ${e.message||e}</div></div>`;
    return;
  }
  v2RenderPendingPanel(anchor, data.pending_payments || []);
}

function v2RenderPendingPanel(panel, rows) {
  const fmt = n => '$' + Math.abs(n||0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  const fmtDate = iso => {
    if (!iso) return '—';
    const dt = new Date(iso + 'T12:00:00');
    const MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${MS[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}`;
  };

  const today = new Date().toISOString().slice(0,10);
  const upcoming = rows.filter(r => !r.paid && r.due_date >= today);
  const overdue = rows.filter(r => !r.paid && r.due_date < today);
  const paid = rows.filter(r => r.paid);

  const upTotal = upcoming.reduce((s,r)=>s+r.amount, 0);
  const overTotal = overdue.reduce((s,r)=>s+r.amount, 0);
  const paidTotal = paid.reduce((s,r)=>s+r.amount, 0);

  const groupBadge = g => g ? `<span style="display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;background:var(--card-h);color:var(--mut);margin-left:6px">${g.replace(/</g,'&lt;')}</span>` : '';
  const catBadge = c => c ? `<span style="display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(75,134,253,.15);color:var(--blu);margin-left:6px">${c.replace(/</g,'&lt;')}</span>` : '';

  const rowHtml = (r, kind) => {
    const dueColor = kind === 'overdue' ? 'var(--red)' : kind === 'paid' ? 'var(--mut)' : 'var(--txt)';
    return `<tr style="border-top:1px solid rgba(33,39,47,.3)" data-pp-id="${r.id}">
      <td style="padding:7px 10px;color:${dueColor};font-family:var(--mono);white-space:nowrap;font-weight:${kind==='overdue'?'700':'400'}">${fmtDate(r.due_date)}</td>
      <td style="padding:7px 10px;font-weight:600">${(r.payee||'').replace(/</g,'&lt;')}${catBadge(r.category)}${groupBadge(r.group_label)}</td>
      <td style="padding:7px 10px;color:var(--mut);font-size:12px">${(r.details||'').replace(/</g,'&lt;')}</td>
      <td style="padding:7px 10px;text-align:right;font-family:var(--mono);color:${kind==='paid'?'var(--mut)':'var(--red)'};font-weight:600">${kind==='paid'?'(paid) ':'-'}${fmt(r.amount)}</td>
      <td style="padding:7px 10px;text-align:right;white-space:nowrap">
        ${r.paid
          ? `<span style="color:var(--grn);font-size:11px;margin-right:8px">✔ ${fmtDate(r.paid_date)}</span><a href="#" class="v2-pp-unpay" data-id="${r.id}" title="Unmark paid" style="color:var(--mut);text-decoration:none;margin-right:4px">↺</a>`
          : `<a href="#" class="v2-pp-pay" data-id="${r.id}" title="Mark paid (today)" style="color:var(--grn);text-decoration:none;margin-right:8px;font-weight:600">✔ Paid</a>`}
        <a href="#" class="v2-pp-edit" data-id="${r.id}" title="Edit" style="color:var(--blu);text-decoration:none;margin-right:6px">✎</a>
        <a href="#" class="v2-pp-void" data-id="${r.id}" title="Void / delete" style="color:var(--red);text-decoration:none">×</a>
      </td>
    </tr>`;
  };

  const sectionTable = (label, color, count, total, items, kind) => {
    if (!items.length) return '';
    return `<div style="margin-top:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:12px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:.5px">${label} <span style="color:var(--mut);font-weight:400;margin-left:6px">${count} item${count!==1?'s':''}</span></div>
        <div style="font-size:12px;color:${color};font-family:var(--mono);font-weight:700">${fmt(total)}</div>
      </div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr style="text-align:left;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px">
          <th style="padding:6px 10px">Due</th><th style="padding:6px 10px">Payee</th>
          <th style="padding:6px 10px">Details</th><th style="padding:6px 10px;text-align:right">Amount</th>
          <th style="padding:6px 10px;text-align:right">Actions</th>
        </tr></thead><tbody>${items.map(r => rowHtml(r, kind)).join('')}</tbody>
      </table></div>
    </div>`;
  };

  panel.innerHTML = `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px 16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:14px;font-weight:700">📑 Pending Payments / Debts <span style="font-size:11px;color:var(--mut);margin-left:6px">(V2 — replaces the Google Sheet)</span></div>
        <div style="font-size:11px;color:var(--mut)">${rows.length} record${rows.length!==1?'s':''} in SQLite. Adds, edits, and "mark paid" all save permanently.</div>
      </div>
      <button class="v2-pp-add" style="padding:7px 14px;background:var(--blu);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px">+ Add Payment</button>
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin:10px 0 6px">
      <div style="background:var(--card-h);border-radius:6px;padding:6px 12px"><div style="font-size:10px;color:var(--mut);text-transform:uppercase">Overdue</div><div style="font-size:18px;font-weight:700;color:var(--red);font-family:var(--mono)">${fmt(overTotal)}</div><div style="font-size:10px;color:var(--mut)">${overdue.length} item${overdue.length!==1?'s':''}</div></div>
      <div style="background:var(--card-h);border-radius:6px;padding:6px 12px"><div style="font-size:10px;color:var(--mut);text-transform:uppercase">Upcoming</div><div style="font-size:18px;font-weight:700;color:var(--ylw);font-family:var(--mono)">${fmt(upTotal)}</div><div style="font-size:10px;color:var(--mut)">${upcoming.length} item${upcoming.length!==1?'s':''}</div></div>
      <div style="background:var(--card-h);border-radius:6px;padding:6px 12px"><div style="font-size:10px;color:var(--mut);text-transform:uppercase">Paid (history)</div><div style="font-size:18px;font-weight:700;color:var(--grn);font-family:var(--mono)">${fmt(paidTotal)}</div><div style="font-size:10px;color:var(--mut)">${paid.length} item${paid.length!==1?'s':''}</div></div>
    </div>
    ${sectionTable('Overdue', 'var(--red)', overdue.length, overTotal, overdue, 'overdue')}
    ${sectionTable('Upcoming', 'var(--ylw)', upcoming.length, upTotal, upcoming, 'upcoming')}
    ${sectionTable('Paid', 'var(--grn)', paid.length, paidTotal, paid, 'paid')}
    ${rows.length === 0 ? `<div style="padding:14px;text-align:center;color:var(--mut);font-size:13px">No pending payments yet. Click <b>+ Add Payment</b> to create the first one.</div>` : ''}
  </div>`;

  // Wire actions
  panel.querySelectorAll('.v2-pp-add').forEach(b => b.onclick = e => { e.preventDefault(); v2OpenPendingForm(null); });
  panel.querySelectorAll('.v2-pp-edit').forEach(b => b.onclick = e => {
    e.preventDefault();
    const r = rows.find(x => x.id == b.dataset.id);
    if (r) v2OpenPendingForm(r);
  });
  panel.querySelectorAll('.v2-pp-pay').forEach(b => b.onclick = async e => {
    e.preventDefault();
    if (!confirm('Mark this payment as paid (today)?')) return;
    try {
      await financeApi('/pending-payment/' + b.dataset.id + '/mark-paid', { method: 'POST', body: JSON.stringify({}) });
      financeSafeRender();
    } catch (err) { alert('Mark paid failed: ' + err.message); }
  });
  panel.querySelectorAll('.v2-pp-unpay').forEach(b => b.onclick = async e => {
    e.preventDefault();
    if (!confirm('Unmark as paid? It will go back to the upcoming/overdue list.')) return;
    try {
      await financeApi('/pending-payment/' + b.dataset.id + '/unmark-paid', { method: 'POST', body: JSON.stringify({}) });
      financeSafeRender();
    } catch (err) { alert('Unmark failed: ' + err.message); }
  });
  panel.querySelectorAll('.v2-pp-void').forEach(b => b.onclick = async e => {
    e.preventDefault();
    const reason = prompt('Reason for voiding this payment? (audit trail — kept in DB)');
    if (reason === null) return;
    try {
      await financeApi('/pending-payment/' + b.dataset.id + '/void', { method: 'POST', body: JSON.stringify({ reason: reason.trim() || 'voided via V2' }) });
      financeSafeRender();
    } catch (err) { alert('Void failed: ' + err.message); }
  });
}

function v2OpenPendingForm(existing) {
  const isEdit = !!existing;
  const today = new Date().toISOString().slice(0,10);
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  const cats = ['debt','salary','service','refund','travel','tax','other'];
  const catOpts = cats.map(c => `<option value="${c}" ${existing && existing.category === c ? 'selected':''}>${c}</option>`).join('');
  overlay.innerHTML = `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:20px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto">
    <div style="font-size:16px;font-weight:700;margin-bottom:14px">${isEdit ? '✎ Edit' : '+ Add'} Pending Payment</div>
    <form id="v2-pp-form" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px">
      <label style="grid-column:1/3">Payee (to whom) <input type="text" name="payee" required value="${(existing?.payee||'').replace(/"/g,'&quot;')}" placeholder="e.g. Office Landlord, Banco X, Subcontractor name" style="width:100%;padding:6px 8px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:5px"></label>
      <label>Due date <input type="date" name="due_date" required value="${existing?.due_date || today}" style="width:100%;padding:6px 8px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:5px"></label>
      <label>Amount $ <input type="number" name="amount" step="0.01" min="0.01" required value="${existing?.amount || ''}" style="width:100%;padding:6px 8px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:5px"></label>
      <label>Category
        <select name="category" style="width:100%;padding:6px 8px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:5px">
          <option value="">—</option>${catOpts}
        </select>
      </label>
      <label>Group (optional) <input type="text" name="group_label" value="${(existing?.group_label||'').replace(/"/g,'&quot;')}" placeholder="e.g. Equipment Loan #1" style="width:100%;padding:6px 8px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:5px"></label>
      <label style="grid-column:1/3">Details <input type="text" name="details" value="${(existing?.details||'').replace(/"/g,'&quot;')}" placeholder="What this payment is for" style="width:100%;padding:6px 8px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:5px"></label>
      <label style="grid-column:1/3">Notes <textarea name="notes" rows="2" placeholder="Optional notes, terms, contract reference, etc." style="width:100%;padding:6px 8px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:5px">${(existing?.notes||'').replace(/</g,'&lt;')}</textarea></label>
      <div style="grid-column:1/3;display:flex;gap:8px;justify-content:flex-end;margin-top:6px">
        <button type="button" id="v2-pp-cancel" style="padding:8px 14px;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;cursor:pointer">Cancel</button>
        <button type="submit" style="padding:8px 14px;background:var(--blu);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600">${isEdit ? 'Save changes' : 'Add Payment'}</button>
      </div>
    </form>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('v2-pp-cancel').onclick = () => overlay.remove();
  overlay.onclick = ev => { if (ev.target === overlay) overlay.remove(); };
  document.getElementById('v2-pp-form').onsubmit = async ev => {
    ev.preventDefault();
    const f = ev.target;
    const body = {
      payee: f.payee.value.trim(),
      amount: parseFloat(f.amount.value),
      due_date: f.due_date.value,
      category: f.category.value || null,
      group_label: f.group_label.value.trim() || null,
      details: f.details.value.trim() || null,
      notes: f.notes.value.trim() || null,
    };
    try {
      if (isEdit) {
        await financeApi('/pending-payment/' + existing.id + '/edit', { method: 'POST', body: JSON.stringify(body) });
      } else {
        await financeApi('/pending-payment', { method: 'POST', body: JSON.stringify(body) });
      }
      overlay.remove();
      financeSafeRender();
    } catch (err) {
      alert('Save failed: ' + (err.message||err));
    }
  };
}

function renderScash(c, scenData) {
  // Swap FINANCE_DATA, call renderFinance, then inject scenario banner
  const _saved = FINANCE_DATA;
  FINANCE_DATA = scenData;
  try {
    renderFinance(c);
  } catch (err) {
    console.error('renderScash: renderFinance failed:', err);
    FINANCE_DATA = _saved;
    c.innerHTML = '<div class="alert"><b>Render error.</b> ' + (err.message || err) + '</div>';
    return;
  }
  // Leave FINANCE_DATA pointing at scenData while tab is active — range filtering
  // happens via renderFinance which reads FINANCE_DATA. Restore on tab switch.

  // Inject scenario banner at top of page
  const ss = scenData.scenario_summary || {};
  const projects = scenData.scenario_projects || [];
  const fmt = n => (n<0?'-':'') + '$' + Math.abs(n||0).toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0});
  const fmtDate = iso => {
    if (!iso) return '—';
    const dt = new Date(iso + 'T12:00:00');
    const MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${MS[dt.getMonth()]} ${dt.getDate()}`;
  };
  const rows = projects.map(p => {
    const netColor = p.net >= 0 ? 'var(--grn)' : 'var(--red)';
    return `<tr>
      <td style="padding:6px 10px">${p.project_name}</td>

      <td style="padding:6px 10px;text-align:right;color:var(--mut);font-size:12px">${p.event_count||0} events</td>
    </tr>`;
  }).join('');
  const netColor = (ss.total_net||0) >= 0 ? 'var(--grn)' : 'var(--red)';
  const banner = `<div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:14px 16px;margin:0 0 16px 0">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--txt)">🔮 Scenario: 5 projects added to real finance state</div>
        <div style="font-size:11px;color:var(--mut)">These projects are NOT in JobTread — planning only. Numbers are rough.</div>
      </div>
      <div style="font-size:13px;color:var(--mut)">
        Total in <span style="color:var(--grn);font-weight:600">${fmt(ss.total_inflow||0)}</span> ·
        Total out <span style="color:var(--red);font-weight:600">${fmt(ss.total_outflow||0)}</span> ·
        Net <span style="color:${netColor};font-weight:600">${fmt(ss.total_net||0)}</span>
      </div>
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead>
        <tr style="color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px">
          <th style="padding:6px 10px;text-align:left">Project</th>
          <th style="padding:6px 10px;text-align:left">Starts</th>
          <th style="padding:6px 10px;text-align:right">Inflow</th>
          <th style="padding:6px 10px;text-align:right">Outflow</th>
          <th style="padding:6px 10px;text-align:right">Net</th>
          <th style="padding:6px 10px;text-align:right"></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
  // Prepend the banner inside the main content container
  c.insertAdjacentHTML('afterbegin', banner);
}

function renderFinance(c) {
  if (!FINANCE_DATA) return;
  const d = financeFilterByRange(FINANCE_DATA);
  const s = d.summary;
  const fmt = n => (n<0?'-':'') + '$' + Math.abs(n||0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  const fmtK = n => (n<0?'-':'') + '$' + Math.abs(Math.round(n||0)).toLocaleString();
  const fmtDate = iso => {
    if (!iso) return '—';
    const dt = new Date(iso + 'T12:00:00');
    const MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${MS[dt.getMonth()]} ${dt.getDate()}`;
  };
  const amountCol = n => n > 0 ? 'var(--grn)' : 'var(--red)';
  const amountSign = n => (n > 0 ? '+' : '') + fmt(n);

  const bal = s.current_balance || 0;

  // ── Summary boxes (Jose 2026-07-13 redesign) — always computed over the FULL
  //    projection horizon from the unfiltered global data, so they don't move
  //    when the Cashflow Breakdown window changes. ──
  const G = FINANCE_DATA;
  const gtl = G.timeline || [];
  const horizonEnd = G.window_end;
  // First date each running balance dips below 0 (computed from the timeline so
  // it stays correct after client-side confirm toggles, not from stale summary).
  const negPot = gtl.find(e => e.running_balance != null && e.running_balance < 0) || null;
  const negConf = gtl.find(e => e.running_balance_confirmed != null && e.running_balance_confirmed < 0) || null;
  const breakdown = negPot ? negPot.date : null;
  // Quarter windows from item dates (year taken from the data date — no hardcoding)
  const finYr = parseInt((G.date || '').slice(0, 4), 10) || new Date().getFullYear();
  const qSum = (from, to, projOnly) => {
    let inn = 0, out = 0;
    gtl.forEach(e => {
      if (e.date < from || e.date > to) return;
      if (projOnly && (e.source_type === 'fixed_cost' || e.source_type === 'debt')) return;
      if (e.amount > 0) inn += e.amount; else out += Math.abs(e.amount);
    });
    return { inn: Math.round(inn * 100) / 100, out: Math.round(out * 100) / 100, net: Math.round((inn - out) * 100) / 100 };
  };
  const q3Tot = qSum(finYr + '-07-01', finYr + '-09-30', false);   // incl. fixed costs
  const q4Tot = qSum(finYr + '-10-01', finYr + '-12-31', false);   // incl. fixed costs
  const projTot = qSum('0000-00-00', '9999-99-99', true);          // full horizon, projects only
  const fcMonthly = (G.fixed_costs && G.fixed_costs.total_monthly_equivalent) || (G.summary && G.summary.fixed_costs_monthly) || 0;
  const fmtDateFull = iso => { if (!iso) return '—'; const dt = new Date(iso + 'T12:00:00'); const MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${MS[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}`; };
  // "Next runs negative" tile state
  const negInfo = ev => {
    if (!ev) return { val: 'Never', sub: `stays positive through ${fmtDateFull(horizonEnd)}`, col: 'var(--grn)', bg: 'rgba(18,183,106,.08)', bdr: 'rgba(18,183,106,.45)' };
    const daysOut = Math.max(0, Math.ceil((new Date(ev.date + 'T12:00:00') - new Date(G.date + 'T12:00:00')) / 86400000));
    const col = daysOut <= 14 ? 'var(--red)' : daysOut <= 45 ? 'var(--ylw)' : 'var(--org)';
    return { val: fmtDateFull(ev.date), sub: (daysOut === 0 ? 'today' : `in ${daysOut} days`) + ` · on "${(ev.label || '').slice(0, 38)}"`, col, bg: 'rgba(240,68,56,.07)', bdr: col };
  };
  const negC = negInfo(negConf), negP = negInfo(negPot);

  const live = window._financeLive === true;
  // Count ALL scenario data (overrides + additions + deletions) for the active scenario.
  // On baseline, this surfaces the legacy 'default' bucket counts so the Reset button
  // can clear leftover edits/adds/deletes from the previous workflow.
  const scenInfo = (d.scenario || {});
  const hasOverrides = (scenInfo.overrides_count || 0)
    + (scenInfo.additions_count || 0)
    + (scenInfo.deletions_count || 0)
    || (d.sources && d.sources.scenario_overrides_count) || 0;

  // Range info — effective start is whichever is later: today or the window start (Q4 starts Oct 1)
  const rangeEnd = new Date(d._rangeEnd + 'T12:00:00');
  const effStartStr = (d._rangeStart && d._rangeStart > d.date) ? d._rangeStart : d.date;
  const effStart = new Date(effStartStr + 'T12:00:00');
  const rangeDays = Math.max(1, Math.round((rangeEnd - effStart) / 86400000));
  const rangeEndFmt = rangeEnd.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  const rangeStartFmt = effStartStr === d.date ? 'Today' : effStart.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  const rangeLbl = { 'month': 'This month', 'q3': 'Q3', 'q4': 'Q4' }[window._financeRange || 'month'] || 'This month';

  let h = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:12px">
      <div>
        <div class="page-title">${window._financeV2 ? 'Finance V2 <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px;background:rgba(75,134,253,.15);color:var(--blu);margin-left:8px;vertical-align:middle">overhead-trim simulation</span>' : 'Finance'}</div>
        <div class="page-sub">Balance · Projects · Fixed costs · <b style="color:var(--txt)">${rangeStartFmt} → ${rangeEndFmt}</b> (${rangeDays} days) · As of ${d.date}
          ${live ? '<span style="color:var(--grn);font-weight:600;margin-left:8px">● LIVE</span>' : '<span style="color:var(--ylw);margin-left:8px">● read-only (static JSON)</span>'}
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button onclick="financePaymentRoute()" style="padding:7px 12px;font-size:12px;font-weight:700;background:var(--acc);color:#fff;border:1px solid var(--acc);border-radius:6px;cursor:pointer" title="Escenario: ruta de pagos optimizada (reglas de Jose) — decision-support, no ejecuta nada">🧭 Ruta de Pagos</button>
        <button onclick="financePrintSummary()" style="padding:7px 12px;font-size:12px;font-weight:600;background:var(--card-h);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;cursor:pointer">📄 Print Summary</button>
        <button onclick="financeOpenAudit()" ${live?'':'disabled'} style="padding:7px 12px;font-size:12px;font-weight:600;background:var(--card-h);color:var(--txt);border:1px solid var(--ylw);border-radius:6px;cursor:${live?'pointer':'not-allowed'};opacity:${live?'1':'.4'}" title="See and clear every manually-entered row">🧹 Audit Manual Entries</button>
        <button onclick="financeResetScenarios()" style="padding:7px 12px;font-size:12px;font-weight:600;background:var(--card-h);color:var(--txt);border:1px solid var(--ylw);border-radius:6px;cursor:pointer">↺ Reset edits${hasOverrides ? ' ('+hasOverrides+')' : ''}</button>
        <button onclick="financeShowConfig()" style="padding:7px 12px;font-size:12px;font-weight:500;background:var(--card);color:var(--txt2);border:1px solid var(--bdr);border-radius:6px;cursor:pointer">⚙ Settings</button>
      </div>
    </div>

    <!-- Prominent Quick Add bar (always visible when LIVE) -->
    <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;font-weight:700">${live?'Quick add →':'Read-only — enable API in ⚙ Settings to add entries'}</span>
      <button onclick="financeAddEntry('bank')" ${live?'':'disabled'} style="padding:8px 14px;font-size:13px;font-weight:600;background:${live?'var(--grn)':'var(--card-h)'};color:#fff;border:none;border-radius:6px;cursor:${live?'pointer':'not-allowed'};opacity:${live?'1':'.4'}">💵 Bank Balance</button>
      <button onclick="financeAddEntry('petty')" ${live?'':'disabled'} style="padding:8px 14px;font-size:13px;font-weight:600;background:${live?'var(--org)':'var(--card-h)'};color:#fff;border:none;border-radius:6px;cursor:${live?'pointer':'not-allowed'};opacity:${live?'1':'.4'}">🧾 Petty Cash</button>
      <button onclick="financeAddEntry('misc')" ${live?'':'disabled'} style="padding:8px 14px;font-size:13px;font-weight:600;background:${live?'var(--red)':'var(--card-h)'};color:#fff;border:none;border-radius:6px;cursor:${live?'pointer':'not-allowed'};opacity:${live?'1':'.4'}">💸 Misc Expense</button>
      <button onclick="financeAddEntry('income')" ${live?'':'disabled'} style="padding:8px 14px;font-size:13px;font-weight:600;background:${live?'var(--blu)':'var(--card-h)'};color:#fff;border:none;border-radius:6px;cursor:${live?'pointer':'not-allowed'};opacity:${live?'1':'.4'}">💰 Income</button>
    </div>
    ${!live ? `<div class="alert" style="background:var(--ylw-s);border-color:var(--ylw-b);color:var(--ylw)"><div><b>Read-only mode.</b> You're seeing the static JSON snapshot from the last dashboard refresh. To enable Add/Edit/Scenario buttons, click ⚙ Settings and enter the tunnel URL + bearer token from the Mac. ${window._financeApiError ? '<span style="opacity:.7"> (last error: '+window._financeApiError+')</span>' : ''}</div></div>` : ''}

    <!-- Row 1: balance + early-warning "next runs negative" boxes + quarter nets -->
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;align-items:stretch">
      <div style="flex:1.1;min-width:160px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px">
        <div style="color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700">Current Balance</div>
        <div style="font-family:var(--mono);font-weight:700;font-size:20px;color:var(--txt);margin-top:4px">${fmtK(bal)}</div>
        ${(d.paid_since_balance && d.paid_since_balance.summary && d.paid_since_balance.summary.remaining_balance != null) ? `<div style="font-size:10px;color:var(--dim);margin-top:3px">Saldo restante (hoy): <b style="color:${d.paid_since_balance.summary.remaining_balance >= 0 ? 'var(--grn)' : 'var(--red)'}">${fmtK(d.paid_since_balance.summary.remaining_balance)}</b></div>` : `<div style="font-size:10px;color:var(--dim);margin-top:3px">as of ${G.bank && G.bank.as_of || d.date}</div>`}
      </div>
      <div style="flex:1.4;min-width:200px;background:${negC.bg};border:1.5px solid ${negC.bdr};border-radius:var(--r);padding:10px 12px" title="First date the CONFIRMED-only running balance goes below $0 (only movements marked ☑ confirmed count)">
        <div style="color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700">⚠ Next Runs Negative <span style="color:var(--grn)">(Confirmed)</span></div>
        <div style="font-family:var(--mono);font-weight:700;font-size:20px;color:${negC.col};margin-top:4px">${negC.val}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:3px">${negC.sub}</div>
      </div>
      <div style="flex:1.4;min-width:200px;background:${negP.bg};border:1.5px solid ${negP.bdr};border-radius:var(--r);padding:10px 12px" title="First date the COMBINED running balance (confirmed + potential movements) goes below $0">
        <div style="color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700">⚠ Next Runs Negative <span style="color:var(--blu)">(Potential)</span></div>
        <div style="font-family:var(--mono);font-weight:700;font-size:20px;color:${negP.col};margin-top:4px">${negP.val}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:3px">${negP.sub}</div>
      </div>
      <div style="width:1px;background:var(--bdr);margin:2px 4px"></div>
      <div style="flex:1;min-width:140px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px" title="Net cashflow ${finYr}-07-01 → ${finYr}-09-30 (incl. fixed costs; projection starts ${d.date})">
        <div style="color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700">Net Q3</div>
        <div style="font-family:var(--mono);font-weight:700;font-size:20px;color:${q3Tot.net >= 0 ? 'var(--grn)' : 'var(--red)'};margin-top:4px">${q3Tot.net >= 0 ? '+' : ''}${fmtK(q3Tot.net)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:3px">Jul 1 → Sep 30</div>
      </div>
      <div style="flex:1;min-width:140px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px" title="Net cashflow ${finYr}-10-01 → ${finYr}-12-31 (incl. fixed costs)">
        <div style="color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700">Net Q4</div>
        <div style="font-family:var(--mono);font-weight:700;font-size:20px;color:${q4Tot.net >= 0 ? 'var(--grn)' : 'var(--red)'};margin-top:4px">${q4Tot.net >= 0 ? '+' : ''}${fmtK(q4Tot.net)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:3px">Oct 1 → Dec 31</div>
      </div>
    </div>

    <!-- Row 2: project-only horizon totals + quarter in/out (incl. fixed) + fixed-cost baseline -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:8px;margin-bottom:16px;font-size:12px">
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 12px" title="All project inflows from today through ${fmtDateFull(horizonEnd)} — fixed costs excluded">
        <div style="color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px">Incoming Total</div>
        <div style="color:var(--grn);font-family:var(--mono);font-weight:700;font-size:16px">+${fmtK(projTot.inn)}</div>
        <div style="color:var(--dim);font-size:10px;margin-top:2px">projects · today → ${fmtDateFull(horizonEnd)}</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 12px" title="All project outflows from today through ${fmtDateFull(horizonEnd)} — fixed costs excluded">
        <div style="color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px">Outgoing Total (Projects)</div>
        <div style="color:var(--red);font-family:var(--mono);font-weight:700;font-size:16px">-${fmtK(projTot.out)}</div>
        <div style="color:var(--dim);font-size:10px;margin-top:2px">fixed costs excluded</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 12px" title="Q3 = Jul 1 → Sep 30 · includes fixed costs (projection starts ${d.date})">
        <div style="color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px">Q3 · In / Out</div>
        <div style="font-family:var(--mono);font-weight:700;font-size:16px"><span style="color:var(--grn)">+${fmtK(q3Tot.inn)}</span> <span style="color:var(--dim);font-weight:400">/</span> <span style="color:var(--red)">-${fmtK(q3Tot.out)}</span></div>
        <div style="color:var(--dim);font-size:10px;margin-top:2px">incl. fixed costs</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 12px" title="Q4 = Oct 1 → Dec 31 · includes fixed costs">
        <div style="color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px">Q4 · In / Out</div>
        <div style="font-family:var(--mono);font-weight:700;font-size:16px"><span style="color:var(--grn)">+${fmtK(q4Tot.inn)}</span> <span style="color:var(--dim);font-weight:400">/</span> <span style="color:var(--red)">-${fmtK(q4Tot.out)}</span></div>

        <div style="color:var(--org);font-family:var(--mono);font-weight:700;font-size:16px">${fmtK(fcMonthly)}<span style="font-size:11px;color:var(--dim);font-weight:400">/mo</span></div>

  if (breakdown) {

  }

  // ── Range selector + time-unit slider + aggregated summary ──
  const unit = window._financeUnit || 'week';
  const view = window._financeView || 'table';
  const range = window._financeRange || 'month';
  const pill = (val, label) => `<button onclick="financeSetUnit('${val}')" style="padding:7px 18px;font-size:13px;font-weight:600;background:${unit===val?'var(--blu)':'transparent'};color:${unit===val?'#fff':'var(--txt2)'};border:none;border-radius:4px;cursor:pointer;transition:all .12s">${label}</button>`;

  <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">
    <span style="font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;font-weight:600">Window:</span>
    <div style="display:inline-flex;background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:2px">
