<!doctype html>
<html lang="es"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>🛒 Purchases — Coordinación de compras</title>
<style>
:root{--bg:#0f141b;--card:#171e27;--card2:#1d2630;--line:#2a3540;--tx:#e6edf3;--mut:#9aa7b4;
--grn:#2ea043;--grnbg:#12351f;--red:#f85149;--redbg:#3a1615;--amb:#d29922;--ambbg:#3a2c10;--blu:#388bfd;--accent:#58a6ff;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.wrap{max-width:1180px;margin:0 auto;padding:18px 20px 60px}
.nav{margin-bottom:14px}.nav a{color:var(--accent);text-decoration:none;font-size:13px}
h1{font-size:21px;margin:0 0 3px}.sub{color:var(--mut);font-size:13px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:16px 0}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 14px}
.kpi .lab{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.kpi .val{font-size:22px;font-weight:700;margin-top:3px}
.kpi.red .val{color:var(--red)}.kpi.amb .val{color:var(--amb)}.kpi.grn .val{color:var(--grn)}
.banner{background:var(--redbg);border:1px solid var(--red);border-radius:10px;padding:12px 14px;margin:14px 0}
.banner b{color:#ffb4ab}
.banner .row{display:flex;justify-content:space-between;gap:10px;padding:4px 0;border-top:1px solid rgba(248,81,73,.2);font-size:13px}
.banner .row:first-of-type{border-top:0;margin-top:6px}
.legend{color:var(--mut);font-size:12px;margin:6px 0 2px}
.proj{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:14px 0;overflow:hidden}
.ph{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 15px;background:var(--card2);border-bottom:1px solid var(--line);cursor:pointer}
.pn{font-size:15.5px;font-weight:650}
.pbadges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;background:rgba(88,166,255,.12);color:var(--accent)}
.badge.red{background:var(--redbg);color:#ffb4ab}.badge.amb{background:var(--ambbg);color:#f0c674}
.day{padding:2px 15px 8px}
.dh{font-size:12px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.03em;margin:11px 0 5px}
.dh.red{color:#ffb4ab}
.task{display:flex;align-items:center;gap:9px;padding:6px 9px;border-radius:8px;border:1px solid transparent}
.task:hover{background:var(--card2)}
.task.alertrow{background:var(--redbg);border-color:rgba(248,81,73,.4)}
.ti{width:20px;text-align:center;flex-shrink:0}
.tn{flex:1;font-size:13.5px;color:#dbe4ee}
.tr{flex-shrink:0;text-align:right}
.amt{color:var(--grn);font-weight:650;font-size:13.5px}
.miss{color:#ffb4ab;font-weight:650;font-size:12px;background:rgba(248,81,73,.15);padding:2px 7px;border-radius:6px}
.steplab{color:var(--mut);font-size:12px}
.empty{color:var(--mut);padding:12px 15px;font-size:13px}
.collapsed .day{display:none}
.ft{color:var(--mut);font-size:11.5px;margin-top:26px;text-align:center}
/* gate */
#gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:9}
#gate input{background:var(--card);border:1px solid var(--line);color:var(--tx);padding:10px 12px;border-radius:8px;font-size:15px}
#gate button{background:var(--accent);border:0;color:#04101f;font-weight:600;padding:10px 18px;border-radius:8px;cursor:pointer}
#pwerr{color:var(--red);font-size:12px;visibility:hidden}
#app{display:none}
</style></head>
<body>
<div id="gate">
  <div style="font-size:34px">🛒</div>
  <div style="font-weight:600">Purchases — Coordinación de compras</div>
  <input id="pw" type="password" placeholder="Contraseña" onkeydown="if(event.key==='Enter')tryauth()">
  <button onclick="tryauth()">Entrar</button>
  <div id="pwerr">Contraseña incorrecta</div>
</div>

<div id="app"><div class="wrap">
  <div class="nav"><a href="index.html">← Dashboard</a></div>
  <h1>🛒 Purchases — Coordinación de compras</h1>
  <div class="sub" id="sub">Cargando…</div>
  <div class="legend">📋 Takeoff · 💲 Secure pricing · 🛒 Purchase material · 🚚 Delivery ETA · 📦 Confirm delivery</div>
  <div class="kpis" id="kpis"></div>
  <div id="alerts"></div>
  <div id="projects"></div>
  <div class="ft" id="ft"></div>
</div></div>

<script>
const MGMT_PW='Awesome';
let DATA=null;
function tryauth(){ if(document.getElementById('pw').value===MGMT_PW){ sessionStorage.setItem('mgmt_auth','1'); load(); } else { document.getElementById('pwerr').style.visibility='visible'; } }
function load(){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  fetch('data/purchases-latest.json?_='+Date.now()).then(r=>r.ok?r.json():null).then(j=>{ if(j){DATA=j;} render(); }).catch(render);
}
const fmt = n => '$'+Math.round(n).toLocaleString('en-US');
function taskRow(t){
  const right = t.step==='purchase'
    ? (t.alert ? '<span class="miss">⚠️ SIN MONTO</span>' : (t.amount?`<span class="amt">${fmt(t.amount)}</span>`:''))
    : `<span class="steplab">${t.step_label}</span>`;
  return `<div class="task ${t.alert?'alertrow':''}"><span class="ti">${t.icon}</span><span class="tn">${t.name}</span><span class="tr">${right}</span></div>`;
}
function render(){
  if(!DATA){ document.getElementById('sub').textContent='No se pudo cargar la data.'; return; }
  const s=DATA.summary;
  document.getElementById('sub').textContent = `Ventana ${DATA.window_start} → ${DATA.window_end} · actualizado ${(''+DATA.generated_at).slice(0,16).replace('T',' ')}`;
  document.getElementById('kpis').innerHTML =
    `<div class="kpi"><div class="lab">Tareas de compra</div><div class="val">${s.tasks}</div></div>`+
    `<div class="kpi"><div class="lab">Proyectos</div><div class="val">${s.projects}</div></div>`+
    `<div class="kpi red"><div class="lab">⚠️ Sin monto</div><div class="val">${s.alerts}</div></div>`+
    `<div class="kpi amb"><div class="lab">Vencidas</div><div class="val">${s.overdue}</div></div>`+
    `<div class="kpi grn"><div class="lab">Por comprar</div><div class="val">${fmt(s.to_purchase_amount)}</div></div>`;
  // alerts banner
  const al=DATA.alerts||[];
  document.getElementById('alerts').innerHTML = al.length ? (
    `<div class="banner"><b>⚠️ ${al.length} tarea(s) PURCHASE MATERIAL sin monto asignado</b> — falta poner el monto en la descripción para que entre al cashflow.`+
    al.map(a=>`<div class="row"><span>${a.project} — ${a.task}</span><span style="color:var(--mut)">vence ${a.due}</span></div>`).join('')+`</div>`) : '';
  // projects
  document.getElementById('projects').innerHTML = (DATA.projects||[]).map(p=>{
    const ov = p.overdue&&p.overdue.length ? `<div class="day"><div class="dh red">⏰ Vencidas (${p.overdue.length})</div>${p.overdue.map(taskRow).join('')}</div>` : '';
    const days = (p.days||[]).map(d=>`<div class="day"><div class="dh">${d.label}</div>${d.tasks.map(taskRow).join('')}</div>`).join('');
    const body = (ov||days) ? (ov+days) : '<div class="empty">Sin tareas de compras en la ventana.</div>';
    const c=p.counts;
    return `<div class="proj"><div class="ph" onclick="this.parentElement.classList.toggle('collapsed')">
      <div class="pn">${p.name}</div>
      <div class="pbadges"><span class="badge">${c.tasks} tareas</span>${c.alerts?`<span class="badge red">${c.alerts} sin monto</span>`:''}${c.overdue?`<span class="badge amb">${c.overdue} vencidas</span>`:''}</div>
    </div>${body}</div>`;
  }).join('');
  document.getElementById('ft').textContent = `Generado por Jade · Awesome Group · Data de JobTread · ${s.tasks} tareas de purchases`;
}
const EMBED = new URLSearchParams(location.search).has('embed') || window.self!==window.top;
if(EMBED){ document.getElementById('gate').style.display='none'; const nv=document.querySelector('.nav'); if(nv) nv.style.display='none'; }
if(EMBED || sessionStorage.getItem('mgmt_auth')==='1'){ load(); }
else { setTimeout(()=>{const e=document.getElementById('pw');if(e)e.focus();},60); }
</script>
</body></html>
