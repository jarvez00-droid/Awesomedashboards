<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>🏁 Month Race — CNG</title>
<style>
:root{--bg:#0f141b;--card:#171e27;--card2:#1d2630;--line:#2a3540;--tx:#e6edf3;--mut:#9aa7b4;
--blu:#388bfd;--accent:#58a6ff;--ghost:#8b9aab;--track:#222c37;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.wrap{max-width:1220px;margin:0 auto;padding:18px 20px 70px}
.nav{margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.nav a{color:var(--accent);text-decoration:none;font-size:13px}
.rbtn{background:var(--card2);border:1px solid var(--line);color:var(--accent);font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer}
.rbtn:active{background:var(--line)}
h1{font-size:22px;margin:0 0 3px}
.sub{color:var(--mut);font-size:13px}

/* ---- company hero ---- */
.hero{display:flex;flex-wrap:wrap;gap:18px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:16px 0 8px}
.hbig{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:160px}
.hbig .num{font-size:52px;font-weight:800;line-height:1;color:var(--accent)}
.hbig .lab{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-top:4px;text-align:center}
.hmid{flex:1;min-width:240px}
.hstats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.hstat .v{font-size:19px;font-weight:700}
.hstat .l{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.03em}
.spark{width:100%;height:52px;display:block}
.pill{font-size:11px;font-weight:700;padding:2px 10px;border-radius:999px;display:inline-block;background:var(--card2);border:1px solid var(--line);color:var(--mut)}
.pill.pace{color:var(--accent);border-color:rgba(88,166,255,.5)}

.legend{color:var(--mut);font-size:12px;margin:10px 2px 4px;display:flex;gap:16px;flex-wrap:wrap}
.legend b{color:var(--tx);font-weight:600}
.lgd{display:inline-flex;align-items:center;gap:5px}
.sw{width:22px;height:8px;border-radius:3px;display:inline-block;background:var(--accent)}
.sw.ghost{border-top:2px dashed var(--ghost);height:0;width:22px;background:none}

/* ---- PM sections ---- */
.pmsec{margin:22px 0 4px}
.pmhead{display:flex;align-items:baseline;gap:10px;padding:4px 2px 8px;border-bottom:1px solid var(--line);margin-bottom:4px}
.pmhead .pmn{font-size:16px;font-weight:750}
.pmhead .pms{color:var(--mut);font-size:12px}

/* ---- lanes ---- */
.lane{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:10px 0;overflow:hidden}
.lhead{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer}
.lhead:hover{background:var(--card2)}
.lname{min-width:150px;max-width:215px;flex-shrink:0;display:flex;gap:9px;align-items:center}
.avatar{width:30px;height:30px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#0b1017}
.lname .n{font-size:14px;font-weight:650;line-height:1.25}
.lname .pm{color:var(--mut);font-size:11px;margin-top:1px}
.trackwrap{flex:1;min-width:150px}
.trackrow{position:relative;height:30px;background:var(--track);border-radius:8px;overflow:visible;border:1px solid var(--line)}
.fill{position:absolute;top:0;left:0;bottom:0;border-radius:7px 0 0 7px;transition:width .5s ease}
.ghostline{position:absolute;top:-4px;bottom:-4px;width:0;border-left:2px dashed var(--ghost);z-index:3}
.ghostline .gl{position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--ghost);white-space:nowrap}
.sun{position:absolute;top:0;bottom:0;width:1px;background:rgba(154,167,180,.28);z-index:2}
.sun .st{position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--mut)}
.flag{position:absolute;right:-2px;top:50%;transform:translateY(-50%);font-size:15px;z-index:2}
.ladh{min-width:96px;max-width:150px;text-align:right;flex-shrink:0}
.ladh .p{font-size:26px;font-weight:800;line-height:1}
.ladh .s{color:var(--mut);font-size:10.5px;line-height:1.3;margin-top:4px}
.chev{color:var(--mut);flex-shrink:0;transition:transform .2s;font-size:13px}
.lane.open .chev{transform:rotate(90deg)}

/* ---- weekly chips ---- */
.wkchips{display:flex;gap:6px;flex-wrap:wrap;margin-top:18px}
.chip{font-size:10.5px;font-weight:600;color:var(--mut);background:var(--card2);border:1px solid var(--line);border-radius:6px;padding:1px 7px;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
.chip b{font-weight:750}

/* ---- ANIMATED RUNNER (faces right, CSS-keyframe stride + dust trail) ---- */
.runner{position:absolute;top:50%;transform:translate(-50%,-56%);z-index:4;width:32px;height:32px;transition:left .5s ease;pointer-events:none}
.rsvg{width:32px;height:32px;overflow:visible;display:block;animation:bob .38s ease-in-out infinite alternate}
.leg,.arm{transform-box:view-box}
.leg1{transform-origin:15px 19px;animation:swingA .38s ease-in-out infinite alternate}
.leg2{transform-origin:15px 19px;animation:swingB .38s ease-in-out infinite alternate}
.arm1{transform-origin:19px 12px;animation:swingB .38s ease-in-out infinite alternate}
.arm2{transform-origin:19px 12px;animation:swingA .38s ease-in-out infinite alternate}
@keyframes swingA{from{transform:rotate(-30deg)}to{transform:rotate(32deg)}}
@keyframes swingB{from{transform:rotate(32deg)}to{transform:rotate(-30deg)}}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-2.5px)}}
.dust{position:absolute;top:62%;left:-2px;width:5px;height:5px;border-radius:50%;background:rgba(154,167,180,.75);animation:puff .7s ease-out infinite}
.dust.d2{animation-delay:.23s;top:74%;width:4px;height:4px}
.dust.d3{animation-delay:.46s;top:52%;width:4px;height:4px}
@keyframes puff{0%{opacity:.85;transform:translateX(0) scale(.6)}100%{opacity:0;transform:translateX(-15px) scale(1.7)}}
@media (prefers-reduced-motion: reduce){
  .rsvg,.leg1,.leg2,.arm1,.arm2,.dust{animation:none}
}

/* ---- detail ---- */
.detail{display:none;padding:4px 15px 16px;border-top:1px solid var(--line);background:var(--card2)}
.lane.open .detail{display:block}
.dmeta{font-size:13px;color:var(--tx);background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 12px;margin-top:12px}
.dtitle{font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;margin:14px 0 7px}
.wk{border:1px solid var(--line);border-radius:9px;margin:8px 0;overflow:hidden}
.wkh{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 11px;background:var(--card);font-size:12.5px}
.wkh .wl{font-weight:650}
.wkh .wd{color:var(--mut);font-size:11px}
.tgt{padding:7px 11px;background:rgba(88,166,255,.06);border-top:1px solid var(--line);font-size:12.5px;color:var(--tx)}
.tgt b{font-weight:700}
.task{display:flex;align-items:center;gap:9px;padding:6px 11px;border-top:1px solid var(--line);font-size:13px}
.task .ic{width:18px;text-align:center;flex-shrink:0;color:var(--mut)}
.task .tn{flex:1;color:#dbe4ee}
.task .tg{font-size:10px;color:var(--mut);border:1px solid var(--line);border-radius:4px;padding:0 5px;flex-shrink:0}
.task.done .tn{color:var(--mut);text-decoration:line-through}
.task .mv{color:var(--ghost);font-size:11.5px;flex-shrink:0;font-style:italic}
.mvlist .task{border-top:1px solid var(--line)}
.empty{color:var(--mut);font-size:12.5px;padding:8px 2px}
.ft{color:var(--mut);font-size:11.5px;margin-top:28px;text-align:center}
@media(max-width:640px){
  .lhead{flex-wrap:wrap}
  .lname{max-width:none;min-width:120px}
  .trackwrap{order:3;flex-basis:100%;margin-top:8px}
  .ladh{min-width:60px}
  .hbig .num{font-size:42px}
}
</style></head>

/* Site-wide gate (Jose 2026-07-03): all of awesomedashboards behind the global password. */
(function(){
  if (sessionStorage.getItem('ag_site') === '1') return;
  document.documentElement.style.visibility='hidden';
  function show(){
    var ov=document.createElement('div'); ov.id='site-gate';
    ov.style.cssText='position:fixed;inset:0;background:#0f141b;z-index:2147483647;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px';
    ov.innerHTML='<div style="font-size:36px">🔒</div>'+
      '<div style="color:#e6edf3;font:700 17px -apple-system,BlinkMacSystemFont,sans-serif">Awesome Group</div>'+
      '<div style="color:#9aa7b4;font:13px -apple-system,sans-serif">Restricted — enter password</div>'+
      '<input id="sg-pw" type="password" placeholder="Password" autocomplete="off" style="background:#171e27;border:1px solid #2a3540;color:#e6edf3;padding:11px 14px;border-radius:8px;font-size:15px;width:230px;outline:none">'+
      '<button id="sg-btn" style="background:#388bfd;color:#fff;border:none;padding:10px 26px;border-radius:8px;font:700 14px -apple-system,sans-serif;cursor:pointer">Enter</button>'+
      '<div id="sg-err" style="color:#f85149;font:12px sans-serif;display:none">Wrong password</div>';
    document.body.appendChild(ov);
    document.documentElement.style.visibility='visible';
    function go(){ if(document.getElementById('sg-pw').value==='Awesome'){sessionStorage.setItem('ag_site','1');ov.remove();}
      else{document.getElementById('sg-err').style.display='block';document.getElementById('sg-pw').value='';} }

})();
</script>

<div class="wrap">
  <div class="nav">
    <a href="index.html">← Dashboard</a>
    <button class="rbtn" id="refresh" onclick="load(true)">↻ Refresh</button>
  </div>
  <h1>🏁 Month Race</h1>
  <div class="sub" id="sub">Loading…</div>

  <div id="hero"></div>

  <div class="legend">
    <span class="lgd">🏃 <b>Runner</b> = actual progress</span>
    <span class="lgd"><span class="sw ghost"></span> <b>Ghost line</b> = where the plan says you should be today</span>
    <span class="lgd">🏁 <b>Goal</b> = month target</span>
    <span class="lgd">│ <b>Sundays</b> = weekly checkpoints</span>
    <span class="lgd"><b>Big %</b> = progress toward the month goal (X/N)</span>
  </div>

  <div id="lanes"></div>
  <div class="ft" id="ft"></div>
</div>

<script>
const $=s=>document.querySelector(s);
let DATA=null;
const fmtM = n => (n==null?'—':'$'+Math.round(n).toLocaleString('en-US'));
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const fmtD = iso => { if(!iso) return '—'; const p=(''+iso).slice(0,10).split('-'); return MON[+p[1]-1]+' '+(+p[2]); };

/* One vivid identity color per project — assigned by stable sorted project id. */
const PALETTE=['#58a6ff','#bc8cff','#ff9f43','#2dd4bf','#f472b6','#eab308','#4ade80','#38bdf8','#fb7185','#a78bfa','#fbbf24','#34d399'];
let COLOR={};
function assignColors(){
  COLOR={};
  DATA.projects.map(p=>p.id).sort().forEach((id,i)=>{ COLOR[id]=PALETTE[i%PALETTE.length]; });
}
function hexA(hex,a){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function initials(name){
  const w=(name||'').replace(/[^A-Za-z ]/g,'').trim().split(/\s+/);
  return ((w[0]||'')[0]||'?')+(((w[1]||'')[0])||'');
}

function load(manual){
  if(manual){ const b=$('#refresh'); if(b){b.textContent='↻ …';} }
  fetch('data/race-latest.json?_='+Date.now())
    .then(r=>r.ok?r.json():null)
    .then(j=>{ DATA=j; render(); const b=$('#refresh'); if(b)b.textContent='↻ Refresh'; })
    .catch(()=>{ render(); const b=$('#refresh'); if(b)b.textContent='↻ Refresh'; });
}

/* SVG sparkline: actual (solid) vs plan (dashed), % of the month goal */
function spark(daily, w, h, color){
  const pad=4, W=w, H=h, col=color||'#58a6ff';
  const days=daily.filter(d=>d.plan_pct!=null);
  if(days.length<2) return '';
  const n=days.length;
  const x=i=> pad + (W-2*pad)*(i/(n-1));
  const y=v=> H-pad - (H-2*pad)*(Math.max(0,Math.min(100,v))/100);
  let planPts=[], realPts=[];
  days.forEach((d,i)=>{
    planPts.push(x(i)+','+y(d.plan_pct));
    if(d.real_pct!=null) realPts.push(x(i)+','+y(d.real_pct));
  });
  const grid=[0,50,100].map(v=>`<line x1="${pad}" y1="${y(v)}" x2="${W-pad}" y2="${y(v)}" stroke="#2a3540" stroke-width="1"/>`).join('');
  const planPoly=`<polyline points="${planPts.join(' ')}" fill="none" stroke="#8b9aab" stroke-width="1.6" stroke-dasharray="4 3"/>`;
  const realPoly=realPts.length?`<polyline points="${realPts.join(' ')}" fill="none" stroke="${col}" stroke-width="2.4"/>`:'';
  const lastReal=days.filter(d=>d.real_pct!=null).slice(-1)[0];
  const dot=lastReal?`<circle cx="${x(days.indexOf(lastReal))}" cy="${y(lastReal.real_pct)}" r="3" fill="${col}"/>`:'';
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${grid}${planPoly}${realPoly}${dot}</svg>`;
}

/* Animated stick-figure runner, drawn FACING RIGHT, legs/arms on CSS keyframes. */
function runnerSVG(color){
  return `<span class="dust"></span><span class="dust d2"></span><span class="dust d3"></span>`+
  `<svg class="rsvg" viewBox="0 0 32 32">`+
    `<circle cx="21" cy="6" r="3.4" fill="${color}"/>`+
    `<g fill="none" stroke="${color}" stroke-width="2.6" stroke-linecap="round">`+
      `<path d="M20 9.5 L15 19"/>`+
      `<path class="arm arm1" d="M19 12 L25.5 15.5"/>`+
      `<path class="arm arm2" d="M19 12 L12.5 15"/>`+
      `<path class="leg leg1" d="M15 19 L21.5 24.5 L23 30"/>`+
      `<path class="leg leg2" d="M15 19 L10.5 24 L5.5 25.5"/>`+
    `</g>`+
  `</svg>`;
}

/* Neutral pace label — no traffic-light colors (Jose v3). */
function paceLabel(done,due){
  if(due<=0) return {t:'nothing due yet',cls:''};
  const d=done-due;
  if(d>=0) return {t:d>0?`ahead by ${d}`:'on pace',cls:'pace'};
  return {t:`${-d} behind plan`,cls:''};
}

/* Cumulative plan fraction at each Sunday (checkpoint positions on the track) */
function sundayPositions(weeks, total){
  let cum=0, out=[];
  weeks.forEach(w=>{ cum+=w.total; out.push(total? (100*cum/total):0); });
  return out;
}

function renderHero(){
  const c=DATA.company;
  const mp=(c.monthly_pct!=null?c.monthly_pct:c.runner_pct);
  const pace=paceLabel(c.done_total,c.due_to_today);
  const money = c.july_money && c.july_money.length===2 ? `${fmtM(c.july_money[0])} <span style="color:var(--mut);font-size:12px">/ ${fmtM(c.july_money[1])} +10% cost</span>` : '—';
  $('#hero').innerHTML=`<div class="hero">
    <div class="hbig">
      <div class="num">${mp}%</div>
      <div class="lab">July goal · ${c.done_total}/${c.total_target} tasks</div>
      <div class="pill ${pace.cls}" style="margin-top:7px">${pace.t}</div>
      <div style="color:var(--mut);font-size:11px;margin-top:6px">expected by today: <b style="color:var(--tx)">${c.ghost_pct}%</b></div>
    </div>
    <div class="hmid">
      <div class="hstats">
        <div class="hstat"><div class="v">${c.done_total}/${c.total_target}</div><div class="l">Month goal</div></div>
        <div class="hstat"><div class="v">${c.done_total}/${c.due_to_today}</div><div class="l">Due by today</div></div>
        <div class="hstat"><div class="v">${c.projects}</div><div class="l">Projects</div></div>
        <div class="hstat"><div class="v" style="font-size:16px">${money}</div><div class="l">Month production ($)</div></div>
      </div>
      ${spark(c.daily,560,52)}
      <div style="color:var(--mut);font-size:11px">Actual (solid) vs plan (dashed) · % of the month's tasks completed day by day</div>
    </div>
  </div>`;
}

function taskRow(t){
  const ic = t.status==='done'?'✓':(t.status==='moved'?'▸':'○');
  const mv = t.moved_days>0?`<span class="mv">+${t.moved_days}d moved</span>`:'';
  return `<div class="task ${t.status==='done'?'done':''}"><span class="ic">${ic}</span>`+
    `<span class="tn">${t.name}</span><span class="tg">${t.type}</span>${mv}</div>`;
}

function detail(p,col){
  const curIdx=p.weeks.findIndex(w=>w.is_current);
  const cur = curIdx>=0?p.weeks[curIdx]:null;
  const wpct = w => w.pct==null ? '' : ` · ${Math.round(w.pct)}%`;
  const tgtRow = w => w.target_task ? `<div class="tgt">🎯 Week target: <b>${w.target_task}</b> <span style="color:var(--mut)">(due ${fmtD(w.target_due)})</span></div>` : '';
  let html='';
  html+=`<div class="dmeta" style="border-left:3px solid ${col}">🎯 Month goal: <b>${p.total_target} tasks</b> · <b>${p.done_total}</b> done (${p.monthly_pct!=null?p.monthly_pct:p.runner_pct}%)</div>`;
  html+=`<div class="dtitle">Day-by-day progress</div>${spark(p.daily,640,60,col)}`;
  if(cur){
    html+=`<div class="dtitle">Current week — deadline Sunday ${fmtD(cur.deadline)}</div>`;
    html+=`<div class="wk" style="border-color:${hexA(col,.55)}"><div class="wkh" style="border-left:3px solid ${col}"><span class="wl">${cur.label}</span><span class="wd">${cur.done}/${cur.total} done${wpct(cur)}</span></div>`;
    html+=tgtRow(cur);
    html+= cur.tasks.length? cur.tasks.map(taskRow).join('') : '<div class="empty" style="padding:8px 11px">No milestones this week.</div>';
    html+=`</div>`;
  }
  html+=`<div class="dtitle">All weeks of the month</div>`;
  p.weeks.forEach((w,i)=>{
    if(i===curIdx) return;
    html+=`<div class="wk"><div class="wkh"><span class="wl">${w.label}</span><span class="wd">${w.done}/${w.total} done${wpct(w)} · Sun ${fmtD(w.deadline)}</span></div>`;
    html+=tgtRow(w);
    html+= w.tasks.length? w.tasks.map(taskRow).join('') : '<div class="empty" style="padding:8px 11px">No milestones.</div>';
    html+=`</div>`;
  });
  if(p.moved && p.moved.length){
    html+=`<div class="dtitle">⏱ Rescheduled from plan (${p.moved_count})</div><div class="mvlist wk">`;
    html+= p.moved.map(m=>`<div class="task"><span class="ic">▸</span><span class="tn">${m.name}</span><span class="mv">${fmtD(m.from)} → ${fmtD(m.to)} (+${m.days}d)</span></div>`).join('');
    html+=`</div>`;
  }
  return html;
}

function shortName(n){ n=n||''; return n.length>30 ? n.slice(0,28)+'…' : n; }

function weekChips(p,col){
  return `<div class="wkchips">`+p.weeks.map((w,i)=>{
    const pct = w.pct==null ? '' : ` · ${Math.round(w.pct)}%`;
    const tgt = w.target_task ? shortName(w.target_task) : 'no tasks';
    const cur = w.is_current ? `style="border-color:${col};color:${col};background:${hexA(col,.09)}"` : '';
    const title = (w.target_task? 'Target: '+w.target_task+' · ':'')+'deadline Sun '+fmtD(w.deadline);
    return `<span class="chip" ${cur} title="${title.replace(/"/g,'&quot;')}">W${i+1} → <b>${tgt}</b> (${w.done}/${w.total}${pct})</span>`;
  }).join('')+`</div>`;
}

function renderLane(p){
  const col=COLOR[p.id]||'#58a6ff';
  const mp=(p.monthly_pct!=null?p.monthly_pct:p.runner_pct);
  const pace=paceLabel(p.done_total,p.due_to_today);
  const suns=sundayPositions(p.weeks, p.total_target);
  let sunHtml=suns.map((pos,i)=>`<div class="sun" style="left:${Math.min(100,pos)}%"><span class="st">${fmtD(DATA.week_sundays[i])}</span></div>`).join('');
  const ghost=`<div class="ghostline" style="left:${Math.min(100,p.ghost_pct)}%"><span class="gl">plan today ${p.ghost_pct}%</span></div>`;
  const runner=`<span class="runner" style="left:${Math.min(100,Math.max(2,p.runner_pct))}%">${runnerSVG(col)}</span>`;
  const money = p.july_money && p.july_money.length===2 ? ` · ${fmtM(p.july_money[0])} this month` : '';
  return `<div class="lane" id="lane-${p.id}" style="border-left:3px solid ${col}">
    <div class="lhead" onclick="document.getElementById('lane-${p.id}').classList.toggle('open')">
      <div class="lname">
        <span class="avatar" style="background:${col}">${initials(p.client||p.name)}</span>
        <div><div class="n">${p.name}</div><div class="pm">${p.done_total}/${p.total_target} tasks${money}</div></div>
      </div>
      <div class="trackwrap">
        <div class="trackrow">
          <div class="fill" style="width:${Math.min(100,p.runner_pct)}%;background:linear-gradient(90deg,${hexA(col,.45)},${col})"></div>
          ${sunHtml}${ghost}${runner}
          <span class="flag">🏁</span>
        </div>
        ${weekChips(p,col)}
      </div>
      <div class="ladh"><div class="p" style="color:${col}">${mp}%</div><div class="s"><span class="pill ${pace.cls}">${pace.t}</span></div></div>
      <span class="chev">▶</span>
    </div>
    <div class="detail">${detail(p,col)}</div>
  </div>`;
}

/* Group lanes by PM (first JobTread PM; alphabetical sections). */
function renderLanes(){
  const groups={};
  DATA.projects.forEach(p=>{
    const pm=(p.pms&&p.pms.length)?p.pms[0]:'Unassigned';
    (groups[pm]=groups[pm]||[]).push(p);
  });
  const names=Object.keys(groups).sort((a,b)=>a.localeCompare(b));
  $('#lanes').innerHTML=names.map(pm=>{
    const ps=groups[pm];
    const done=ps.reduce((s,p)=>s+p.done_total,0), tot=ps.reduce((s,p)=>s+p.total_target,0);
    return `<div class="pmsec">
      <div class="pmhead"><span class="pmn">👤 ${pm}</span><span class="pms">${ps.length} project${ps.length>1?'s':''} · ${done}/${tot} July tasks</span></div>
      ${ps.map(renderLane).join('')}
    </div>`;
  }).join('');
}

function render(){
  if(!DATA){ $('#sub').textContent='Could not load race data.'; return; }
  assignColors();
  const gen=(''+DATA.generated_at);
  $('#sub').innerHTML=`${DATA.month} · as of ${fmtD(DATA.today)} · updated ${fmtD(gen)} ${gen.slice(11,16)} · deadlines every <b>Sunday</b>`;
  renderHero();
  renderLanes();
  $('#ft').textContent=`Generated by Jade · Awesome Group · baseline 2026-07-06 vs live JobTread · big % = month-goal progress · Action/Critical-Path task count`;
}

load();
// Near real time: silent re-fetch every 5 min (the JSON regenerates every 20 min).
setInterval(()=>load(false), 300000);
</script>
</body></html>
